<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500">
  <title>Font Yükleme Akışı</title>
  <desc>Aynı AssetSource iki tüketiciyi besler: TextSystem ve SVG renderer fontdb'si.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .when { font: 700 12px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.82; letter-spacing: 0.3px; }
      .divider { stroke: #ffffff; stroke-opacity: 0.22; stroke-width: 1; }

      .arrow-line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      .footer-text { font: 600 14px system-ui, -apple-system, sans-serif; fill: #4338ca; text-anchor: middle; }
      .footer-tag { font: 800 12px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }

      @keyframes flow-dash {
        to { stroke-dashoffset: -28; }
      }
      .flow {
        stroke-dasharray: 7 7;
        animation: flow-dash 9s linear infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.72; }
      }
      .glow-1 { animation: pulse 10s ease-in-out infinite; }
      .glow-2 { animation: pulse 10s ease-in-out infinite; animation-delay: 1.5s; }
      .glow-3 { animation: pulse 10s ease-in-out infinite; animation-delay: 3s; }
      .glow-4 { animation: pulse 10s ease-in-out infinite; animation-delay: 4.5s; }
      .glow-5 { animation: pulse 10s ease-in-out infinite; animation-delay: 6s; }

      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; }
        .glow-1, .glow-2, .glow-3, .glow-4, .glow-5 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="520" y="48" class="title">Font Yükleme Akışı</text>
  <text x="520" y="76" class="sub">Aynı AssetSource iki tüketiciyi besler: TextSystem ve SVG renderer fontdb'si.</text>

  <!-- ================= OKLAR (kartların altında) ================= -->
  <path d="M 240 230 H 312" class="arrow-line flow" />

  <path d="M 520 230 C 562 230 562 160 592 160" class="arrow-line flow" />
  <path d="M 520 230 C 562 230 562 300 592 300" class="arrow-line flow" />

  <path d="M 800 160 C 832 160 832 230 854 230" class="arrow-line flow" />
  <path d="M 800 300 C 832 300 832 230 854 230" class="arrow-line flow" />

  <!-- ================= ADIM 1 — assets/fonts/ ================= -->
  <g transform="translate(40, 170)" class="glow-1">
    <rect width="200" height="120" rx="12" fill="url(#g-slate)" filter="url(#shadow)" />
    <text x="100" y="34" class="api">assets/fonts/</text>
    <line x1="18" y1="46" x2="182" y2="46" class="divider" />
    <text x="20" y="70" class="body">• IBM Plex Sans</text>
    <text x="20" y="91" class="body">• Lilex vb.</text>
    <text x="20" y="111" class="when">.ttf + Lisans Dosyaları</text>
  </g>

  <!-- ================= ADIM 2 — AssetSource ================= -->
  <g transform="translate(320, 170)" class="glow-2">
    <rect width="200" height="120" rx="12" fill="url(#g-violet)" filter="url(#shadow)" />
    <text x="100" y="34" class="api">AssetSource</text>
    <line x1="18" y1="46" x2="182" y2="46" class="divider" />
    <text x="20" y="70" class="body">• list("fonts")</text>
    <text x="20" y="91" class="body">• .ttf filtresi</text>
    <text x="20" y="111" class="when">Lisans dosyaları dışlanır</text>
  </g>

  <!-- ================= ADIM 3 ÜST — TextSystem ================= -->
  <g transform="translate(600, 110)" class="glow-3">
    <rect width="200" height="100" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="100" y="32" class="api">TextSystem</text>
    <line x1="18" y1="44" x2="182" y2="44" class="divider" />
    <text x="20" y="67" class="body">• add_fonts(...)</text>
    <text x="20" y="87" class="when">UI Metni ve Editör</text>
  </g>

  <!-- ================= ADIM 3 ALT — USVG fontdb ================= -->
  <g transform="translate(600, 250)" class="glow-4">
    <rect width="200" height="100" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="100" y="32" class="api">USVG fontdb</text>
    <line x1="18" y1="44" x2="182" y2="44" class="divider" />
    <text x="20" y="67" class="body">• load_system_fonts()</text>
    <text x="20" y="87" class="when">SVG Text Fallback</text>
  </g>

  <!-- ================= ADIM 4 — Pencere ================= -->
  <g transform="translate(860, 170)" class="glow-5">
    <rect width="140" height="120" rx="12" fill="url(#g-blue)" filter="url(#shadow)" />
    <text x="70" y="34" class="api">Pencere</text>
    <line x1="18" y1="46" x2="122" y2="46" class="divider" />
    <text x="20" y="70" class="body">• İlk Frame</text>
    <text x="20" y="111" class="when">Fallback Önlenir</text>
  </g>

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 420)">
    <rect width="960" height="48" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="16" y="14" width="84" height="20" rx="10" fill="#4f46e5" />
    <text x="58" y="28" class="footer-tag">KURAL</text>
    <text x="540" y="29" class="footer-text">with_assets önce kurulur, fontlar pencere açılmadan önce TextSystem'e eklenir.</text>
  </g>

</svg>
