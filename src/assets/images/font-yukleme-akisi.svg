<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420">
  <title>Font Yükleme Akışı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 22px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}
      .sub{font:13px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#475569}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}
      .head{font:700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#fff}
      .body{font:12px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#334155}
      .small{font:11px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#64748b}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="420" rx="10" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" class="title">Font Yükleme Akışı</text>
  <text x="480" y="60" text-anchor="middle" class="sub">Aynı AssetSource iki tüketiciyi besler: TextSystem ve SVG renderer fontdb'si.</text>

  <rect x="40" y="100" width="180" height="104" rx="8" class="card"/>
  <rect x="40" y="100" width="180" height="30" rx="8" fill="#0284c7"/>
  <path d="M40 122 H220 V130 H40 Z" fill="#0284c7"/>
  <text x="56" y="120" class="head">assets/fonts/</text>
  <text x="56" y="152" class="body">IBM Plex Sans</text>
  <text x="56" y="170" class="body">Lilex</text>
  <text x="56" y="188" class="small">.ttf + lisans dosyaları</text>

  <rect x="300" y="100" width="190" height="104" rx="8" class="card"/>
  <rect x="300" y="100" width="190" height="30" rx="8" fill="#7c3aed"/>
  <path d="M300 122 H490 V130 H300 Z" fill="#7c3aed"/>
  <text x="316" y="120" class="head">AssetSource</text>
  <text x="316" y="152" class="body">list("fonts")</text>
  <text x="316" y="170" class="body">.ttf filtresi</text>
  <text x="316" y="188" class="small">license dosyaları dışlanır</text>

  <rect x="570" y="88" width="170" height="92" rx="8" class="card"/>
  <rect x="570" y="88" width="170" height="30" rx="8" fill="#059669"/>
  <path d="M570 110 H740 V118 H570 Z" fill="#059669"/>
  <text x="586" y="108" class="head">TextSystem</text>
  <text x="586" y="140" class="body">add_fonts(...)</text>
  <text x="586" y="158" class="small">UI metni ve editör</text>

  <rect x="570" y="224" width="170" height="92" rx="8" class="card"/>
  <rect x="570" y="224" width="170" height="30" rx="8" fill="#d97706"/>
  <path d="M570 246 H740 V254 H570 Z" fill="#d97706"/>
  <text x="586" y="244" class="head">USVG fontdb</text>
  <text x="586" y="276" class="body">load_system_fonts</text>
  <text x="586" y="294" class="small">SVG text fallback</text>

  <rect x="800" y="150" width="120" height="92" rx="8" class="card"/>
  <rect x="800" y="150" width="120" height="30" rx="8" fill="#334155"/>
  <path d="M800 172 H920 V180 H800 Z" fill="#334155"/>
  <text x="816" y="170" class="head">Pencere</text>
  <text x="816" y="202" class="body">ilk frame</text>
  <text x="816" y="220" class="small">fallback önlenir</text>

  <path d="M220 152 H300" class="arrow"/>
  <path d="M490 140 H570" class="arrow"/>
  <path d="M490 164 C530 164 530 270 570 270" class="arrow"/>
  <path d="M740 134 C780 134 780 182 800 190" class="arrow"/>
  <path d="M740 270 C780 270 780 226 800 210" class="arrow"/>

  <rect x="130" y="338" width="700" height="42" rx="7" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="154" y="364" class="body">Sert sıra: with_assets önce kurulur, fontlar pencere açılmadan önce TextSystem'e eklenir.</text>
</svg>
