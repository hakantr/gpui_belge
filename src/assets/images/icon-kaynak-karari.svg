<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480">
  <title>İkon Kaynak Kararı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 13.5px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .when { font: 800 12px system-ui, -apple-system, sans-serif; fill: rgba(255, 255, 255, 0.82); letter-spacing: 0.3px; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .card { filter: url(#shadow); }

      .flow path { stroke-dasharray: 7 6; animation: dash 9s linear infinite; }
      @keyframes dash { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -130; } }
      @media (prefers-reduced-motion: reduce) {
        .flow path { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="46" class="title">İkon Kaynak Kararı</text>
  <text x="500" y="74" class="sub">Dosyanın konumu, enum eşlemesi ve renk davranışı birlikte seçilir.</text>

  <!-- ================= OKLAR (kartların altında) ================= -->
  <g class="flow">
    <path d="M 240 240 C 280 240 280 160 315 160" class="arrow-line" />
    <path d="M 240 240 C 280 240 280 320 315 320" class="arrow-line" />
    <path d="M 520 160 H 575" class="arrow-line" />
    <path d="M 520 320 H 575" class="arrow-line" />
    <path d="M 760 160 C 790 160 790 240 815 240" class="arrow-line" />
    <path d="M 760 320 C 790 320 790 240 815 240" class="arrow-line" />
  </g>

  <!-- ================= ADIM 1: KARAR ================= -->
  <g transform="translate(60, 180)">
    <rect width="180" height="120" rx="12" fill="url(#g-teal)" class="card" />
    <text x="90" y="35" class="api">Yeni SVG</text>
    <text x="20" y="68" class="body">• Tek renk mi?</text>
    <text x="20" y="92" class="when">Tema rengiyle mi</text>
    <text x="20" y="108" class="when">boyanacak?</text>
  </g>

  <!-- ================= ADIM 2: EVET ================= -->
  <g transform="translate(320, 100)">
    <rect width="200" height="120" rx="12" fill="url(#g-sky)" class="card" />
    <text x="100" y="35" class="api">IconName</text>
    <text x="20" y="68" class="body">• icons/*.svg</text>
    <text x="20" y="90" class="body">• snake_case path</text>
    <text x="20" y="111" class="when">Icon::new(...)</text>
  </g>

  <g transform="translate(580, 100)">
    <rect width="180" height="120" rx="12" fill="url(#g-green)" class="card" />
    <text x="90" y="35" class="api">svg()</text>
    <text x="20" y="68" class="body">• Alfa maskesi</text>
    <text x="20" y="90" class="body">• Geçerli renk</text>
    <text x="20" y="111" class="when">SvgRenderer</text>
  </g>

  <!-- ================= ADIM 2: HAYIR ================= -->
  <g transform="translate(320, 260)">
    <rect width="200" height="120" rx="12" fill="url(#g-violet)" class="card" />
    <text x="100" y="35" class="api">ImageSource</text>
    <text x="20" y="68" class="body">• Çok renkli logo</text>
    <text x="20" y="90" class="body">• Dış dosya / Tema ikonu</text>
    <text x="20" y="111" class="when">img() veya IconTheme</text>
  </g>

  <g transform="translate(580, 260)">
    <rect width="180" height="120" rx="12" fill="url(#g-amber)" class="card" />
    <text x="90" y="35" class="api">Raster Yol</text>
    <text x="20" y="68" class="body">• Renkler korunur</text>
    <text x="20" y="90" class="body">• Biçim yükleyici seçer</text>
    <text x="20" y="111" class="when">ImageAssetLoader</text>
  </g>

  <!-- ================= UI RENDER ================= -->
  <g transform="translate(820, 180)">
    <rect width="140" height="120" rx="12" fill="url(#g-slate)" class="card" />
    <text x="70" y="35" class="api">UI Motoru</text>
    <text x="20" y="68" class="body">• İkon</text>
    <text x="20" y="90" class="body">• Vektör</text>
    <text x="20" y="111" class="when">Tema Duyarlı</text>
  </g>

  <!-- ================= OK ETİKETLERİ ================= -->
  <g>
    <rect x="270" y="182" width="26" height="26" rx="8" fill="#f8fafc" stroke="#bbf7d0" stroke-width="1.5" />
    <text x="283" y="200" font-family="system-ui" font-weight="800" font-size="15" fill="#10b981" text-anchor="middle">E</text>
  </g>
  <g>
    <rect x="270" y="272" width="26" height="26" rx="8" fill="#f8fafc" stroke="#fecdd3" stroke-width="1.5" />
    <text x="283" y="290" font-family="system-ui" font-weight="800" font-size="15" fill="#e11d48" text-anchor="middle">H</text>
  </g>

</svg>
