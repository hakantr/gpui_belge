<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430">
  <title>İkon Kaynak Kararı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 22px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}
      .sub{font:13px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#475569}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}
      .head{font:700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#fff}
      .body{font:12px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#334155}
      .small{font:11px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#64748b}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="980" height="430" rx="10" fill="#f8fafc"/>
  <text x="490" y="36" text-anchor="middle" class="title">İkon Kaynak Kararı</text>
  <text x="490" y="60" text-anchor="middle" class="sub">Dosyanın konumu, enum eşlemesi ve renk davranışı birlikte seçilir.</text>

  <rect x="40" y="118" width="170" height="94" rx="8" class="card"/>
  <rect x="40" y="118" width="170" height="30" rx="8" fill="#0f766e"/>
  <path d="M40 140 H210 V148 H40 Z" fill="#0f766e"/>
  <text x="56" y="138" class="head">Yeni SVG</text>
  <text x="56" y="170" class="body">tek renk mi?</text>
  <text x="56" y="188" class="small">tema rengiyle boyanacak mı?</text>

  <rect x="280" y="74" width="190" height="104" rx="8" class="card"/>
  <rect x="280" y="74" width="190" height="30" rx="8" fill="#0284c7"/>
  <path d="M280 96 H470 V104 H280 Z" fill="#0284c7"/>
  <text x="296" y="94" class="head">IconName</text>
  <text x="296" y="126" class="body">icons/*.svg</text>
  <text x="296" y="144" class="body">snake_case path</text>
  <text x="296" y="162" class="small">Icon::new(...)</text>

  <rect x="280" y="244" width="190" height="104" rx="8" class="card"/>
  <rect x="280" y="244" width="190" height="30" rx="8" fill="#7c3aed"/>
  <path d="M280 266 H470 V274 H280 Z" fill="#7c3aed"/>
  <text x="296" y="264" class="head">ImageSource</text>
  <text x="296" y="296" class="body">çok renkli logo</text>
  <text x="296" y="314" class="body">dış dosya / tema ikonu</text>
  <text x="296" y="332" class="small">img() veya IconTheme</text>

  <rect x="560" y="74" width="180" height="104" rx="8" class="card"/>
  <rect x="560" y="74" width="180" height="30" rx="8" fill="#059669"/>
  <path d="M560 96 H740 V104 H560 Z" fill="#059669"/>
  <text x="576" y="94" class="head">svg()</text>
  <text x="576" y="126" class="body">alpha mask</text>
  <text x="576" y="144" class="body">current color</text>
  <text x="576" y="162" class="small">SvgRenderer</text>

  <rect x="560" y="244" width="180" height="104" rx="8" class="card"/>
  <rect x="560" y="244" width="180" height="30" rx="8" fill="#d97706"/>
  <path d="M560 266 H740 V274 H560 Z" fill="#d97706"/>
  <text x="576" y="264" class="head">raster yol</text>
  <text x="576" y="296" class="body">renkler korunur</text>
  <text x="576" y="314" class="body">format loader seçer</text>
  <text x="576" y="332" class="small">ImageAssetLoader</text>

  <rect x="812" y="154" width="120" height="104" rx="8" class="card"/>
  <rect x="812" y="154" width="120" height="30" rx="8" fill="#334155"/>
  <path d="M812 176 H932 V184 H812 Z" fill="#334155"/>
  <text x="828" y="174" class="head">UI</text>
  <text x="828" y="206" class="body">Icon</text>
  <text x="828" y="224" class="body">Vector</text>
  <text x="828" y="242" class="small">theme aware</text>

  <path d="M210 150 C244 122 250 112 280 112" class="arrow"/>
  <path d="M210 182 C244 240 250 286 280 296" class="arrow"/>
  <path d="M470 126 H560" class="arrow"/>
  <path d="M470 296 H560" class="arrow"/>
  <path d="M740 126 C790 126 790 188 812 198" class="arrow"/>
  <path d="M740 296 C790 296 790 234 812 224" class="arrow"/>
</svg>
