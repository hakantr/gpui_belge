<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280">
  <title>GPUI Render Döngüsü</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />

  <text x="430" y="38" text-anchor="middle" class="title">GPUI Render Döngüsü</text>
  <text x="430" y="62" text-anchor="middle" class="subtitle">Her cx.notify() çağrısı tam bir render döngüsü tetikler.</text>

  <rect x="50" y="100" width="170" height="70" rx="8" class="card"/>
  <text x="135" y="130" class="label" text-anchor="middle">Event / State</text>

  <path d="M 220 135 L 320 135" class="arrowSoft"/>
  <text x="270" y="122" class="edge" text-anchor="middle">cx.notify()</text>

  <rect x="320" y="100" width="200" height="70" rx="8" class="card"/>
  <text x="420" y="128" class="label" text-anchor="middle">Render::render</text>
  <text x="420" y="150" class="body" text-anchor="middle">(Element Tree)</text>

  <path d="M 520 135 L 620 135" class="arrowSoft"/>

  <rect x="620" y="100" width="200" height="70" rx="8" class="card"/>
  <text x="720" y="128" class="label" text-anchor="middle">Layout &amp; Paint</text>
  <text x="720" y="150" class="body" text-anchor="middle">(GPU Frame)</text>
</svg>
