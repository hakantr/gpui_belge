<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <title>JSON Varlık Tüketim Yolları</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .when { font: 700 12px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.82; letter-spacing: 0.4px; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow { stroke: #94a3b8; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-dasharray: 7 9; animation: flow 9s linear infinite; }

      @keyframes flow { from { stroke-dashoffset: 32; } to { stroke-dashoffset: 0; } }
      @media (prefers-reduced-motion: reduce) { .flow { animation: none; } }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="48" class="title">JSON Varlık Tüketim Yolları</text>
  <text x="500" y="76" class="sub">Aynı dosya formatı dört farklı runtime sözleşmesine akar.</text>

  <!-- ================= 4 KANALLI BAŞLANGIÇ ================= -->
  <!-- 1. THEMES -->
  <g transform="translate(60, 118)">
    <rect width="190" height="104" rx="12" fill="url(#g-sky)" filter="url(#shadow)" />
    <text x="95" y="40" class="api">themes/</text>
    <text x="95" y="66" class="body">ThemeFamilyContent</text>
    <text x="95" y="88" class="when">Registry'ye Eklenir</text>
  </g>

  <!-- 2. SETTINGS -->
  <g transform="translate(290, 118)">
    <rect width="190" height="104" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="95" y="40" class="api">settings/</text>
    <text x="95" y="66" class="body">Default Content</text>
    <text x="95" y="88" class="when">SettingsStore'a Girer</text>
  </g>

  <!-- 3. KEYMAPS -->
  <g transform="translate(520, 118)">
    <rect width="190" height="104" rx="12" fill="url(#g-purple)" filter="url(#shadow)" />
    <text x="95" y="40" class="api">keymaps/</text>
    <text x="95" y="66" class="body">Platform Seçimi</text>
    <text x="95" y="88" class="when">Keymap Parser</text>
  </g>

  <!-- 4. BADGES -->
  <g transform="translate(750, 118)">
    <rect width="190" height="104" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="95" y="40" class="api">badge/</text>
    <text x="95" y="66" class="body">Runtime Dışı</text>
    <text x="95" y="88" class="when">README Rozeti</text>
  </g>

  <!-- ================= OKLAR YUKARI -> MERKEZ ================= -->
  <path d="M 155 222 C 155 252 500 252 500 282" class="flow" />
  <path d="M 385 222 C 385 252 500 252 500 282" class="flow" />
  <path d="M 615 222 C 615 252 500 252 500 282" class="flow" />
  <path d="M 845 222 C 845 252 500 252 500 282" class="flow" />
  <path d="M 155 222 C 155 252 500 252 500 282" class="arrow-line" />
  <path d="M 385 222 C 385 252 500 252 500 282" class="arrow-line" />
  <path d="M 615 222 C 615 252 500 252 500 282" class="arrow-line" />
  <path d="M 845 222 C 845 252 500 252 500 282" class="arrow-line" />

  <!-- ================= MERKEZ ================= -->
  <g transform="translate(390, 282)">
    <rect width="220" height="92" rx="12" fill="url(#g-slate)" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)" />
    <text x="110" y="36" class="api">AssetSource</text>
    <text x="110" y="58" class="body" style="font-family:ui-monospace,SFMono-Regular,monospace">asset_str / list</text>
    <text x="110" y="78" class="when">Dosyayı Yalnız Taşır</text>
  </g>

  <!-- ================= OKLAR MERKEZ -> AŞAĞI ================= -->
  <path d="M 500 374 C 500 404 275 404 275 432" class="flow" />
  <path d="M 500 374 V 432" class="flow" />
  <path d="M 500 374 C 500 404 725 404 725 432" class="flow" />
  <path d="M 500 374 C 500 404 275 404 275 432" class="arrow-line" />
  <path d="M 500 374 V 432" class="arrow-line" />
  <path d="M 500 374 C 500 404 725 404 725 432" class="arrow-line" />

  <!-- ================= HEDEF TÜKETİCİLER ================= -->
  <g transform="translate(180, 432)">
    <rect width="190" height="62" rx="12" fill="url(#g-light)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="95" y="29" class="api" style="fill:#334155">ThemeRegistry</text>
    <text x="95" y="49" class="when" style="fill:#64748b;opacity:1">UI Theme</text>
  </g>

  <g transform="translate(405, 432)">
    <rect width="190" height="62" rx="12" fill="url(#g-light)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="95" y="29" class="api" style="fill:#334155">SettingsStore</text>
    <text x="95" y="49" class="when" style="fill:#64748b;opacity:1">Ayarlar + Keymap</text>
  </g>

  <g transform="translate(630, 432)">
    <rect width="190" height="62" rx="12" fill="url(#g-light)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="95" y="29" class="api" style="fill:#334155">Harici Araç</text>
    <text x="95" y="49" class="when" style="fill:#64748b;opacity:1">Badge Tüketimi</text>
  </g>

</svg>
