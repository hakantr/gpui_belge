<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 800 400"
   version="1.1"
   id="svg21"
   sodipodi:docname="gorsel-onbellek-mimarisi.svg"
   inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview21"
     pagecolor="#505050"
     bordercolor="#eeeeee"
     borderopacity="1"
     inkscape:showpageshadow="0"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#505050"
     inkscape:zoom="1.9087806"
     inkscape:cx="397.37411"
     inkscape:cy="197.24634"
     inkscape:window-width="2048"
     inkscape:window-height="1243"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg21" />
  <title
     id="title1">ImageCache önbellek mimarisi</title>
  <defs
     id="defs2">
    <marker
       id="arrow-blue"
       viewBox="0 0 10 10"
       refX="10"
       refY="5"
       markerWidth="8"
       markerHeight="8"
       markerUnits="userSpaceOnUse"
       orient="auto-start-reverse">
      <path
         d="M 0 0 L 10 5 L 0 10 z"
         fill="#0284c7"
         id="path1" />
    </marker>
    <marker
       id="arrow-green"
       viewBox="0 0 10 10"
       refX="10"
       refY="5"
       markerWidth="8"
       markerHeight="8"
       markerUnits="userSpaceOnUse"
       orient="auto-start-reverse">
      <path
         d="M 0 0 L 10 5 L 0 10 z"
         fill="#059669"
         id="path2" />
    </marker>
    <style
       id="style2">
      .bg { fill: #f8fafc; rx: 12px; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #0f172a; text-anchor: middle; }
      .sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }

      /* Block styles */
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8px; }
      .box-active { stroke: #0284c7; }
      .box-success { stroke: #059669; }
      .box-warn { stroke: #d97706; }

      .text-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #334155; text-anchor: middle; }
      .text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #475569; text-anchor: middle; }
      .branch-label { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 11px; text-anchor: middle; dominant-baseline: central; }

      /* Connection Lines */
      .conn-line { stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .conn-line-active { stroke: #0284c7; marker-end: url(#arrow-blue); }
      .conn-line-cache { stroke: #059669; marker-end: url(#arrow-green); }

      /* Veri parçacıkları SMIL animateMotion ile taşınır; cx/cy CSS keyframe'leri her renderer'da güvenilir değildir. */
      .particle { fill: #0284c7; stroke: #ffffff; stroke-width: 1.5; opacity: 0; }
    </style>
  </defs>
  <rect
     width="800"
     height="400"
     class="bg"
     id="rect2" />
  <text
     x="400"
     y="45"
     class="title"
     id="text2">ImageCache Önbellek Mimarisi</text>
  <text
     x="400"
     y="70"
     class="sub"
     id="text3">Uzak görsellerin ilk yükleme (MISS) ve sonrasındaki hızlı bellek (HIT) akışları</text>
  <!-- 1. İstek Başlangıcı (img(source)) x: 60, y: 145, w: 140, h: 100 -->
  <g
     transform="translate(60, 145)"
     id="g6">
    <rect
       width="140"
       height="100"
       class="box"
       id="rect3" />
    <text
       x="70"
       y="40"
       class="text-title"
       id="text4">img(source)</text>
    <text
       x="70"
       y="60"
       class="text-desc"
       id="text5">Görsel Kaynak</text>
    <text
       x="70"
       y="75"
       class="text-desc"
       id="text6">İsteği</text>
  </g>
  <!-- Ok 1 -->
  <path
     d="M 200 195 L 250 195"
     class="conn-line conn-line-active"
     id="path6" />
  <!-- 2. Önbellek Denetleyici (Cache Controller) x: 250, y: 145, w: 140, h: 100 -->
  <g
     transform="translate(250, 145)"
     id="g9">
    <rect
       width="140"
       height="100"
       class="box box-active"
       id="rect6" />
    <text
       x="70"
       y="40"
       class="text-title"
       id="text7">Cache Lookup</text>
    <text
       x="70"
       y="60"
       class="text-desc"
       id="text8">Bellekte Var mı?</text>
    <text
       x="70"
       y="75"
       class="text-desc"
       id="text9">Denetimi</text>
  </g>
  <!-- Oklar: Miss (Aşağı) ve Hit (Sağ) -->
  <!-- Hit -->
  <path
     d="M 390 195 L 410 195"
     class="conn-line conn-line-active"
     id="path9" />
  <text
     x="382"
     y="196.1521"
     class="branch-label"
     fill="#0284c7"
     id="text10">E</text>
  <!-- Miss -->
  <path
     d="M 320 245 L 320 275"
     class="conn-line conn-line-cache"
     id="path10" />
  <text
     x="320"
     y="237"
     class="branch-label"
     fill="#059669"
     id="text11">H</text>
  <!-- 3. Önbellek Bellek Alanı (RAM/Texture Atlas) x: 410, y: 145, w: 140, h: 100 -->
  <g
     transform="translate(410, 145)"
     id="g14">
    <rect
       width="140"
       height="100"
       class="box box-success"
       id="rect11" />
    <text
       x="70"
       y="40"
       class="text-title"
       id="text12">ImageCache (RAM)</text>
    <text
       x="70"
       y="60"
       class="text-desc"
       id="text13">Önbellek Havuzu</text>
    <text
       x="70"
       y="75"
       class="text-desc"
       id="text14">/ Texture Atlas</text>
  </g>
  <!-- Ok 2 -->
  <path
     d="M 550 195 L 600 195"
     class="conn-line conn-line-active"
     id="path14" />
  <!-- 4. Çıktı / GPU Render x: 600, y: 145, w: 140, h: 100 -->
  <g
     transform="translate(600, 145)"
     id="g16">
    <rect
       width="140"
       height="100"
       class="box"
       id="rect14" />
    <text
       x="70"
       y="45"
       class="text-title"
       id="text15">GPU Render</text>
    <text
       x="70"
       y="65"
       class="text-desc"
       id="text16">Ekrana Çizim</text>
  </g>
  <!-- ================= MISS ROUTE (Alt Kanal) ================= -->
  <!-- 5. Asenkron İndirme / Ağ Yükü (Disk/Network) x: 250, y: 275, w: 300, h: 60 -->
  <g
     transform="translate(250, 275)"
     id="g18">
    <rect
       width="300"
       height="60"
       class="box box-warn"
       id="rect16" />
    <text
       x="150"
       y="25"
       class="text-title"
       id="text17">Async Yükleme Görevi (Network/Disk)</text>
    <text
       x="150"
       y="45"
       class="text-desc"
       id="text18">fs::read veya HTTP get ile byte okuma</text>
  </g>
  <!-- Miss dönüş oku (İndirmeden Cache'e) -->
  <path
     d="M 480 275 L 480 245"
     class="conn-line conn-line-cache"
     id="path18" />
  <!-- Animasyonlu Veri Parçacıkları -->
  <circle
     r="5"
     class="particle"
     id="circle18">
    <animate
       attributeName="opacity"
       dur="8s"
       repeatCount="indefinite"
       values="1;1;0;0"
       keyTimes="0;0.56;0.58;1" />
    <animate
       attributeName="fill"
       dur="8s"
       repeatCount="indefinite"
       values="#0284c7;#0284c7;#059669;#059669"
       keyTimes="0;0.13;0.131;1" />
    <animateMotion
       dur="8s"
       repeatCount="indefinite"
       calcMode="linear"
       keyPoints="0;0.229;0.386;0.614;0.771;1;1"
       keyTimes="0;0.13;0.24;0.36;0.46;0.56;1"
       path="M 160 195 L 320 195 L 320 305 L 480 305 L 480 195 L 640 195" />
  </circle>
  <circle
     r="5"
     class="particle"
     id="circle19">
    <animate
       attributeName="opacity"
       dur="8s"
       repeatCount="indefinite"
       values="0;0;1;1;0"
       keyTimes="0;0.61;0.62;0.92;1" />
    <animateMotion
       dur="8s"
       repeatCount="indefinite"
       calcMode="linear"
       keyPoints="0;0;1;1"
       keyTimes="0;0.62;0.92;1"
       path="M 160 195 L 320 195 L 480 195 L 640 195" />
  </circle>
  <!-- Durum Kılavuz Açıklamaları -->
  <g
     transform="translate(400, 370)"
     id="g21">
    <g
       class="state-labels"
       id="g20">
      <text
         class="text-desc"
         style="fill: #d97706"
         opacity="0"
         id="text19">MISS: Görsel ilk kez istenir → Asenkron disk/ağ görevi başlatılır.
        <animate
   attributeName="opacity"
   dur="8s"
   repeatCount="indefinite"
   values="1;1;0;0"
   keyTimes="0;0.58;0.59;1" /></text>
      <text
         class="text-desc"
         style="fill: #d97706"
         opacity="0"
         id="text20">HIT: Görsel önbellekte var → RAM / Atlas üzerinden anında çizilir.
        <animate
   attributeName="opacity"
   dur="8s"
   repeatCount="indefinite"
   values="0;0;1;1;0"
   keyTimes="0;0.61;0.62;0.95;1" /></text>
    </g>
  </g>
</svg>
