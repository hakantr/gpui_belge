<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <title>İkon ve SVG render akış hattı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-note" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .when { font: 800 12px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.85; letter-spacing: 0.4px; text-anchor: middle; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .card { filter: url(#shadow); }

      /* Sıralı akış vurgusu: her kart sırayla hafifçe parlar */
      .step { animation: stepPulse 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .step-1 { animation-delay: 0s; }
      .step-2 { animation-delay: 2.5s; }
      .step-3 { animation-delay: 5s; }
      .step-4 { animation-delay: 7.5s; }
      @keyframes stepPulse {
        0%   { opacity: 1; }
        6%   { opacity: 1; transform: translateY(-3px); }
        14%  { opacity: 1; transform: translateY(0); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Oklarda akan akış */
      .flow { stroke-dasharray: 7 7; animation: flowDash 1.6s linear infinite; }
      @keyframes flowDash { to { stroke-dashoffset: -28; } }

      @media (prefers-reduced-motion: reduce) {
        .step, .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="48" class="title">İkon ve SVG Render Akış Hattı</text>
  <text x="500" y="76" class="sub">SVG varlıklarının okunması, çözümlenmesi, mozaiklenmesi ve çizimi</text>

  <!-- ================= ADIM 1 ================= -->
  <g class="step step-1" transform="translate(40, 150)">
    <rect width="180" height="104" rx="12" fill="url(#g-slate)" class="card" />
    <text x="90" y="40" class="api">AssetSource</text>
    <text x="90" y="66" class="body">SVG Byte Verisi</text>
    <text x="90" y="87" class="when">veya Dosya Yükleme</text>
  </g>

  <!-- ================= ADIM 2 ================= -->
  <g class="step step-2" transform="translate(280, 150)">
    <rect width="180" height="104" rx="12" fill="url(#g-sky)" class="card" />
    <text x="90" y="40" class="api">usvg Parser</text>
    <text x="90" y="66" class="body">Vektör Yollarının</text>
    <text x="90" y="87" class="when">Çözümlenmesi (parse)</text>
  </g>

  <!-- ================= ADIM 3 ================= -->
  <g class="step step-3" transform="translate(520, 150)">
    <rect width="180" height="104" rx="12" fill="url(#g-violet)" class="card" />
    <text x="90" y="40" class="api">Tessellator</text>
    <text x="90" y="66" class="body">Yolların Üçgenlere</text>
    <text x="90" y="87" class="when">Bölünmesi (Lyon)</text>
  </g>

  <!-- ================= ADIM 4 ================= -->
  <g class="step step-4" transform="translate(760, 150)">
    <rect width="200" height="104" rx="12" fill="url(#g-blue)" class="card" />
    <text x="100" y="40" class="api">GPU Render</text>
    <text x="100" y="66" class="body">Canvas Üzerinde</text>
    <text x="100" y="87" class="when">Hızlı Piksel Boyama</text>
  </g>

  <!-- ================= OKLAR ================= -->
  <path d="M 220 202 H 275" class="arrow-line flow" />
  <path d="M 460 202 H 515" class="arrow-line flow" />
  <path d="M 700 202 H 755" class="arrow-line flow" />

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 300)">
    <rect width="920" height="64" rx="12" fill="url(#g-note)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="460" y="28" class="note">Bellek kopyalamalarını önlemek amacıyla veriler paylaşımlı Arc dilimlerinde taşınır.</text>
    <text x="460" y="50" class="note">Süreç, GPUI'nin düşük seviyeli çizim motoru tarafından eşzamansız olarak yürütülür.</text>
  </g>

</svg>
