<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <title>İkon ve SVG render akış hattı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; rx: 12px; }
      .label-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #0f172a; text-anchor: middle; }
      .label-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
      
      /* Step Blocks */
      .step-rect { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8px; }
      .step-rect-active { stroke: #0284c7; }
      .step-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #334155; text-anchor: middle; }
      .step-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #475569; text-anchor: middle; }
      
      /* Connecting Arrows */
      .conn-line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>

  <!-- Arka Plan -->
  <rect width="800" height="350" class="bg" />

  <!-- Başlıklar -->
  <text x="400" y="45" class="label-title">İkon ve SVG Render Akış Hattı</text>
  <text x="400" y="70" class="label-sub">SVG varlıklarının okunması, çözümlenmesi, mozaiklenmesi ve çizimi</text>

  <!-- Bağlantı Çizgileri -->
  <path d="M 190 175 H 242" class="conn-line" />
  <path d="M 370 175 H 422" class="conn-line" />
  <path d="M 550 175 H 602" class="conn-line" />

  <!-- 1. Adım: AssetSource -->
  <g transform="translate(70, 125)">
    <rect width="120" height="100" class="step-rect step-1" />
    <text x="60" y="35" class="step-title">AssetSource</text>
    <text x="60" y="60" class="step-desc">SVG byte verisi</text>
    <text x="60" y="75" class="step-desc">veya dosya yükleme</text>
  </g>

  <!-- 2. Adım: usvg / SVG Parser -->
  <g transform="translate(250, 125)">
    <rect width="120" height="100" class="step-rect step-2" />
    <text x="60" y="35" class="step-title">usvg Parser</text>
    <text x="60" y="60" class="step-desc">Vektör yollarının</text>
    <text x="60" y="75" class="step-desc">çözümlenmesi (parse)</text>
  </g>

  <!-- 3. Adım: Tessellator (Lyon) -->
  <g transform="translate(430, 125)">
    <rect width="120" height="100" class="step-rect step-3" />
    <text x="60" y="35" class="step-title">Tessellator</text>
    <text x="60" y="60" class="step-desc">Yolların üçgenlere</text>
    <text x="60" y="75" class="step-desc">bölünmesi (Lyon)</text>
  </g>

  <!-- 4. Adım: GPU Canvas Render -->
  <g transform="translate(610, 125)">
    <rect width="120" height="100" class="step-rect step-4" />
    <text x="60" y="35" class="step-title">GPU Render</text>
    <text x="60" y="60" class="step-desc">Canvas üzerinde</text>
    <text x="60" y="75" class="step-desc">hızlı piksel boyama</text>
  </g>

  <!-- Açıklama Notları -->
  <text x="400" y="280" class="step-desc" fill="#64748b">Bellek kopyalamalarını önlemek amacıyla veriler paylaşımlı Arc dilimlerinde taşınır.</text>
  <text x="400" y="300" class="step-desc" fill="#475569">Süreç, GPUI'nin düşük seviyeli çizim motoru tarafından asenkron olarak yürütülür.</text>
</svg>
