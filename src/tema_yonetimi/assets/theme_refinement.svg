<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640">
  <title>Tema Refinement Hiyerarşisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-content" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-refine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-theme" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .card-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .card-type { font: 700 15px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .card-q { font: 500 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.9; text-anchor: middle; }
      .card-src { font: 600 13px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.85; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .edge-chip { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .edge { font: 800 14px ui-monospace, SFMono-Regular, monospace; fill: #7c3aed; text-anchor: middle; }
      .edge-note { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .foot { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .foot-strong { font: 700 14px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }

      @keyframes flow-1 { 0%,100% { opacity: 1; } 45% { opacity: 0.65; } }
      @keyframes flow-2 { 0%,100% { opacity: 1; } 60% { opacity: 0.65; } }
      @keyframes flow-3 { 0%,100% { opacity: 1; } 75% { opacity: 0.65; } }
      .pulse-1 { animation: flow-1 9s ease-in-out infinite; }
      .pulse-2 { animation: flow-2 9s ease-in-out infinite; }
      .pulse-3 { animation: flow-3 9s ease-in-out infinite; }

      @keyframes dash-move { to { stroke-dashoffset: -28; } }
      .arrow-flow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow);
        stroke-linecap: round; stroke-dasharray: 8 6; animation: dash-move 1.6s linear infinite; }

      @media (prefers-reduced-motion: reduce) {
        .pulse-1, .pulse-2, .pulse-3, .arrow-flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="380" y="50" class="title">Tema Refinement Hiyerarşisi</text>
  <text x="380" y="80" class="subtitle">JSON içeriği refinement katmanından geçerek çalışma zamanı nesnesine dönüşür.</text>

  <!-- ================= KATMAN 1 (Content / JSON) ================= -->
  <g class="pulse-1" transform="translate(205, 112)">
    <rect width="350" height="104" rx="12" fill="url(#g-content)" filter="url(#shadow)" />
    <text x="175" y="34" class="card-title">Theme Content (JSON)</text>
    <text x="175" y="60" class="card-type">Option&lt;String&gt; alanlar</text>
    <text x="175" y="82" class="card-q">Soru: kullanıcı bu alanı yazdı mı?</text>
  </g>

  <!-- Ok 1 -->
  <path d="M 380 216 L 380 252" class="arrow-line" />
  <path d="M 380 216 L 380 250" class="arrow-flow" />
  <g class="edge-note" transform="translate(560, 240)">
    <text x="0" y="0">JSON ayrıştırma</text>
  </g>

  <!-- ================= KATMAN 2 (Refinement) ================= -->
  <g class="pulse-2" transform="translate(205, 262)">
    <rect width="350" height="104" rx="12" fill="url(#g-refine)" filter="url(#shadow)" />
    <text x="175" y="34" class="card-title">Refinement Layer</text>
    <text x="175" y="60" class="card-type">Option&lt;Hsla&gt; alanlar</text>
    <text x="175" y="82" class="card-q">Soru: yazdıysa ayrıştırılabildi mi?</text>
  </g>

  <!-- Ok 2 + baseline.refine() etiketi -->
  <path d="M 380 366 L 380 432" class="arrow-line" />
  <path d="M 380 366 L 380 430" class="arrow-flow" />
  <rect x="298" y="384" width="164" height="28" rx="8" class="edge-chip" />
  <text x="380" y="403" class="edge">baseline.refine()</text>

  <!-- ================= KATMAN 3 (Theme / Runtime) ================= -->
  <g class="pulse-3" transform="translate(205, 442)">
    <rect width="350" height="104" rx="12" fill="url(#g-theme)" filter="url(#shadow)" />
    <text x="175" y="34" class="card-title">Final Theme (Hsla)</text>
    <text x="175" y="60" class="card-type">Hsla alanlar — çalışma zamanı nesnesi</text>
    <text x="175" y="82" class="card-src">Theme::from_content içinde üretilir</text>
  </g>

  <!-- Alt not -->
  <text x="380" y="588" class="foot-strong">Durumsuz ve belirlenimci boru hattı.</text>
  <text x="380" y="610" class="foot">Aynı Content her zaman aynı Refinement değerini üretir.</text>

</svg>
