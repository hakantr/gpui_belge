<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460">
  <title>Tema Refinement Hiyerarşisi</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.05" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 22px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .subtitle { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      
      .label { font: 800 16px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }
      .body { font: 14px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }
      .edge { font: 800 13px ui-monospace, SFMono-Regular, monospace; fill: #3b82f6; text-anchor: middle; background: #fff; }
      
      .arrow-line { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
      
      .card-top { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; rx: 12px; filter: url(#shadow); }
      .card-mid { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; rx: 12px; filter: url(#shadow); }
      .card-bot { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; rx: 12px; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="350" y="46" class="title">Tema Refinement Hiyerarşisi</text>
  <text x="350" y="74" class="subtitle">JSON içeriği refinement katmanından geçerek runtime nesnesine dönüşür.</text>

  <!-- ================= KATMAN 1 (JSON) ================= -->
  <g transform="translate(200, 110)">
    <rect width="300" height="70" class="card-top" />
    <text x="150" y="40" class="label">Theme Content (JSON)</text>
  </g>

  <!-- Ok 1 -->
  <path d="M 350 180 L 350 230" class="arrow-line" />

  <!-- ================= KATMAN 2 (Refinement) ================= -->
  <g transform="translate(200, 240)">
    <rect width="300" height="70" class="card-mid" />
    <text x="150" y="40" class="label">Refinement Layer</text>
  </g>

  <!-- Ok 2 -->
  <path d="M 350 310 L 350 360" class="arrow-line" />
  
  <rect x="370" y="325" width="140" height="20" fill="#f8fafc" />
  <text x="440" y="340" class="edge">baseline.refine()</text>

  <!-- ================= KATMAN 3 (Runtime) ================= -->
  <g transform="translate(200, 370)">
    <rect width="300" height="70" class="card-bot" />
    <text x="150" y="30" class="label">Final Theme (Hsla)</text>
    <text x="150" y="52" class="body">Runtime Object</text>
  </g>

</svg>
