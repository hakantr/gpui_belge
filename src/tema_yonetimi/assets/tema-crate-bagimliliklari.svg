<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <title>Tema Crate Bağımlılık Grafiği</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <marker id="arrowR" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#dc2626" stroke="#dc2626" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrowR" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#dc2626" />
    </marker>
    <style>
      .title  { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub    { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cname  { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .clabel { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .desc   { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .badge  { font: 700 10px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .arrow  { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowR { stroke: #dc2626; stroke-width: 1.8; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrowR); marker-start: url(#dot-arrowR); }
    </style>
  </defs>

  <rect width="900" height="500" rx="10" fill="#f8fafc" />
  <text x="450" y="34" text-anchor="middle" class="title">Tema Crate Bağımlılık Grafiği</text>
  <text x="450" y="56" text-anchor="middle" class="sub">Ok yönü "bağımlı → sağlayan" ilişkisini gösterir. GPL crate'lere yalnızca okuma referansı verilir.</text>

  <!-- ── Uygulama crate'leri (merkez) ── -->
  <rect x="270" y="80" width="200" height="70" rx="8" fill="#1d4ed8" />
  <text x="370" y="108" text-anchor="middle" class="cname">kvs_tema</text>
  <text x="370" y="126" text-anchor="middle" class="desc" fill="#bfdbfe">Theme, Registry, Runtime</text>
  <text x="370" y="142" text-anchor="middle" class="desc" fill="#bfdbfe">JSON schema, IconTheme</text>

  <rect x="490" y="80" width="200" height="70" rx="8" fill="#0891b2" />
  <text x="590" y="108" text-anchor="middle" class="cname">kvs_syntax_tema</text>
  <text x="590" y="126" text-anchor="middle" class="desc" fill="#e0f2fe">SyntaxTheme</text>
  <text x="590" y="142" text-anchor="middle" class="desc" fill="#e0f2fe">kod renkleri</text>

  <!-- kvs_tema → kvs_syntax_tema -->
  <path d="M 470 115 C 474 118 478 118 482 118" class="arrow" />

  <!-- ── Zed workspace (Apache-2.0) ── -->
  <rect x="20" y="82" width="230" height="66" rx="8" fill="#fff" stroke="#15803d" stroke-width="2" />
  <rect x="20" y="82" width="230" height="22" rx="8" fill="#15803d" />
  <path d="M 20 97 H 250 V 104 H 20 Z" fill="#15803d" />
  <text x="135" y="95" text-anchor="middle" class="badge" fill="#fff">Zed workspace · Apache-2.0</text>
  <text x="135" y="120" text-anchor="middle" class="clabel">gpui · refineable</text>
  <text x="135" y="136" text-anchor="middle" class="clabel">collections</text>
  <!-- Arrow -->
  <path d="M 250 115 L 262 115" class="arrow" />
  <!-- Syntax tema → gpui -->
  <path d="M 250 120 C 330 120 430 118 482 118" class="arrow" />

  <!-- ── GPL Zed crate'leri (YALNIZCA referans) ── -->
  <rect x="20" y="200" width="230" height="80" rx="8" fill="#fff7f7" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 4" />
  <rect x="20" y="200" width="230" height="22" rx="8" fill="#dc2626" />
  <path d="M 20 215 H 250 V 222 H 20 Z" fill="#dc2626" />
  <text x="135" y="214" text-anchor="middle" class="badge" fill="#fff">YALNIZCA REFERANS · GPL-3</text>
  <text x="135" y="242" text-anchor="middle" class="clabel">theme · syntax_theme</text>
  <text x="135" y="258" text-anchor="middle" class="clabel">theme_settings vb.</text>
  <!-- Dashed reference arrow — reverse (reference goes from kvs_tema to GPL) -->
  <path d="M 270 130 L 180 192" class="arrowR" />
  <text x="200" y="175" text-anchor="middle" class="badge" fill="#dc2626" style="font-size:10px;">kod değil</text>
  <text x="200" y="187" text-anchor="middle" class="badge" fill="#dc2626" style="font-size:10px;">yalnız okur</text>

  <!-- ── Üçüncü taraf crate'ler ── -->
  <rect x="650" y="80" width="230" height="200" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="650" y="80" width="230" height="22" rx="8" fill="#334155" />
  <path d="M 650 95 H 880 V 102 H 650 Z" fill="#334155" />
  <text x="765" y="94" text-anchor="middle" class="badge" fill="#fff">Üçüncü taraf</text>
  <text x="665" y="120" class="clabel">serde + serde_json</text>
  <text x="665" y="138" class="clabel">serde_json_lenient</text>
  <text x="665" y="156" class="clabel">palette (renk dönüşümü)</text>
  <text x="665" y="174" class="clabel">parking_lot (RwLock)</text>
  <text x="665" y="192" class="clabel">indexmap · schemars</text>
  <text x="665" y="210" class="clabel">anyhow · thiserror</text>
  <text x="665" y="228" class="clabel">uuid</text>
  <!-- Arrow from kvs_tema to third-party -->
  <path d="M 470 130 L 642 130" class="arrow" />

  <!-- ── Bağımlılık yönü kuralı ── -->
  <rect x="20" y="320" width="860" height="60" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <text x="40" y="348" class="desc"><tspan font-weight="bold">Ters yön yasaktır:</tspan> gpui, refineable veya collections hiçbir zaman kvs_tema'ya bağlanmaz.</text>
  <text x="40" y="368" class="desc">Bu kural alt katmanları sakin tutar; upstream Zed değişikliğinde yalnızca tip imzası, davranış veya isim değişimleri izlenir.</text>

  <!-- ── Lisans notu ── -->
  <rect x="20" y="398" width="860" height="76" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2" />
  <text x="40" y="422" class="desc"><tspan font-weight="bold" fill="#92400e">GPL sınırı:</tspan> <tspan fill="#334155">GPL-3 Zed crate'leri (theme, syntax_theme, theme_settings, theme_selector…) Cargo.toml'a</tspan></text>
  <text x="40" y="440" class="desc" fill="#334155">dependency olarak <tspan font-weight="bold">eklenmez.</tspan> Yalnızca kaynak okuma için referans alınır. Bir satır bile kopyalanırsa uygulama GPL kapsamına girer.</text>
  <text x="40" y="460" class="desc" fill="#334155">Alan adları ve JSON anahtarları telif kapsamı dışındadır ve mirror edilebilir. Bağımlılık yalnızca apache crate'ler üzerindendir.</text>

</svg>
