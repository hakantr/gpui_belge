<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470">
  <title>Tema etkileşim renk akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow-focus" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#0ea5e9" flood-opacity="0.55" />
    </filter>

    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="g-stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .label-state { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #059669; text-anchor: middle; }

      .btn-base { rx: 12px; }
      .btn-text { font: 800 17px system-ui, -apple-system, sans-serif; text-anchor: middle; dominant-baseline: middle; }

      .focus-ring { fill: none; stroke: #0ea5e9; stroke-width: 3; rx: 16px; opacity: 0; filter: url(#glow-focus); }

      /* Animasyon döngüsü: 12 saniye (her durum 3s) */
      @keyframes anim-button {
        /* Varsayılan (Default): 0-25% */
        0%, 20% { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
        /* Üzerinde (Hovered): 25-50% */
        25%, 45% { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; }
        /* Tıklandı (Pressed): 50-75% */
        50%, 70% { fill: #e2e8f0; stroke: #0ea5e9; stroke-width: 3; }
        /* Odaklandı (Focused): 75-100% */
        75%, 95% { fill: #ffffff; stroke: #0ea5e9; stroke-width: 2; }
        100% { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      }

      @keyframes anim-text {
        0%, 20% { fill: #475569; }
        25%, 95% { fill: #0f172a; }
        100% { fill: #475569; }
      }

      @keyframes anim-ring { 0%, 70% { opacity: 0; } 75%, 95% { opacity: 1; } 100% { opacity: 0; } }

      .target-btn { animation: anim-button 12s infinite step-end; }
      .target-text { animation: anim-text 12s infinite step-end; }
      .target-ring { animation: anim-ring 12s infinite step-end; }

      .info-card { fill: url(#g-panel); stroke: #e2e8f0; stroke-width: 1.5; rx: 12px; filter: url(#shadow); }
      .card-accent { rx: 3px; }
      .info-head { font: 800 14px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .info-text { font: 600 13px system-ui, -apple-system, sans-serif; fill: #475569; }
      .info-code { font: 600 12.5px ui-monospace, SFMono-Regular, monospace; fill: #334155; }
      .step-num { font: 800 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="450" y="48" class="title">Tema Etkileşim Renk Akışı</text>
  <text x="450" y="76" class="sub">Buton etkileşim durumlarının renk ve stil değişim dinamikleri</text>

  <!-- ================= MERKEZ SAHNE + BUTON ANIMASYONU ================= -->
  <g transform="translate(450, 205)">
    <!-- Sahne zemini -->
    <rect x="-145" y="-78" width="290" height="156" rx="16" fill="url(#g-stage)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="-52" fill="#64748b" text-anchor="middle" style="font: 700 12px ui-monospace, SFMono-Regular, monospace;">Etkileşim Sahnesi</text>

    <!-- Focus Halkası -->
    <rect x="-118" y="-26" width="236" height="62" class="focus-ring target-ring" />

    <!-- Buton Gövdesi -->
    <rect x="-108" y="-20" width="216" height="50" class="btn-base target-btn" filter="url(#shadow)" />

    <!-- Buton Etiketi -->
    <text x="0" y="7" class="btn-text target-text">Etkileşimli Buton</text>
  </g>

  <!-- ================= DURUM GÖSTERGESİ (animasyonlu) ================= -->
  <g transform="translate(450, 320)">
    <text class="label-state" opacity="1">Durum: Varsayılan (Default)
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="discrete" values="1;1;0;0;0;0;1" keyTimes="0;0.20;0.25;0.95;0.96;0.99;1" />
    </text>
    <text class="label-state" opacity="0">Durum: Üzerinde (Hovered)
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="discrete" values="0;0;1;1;0;0" keyTimes="0;0.20;0.25;0.45;0.50;1" />
    </text>
    <text class="label-state" opacity="0">Durum: Tıklandı (Active/Pressed)
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="discrete" values="0;0;1;1;0;0" keyTimes="0;0.45;0.50;0.70;0.75;1" />
    </text>
    <text class="label-state" opacity="0">Durum: Odaklandı (Focused)
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="discrete" values="0;0;1;1;0;0" keyTimes="0;0.70;0.75;0.95;1;1" />
    </text>
  </g>

  <!-- ================= BİLGİ KARTLARI ================= -->
  <!-- Sol Kart: Default + Hover -->
  <g transform="translate(36, 148)">
    <rect width="262" height="128" class="info-card" />
    <rect x="0" y="14" width="5" height="100" class="card-accent" fill="#94a3b8" />

    <circle cx="30" cy="34" r="11" fill="#94a3b8" />
    <text x="30" y="38" class="step-num">1</text>
    <text x="50" y="31" class="info-head">Default Durum</text>
    <text x="50" y="50" class="info-code">theme.colors()</text>
    <text x="50" y="66" class="info-code">  .button_background</text>

    <circle cx="30" cy="92" r="11" fill="url(#g-sky)" />
    <text x="30" y="96" class="step-num">2</text>
    <text x="50" y="89" class="info-head">Hover Durum</text>
    <text x="50" y="108" class="info-text">Arka plan aydınlanır / grileşir.</text>
  </g>

  <!-- Sağ Kart: Pressed + Focused -->
  <g transform="translate(602, 148)">
    <rect width="262" height="128" class="info-card" />
    <rect x="0" y="14" width="5" height="100" class="card-accent" fill="#0ea5e9" />

    <circle cx="30" cy="34" r="11" fill="#0ea5e9" />
    <text x="30" y="38" class="step-num">3</text>
    <text x="50" y="31" class="info-head">Pressed Durum</text>
    <text x="50" y="50" class="info-text">Arka plan koyulaşır,</text>
    <text x="50" y="66" class="info-text">kenar vurgusu artar.</text>

    <circle cx="30" cy="92" r="11" fill="#0284c7" />
    <text x="30" y="96" class="step-num">4</text>
    <text x="50" y="89" class="info-head">Focused Durum</text>
    <text x="50" y="108" class="info-text">Parlak mavi odak halkası eklenir.</text>
  </g>

  <!-- ================= DURUM ŞERİDİ (alt denge) ================= -->
  <g transform="translate(450, 410)">
    <text x="0" y="-14" class="sub" style="font: 600 13px system-ui, -apple-system, sans-serif; fill: #94a3b8;">Etkileşim döngüsü: her durum kendi tema rengini sürer</text>

    <!-- Varsayılan -->
    <g transform="translate(-330, 0)">
      <rect x="0" y="0" width="150" height="32" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <circle cx="20" cy="16" r="6" fill="#cbd5e1" />
      <text x="34" y="21" class="info-text" style="font: 700 13px system-ui, -apple-system, sans-serif; fill: #475569;">Varsayılan</text>
    </g>
    <!-- Üzerinde -->
    <g transform="translate(-165, 0)">
      <rect x="0" y="0" width="150" height="32" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
      <circle cx="20" cy="16" r="6" fill="#94a3b8" />
      <text x="34" y="21" class="info-text" style="font: 700 13px system-ui, -apple-system, sans-serif; fill: #475569;">Üzerinde</text>
    </g>
    <!-- Tıklandı -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="150" height="32" rx="9" fill="#e2e8f0" stroke="#0ea5e9" stroke-width="2.5" />
      <circle cx="20" cy="16" r="6" fill="#0ea5e9" />
      <text x="34" y="21" class="info-text" style="font: 700 13px system-ui, -apple-system, sans-serif; fill: #334155;">Tıklandı</text>
    </g>
    <!-- Odaklandı -->
    <g transform="translate(165, 0)">
      <rect x="0" y="0" width="150" height="32" rx="9" fill="#ffffff" stroke="#0284c7" stroke-width="2.5" />
      <circle cx="20" cy="16" r="6" fill="#0284c7" />
      <text x="34" y="21" class="info-text" style="font: 700 13px system-ui, -apple-system, sans-serif; fill: #334155;">Odaklandı</text>
    </g>
  </g>

</svg>
