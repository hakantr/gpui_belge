<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 320">
  <title>FontWeight Ölçeği</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <!-- Açık -> koyu dikey degradeler (artan ağırlığı temsil eder) -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2ff"/><stop offset="1" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d7defe"/><stop offset="1" stop-color="#c7d2fe"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b6c2fc"/><stop offset="1" stop-color="#a5b4fc"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b96fa"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7077f5"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b52ec"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="g7" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4f43d6"/><stop offset="1" stop-color="#4338ca"/></linearGradient>
    <linearGradient id="g8" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#403aaf"/><stop offset="1" stop-color="#3730a3"/></linearGradient>
    <linearGradient id="g9" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a2563"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient>

    <style>
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .cname { font: 800 12px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }
      .cval { font: 600 14px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .csmall { font: 500 11px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .card { filter: url(#shadow); rx: 12px; }
      .letter { font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="530" y="46" class="title">FontWeight Ölçeği</text>
  <text x="530" y="74" class="sub">9 sabit değer; CSS ağırlık değerleriyle birebir eşleşir. FontWeight yeni tip olarak tanımlıdır.</text>

  <!-- 9 kutucuk -->
  <!-- Genişlik: 96, Aralık: 16 -> Toplam Genişlik: 9*96 + 8*16 = 864 + 128 = 992. Merkez=530 -> Başlangıç=530 - 496 = 34 -->

  <g transform="translate(34, 110)">
    <!-- THIN 100 -->
    <g transform="translate(0, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g1)" stroke="#c7d2fe" stroke-width="1" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="100" fill="#312e81">Aa</text>
      <text x="48" y="96" class="cname" fill="#3730a3">THIN</text>
      <text x="48" y="116" class="cval" fill="#4338ca">100.0</text>
      <text x="48" y="136" class="csmall" fill="#4f46e5">thin</text>
    </g>

    <!-- EXTRA_LIGHT 200 -->
    <g transform="translate(112, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g2)" stroke="#b6c2fc" stroke-width="1" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="200" fill="#312e81">Aa</text>
      <text x="48" y="96" class="cname" fill="#3730a3">EXTRA_LIGHT</text>
      <text x="48" y="116" class="cval" fill="#4338ca">200.0</text>
      <text x="48" y="136" class="csmall" fill="#4f46e5">extra-light</text>
    </g>

    <!-- LIGHT 300 -->
    <g transform="translate(224, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g3)" stroke="#8b96fa" stroke-width="1" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="300" fill="#1e1b4b">Aa</text>
      <text x="48" y="96" class="cname" fill="#312e81">LIGHT</text>
      <text x="48" y="116" class="cval" fill="#3730a3">300.0</text>
      <text x="48" y="136" class="csmall" fill="#4338ca">light</text>
    </g>

    <!-- NORMAL 400 -->
    <g transform="translate(336, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g4)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="400" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#e0e7ff">NORMAL</text>
      <text x="48" y="116" class="cval" fill="#ffffff">400.0</text>
      <text x="48" y="136" class="csmall" fill="#c7d2fe">normal (default)</text>
    </g>

    <!-- MEDIUM 500 -->
    <g transform="translate(448, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g5)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="500" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#e0e7ff">MEDIUM</text>
      <text x="48" y="116" class="cval" fill="#ffffff">500.0</text>
      <text x="48" y="136" class="csmall" fill="#c7d2fe">medium</text>
    </g>

    <!-- SEMIBOLD 600 -->
    <g transform="translate(560, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g6)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="600" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#e0e7ff">SEMIBOLD</text>
      <text x="48" y="116" class="cval" fill="#ffffff">600.0</text>
      <text x="48" y="136" class="csmall" fill="#c7d2fe">semibold</text>
    </g>

    <!-- BOLD 700 -->
    <g transform="translate(672, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g7)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="700" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#e0e7ff">BOLD</text>
      <text x="48" y="116" class="cval" fill="#ffffff">700.0</text>
      <text x="48" y="136" class="csmall" fill="#c7d2fe">bold</text>
    </g>

    <!-- EXTRA_BOLD 800 -->
    <g transform="translate(784, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g8)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="800" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#c7d2fe">EXTRA_BOLD</text>
      <text x="48" y="116" class="cval" fill="#ffffff">800.0</text>
      <text x="48" y="136" class="csmall" fill="#a5b4fc">extra-bold</text>
    </g>

    <!-- BLACK 900 -->
    <g transform="translate(896, 0)">
      <rect width="96" height="150" rx="12" class="card" fill="url(#g9)" />
      <text x="48" y="56" class="letter" font-size="44" font-weight="900" fill="#ffffff">Aa</text>
      <text x="48" y="96" class="cname" fill="#c7d2fe">BLACK</text>
      <text x="48" y="116" class="cval" fill="#ffffff">900.0</text>
      <text x="48" y="136" class="csmall" fill="#a5b4fc">black</text>
    </g>
  </g>

  <!-- Alt Not -->
  <text x="530" y="294" class="note">FontWeight::ALL tüm değerleri sırayla taşır — font seçici iterasyonu için pratik erişim sunar.</text>

</svg>
