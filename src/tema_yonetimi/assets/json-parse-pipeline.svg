<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360">
  <title>JSON Parse Pipeline</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.04" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <style>
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .api { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      .when { font: 800 12px system-ui, -apple-system, sans-serif; fill: rgba(255, 255, 255, 0.8); letter-spacing: 0.5px; }
      .body { font: 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
      .card { filter: url(#shadow); }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />
  
  <text x="550" y="46" text-anchor="middle" class="title">JSON Parse Pipeline</text>
  <text x="550" y="74" text-anchor="middle" class="subtitle">Lenient okuma, schema tipi ve runtime model sırayla nasıl işlenir?</text>

  <!-- Adım 1 -->
  <g transform="translate(30, 110)">
    <rect width="180" height="120" rx="10" fill="#334155" class="card" />
    <text x="90" y="30" text-anchor="middle" class="api">theme.json</text>
    <text x="15" y="70" class="body">• Zed uyumlu</text>
    <text x="25" y="90" class="when">Comments &amp;</text>
    <text x="25" y="105" class="when">Trailing Comma</text>
  </g>

  <!-- Adım 2 -->
  <g transform="translate(250, 110)">
    <rect width="180" height="120" rx="10" fill="#0ea5e9" class="card" />
    <text x="90" y="30" text-anchor="middle" class="api">serde_lenient</text>
    <text x="15" y="70" class="body">• ThemeFamilyContent</text>
    <text x="25" y="95" class="when">Schema Katmanı</text>
  </g>

  <!-- Adım 3a -->
  <g transform="translate(470, 40)">
    <rect width="200" height="120" rx="10" fill="#7c3aed" class="card" />
    <text x="100" y="30" text-anchor="middle" class="api">flatten/rename</text>
    <text x="20" y="70" class="body">• Dotted keys çözülür</text>
    <text x="20" y="95" class="when">İç içe Option Alanlar</text>
  </g>

  <!-- Adım 3b -->
  <g transform="translate(470, 180)">
    <rect width="200" height="120" rx="10" fill="#d97706" class="card" />
    <text x="100" y="30" text-anchor="middle" class="api" style="font-size: 14px;">treat_error_as_none</text>
    <text x="20" y="70" class="body">• Tolerans noktası</text>
    <text x="20" y="95" class="when">Hatalı Renk Düşer</text>
  </g>

  <!-- Adım 4 -->
  <g transform="translate(710, 110)">
    <rect width="220" height="120" rx="10" fill="#10b981" class="card" />
    <text x="110" y="30" text-anchor="middle" class="api">Theme::from_content</text>
    <text x="20" y="70" class="body">• Hsla + Arc + Registry</text>
    <text x="20" y="95" class="when">Runtime Model Oluşturulur</text>
  </g>

  <!-- Oklar -->
  <path d="M 210 170 H 240" class="arrow-line" />
  <path d="M 430 170 C 450 170 450 100 460 100" class="arrow-line" />
  <path d="M 430 170 C 450 170 450 240 460 240" class="arrow-line" />
  
  <path d="M 670 100 C 690 100 690 170 700 170" class="arrow-line" />
  <path d="M 670 240 C 690 240 690 170 700 170" class="arrow-line" />

  <!-- Alt Not -->
  <g transform="translate(30, 316)">
    <rect width="900" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="450" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#1e40af">Kural: JSON schema kullanıcı sözleşmesidir; runtime Theme bu sözleşmenin işlenmiş ve valide edilmiş sonucudur.</text>
  </g>

</svg>
