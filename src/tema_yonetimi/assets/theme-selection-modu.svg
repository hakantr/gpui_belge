<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <title>ThemeSelection Modu Seçimi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-static" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4338ca" />
      <stop offset="1" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="g-system" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="g-foot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>

    <style>
      .bg   { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub  { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api  { font: 800 17px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .head { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .note { font: 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.80; }
      .sec  { font: 800 15px system-ui, -apple-system, sans-serif; fill: #334155; }
      .foot { font: 600 13px system-ui, -apple-system, sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .tag  { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; }

      .reveal { animation: reveal 9s ease-in-out infinite; }
      .d0 { animation-delay: 0s; }
      .d1 { animation-delay: 0.6s; }
      .d2 { animation-delay: 1.2s; }
      .d3 { animation-delay: 1.8s; }
      @keyframes reveal {
        0%   { opacity: 1; }
        70%  { opacity: 1; }
        82%  { opacity: 0.7; }
        100% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="46" class="title">ThemeSelection Modu Seçimi</text>
  <text x="500" y="74" class="sub">Enum serde::untagged olarak ayrıştırılır; string → Static, object → Dynamic.</text>

  <!-- ================= AYRIŞTIRMA AKIŞI (untagged karar) ================= -->
  <g transform="translate(40, 96)">
    <!-- JSON girişi -->
    <rect x="0" y="0" width="160" height="40" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="25" class="tag">serde JSON girişi</text>
    <!-- string dalı -->
    <path d="M 160 20 L 232 20" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <rect x="240" y="2" width="118" height="36" rx="8" fill="#e0e7ff" stroke="#cbd5e1" stroke-width="1" />
    <text x="299" y="25" class="tag">string → Static</text>
    <!-- object dalı -->
    <path d="M 358 20 L 430 20" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <rect x="438" y="2" width="132" height="36" rx="8" fill="#ede9fe" stroke="#cbd5e1" stroke-width="1" />
    <text x="504" y="25" class="tag">object → Dynamic</text>
  </g>

  <!-- ================= STATIC (Tekil Tema) ================= -->
  <g transform="translate(40, 152)" class="reveal d0">
    <rect width="920" height="92" rx="12" fill="url(#g-static)" filter="url(#shadow)" />
    <text x="460" y="32" class="api">ThemeSelection::Static(ThemeName)</text>
    <text x="460" y="56" class="body" text-anchor="middle">Tek bir tema adı taşır; "mode" kavramı yoktur. Her koşulda aynı ad Registry.get(name) ile aranır.</text>
    <text x="460" y="78" class="note" text-anchor="middle">Örnek JSON: "theme": "One Dark"</text>
  </g>

  <!-- ================= DYNAMIC BAŞLIK ================= -->
  <text x="40" y="280" class="sec">Dynamic { mode, light, dark } — Object biçiminde ayrıştırılır (light ve dark zorunludur).</text>

  <!-- ================= DYNAMIC: LIGHT ================= -->
  <g transform="translate(40, 296)" class="reveal d1">
    <rect width="290" height="168" rx="12" fill="url(#g-light)" filter="url(#shadow)" />
    <text x="145" y="32" class="head">mode = Light</text>
    <text x="20" y="62" class="body">• OS modu yoksayılır.</text>
    <text x="20" y="84" class="body">• Hep "light" adı lookup edilir.</text>
    <text x="20" y="116" class="note">"theme": { "mode": "light",</text>
    <text x="20" y="134" class="note">  "light": "One Light",</text>
    <text x="20" y="152" class="note">  "dark": "One Dark" }</text>
  </g>

  <!-- ================= DYNAMIC: DARK ================= -->
  <g transform="translate(355, 296)" class="reveal d2">
    <rect width="290" height="168" rx="12" fill="url(#g-dark)" filter="url(#shadow)" />
    <text x="145" y="32" class="head">mode = Dark</text>
    <text x="20" y="62" class="body">• OS modu yoksayılır.</text>
    <text x="20" y="84" class="body">• Hep "dark" adı lookup edilir.</text>
    <text x="20" y="116" class="note">"theme": { "mode": "dark",</text>
    <text x="20" y="134" class="note">  "light": "One Light",</text>
    <text x="20" y="152" class="note">  "dark": "One Dark" }</text>
  </g>

  <!-- ================= DYNAMIC: SYSTEM ================= -->
  <g transform="translate(670, 296)" class="reveal d3">
    <rect width="290" height="168" rx="12" fill="url(#g-system)" filter="url(#shadow)" />
    <text x="145" y="32" class="head">mode = System (Varsayılan)</text>
    <text x="20" y="58" class="note" style="font-size:11.5px">SystemAppearance::global(cx) okunur.</text>
    <text x="20" y="80" class="body">• Appearance::Light → "light" adı</text>
    <text x="20" y="102" class="body">• Appearance::Dark → "dark" adı</text>
    <text x="20" y="130" class="note" style="font-size:11.5px">mode belirtilmezse System seçilir.</text>
  </g>

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 478)">
    <rect width="920" height="26" rx="6" fill="url(#g-foot)" filter="url(#shadow)" />
    <text x="460" y="18" class="foot">ThemeAppearanceMode: #[default] System. IconThemeSelection aynı untagged yapısını kullanır.</text>
  </g>

</svg>
