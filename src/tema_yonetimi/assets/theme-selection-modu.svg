<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440">
  <title>ThemeSelection Modu Seçimi</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.05" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      
      .api { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .head { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .body { font: 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .note { font: 13px ui-monospace, SFMono-Regular, monospace; fill: rgba(255, 255, 255, 0.8); }
      .sec { font: 800 15px system-ui, -apple-system, sans-serif; fill: #334155; }

      .card { filter: url(#shadow); rx: 12px; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="46" class="title">ThemeSelection Modu Seçimi</text>
  <text x="500" y="74" class="sub">Enum serde::untagged olarak ayrıştırılır; string → Static, object → Dynamic.</text>

  <!-- ================= STATIC (Tekil Tema) ================= -->
  <g transform="translate(40, 110)">
    <rect width="920" height="90" fill="#0ea5e9" class="card" />
    <text x="460" y="32" class="api">ThemeSelection::Static(ThemeName)</text>
    <text x="460" y="55" class="body" text-anchor="middle">Tek bir tema adı taşır; "mode" kavramı yoktur. Her koşulda aynı ad Registry üzerinden aranır.</text>
    <text x="460" y="75" class="note" text-anchor="middle">Örnek JSON: "theme": "One Dark"</text>
  </g>

  <!-- ================= DYNAMIC BAŞLIK ================= -->
  <text x="40" y="235" class="sec">Dynamic { mode, light, dark } — Object biçiminde ayrıştırılır (light ve dark zorunludur).</text>

  <!-- ================= DYNAMIC: LIGHT ================= -->
  <g transform="translate(40, 250)">
    <rect width="290" height="135" fill="#2563eb" class="card" />
    <text x="145" y="32" class="head">mode = Light</text>
    <text x="20" y="60" class="body">• OS modu yoksayılır.</text>
    <text x="20" y="80" class="body">• Daima "light" kullanılır.</text>
    <text x="20" y="105" class="note">"theme": { "mode": "light",</text>
    <text x="20" y="120" class="note">  "light": "One Light", ... }</text>
  </g>

  <!-- ================= DYNAMIC: DARK ================= -->
  <g transform="translate(355, 250)">
    <rect width="290" height="135" fill="#312e81" class="card" />
    <text x="145" y="32" class="head">mode = Dark</text>
    <text x="20" y="60" class="body">• OS modu yoksayılır.</text>
    <text x="20" y="80" class="body">• Daima "dark" kullanılır.</text>
    <text x="20" y="105" class="note">"theme": { "mode": "dark",</text>
    <text x="20" y="120" class="note">  "dark": "One Dark", ... }</text>
  </g>

  <!-- ================= DYNAMIC: SYSTEM ================= -->
  <g transform="translate(670, 250)">
    <rect width="290" height="135" fill="#7c3aed" class="card" />
    <text x="145" y="32" class="head">mode = System (Varsayılan)</text>
    <text x="20" y="60" class="body">• OS Modu Okunur</text>
    <text x="20" y="80" class="body">• Light OS → "light" Tema</text>
    <text x="20" y="100" class="body">• Dark OS → "dark" Tema</text>
    <text x="20" y="120" class="note">Mode belirtilmezse bu seçilir.</text>
  </g>

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 400)">
    <rect width="920" height="24" rx="4" fill="#334155" />
    <text x="460" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" fill="#e2e8f0">ThemeAppearanceMode: #[default] System. IconThemeSelection aynı untagged yapısını kullanır.</text>
  </g>

</svg>
