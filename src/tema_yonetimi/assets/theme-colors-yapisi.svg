<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620">
  <title>ThemeStyles ve ThemeColors Alan Haritası</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.05" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      
      .panel-border { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12px; filter: url(#shadow); }
      .panel-head { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; letter-spacing: 0.5px; }
      
      .chip-base { rx: 8px; }
      .chip-name { font: 800 13px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }
      .chip-count { font: 600 12px system-ui, -apple-system, sans-serif; opacity: 0.8; text-anchor: middle; }
      
      .card-title { font: 800 15px ui-monospace, SFMono-Regular, monospace; }
      .card-body { font: 500 13px system-ui, -apple-system, sans-serif; opacity: 0.9; }
      .card-note { font: 500 12px system-ui, -apple-system, sans-serif; opacity: 0.7; font-style: italic; }

      .footer-note { font: 600 14px system-ui, -apple-system, sans-serif; fill: #1e40af; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">ThemeStyles - Renk Grubu Haritası</text>
  <text x="550" y="74" class="sub">ThemeColors alanları semantik kümeler halinde; diğer tema renkleri ayrı alt yapılar olarak taşınır.</text>

  <!-- ================= SOL PANEL: ThemeColors ================= -->
  <g transform="translate(30, 110)">
    <!-- Panel Zemin -->
    <rect width="700" height="480" class="panel-border" />
    
    <!-- Panel Başlık -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 688 A 12 12 0 0 1 700 12 V 40 H 0 Z" fill="#2563eb" />
    <text x="350" y="26" text-anchor="middle" class="panel-head">ThemeColors (143 Hsla alan)</text>

    <!-- SATIR 1 -->
    <g transform="translate(30, 60)">
      <rect width="140" height="55" class="chip-base" fill="#dbeafe" />
      <text x="70" y="24" class="chip-name" fill="#1e40af">border</text>
      <text x="70" y="44" class="chip-count" fill="#1e40af">6 alan</text>

      <rect x="160" width="140" height="55" class="chip-base" fill="#dbeafe" />
      <text x="230" y="24" class="chip-name" fill="#1e40af">surface</text>
      <text x="230" y="44" class="chip-count" fill="#1e40af">3 alan</text>

      <rect x="320" width="140" height="55" class="chip-base" fill="#dbeafe" />
      <text x="390" y="24" class="chip-name" fill="#1e40af">element</text>
      <text x="390" y="44" class="chip-count" fill="#1e40af">8 alan</text>

      <rect x="480" width="160" height="55" class="chip-base" fill="#dbeafe" />
      <text x="560" y="24" class="chip-name" fill="#1e40af">ghost_element</text>
      <text x="560" y="44" class="chip-count" fill="#1e40af">5 alan</text>
    </g>

    <!-- SATIR 2 -->
    <g transform="translate(30, 135)">
      <rect width="140" height="55" class="chip-base" fill="#dcfce7" />
      <text x="70" y="24" class="chip-name" fill="#166534">text</text>
      <text x="70" y="44" class="chip-count" fill="#166534">5 alan</text>

      <rect x="160" width="140" height="55" class="chip-base" fill="#dcfce7" />
      <text x="230" y="24" class="chip-name" fill="#166534">icon</text>
      <text x="230" y="44" class="chip-count" fill="#166534">4 alan</text>

      <rect x="320" width="140" height="55" class="chip-base" fill="#dcfce7" />
      <text x="390" y="24" class="chip-name" fill="#166534">scrollbar</text>
      <text x="390" y="44" class="chip-count" fill="#166534">6 alan</text>

      <rect x="480" width="160" height="55" class="chip-base" fill="#dcfce7" />
      <text x="560" y="24" class="chip-name" fill="#166534">minimap</text>
      <text x="560" y="44" class="chip-count" fill="#166534">4 alan</text>
    </g>

    <!-- SATIR 3 -->
    <g transform="translate(30, 210)">
      <rect width="140" height="55" class="chip-base" fill="#fef9c3" />
      <text x="70" y="24" class="chip-name" fill="#854d0e">chrome</text>
      <text x="70" y="44" class="chip-count" fill="#854d0e">kabuk alanları</text>

      <rect x="160" width="140" height="55" class="chip-base" fill="#fef9c3" />
      <text x="230" y="24" class="chip-name" fill="#854d0e">panel / pane</text>
      <text x="230" y="44" class="chip-count" fill="#854d0e">~7 alan</text>

      <rect x="320" width="140" height="55" class="chip-base" fill="#fef9c3" />
      <text x="390" y="24" class="chip-name" fill="#854d0e">editor</text>
      <text x="390" y="44" class="chip-count" fill="#854d0e">base ~18</text>

      <rect x="480" width="160" height="55" class="chip-base" fill="#fef9c3" />
      <text x="560" y="24" class="chip-name" fill="#854d0e">editor_diff</text>
      <text x="560" y="44" class="chip-count" fill="#854d0e">hunk 6 alan</text>
    </g>

    <!-- SATIR 4 -->
    <g transform="translate(30, 285)">
      <rect width="140" height="55" class="chip-base" fill="#fce7f3" />
      <text x="70" y="24" class="chip-name" fill="#9d174d">search</text>
      <text x="70" y="44" class="chip-count" fill="#9d174d">2 alan</text>

      <rect x="160" width="140" height="55" class="chip-base" fill="#fce7f3" />
      <text x="230" y="24" class="chip-name" fill="#9d174d">debugger</text>
      <text x="230" y="44" class="chip-count" fill="#9d174d">2 alan</text>

      <rect x="320" width="140" height="55" class="chip-base" fill="#fce7f3" />
      <text x="390" y="24" class="chip-name" fill="#9d174d">terminal</text>
      <text x="390" y="44" class="chip-count" fill="#9d174d">ansi ~29 alan</text>

      <rect x="480" width="160" height="55" class="chip-base" fill="#fce7f3" />
      <text x="560" y="24" class="chip-name" fill="#9d174d">vcs</text>
      <text x="560" y="44" class="chip-count" fill="#9d174d">~10 alan</text>
    </g>

    <!-- SATIR 5 -->
    <g transform="translate(30, 360)">
      <rect width="140" height="55" class="chip-base" fill="#ede9fe" />
      <text x="70" y="24" class="chip-name" fill="#5b21b6">vim / helix</text>
      <text x="70" y="44" class="chip-count" fill="#5b21b6">~18 alan</text>

      <rect x="190" width="280" height="55" class="chip-base" fill="#eff6ff" stroke="#3b82f6" />
      <text x="330" y="24" class="chip-name" fill="#1d4ed8">Accessor Odaklı</text>
      <text x="330" y="44" class="chip-count" fill="#1d4ed8">cx.theme().colors().background</text>

      <rect x="490" width="150" height="55" class="chip-base" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4" />
      <text x="565" y="24" class="chip-name" fill="#334155">pub(crate)</text>
      <text x="565" y="44" class="chip-count" fill="#334155">Alanlar Gizli</text>
    </g>

    <!-- ALT BİLGİ -->
    <rect x="30" y="435" width="610" height="25" rx="6" fill="#eff6ff" />
    <text x="335" y="452" class="footer-note">Tüketici doğrudan struct alanına değil, accessor metodlarına dayanır.</text>
  </g>

  <!-- ================= SAĞ PANEL: ThemeStyles (Diğer) ================= -->
  <g transform="translate(750, 110)">
    <!-- Panel Zemin -->
    <rect width="320" height="480" class="panel-border" />
    
    <!-- Panel Başlık -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 308 A 12 12 0 0 1 320 12 V 40 H 0 Z" fill="#334155" />
    <text x="160" y="26" text-anchor="middle" class="panel-head">ThemeStyles (Diğer)</text>

    <!-- KARTLAR -->
    <g transform="translate(20, 60)">
      <rect width="280" height="65" class="chip-base" fill="#fef2f2" />
      <text x="15" y="25" class="card-title" fill="#b91c1c">StatusColors</text>
      <text x="15" y="45" class="card-body" fill="#991b1b">error, warning, info, success</text>
      <text x="15" y="60" class="card-note" fill="#b91c1c">fg / bg / border varyantları</text>
    </g>

    <g transform="translate(20, 140)">
      <rect width="280" height="65" class="chip-base" fill="#eff6ff" />
      <text x="15" y="25" class="card-title" fill="#1d4ed8">PlayerColors</text>
      <text x="15" y="45" class="card-body" fill="#1e40af">cursor, selection, background</text>
      <text x="15" y="60" class="card-note" fill="#1d4ed8">her işbirliği katılımcısı için</text>
    </g>

    <g transform="translate(20, 220)">
      <rect width="280" height="65" class="chip-base" fill="#fefce8" />
      <text x="15" y="25" class="card-title" fill="#a16207">AccentColors</text>
      <text x="15" y="45" class="card-body" fill="#854d0e">color, text, background, border</text>
      <text x="15" y="60" class="card-note" fill="#a16207">uygulama accent rengi seti</text>
    </g>

    <g transform="translate(20, 300)">
      <rect width="280" height="65" class="chip-base" fill="#f0fdf4" />
      <text x="15" y="25" class="card-title" fill="#15803d">Arc&lt;SyntaxTheme&gt;</text>
      <text x="15" y="45" class="card-body" fill="#166534">50-200 highlight girişi</text>
      <text x="15" y="60" class="card-note" fill="#15803d">tema varyantları paylaşabilir</text>
    </g>

    <g transform="translate(20, 380)">
      <rect width="280" height="65" class="chip-base" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />
      <text x="15" y="25" class="card-title" fill="#334155">SystemColors</text>
      <text x="15" y="45" class="card-body" fill="#475569">Platform sistem renkleri</text>
    </g>
  </g>

</svg>
