<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 470">
  <title>UI Tema Tüketim Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .api { font: 800 17px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .when { font: 600 12.5px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.82; letter-spacing: 0.3px; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 9 11; opacity: 0.85; }
      .card { filter: url(#shadow); }

      @keyframes dash { to { stroke-dashoffset: -120; } }
      .flow { animation: dash 9s linear infinite; }
      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="530" y="50" class="title">UI Tema Tüketim Akışı</text>
  <text x="530" y="80" class="sub">Bileşenler tema iç yerleşimini değil, accessor yüzeyini okur.</text>

  <!-- ================= OKLAR (kartların altında çizilir) ================= -->
  <!-- Adim 1 -> Adim 2 -->
  <path d="M 220 230 H 270" class="arrow-line" />
  <path d="M 220 230 H 264" class="flow" />

  <!-- Adim 2 -> Accessor / Etkilesim -->
  <path d="M 460 230 C 492 230 492 150 512 150" class="arrow-line" />
  <path d="M 460 230 C 492 230 492 150 506 150" class="flow" />
  <path d="M 460 230 C 492 230 492 310 512 310" class="arrow-line" />
  <path d="M 460 230 C 492 230 492 310 506 310" class="flow" />

  <!-- Accessor / Etkilesim -> Element Olusturma -->
  <path d="M 720 150 C 752 150 752 230 772 230" class="arrow-line" />
  <path d="M 720 150 C 752 150 752 230 766 230" class="flow" />
  <path d="M 720 310 C 752 310 752 230 772 230" class="arrow-line" />
  <path d="M 720 310 C 752 310 752 230 766 230" class="flow" />

  <!-- ================= ADIM 1 ================= -->
  <g transform="translate(40, 170)">
    <rect width="180" height="120" rx="12" fill="url(#g-slate)" class="card" />
    <text x="90" y="34" class="api">Render View</text>
    <line x1="20" y1="50" x2="160" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="18" y="78" class="body">• use prelude</text>
    <text x="18" y="102" class="when">ActiveTheme trait'i</text>
  </g>

  <!-- ================= ADIM 2 ================= -->
  <g transform="translate(280, 170)">
    <rect width="180" height="120" rx="12" fill="url(#g-sky)" class="card" />
    <text x="90" y="34" class="api">cx.theme()</text>
    <line x1="20" y1="50" x2="160" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="18" y="78" class="body">• &amp;Arc&lt;Theme&gt;</text>
    <text x="18" y="102" class="when">Klon gerekmez</text>
  </g>

  <!-- ================= ADIM 3a: Accessor ================= -->
  <g transform="translate(520, 90)">
    <rect width="200" height="120" rx="12" fill="url(#g-green)" class="card" />
    <text x="100" y="34" class="api">Accessor</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="18" y="78" class="body">• colors()</text>
    <text x="18" y="102" class="when">status(), players() vb.</text>
  </g>

  <!-- ================= ADIM 3b: Etkilesim ================= -->
  <g transform="translate(520, 250)">
    <rect width="200" height="120" rx="12" fill="url(#g-amber)" class="card" />
    <text x="100" y="34" class="api">Etkileşim</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="18" y="78" class="body">• hover / active</text>
    <text x="18" y="102" class="when">disabled / selected</text>
  </g>

  <!-- ================= ADIM 4 ================= -->
  <g transform="translate(780, 170)">
    <rect width="240" height="120" rx="12" fill="url(#g-purple)" class="card" />
    <text x="120" y="34" class="api">Element Oluşturma</text>
    <line x1="20" y1="50" x2="220" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="18" y="78" class="body">• div().bg(..).border(..)</text>
    <text x="18" y="102" class="when">text_color(..)</text>
  </g>

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 408)">
    <rect width="980" height="42" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="490" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#1e40af">Kural: `styles` alanları crate-içi gizlidir; dış UI yalnızca accessor metotlarını kullanır.</text>
  </g>

</svg>
