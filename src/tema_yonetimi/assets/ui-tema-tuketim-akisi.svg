<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 440">
  <title>UI Tema Tüketim Akışı</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.05" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      
      .api { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .when { font: 800 12px system-ui, -apple-system, sans-serif; fill: rgba(255, 255, 255, 0.8); letter-spacing: 0.5px; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
      .card { filter: url(#shadow); rx: 12px; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />
  
  <text x="530" y="46" class="title">UI Tema Tüketim Akışı</text>
  <text x="530" y="74" class="sub">Bileşenler tema iç yerleşimini değil, accessor yüzeyini okur.</text>

  <!-- ================= ADIM 1 ================= -->
  <g transform="translate(40, 130)">
    <rect width="180" height="120" fill="#334155" class="card" />
    <text x="90" y="30" class="api">Render View</text>
    <text x="15" y="70" class="body">• use prelude</text>
    <text x="15" y="95" class="when">ActiveTheme trait'i</text>
  </g>

  <!-- ================= ADIM 2 ================= -->
  <g transform="translate(280, 130)">
    <rect width="180" height="120" fill="#0284c7" class="card" />
    <text x="90" y="30" class="api">cx.theme()</text>
    <text x="15" y="70" class="body">• &amp;Arc&lt;Theme&gt;</text>
    <text x="15" y="95" class="when">Klon Gerekmez</text>
  </g>

  <!-- ================= ADIM 3 ================= -->
  <g transform="translate(520, 50)">
    <rect width="200" height="120" fill="#059669" class="card" />
    <text x="100" y="30" class="api">Accessor</text>
    <text x="15" y="70" class="body">• colors()</text>
    <text x="15" y="95" class="when">status(), players() vb.</text>
  </g>

  <g transform="translate(520, 210)">
    <rect width="200" height="120" fill="#d97706" class="card" />
    <text x="100" y="30" class="api">Etkileşim</text>
    <text x="15" y="70" class="body">• hover / active</text>
    <text x="15" y="95" class="when">disabled / selected</text>
  </g>

  <!-- ================= ADIM 4 ================= -->
  <g transform="translate(780, 130)">
    <rect width="240" height="120" fill="#7c3aed" class="card" />
    <text x="120" y="30" class="api">Element Oluşturma</text>
    <text x="15" y="70" class="body">• div().bg(..).border(..)</text>
    <text x="15" y="95" class="when">text_color(..)</text>
  </g>

  <!-- ================= OKLAR ================= -->
  <path d="M 220 190 H 270" class="arrow-line" />
  
  <path d="M 460 190 C 490 190 490 110 510 110" class="arrow-line" />
  <path d="M 460 190 C 490 190 490 270 510 270" class="arrow-line" />

  <path d="M 720 110 C 750 110 750 190 770 190" class="arrow-line" />
  <path d="M 720 270 C 750 270 750 190 770 190" class="arrow-line" />

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(40, 360)">
    <rect width="980" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="490" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#1e40af">Kural: `styles` alanları crate-içi gizlidir; dış UI yalnızca accessor metotlarını kullanır.</text>
  </g>

</svg>
