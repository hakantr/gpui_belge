<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti ve Gölgeler -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50fa7b"/>
      <stop offset="100%" stop-color="#bd93f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }
      .line-pulse {
        animation: lineGlow 3s infinite alternate;
      }
      .node-select-pulse {
        animation: selectPulse 2s infinite alternate;
      }

      @keyframes lineGlow {
        0% { stroke: #6272a4; stroke-width: 1.5; }
        100% { stroke: #8be9fd; stroke-width: 2.5; filter: drop-shadow(0 0 4px #8be9fd); }
      }
      @keyframes selectPulse {
        0% { fill: #21222c; stroke: #6272a4; }
        100% { fill: #282a36; stroke: #50fa7b; }
      }
    </style>
  </defs>

  <!-- Arka Plan Kartı -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">Ağaç (Tree) ve Girinti (Indent) Yapısı</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">TreeViewItem Girintileri ve IndentGuides Kılavuz Çizgileri</text>

  <!-- TREE VE LIST HIYERARSISI -->

  <!-- Kılavuz Çizgileri (Indent Guides) -->
  <line x1="140" y1="180" x2="140" y2="400" stroke="#6272a4" stroke-width="1.5" class="line-pulse"/>
  <line x1="180" y1="300" x2="180" y2="400" stroke="#6272a4" stroke-width="1" opacity="0.5"/>

  <!-- Node 1: Root (Expanded) -->
  <g transform="translate(80, 120)" filter="url(#shadow)">
    <rect width="640" height="48" rx="8" fill="#21222c" stroke="#6272a4" stroke-width="1"/>
    
    <!-- Expanded Arrow -->
    <path d="M 25 20 L 35 30 L 45 20" fill="none" stroke="#ffb86c" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Folder Icon -->
    <rect x="60" y="14" width="20" height="20" rx="3" fill="#bd93f9"/>
    
    <!-- Text -->
    <text x="95" y="28" class="text-style" font-size="13" font-weight="600">src (Root Node - Indent 0)</text>
    <text x="580" y="28" fill="#6272a4" font-size="10">Expanded</text>
  </g>

  <!-- Node 2: Child File (Indent 1) -->
  <g transform="translate(80, 180)" filter="url(#shadow)">
    <rect width="640" height="48" rx="8" fill="#21222c" stroke="#6272a4" stroke-width="1"/>
    
    <!-- Indent Space indicator (12px * 1) -->
    <rect x="0" y="0" width="60" height="48" fill="#ff5555" fill-opacity="0.05"/>
    
    <!-- File Icon -->
    <rect x="100" y="14" width="16" height="20" rx="2" fill="#8be9fd"/>
    
    <!-- Text -->
    <text x="130" y="28" class="text-style" font-size="13" font-weight="600">main.rs (Child File - Indent 1)</text>
    <text x="580" y="28" fill="#6272a4" font-size="10">Indent: 12px</text>
  </g>

  <!-- Node 3: Child Folder (Indent 1 - Selected/Active) -->
  <g transform="translate(80, 240)" filter="url(#shadow)">
    <rect width="640" height="48" rx="8" fill="#282a36" stroke="#50fa7b" stroke-width="1.5" class="node-select-pulse"/>
    
    <!-- Indent Space indicator (12px * 1) -->
    <rect x="0" y="0" width="60" height="48" fill="#ff5555" fill-opacity="0.05"/>
    
    <!-- Collapsed Arrow -->
    <path d="M 65 19 L 75 24 L 65 29" fill="none" stroke="#ffb86c" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Folder Icon -->
    <rect x="100" y="14" width="20" height="20" rx="3" fill="#bd93f9"/>
    
    <!-- Text -->
    <text x="130" y="28" class="text-style" font-size="13" font-weight="600" fill="#50fa7b">ui (Child Folder - Selected)</text>
    <text x="580" y="28" fill="#50fa7b" font-size="10" font-weight="600">Collapsed</text>
  </g>

  <!-- Node 4: Grandchild File (Indent 2 - Hidden/Mocked) -->
  <g transform="translate(80, 300)" filter="url(#shadow)" opacity="0.6">
    <rect width="640" height="48" rx="8" fill="#21222c" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- Indent Space indicator (12px * 2) -->
    <rect x="0" y="0" width="100" height="48" fill="#ff5555" fill-opacity="0.03"/>
    
    <!-- File Icon -->
    <rect x="140" y="14" width="16" height="20" rx="2" fill="#8be9fd"/>
    
    <!-- Text -->
    <text x="170" y="28" class="text-style" font-size="13" font-weight="600">button.rs (Grandchild - Indent 2)</text>
    <text x="580" y="28" fill="#6272a4" font-size="10">Indent: 24px</text>
  </g>

</svg>
