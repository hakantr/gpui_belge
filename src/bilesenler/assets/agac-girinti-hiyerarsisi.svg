<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Ağaç ve girinti yapısı</title>
  <defs>
    <marker id="aSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="aEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
    <marker id="aViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#7c3aed"/></marker>
    <marker id="aCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0891b2"/></marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
    <marker id="aRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#be123c"/></marker>
    <marker id="aSky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0284c7"/></marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#475569}
      .h{font-size:13px;font-weight:700;fill:#0f172a}
      .t{font-size:12px;font-weight:600;fill:#0f172a}
      .body{font-size:12px;fill:#475569}
      .small{font-size:10px;fill:#64748b}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;fill:#0f172a}
      .card{fill:#fff;stroke-width:1.6}
      .tEmerald{fill:#059669}.tViolet{fill:#7c3aed}.tCyan{fill:#0891b2}.tAmber{fill:#d97706}.tRose{fill:#be123c}.tSky{fill:#0284c7}.tSlate{fill:#64748b}.tWhite{fill:#fff}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#aSlate)}
      .aEm{stroke:#059669;marker-end:url(#aEmerald)}.aVi{stroke:#7c3aed;marker-end:url(#aViolet)}.aCy{stroke:#0891b2;marker-end:url(#aCyan)}.aAm{stroke:#d97706;marker-end:url(#aAmber)}.aRo{stroke:#be123c;marker-end:url(#aRose)}.aSk{stroke:#0284c7;marker-end:url(#aSky)}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc"/>

  <text x="400" y="40" text-anchor="middle" class="title">Ağaç (Tree) ve Girinti (Indent) Yapısı</text>
  <text x="400" y="63" text-anchor="middle" class="sub">TreeViewItem girintileri ve IndentGuides kılavuz çizgileri</text>

  <!-- Girinti kılavuz çizgileri -->
  <line x1="140" y1="180" x2="140" y2="392" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="180" y1="300" x2="180" y2="392" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Düğüm 1: Kök (açık) -->
  <g transform="translate(80,120)">
    <rect width="640" height="48" rx="8" class="card" stroke="#cbd5e1"/>
    <path d="M 20 19 L 30 27 L 40 19" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="60" y="14" width="20" height="20" rx="3" fill="#7c3aed"/>
    <text x="95" y="29" class="t">src (kök düğüm · girinti 0)</text>
    <text x="600" y="29" class="small" text-anchor="end">Açık</text>
  </g>

  <!-- Düğüm 2: Alt dosya (girinti 1) -->
  <g transform="translate(80,180)">
    <rect width="640" height="48" rx="8" class="card" stroke="#cbd5e1"/>
    <rect x="0" y="0" width="60" height="48" rx="8" fill="#be123c" fill-opacity="0.05"/>
    <rect x="100" y="14" width="16" height="20" rx="2" fill="#0284c7"/>
    <text x="130" y="29" class="t">main.rs (alt dosya · girinti 1)</text>
    <text x="600" y="29" class="small" text-anchor="end">Girinti: 12px</text>
  </g>

  <!-- Düğüm 3: Alt klasör (girinti 1 · seçili) -->
  <g transform="translate(80,240)">
    <rect width="640" height="48" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
    <rect x="0" y="0" width="60" height="48" rx="8" fill="#be123c" fill-opacity="0.05"/>
    <path d="M 65 19 L 75 24 L 65 29" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="100" y="14" width="20" height="20" rx="3" fill="#7c3aed"/>
    <text x="130" y="29" class="t tEmerald">ui (alt klasör · seçili)</text>
    <text x="600" y="29" class="small tEmerald" font-weight="600" text-anchor="end">Kapalı</text>
  </g>

  <!-- Düğüm 4: Torun dosya (girinti 2 · gizli) -->
  <g transform="translate(80,300)" opacity="0.6">
    <rect width="640" height="48" rx="8" class="card" stroke="#94a3b8" stroke-dasharray="4,4"/>
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#be123c" fill-opacity="0.04"/>
    <rect x="140" y="14" width="16" height="20" rx="2" fill="#0284c7"/>
    <text x="170" y="29" class="t">button.rs (torun · girinti 2)</text>
    <text x="600" y="29" class="small" text-anchor="end">Girinti: 24px</text>
  </g>
</svg>
