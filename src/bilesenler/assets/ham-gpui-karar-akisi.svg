<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <title>Ham GPUI Primitive Karar Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.55" />
    </filter>

    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#10b981" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#0ea5e9" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" /><stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-slate2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" /><stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" /><stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" /><stop offset="1" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="g-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f472b6" /><stop offset="1" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8" /><stop offset="1" stop-color="#4338ca" />
    </linearGradient>

    <style>
      .title    { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .q        { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; }
      .qsub     { font: 500 13px system-ui, -apple-system, sans-serif; fill: #cbd5e1; }
      .api      { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      .why      { font: 600 13px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .chip     { font: 700 13px system-ui, -apple-system, sans-serif; }
      .note     { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; }

      .arrow-line  { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-green { stroke: #10b981; stroke-width: 3;   fill: none; marker-end: url(#arrow-green); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-blue  { stroke: #0ea5e9; stroke-width: 3;   fill: none; marker-end: url(#arrow-blue); stroke-linecap: round; stroke-linejoin: round; }
      .card        { filter: url(#shadow); }

      .decision { animation: pulse 9s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pulse {
        0%, 100% { filter: url(#shadow); }
        50%      { filter: url(#glow); }
      }

      .row1 { animation: rise 9s ease-in-out infinite; }
      .row2 { animation: rise 9s ease-in-out infinite; animation-delay: 0.4s; }
      .row3 { animation: rise 9s ease-in-out infinite; animation-delay: 0.8s; }
      @keyframes rise {
        0%, 18%, 100% { opacity: 0.62; }
        34%, 84%      { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .decision, .row1, .row2, .row3 { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="480" y="48" text-anchor="middle" class="title">Ham GPUI Primitive Karar Akışı</text>
  <text x="480" y="76" text-anchor="middle" class="subtitle">Hazır Zed bileşeni var mı? → Yoksa hangi primitive kullanılmalı?</text>

  <!-- ===== Karar düğümü 1 ===== -->
  <g class="decision">
    <rect x="310" y="104" width="340" height="64" rx="32" fill="url(#g-slate)" stroke="#38bdf8" stroke-width="3" class="card" />
    <text x="480" y="132" text-anchor="middle" class="q">İhtiyacın standart bir Zed</text>
    <text x="480" y="154" text-anchor="middle" class="q">UI bileşeniyle karşılanıyor mu?</text>
  </g>

  <!-- Evet → ui::* -->
  <path d="M 308 136 L 216 136" class="arrow-green" />
  <g transform="translate(249,106)">
    <rect x="0" y="0" width="26" height="24" rx="8" fill="#f8fafc" stroke="#bbf7d0" stroke-width="1.5" />
    <text x="13" y="16" text-anchor="middle" class="chip" fill="#059669">E</text>
  </g>
  <rect x="40" y="100" width="170" height="72" rx="12" fill="url(#g-emerald)" class="card" />
  <text x="125" y="128" text-anchor="middle" class="api">ui::*</text>
  <text x="125" y="148" text-anchor="middle" class="why">Token, focus,</text>
  <text x="125" y="165" text-anchor="middle" class="why">erişilebilirlik hazır</text>

  <!-- Hayır → aşağı -->
  <path d="M 480 168 L 480 200" class="arrow-blue" />
  <g transform="translate(491,170)">
    <rect x="0" y="0" width="26" height="24" rx="8" fill="#f8fafc" stroke="#fecdd3" stroke-width="1.5" />
    <text x="13" y="16" text-anchor="middle" class="chip" fill="#e11d48">H</text>
  </g>

  <!-- ===== Karar düğümü 2 ===== -->
  <rect x="330" y="206" width="300" height="58" rx="29" fill="url(#g-slate2)" stroke="#64748b" stroke-width="2" class="card" />
  <text x="480" y="232" text-anchor="middle" class="q">Hangi ham GPUI ihtiyacı?</text>
  <text x="480" y="252" text-anchor="middle" class="qsub">(Aşağıdan seç)</text>

  <!-- Dağıtım gövdesi -->
  <path d="M 480 264 L 480 290" class="arrow-line" style="marker-end:none;" />

  <!-- ================= SATIR 1 ================= -->
  <g class="row1">
    <path d="M 480 290 L 480 296 L 130 296 L 130 320" class="arrow-line" />
    <path d="M 360 296 L 360 320" class="arrow-line" />
    <path d="M 600 296 L 600 320" class="arrow-line" />
    <path d="M 480 290 L 480 296 L 830 296 L 830 320" class="arrow-line" />

    <rect x="40" y="326" width="180" height="72" rx="12" fill="url(#g-blue)" class="card" />
    <text x="130" y="354" text-anchor="middle" class="api">div / h_flex</text>
    <text x="130" y="374" text-anchor="middle" class="why">Kutu + layout</text>
    <text x="130" y="391" text-anchor="middle" class="why">ve stil zinciri</text>

    <rect x="270" y="326" width="180" height="72" rx="12" fill="url(#g-violet)" class="card" />
    <text x="360" y="354" text-anchor="middle" class="api">canvas(pre, paint)</text>
    <text x="360" y="374" text-anchor="middle" class="why">Özel çizim,</text>
    <text x="360" y="391" text-anchor="middle" class="why">hitbox, path</text>

    <rect x="510" y="326" width="180" height="72" rx="12" fill="url(#g-sky)" class="card" />
    <text x="600" y="354" text-anchor="middle" class="api">img / svg</text>
    <text x="600" y="374" text-anchor="middle" class="why">Görsel gösterim,</text>
    <text x="600" y="391" text-anchor="middle" class="why">vektör varlık</text>

    <rect x="740" y="326" width="180" height="72" rx="12" fill="url(#g-amber)" class="card" />
    <text x="830" y="354" text-anchor="middle" class="api">anchored()</text>
    <text x="830" y="374" text-anchor="middle" class="why">Tooltip, popover,</text>
    <text x="830" y="391" text-anchor="middle" class="why">konumlu kaplama</text>
  </g>

  <!-- ================= SATIR 2 ================= -->
  <g class="row2">
    <path d="M 130 398 L 130 422" class="arrow-line" />
    <path d="M 360 398 L 360 422" class="arrow-line" />
    <path d="M 600 398 L 600 422" class="arrow-line" />
    <path d="M 830 398 L 830 422" class="arrow-line" />

    <rect x="40" y="428" width="180" height="72" rx="12" fill="url(#g-green)" class="card" />
    <text x="130" y="456" text-anchor="middle" class="api">list / uniform_list</text>
    <text x="130" y="476" text-anchor="middle" class="why">Sanal liste —</text>
    <text x="130" y="493" text-anchor="middle" class="why">değişken / sabit yükseklik</text>

    <rect x="270" y="428" width="180" height="72" rx="12" fill="url(#g-rose)" class="card" />
    <text x="360" y="456" text-anchor="middle" class="api">StyledText</text>
    <text x="360" y="476" text-anchor="middle" class="why">Metin vurgu,</text>
    <text x="360" y="493" text-anchor="middle" class="why">aralık (span) etkileşimi</text>

    <rect x="510" y="428" width="180" height="72" rx="12" fill="url(#g-teal)" class="card" />
    <text x="600" y="456" text-anchor="middle" class="api">image_cache</text>
    <text x="600" y="476" text-anchor="middle" class="why">Alt ağaçta ortak</text>
    <text x="600" y="493" text-anchor="middle" class="why">görsel önbelleği</text>

    <rect x="740" y="428" width="180" height="72" rx="12" fill="url(#g-pink)" class="card" />
    <text x="830" y="456" text-anchor="middle" class="api">Animation</text>
    <text x="830" y="476" text-anchor="middle" class="why">Zaman tabanlı</text>
    <text x="830" y="493" text-anchor="middle" class="why">dönüşüm / geçiş</text>
  </g>

  <!-- ================= SATIR 3 ================= -->
  <g class="row3">
    <path d="M 130 500 L 130 524" class="arrow-line" />
    <path d="M 360 500 L 360 524" class="arrow-line" />

    <rect x="40" y="530" width="180" height="72" rx="12" fill="url(#g-indigo)" class="card" />
    <text x="130" y="558" text-anchor="middle" class="api">deferred(child)</text>
    <text x="130" y="578" text-anchor="middle" class="why">Ağır alt ağacın</text>
    <text x="130" y="595" text-anchor="middle" class="why">çizimini erteleme</text>

    <rect x="270" y="530" width="180" height="72" rx="12" fill="url(#g-slate2)" class="card" />
    <text x="360" y="558" text-anchor="middle" class="api">surface(source)</text>
    <text x="360" y="578" text-anchor="middle" class="why">CVPixelBuffer</text>
    <text x="360" y="595" text-anchor="middle" class="why">(macOS) yüzeyi</text>
  </g>

  <!-- Alt not -->
  <text x="600" y="572" text-anchor="middle" class="note">Önce ui::* ara; yoksa amaca en yakın primitive ile kompozisyon kur.</text>
  <text x="600" y="594" text-anchor="middle" class="note">Token, focus ve erişilebilirliği elle taşımayı unutma.</text>

</svg>
