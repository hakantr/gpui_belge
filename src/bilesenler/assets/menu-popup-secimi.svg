<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <title>Menü, Popup ve Tooltip Bileşeni Seçimi</title>
  <defs>
    <style>
      .title   { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub     { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .name    { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .when    { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .body    { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .tag     { font: 700 10px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #fff; }
    </style>
  </defs>

  <rect width="900" height="450" rx="10" fill="#f8fafc" />
  <text x="450" y="34" text-anchor="middle" class="title">Menü, Popup ve Tooltip Seçimi</text>
  <text x="450" y="56" text-anchor="middle" class="sub">Hangi bileşen hangi senaryoya uyar?</text>

  <!-- ─── Satır 1 ─── -->

  <!-- DropdownMenu -->
  <rect x="20" y="74" width="274" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="20" y="74" width="274" height="28" rx="8" fill="#0891b2" />
  <path d="M 20 94 H 294 V 102 H 20 Z" fill="#0891b2" />
  <text x="34" y="92" class="name">DropdownMenu</text>
  <text x="34" y="118" class="when">NE ZAMAN:</text>
  <text x="34" y="134" class="body">Seçili değer trigger üzerinde görünür.</text>
  <text x="34" y="150" class="body">Entry listesi kısa, arama gerekmez.</text>
  <text x="34" y="172" class="when">TETİKLEYİCİ:</text>
  <text x="34" y="188" class="body">Button / label tıklaması</text>

  <!-- ContextMenu -->
  <rect x="314" y="74" width="274" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="314" y="74" width="274" height="28" rx="8" fill="#7c3aed" />
  <path d="M 314 94 H 588 V 102 H 314 Z" fill="#7c3aed" />
  <text x="328" y="92" class="name">ContextMenu</text>
  <text x="328" y="118" class="when">NE ZAMAN:</text>
  <text x="328" y="134" class="body">Entry, separator, submenu, action</text>
  <text x="328" y="150" class="body">dispatch akışı gerekir.</text>
  <text x="328" y="172" class="when">TETİKLEYİCİ:</text>
  <text x="328" y="188" class="body">PopoverMenu içinde entity olarak</text>

  <!-- PopoverMenu -->
  <rect x="608" y="74" width="272" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="608" y="74" width="272" height="28" rx="8" fill="#1d4ed8" />
  <path d="M 608 94 H 880 V 102 H 608 Z" fill="#1d4ed8" />
  <text x="622" y="92" class="name">PopoverMenu</text>
  <text x="622" y="118" class="when">NE ZAMAN:</text>
  <text x="622" y="134" class="body">Trigger ile managed view açılır.</text>
  <text x="622" y="150" class="body">ContextMenu en yaygın içerik.</text>
  <text x="622" y="172" class="when">TETİKLEYİCİ:</text>
  <text x="622" y="188" class="body">Button / IconButton tıklaması</text>

  <!-- ─── Satır 2 ─── -->

  <!-- right_click_menu -->
  <rect x="20" y="230" width="274" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="20" y="230" width="274" height="28" rx="8" fill="#b45309" />
  <path d="M 20 250 H 294 V 258 H 20 Z" fill="#b45309" />
  <text x="34" y="248" class="name">right_click_menu</text>
  <text x="34" y="274" class="when">NE ZAMAN:</text>
  <text x="34" y="290" class="body">İkincil tıklama (sağ tık) ile</text>
  <text x="34" y="306" class="body">bağlam menüsü açılır.</text>
  <text x="34" y="328" class="when">TETİKLEYİCİ:</text>
  <text x="34" y="344" class="body">Sağ tık / context click</text>

  <!-- Popover -->
  <rect x="314" y="230" width="274" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="314" y="230" width="274" height="28" rx="8" fill="#334155" />
  <path d="M 314 250 H 588 V 258 H 314 Z" fill="#334155" />
  <text x="328" y="248" class="name">Popover</text>
  <text x="328" y="274" class="when">NE ZAMAN:</text>
  <text x="328" y="290" class="body">Yüzey kabı gerekir; elevation,</text>
  <text x="328" y="306" class="body">padding ve konum ayarı önemli.</text>
  <text x="328" y="328" class="when">TETİKLEYİCİ:</text>
  <text x="328" y="344" class="body">PopoverMenu içinde iç kap olarak</text>

  <!-- Tooltip -->
  <rect x="608" y="230" width="272" height="140" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="608" y="230" width="272" height="28" rx="8" fill="#059669" />
  <path d="M 608 250 H 880 V 258 H 608 Z" fill="#059669" />
  <text x="622" y="248" class="name">Tooltip</text>
  <text x="622" y="274" class="when">NE ZAMAN:</text>
  <text x="622" y="290" class="body">Kısa hover açıklama veya</text>
  <text x="622" y="306" class="body">shortcut bilgisi gösterilir.</text>
  <text x="622" y="328" class="when">TETİKLEYİCİ:</text>
  <text x="622" y="344" class="body">Fare hover (element üzerinde)</text>

  <!-- Alt not -->
  <rect x="20" y="388" width="860" height="40" rx="7" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
  <text x="40" y="408" class="body">Ortak kural: menü ve popup bileşenleri kendi başlarına değer saklamaz. Entry handler'ları view veya model state'ini günceller.</text>
  <text x="40" y="424" class="body">Açılıp kapanma davranışı menu, popover veya parent lifecycle tarafından yönetilir.</text>

</svg>
