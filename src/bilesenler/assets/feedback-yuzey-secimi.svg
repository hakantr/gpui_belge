<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480">
  <title>Feedback Yüzeyi Seçimi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" /><stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" /><stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .axis { font: 800 14px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: 0.5px; }
      .name { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .small { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .card { fill: url(#g-card); stroke: #e2e8f0; stroke-width: 1.5; }
      .step1 { animation: pulse 10s ease-in-out infinite; }
      .step2 { animation: pulse 10s ease-in-out infinite; animation-delay: 1s; }
      .step3 { animation: pulse 10s ease-in-out infinite; animation-delay: 2s; }
      .step4 { animation: pulse 10s ease-in-out infinite; animation-delay: 3s; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        12% { opacity: 1; transform: translateY(-3px); }
        24% { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .step1, .step2, .step3, .step4 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="470" y="46" text-anchor="middle" class="title">Feedback Yüzeyi Seçimi</text>
  <text x="470" y="74" text-anchor="middle" class="subtitle">Dikkat seviyesi arttıkça yüzey akışı daha fazla böler.</text>

  <!-- Y Eksen Çizgisi -->
  <text x="80" y="112" class="axis">Akışı Bölme Etkisi</text>
  <path d="M 120 135 V 400" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
  <polygon points="120,120 110,136 130,136" fill="#cbd5e1" />
  <text x="140" y="392" class="small">Düşük</text>
  <text x="140" y="146" class="small">Yüksek</text>

  <!-- Yükselen akış oku (Indicator -> AlertModal) -->
  <path d="M 290 365 C 360 360 365 305 420 295" stroke="#cbd5e1" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-dasharray="2 7" />
  <path d="M 520 285 C 590 280 600 225 650 215" stroke="#cbd5e1" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-dasharray="2 7" />
  <path d="M 540 215 C 530 200 510 165 490 155" stroke="#cbd5e1" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-dasharray="2 7" />

  <!-- Indicator (Düşük Bölme) -->
  <g transform="translate(190, 310)" class="step1">
    <rect width="180" height="110" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-sky)" />
    <text x="90" y="26" text-anchor="middle" class="name">Indicator</text>
    <text x="90" y="70" text-anchor="middle" class="body">Küçük durum</text>
    <text x="90" y="94" text-anchor="middle" class="small">Badge / Progress</text>
  </g>

  <!-- Banner (Orta Bölme) -->
  <g transform="translate(410, 240)" class="step2">
    <rect width="180" height="110" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-green)" />
    <text x="90" y="26" text-anchor="middle" class="name">Banner</text>
    <text x="90" y="70" text-anchor="middle" class="body">Kısa mesaj</text>
    <text x="90" y="94" text-anchor="middle" class="small">Engellemeyen eylem</text>
  </g>

  <!-- Callout (Orta-Yüksek Bölme) -->
  <g transform="translate(630, 170)" class="step3">
    <rect width="180" height="110" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-amber)" />
    <text x="90" y="26" text-anchor="middle" class="name">Callout</text>
    <text x="90" y="70" text-anchor="middle" class="body">Açıklamalı uyarı</text>
    <text x="90" y="94" text-anchor="middle" class="small">Okunması beklenir</text>
  </g>

  <!-- AlertModal (Yüksek Bölme) -->
  <g transform="translate(390, 100)" class="step4">
    <rect width="180" height="110" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-rose)" />
    <text x="90" y="26" text-anchor="middle" class="name">AlertModal</text>
    <text x="90" y="70" text-anchor="middle" class="body">Karar zorunlu</text>
    <text x="90" y="94" text-anchor="middle" class="small">Akış durur</text>
  </g>

  <!-- Severity Legend -->
  <g transform="translate(630, 310)">
    <rect width="250" height="110" rx="12" class="card" filter="url(#shadow)" />
    <text x="125" y="32" text-anchor="middle" class="axis">Severity (Önem)</text>
    <line x1="24" y1="44" x2="226" y2="44" stroke="#e2e8f0" stroke-width="1.5" />
    <!-- Info -->
    <circle cx="40" cy="65" r="8" fill="url(#g-sky)" />
    <text x="60" y="70" class="small">Info</text>
    <!-- Success -->
    <circle cx="150" cy="65" r="8" fill="url(#g-green)" />
    <text x="170" y="70" class="small">Success</text>
    <!-- Warning -->
    <circle cx="40" cy="92" r="8" fill="url(#g-amber)" />
    <text x="60" y="97" class="small">Warning</text>
    <!-- Error -->
    <circle cx="150" cy="92" r="8" fill="url(#g-rose)" />
    <text x="170" y="97" class="small">Error</text>
  </g>

  <!-- Alt Bilgi Notu -->
  <g transform="translate(190, 440)">
    <rect width="690" height="46" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
    <text x="345" y="28" text-anchor="middle" class="body" style="font-weight: 600;">Kural: mesaj kısa değilse Banner yerine Callout; karar zorunluysa AlertModal.</text>
  </g>

</svg>
