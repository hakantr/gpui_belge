  <text x="394" y="318" class="small">Link semantiği açık kalır.</text>

  <rect x="606" y="248" width="200" height="112" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="606" y="248" width="200" height="30" rx="8" fill="#0f766e"/>
  <path d="M606 270 H806 V278 H606 Z" fill="#0f766e"/>
  <text x="622" y="268" class="name">ToggleGroup</text>
  <text x="622" y="300" class="body">Birbirini dışlayan seçim.</text>
  <text x="622" y="318" class="small">selected_style burada anlamlı.</text>

  <rect x="96" y="382" width="748" height="28" rx="7" fill="#eef2ff" stroke="#6366f1" stroke-width="1.1"/>
  <text x="118" y="401" class="small">Ortak yüzey: ButtonCommon + Clickable + Disableable. Key binding hint'i yalnız Button üzerinde inherent builder'dır.</text>
