<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430">
  <title>Buton Ailesi Seçim Matrisi</title>
  <defs>
    <style>
      .title{font:700 22px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}
      .sub{font:13px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#475569}
      .name{font:700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#fff}
      .when{font:700 11px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#475569}
      .body{font:12px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#334155}
      .small{font:11px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect width="940" height="430" rx="10" fill="#f8fafc"/>
  <text x="470" y="36" text-anchor="middle" class="title">Buton Ailesi Seçim Matrisi</text>
  <text x="470" y="60" text-anchor="middle" class="sub">Önce içerik biçimini, sonra etkileşim kapsamını seç.</text>

  <rect x="36" y="90" width="200" height="118" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="36" y="90" width="200" height="30" rx="8" fill="#0284c7"/>
  <path d="M36 112 H236 V120 H36 Z" fill="#0284c7"/>
  <text x="52" y="110" class="name">Button</text>
  <text x="52" y="142" class="when">NE ZAMAN</text>
  <text x="52" y="160" class="body">Metinli komut.</text>
  <text x="52" y="178" class="body">Modal footer veya form.</text>

  <rect x="260" y="90" width="200" height="118" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="260" y="90" width="200" height="30" rx="8" fill="#7c3aed"/>
  <path d="M260 112 H460 V120 H260 Z" fill="#7c3aed"/>
  <text x="276" y="110" class="name">IconButton</text>
  <text x="276" y="142" class="when">NE ZAMAN</text>
  <text x="276" y="160" class="body">Toolbar ve kompakt UI.</text>
  <text x="276" y="178" class="body">Tooltip zorunlu olur.</text>

  <rect x="484" y="90" width="200" height="118" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="484" y="90" width="200" height="30" rx="8" fill="#059669"/>
  <path d="M484 112 H684 V120 H484 Z" fill="#059669"/>
  <text x="500" y="110" class="name">ButtonLike</text>
  <text x="500" y="142" class="when">NE ZAMAN</text>
  <text x="500" y="160" class="body">Özel child düzeni.</text>
  <text x="500" y="178" class="body">Kart gibi tıklanabilir yüzey.</text>

  <rect x="708" y="90" width="196" height="118" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="708" y="90" width="196" height="30" rx="8" fill="#d97706"/>
  <path d="M708 112 H904 V120 H708 Z" fill="#d97706"/>
  <text x="724" y="110" class="name">SplitButton</text>
  <text x="724" y="142" class="when">NE ZAMAN</text>
  <text x="724" y="160" class="body">Ana eylem + seçenek.</text>
  <text x="724" y="178" class="body">Menu ile birlikte.</text>

  <rect x="150" y="248" width="200" height="112" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="150" y="248" width="200" height="30" rx="8" fill="#be123c"/>
  <path d="M150 270 H350 V278 H150 Z" fill="#be123c"/>
  <text x="166" y="268" class="name">CopyButton</text>
  <text x="166" y="300" class="body">Pano yazma davranışı.</text>
  <text x="166" y="318" class="small">Kopyalandı feedback'i kendi içinde.</text>

  <rect x="378" y="248" width="200" height="112" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.3"/>
  <rect x="378" y="248" width="200" height="30" rx="8" fill="#334155"/>
  <path d="M378 270 H578 V278 H378 Z" fill="#334155"/>
