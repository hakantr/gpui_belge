<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500">
  <title>Buton Ailesi Seçim Matrisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" /><stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" /><stop offset="1" stop-color="#0d9488" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .name { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      .when { font: 800 12px system-ui, -apple-system, sans-serif; fill: #64748b; letter-spacing: 0.5px; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .small { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="580" y="46" text-anchor="middle" class="title">Buton Ailesi Seçim Matrisi</text>
  <text x="580" y="74" text-anchor="middle" class="subtitle">Önce içerik biçimini, sonra etkileşim kapsamını seç.</text>

  <!-- Button -->
  <g transform="translate(60, 108)">
    <rect width="240" height="140" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-sky)" />
    <text x="120" y="27" text-anchor="middle" class="name">Button</text>

    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Metinli komut</text>
    <text x="20" y="120" class="body">• Modal alt çubuğu veya form</text>
  </g>

  <!-- IconButton -->
  <g transform="translate(320, 108)">
    <rect width="240" height="140" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-purple)" />
    <text x="120" y="27" text-anchor="middle" class="name">IconButton</text>

    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Araç çubuğu ve dar arayüz</text>
    <text x="20" y="120" class="body">• İpucu balonu zorunlu olur</text>
  </g>

  <!-- ButtonLike -->
  <g transform="translate(580, 108)">
    <rect width="240" height="140" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-green)" />
    <text x="120" y="27" text-anchor="middle" class="name">ButtonLike</text>

    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Özel iç öğe düzeni</text>
    <text x="20" y="120" class="body">• Kart gibi tıklanabilir yüzey</text>
  </g>

  <!-- SplitButton -->
  <g transform="translate(840, 108)">
    <rect width="240" height="140" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-amber)" />
    <text x="120" y="27" text-anchor="middle" class="name">SplitButton</text>

    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Ana eylem + seçenek</text>
    <text x="20" y="120" class="body">• Menü ile birlikte</text>
  </g>

  <!-- CopyButton -->
  <g transform="translate(190, 278)">
    <rect width="240" height="134" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-rose)" />
    <text x="120" y="27" text-anchor="middle" class="name">CopyButton</text>

    <text x="120" y="78" text-anchor="middle" class="body">Pano yazma davranışı</text>
    <text x="120" y="106" text-anchor="middle" class="small">Kopyalandı geri bildirimi gömülü</text>
  </g>

  <!-- ButtonLink -->
  <g transform="translate(460, 278)">
    <rect width="240" height="134" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-slate)" />
    <text x="120" y="27" text-anchor="middle" class="name">ButtonLink</text>

    <text x="120" y="78" text-anchor="middle" class="body">Harici bağlantı veya belgeler</text>
    <text x="120" y="106" text-anchor="middle" class="small">Bağlantı anlamı korunur</text>
  </g>

  <!-- ToggleGroup -->
  <g transform="translate(730, 278)">
    <rect width="240" height="134" rx="12" class="card" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 228 A 12 12 0 0 1 240 12 V 42 H 0 Z" fill="url(#g-teal)" />
    <text x="120" y="27" text-anchor="middle" class="name">ToggleGroup</text>

    <text x="120" y="78" text-anchor="middle" class="body">Birbirini dışlayan seçim</text>
    <text x="120" y="106" text-anchor="middle" class="small">selected_style burada etkilidir</text>
  </g>

  <!-- Ortak Yüzey Notu -->
  <g transform="translate(60, 442)">
    <rect width="1040" height="46" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
    <text x="520" y="29" text-anchor="middle" class="body" style="font-weight:500">Ortak yüzey: <tspan font-family="ui-monospace, monospace" style="fill:#0f172a">ButtonCommon</tspan> + <tspan font-family="ui-monospace, monospace" style="fill:#0f172a">Clickable</tspan> + <tspan font-family="ui-monospace, monospace" style="fill:#0f172a">Disableable</tspan>. Kısayol tuşu ipucu yalnızca Button üzerinde gömülü kurucudadır.</text>
  </g>

</svg>
