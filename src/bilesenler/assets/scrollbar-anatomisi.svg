<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <title>Scrollbar ve ScrollHandle anatomisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow-viewport" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#0284c7" flood-opacity="0.22" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-content" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="g-track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-thumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-formula" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .viewport-border { fill: none; stroke: #0ea5e9; stroke-width: 3; filter: url(#glow-viewport); }
      .text-block { fill: #e2e8f0; rx: 4px; }
      .text-block-highlight { fill: #38bdf8; rx: 4px; }

      .lbl-bold { font: 800 16px system-ui, -apple-system, sans-serif; fill: #334155; }
      .lbl-formula { font: 700 17px ui-monospace, SFMono-Regular, monospace; fill: #059669; text-anchor: middle; }
      .formula-cap { font: 800 14px system-ui, -apple-system, sans-serif; fill: #2563eb; text-anchor: middle; letter-spacing: 0.3px; }

      .dim-lbl { font: 700 13px system-ui, -apple-system, sans-serif; fill: #475569; }
      .dim-val { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #0284c7; }

      .guide { stroke: #e11d48; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
      .guide-lbl { font: 800 13px system-ui, -apple-system, sans-serif; fill: #e11d48; letter-spacing: 0.5px; }
      .guide-cap { stroke: #e11d48; stroke-width: 3; stroke-linecap: round; }

      @keyframes anim-thumb {
        0%, 12% { transform: translateY(0px); }
        50%, 62% { transform: translateY(115px); }
        100% { transform: translateY(0px); }
      }
      @keyframes anim-content {
        0%, 12% { transform: translateY(0px); }
        50%, 62% { transform: translateY(-220px); }
        100% { transform: translateY(0px); }
      }

      .animated-thumb { animation: anim-thumb 10s infinite ease-in-out; }
      .animated-content { animation: anim-content 10s infinite ease-in-out; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="480" y="48" class="title">Scrollbar &amp; ScrollHandle Anatomisi</text>
  <text x="480" y="76" class="sub">Viewport, içerik yüksekliği ve scrollbar thumb konumunun matematiksel eşleşmesi</text>

  <!-- ================= SOL: Viewport ve İçerik ================= -->
  <!-- Viewport: x=210, y=130, w=300, h=260 -->
  <g transform="translate(210, 130)">
    <text x="0" y="-15" class="lbl-bold" style="fill:#0284c7">Viewport (Görünür Pencere)</text>

    <mask id="content-mask">
      <rect x="0" y="0" width="300" height="260" fill="white" rx="10" />
    </mask>

    <g mask="url(#content-mask)">
      <!-- Toplam içerik yüksekliği: 480px -->
      <g class="animated-content">
        <rect x="0" y="0" width="300" height="480" fill="url(#g-content)" stroke="#e2e8f0" stroke-width="1.5" rx="10" />

        <rect x="25" y="25" width="250" height="18" class="text-block" />
        <rect x="25" y="60" width="180" height="18" class="text-block" />
        <rect x="25" y="95" width="220" height="18" class="text-block-highlight" />
        <rect x="25" y="130" width="150" height="18" class="text-block" />
        <rect x="25" y="165" width="240" height="18" class="text-block" />

        <rect x="25" y="210" width="210" height="18" class="text-block" />
        <rect x="25" y="245" width="190" height="18" class="text-block-highlight" />
        <rect x="25" y="280" width="230" height="18" class="text-block" />
        <rect x="25" y="315" width="140" height="18" class="text-block" />

        <rect x="25" y="360" width="220" height="18" class="text-block" />
        <rect x="25" y="395" width="170" height="18" class="text-block" />
        <rect x="25" y="430" width="250" height="18" class="text-block-highlight" />
      </g>
    </g>

    <!-- Viewport sınırı -->
    <rect x="0" y="0" width="300" height="260" rx="10" class="viewport-border" />
    <!-- Viewport yüksekliği etiketi -->
    <text x="296" y="285" class="dim-lbl" text-anchor="end">Viewport H. <tspan class="dim-val">260px</tspan></text>
  </g>

  <!-- Kılavuz Çizgi: İçerik Yüksekliği -->
  <line x1="170" y1="130" x2="170" y2="390" class="guide" />
  <text x="155" y="260" class="guide-lbl" text-anchor="middle" transform="rotate(-90 155 260)">İçerik Yüksekliği (480px)</text>
  <line x1="160" y1="130" x2="180" y2="130" class="guide-cap" />
  <line x1="160" y1="390" x2="180" y2="390" class="guide-cap" />

  <!-- ================= Eşleşme oku ================= -->
  <line x1="540" y1="260" x2="588" y2="260" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />
  <rect x="528" y="244" width="72" height="22" rx="11" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="564" y="259" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" fill="#475569" text-anchor="middle">eşleşir</text>

  <!-- ================= SAĞ: Scrollbar ================= -->
  <!-- Track: x=620, y=130, w=16, h=260 -->
  <g transform="translate(620, 130)">
    <text x="0" y="-15" class="lbl-bold">Scrollbar Track (Ray)</text>

    <!-- Track (Ray) -->
    <rect width="16" height="260" fill="url(#g-track)" rx="8" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Thumb yüksekliği = Track H. * (Viewport H. / Content H.) = 260 * (260/480) ≈ 141px -->
    <g class="animated-thumb">
      <rect x="2" y="2" width="12" height="141" fill="url(#g-thumb)" rx="6" />
    </g>

    <!-- Thumb etiketi (sabit, animasyondan bağımsız) -->
    <line x1="22" y1="72" x2="58" y2="72" stroke="#94a3b8" stroke-width="1.5" />
    <text x="64" y="68" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="14" fill="#0284c7">Thumb (Kulp)</text>
    <text x="64" y="86" class="dim-lbl">Thumb H. <tspan class="dim-val">≈ 141px</tspan></text>

    <!-- Track yüksekliği etiketi -->
    <text x="-4" y="285" class="dim-lbl" text-anchor="middle">Track H. <tspan class="dim-val">260px</tspan></text>
  </g>

  <!-- ================= MATEMATİKSEL MODEL ================= -->
  <g transform="translate(210, 460)">
    <rect width="560" height="68" rx="12" fill="url(#g-formula)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
    <text x="280" y="26" class="formula-cap">YERLEŞİM FORMÜLÜ</text>
    <text x="280" y="52" class="lbl-formula">Thumb H. / Track H.  =  Viewport H. / Content H.</text>
  </g>

</svg>
