<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520">
  <title>RenderOnce ve Render Akış Modeli</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#059669" />
    </marker>
    <marker id="arrow-sky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#0284c7" />
    </marker>

    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-green-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#ecfdf5" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-sky-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#eff6ff" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .col-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }

      .box-text { font: 800 16px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }
      .box-desc { font: 500 13px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }
      .head-text { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .head-desc { font: 500 13px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; opacity: 0.95; }

      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-green { stroke: #059669; stroke-width: 2.5; fill: none; marker-end: url(#arrow-green); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 6; animation: dash 2.4s linear infinite; }
      .arrow-sky { stroke: #0284c7; stroke-width: 2.5; fill: none; marker-end: url(#arrow-sky); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 6; animation: dash 2.4s linear infinite; }
      .loop-arrow { stroke: #0284c7; stroke-width: 2.5; fill: none; marker-end: url(#arrow-sky); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 6; animation: dash 3s linear infinite; }

      @keyframes dash { to { stroke-dashoffset: -28; } }

      /* Particles */
      .particle-green { fill: #10b981; filter: drop-shadow(0 0 6px #10b981); }
      .particle-sky { fill: #0ea5e9; filter: drop-shadow(0 0 6px #0ea5e9); }
      .p-once { animation: move-once 3.2s infinite ease-in-out; }
      .p-render { animation: move-render 4.4s infinite linear; }

      @keyframes move-once {
        0%   { cx: 280; cy: 224; opacity: 1; }
        25%  { cx: 280; cy: 270; opacity: 1; }
        55%  { cx: 280; cy: 330; opacity: 1; }
        80%  { cx: 280; cy: 415; opacity: 1; }
        92%  { cx: 280; cy: 440; opacity: 0.6; }
        100% { cx: 280; cy: 224; opacity: 1; }
      }

      @keyframes move-render {
        0%   { cx: 800; cy: 224; opacity: 1; }
        18%  { cx: 800; cy: 330; opacity: 1; }
        36%  { cx: 800; cy: 405; opacity: 1; }
        52%  { cx: 985; cy: 405; opacity: 1; }
        70%  { cx: 985; cy: 230; opacity: 1; }
        86%  { cx: 924; cy: 172; opacity: 1; }
        100% { cx: 800; cy: 224; opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .arrow-green, .arrow-sky, .loop-arrow { animation: none; }
        .p-once, .p-render { animation: none; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="560" y="48" class="title">RenderOnce vs Render Akış Modeli</text>
  <text x="560" y="76" class="sub">Durumsuz bileşen zinciri ile durumlu view/entity döngüsü karşılaştırması</text>

  <!-- Kolon Çizgisi -->
  <line x1="540" y1="118" x2="540" y2="470" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6" />

  <!-- ================= LEFT: RenderOnce ================= -->
  <text x="280" y="116" class="col-title" style="fill:#059669">RenderOnce (Stateless)</text>

  <!-- Step 1 -->
  <rect x="160" y="140" width="240" height="64" rx="12" fill="url(#g-green-soft)" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)" />
  <text x="280" y="170" class="box-text" style="fill:#065f46">Bileşen Kurulumu</text>
  <text x="280" y="190" class="box-desc">Builder zinciri ile parametre alımı</text>

  <!-- Step 2 -->
  <rect x="160" y="245" width="240" height="64" rx="12" fill="url(#g-green-soft)" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)" />
  <text x="280" y="275" class="box-text" style="fill:#065f46">render() Çağrısı</text>
  <text x="280" y="295" class="box-desc">Sadece anlık IntoElement döner</text>

  <!-- Step 3 -->
  <rect x="160" y="350" width="240" height="64" rx="12" fill="url(#g-green)" stroke="#059669" stroke-width="1.5" filter="url(#shadow)" />
  <text x="280" y="380" class="head-text">GPU Çizimi</text>
  <text x="280" y="400" class="head-desc">Ekrana yansıtılır ve sonlanır</text>

  <!-- Bitiş (durumsuz: zincir sonlanır) -->
  <text x="280" y="452" class="box-desc" style="fill:#059669;font-weight:700">Zincir burada sonlanır — durum tutulmaz</text>

  <!-- Left Arrows -->
  <path d="M 280 204 L 280 241" class="arrow-green" />
  <path d="M 280 309 L 280 346" class="arrow-green" />

  <circle r="6" class="particle-green p-once" />

  <!-- ================= RIGHT: Render ================= -->
  <text x="800" y="116" class="col-title" style="fill:#0284c7">Render (Stateful View/Entity)</text>

  <!-- Step 1 -->
  <rect x="680" y="140" width="240" height="64" rx="12" fill="url(#g-sky)" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)" />
  <text x="800" y="170" class="head-text">View / Entity Durumu</text>
  <text x="800" y="190" class="head-desc">Kalıcı durum verileri saklanır</text>

  <!-- Step 2 -->
  <rect x="680" y="245" width="240" height="64" rx="12" fill="url(#g-sky-soft)" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)" />
  <text x="800" y="275" class="box-text" style="fill:#075985">render() Çağrısı</text>
  <text x="800" y="295" class="box-desc">Güncel durum ile element türetilir</text>

  <!-- Step 3 -->
  <rect x="680" y="350" width="240" height="64" rx="12" fill="url(#g-sky-soft)" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)" />
  <text x="800" y="380" class="box-text" style="fill:#075985">GPU Çizimi</text>
  <text x="800" y="400" class="box-desc">Ekrana yansıtılır</text>

  <!-- Step 4 (Loopback Node) -->
  <rect x="955" y="245" width="160" height="64" rx="12" fill="url(#g-amber)" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)" />
  <text x="1035" y="275" class="head-text">cx.notify()</text>
  <text x="1035" y="295" class="head-desc">Event / Listener tetikler</text>

  <!-- Right Loop Arrows -->
  <path d="M 800 204 L 800 241" class="arrow-sky" />
  <path d="M 800 309 L 800 346" class="arrow-sky" />
  <!-- GPU -> cx.notify(): aşağıdan sağa, sonra yukarı kutu altına -->
  <path d="M 920 405 L 1035 405 L 1035 313" class="loop-arrow" />
  <!-- cx.notify() -> View/Entity Durumu: yukarı, sonra sola kutuya -->
  <path d="M 1035 241 L 1035 172 L 924 172" class="loop-arrow" />

  <text x="1035" y="452" class="box-desc" style="fill:#d97706;font-weight:700">Yeniden çizim döngüsü</text>

  <circle r="6" class="particle-sky p-render" />

</svg>
