<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430">
  <title>Layout Yardımcısı Seçimi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .api { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      .when { font: 800 11px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.78; letter-spacing: 0.6px; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .body-sm { font: 500 13px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.9; }
      .card { filter: url(#shadow); }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="470" y="48" text-anchor="middle" class="title">Layout Yardımcısı Seçimi</text>
  <text x="470" y="76" text-anchor="middle" class="subtitle">Standart layout ihtiyacı → yardımcı · Özel tek-seferlik → div() doğrudan</text>

  <!-- h_flex -->
  <g transform="translate(40, 108)">
    <rect width="270" height="148" rx="12" fill="url(#g-blue)" class="card" />
    <text x="135" y="34" text-anchor="middle" class="api">h_flex()</text>
    <line x1="20" y1="48" x2="250" y2="48" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Yatay satır düzeni.</text>
    <text x="20" y="118" class="body">• Dikeyde otomatik ortalama</text>
    <text x="32" y="136" class="body-sm">gerekiyorsa ilk seçenek.</text>
  </g>

  <!-- v_flex -->
  <g transform="translate(335, 108)">
    <rect width="270" height="148" rx="12" fill="url(#g-sky)" class="card" />
    <text x="135" y="34" text-anchor="middle" class="api">v_flex()</text>
    <line x1="20" y1="48" x2="250" y2="48" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Dikey kolon düzeni.</text>
    <text x="20" y="118" class="body">• Formlar, menü içerikleri</text>
    <text x="32" y="136" class="body-sm">ve dikey panel layout'u.</text>
  </g>

  <!-- h_group / v_group -->
  <g transform="translate(630, 108)">
    <rect width="270" height="148" rx="12" fill="url(#g-violet)" class="card" />
    <text x="135" y="34" text-anchor="middle" class="api">h_group* / v_group*</text>
    <line x1="20" y1="48" x2="250" y2="48" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Birbirine yakın küçük</text>
    <text x="32" y="114" class="body-sm">inline öğe grupları.</text>
    <text x="20" y="136" class="body">• Tutarlı boşluk yönetimi.</text>
  </g>

  <!-- Divider -->
  <g transform="translate(40, 282)">
    <rect width="420" height="118" rx="12" fill="url(#g-green)" class="card" />
    <text x="210" y="34" text-anchor="middle" class="api">Divider</text>
    <line x1="20" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Section, toolbar veya panel ayrımı için yatay/dikey çizgi.</text>
    <text x="20" y="114" class="body-sm">• Görsel bölme amaçlıdır; durum taşımaz.</text>
  </g>

  <!-- div() doğrudan -->
  <g transform="translate(480, 282)">
    <rect width="420" height="118" rx="12" fill="url(#g-slate)" class="card" />
    <text x="210" y="34" text-anchor="middle" class="api">div() doğrudan</text>
    <line x1="20" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <text x="20" y="72" class="when">NE ZAMAN KULLANILIR?</text>
    <text x="20" y="96" class="body">• Yardımcıların karşılamadığı özel / tek-seferlik layout.</text>
    <text x="20" y="114" class="body-sm">• GPUI style oluşturucuları doğrudan yeterlidir.</text>
  </g>

</svg>
