<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 490">
  <title>GPUI ve Zed UI layout hizalaması</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow-1" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#2563eb" flood-opacity="0.28" />
    </filter>
    <filter id="glow-2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.28" />
    </filter>
    <filter id="glow-3" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#e11d48" flood-opacity="0.28" />
    </filter>

    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" />
      <stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .container-box { fill: url(#g-panel); stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .label-sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .axis-label { font: 600 13px system-ui, -apple-system, sans-serif; fill: #94a3b8; text-anchor: middle; }
      .label-state { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #34d399; text-anchor: middle; dominant-baseline: middle; }

      .box-text { font: 800 22px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }

      /* Durum etiketi sırayla belirir; ilk kare (t=0) tam opaklıkta. */
      .state-txt { opacity: 0; animation: fade-text 16s infinite ease-in-out; }
      .state-1 { animation-delay: 0s; }
      .state-2 { animation-delay: 4s; }
      .state-3 { animation-delay: 8s; }
      .state-4 { animation-delay: 12s; }

      @keyframes fade-text {
        0%, 20% { opacity: 1; }
        24%, 100% { opacity: 0; }
      }

      @keyframes move-box-1 {
        0%, 20% { transform: translate(0px, 0px); }
        25%, 45% { transform: translate(0px, 0px); }
        50%, 70% { transform: translate(180px, 0px); }
        75%, 95% { transform: translate(255px, -110px); }
      }

      @keyframes move-box-2 {
        0%, 20% { transform: translate(0px, 0px); }
        25%, 45% { transform: translate(190px, 0px); }
        50%, 70% { transform: translate(180px, 0px); }
        75%, 95% { transform: translate(165px, 0px); }
      }

      @keyframes move-box-3 {
        0%, 20% { transform: translate(0px, 0px); }
        25%, 45% { transform: translate(380px, 0px); }
        50%, 70% { transform: translate(180px, 0px); }
        75%, 95% { transform: translate(75px, 110px); }
      }

      .b1 { animation: move-box-1 16s infinite cubic-bezier(0.4, 0, 0.2, 1); }
      .b2 { animation: move-box-2 16s infinite cubic-bezier(0.4, 0, 0.2, 1); }
      .b3 { animation: move-box-3 16s infinite cubic-bezier(0.4, 0, 0.2, 1); }

      @media (prefers-reduced-motion: reduce) {
        .state-txt { opacity: 0; animation: none; }
        .state-1 { opacity: 1; }
        .b1, .b2, .b3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="430" y="46" class="label-title">GPUI &amp; Zed UI Layout Hizalaması</text>
  <text x="430" y="74" class="label-sub">Flexbox düzenindeki öğelerin dinamik konumlandırma animasyonu</text>

  <!-- Kapsayıcı Kutu: Genişlik 640, Yükseklik 300, x=110, y=110 (merkez 430,260) -->
  <rect x="110" y="110" width="640" height="300" rx="12" class="container-box" filter="url(#shadow)" />

  <!-- Hizalama kılavuzları: soluk merkez çizgileri (justify_center / items_center referansı) -->
  <line x1="430" y1="150" x2="430" y2="374" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3 6" />
  <line x1="160" y1="260" x2="700" y2="260" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3 6" />
  <circle cx="430" cy="260" r="3" fill="#cbd5e1" />

  <!-- Eksen ipuçları: yatay (ana eksen) ve dikey (çapraz eksen) -->
  <text x="430" y="132" class="axis-label">ana eksen →  h_flex / v_flex</text>
  <text x="138" y="260" class="axis-label" transform="rotate(-90 138 260)">çapraz eksen ↕  items_*</text>

  <!-- Hareketli Elemanlar: 60x60 kutular, başlangıç justify_start (boşluk 30): x=140,230,320; y=230 -->
  <g class="b1">
    <rect x="140" y="230" width="60" height="60" rx="10" fill="url(#g-blue)" filter="url(#glow-1)" />
    <text x="170" y="261" class="box-text">A</text>
  </g>

  <g class="b2">
    <rect x="230" y="230" width="60" height="60" rx="10" fill="url(#g-purple)" filter="url(#glow-2)" />
    <text x="260" y="261" class="box-text">B</text>
  </g>

  <g class="b3">
    <rect x="320" y="230" width="60" height="60" rx="10" fill="url(#g-rose)" filter="url(#glow-3)" />
    <text x="350" y="261" class="box-text">C</text>
  </g>

  <!-- Dinamik durum etiketi: koyu çip üzerinde, sırayla değişir -->
  <rect x="280" y="438" width="300" height="33" rx="18" fill="url(#g-chip)" filter="url(#shadow)" />
  <g transform="translate(430, 457)">
    <text class="state-txt state-1 label-state">h_flex().justify_start()</text>
    <text class="state-txt state-2 label-state">h_flex().justify_between()</text>
    <text class="state-txt state-3 label-state">h_flex().justify_center()</text>
    <text class="state-txt state-4 label-state">v_flex().items_center()</text>
  </g>

</svg>
