<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-hover" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }
      .btn-hover-anim {
        animation: hoverEffect 2s infinite alternate;
      }
      .btn-active-anim {
        animation: activeEffect 1.5s infinite alternate;
      }
      .btn-pulse {
        animation: pulseSlow 3s infinite;
      }

      @keyframes hoverEffect {
        0% { filter: drop-shadow(0 0 2px rgba(189, 147, 249, 0.3)); }
        100% { filter: drop-shadow(0 0 10px rgba(189, 147, 249, 0.7)); transform: translateY(-2px); }
      }
      @keyframes activeEffect {
        0% { transform: scale(1); }
        100% { transform: scale(0.96); filter: brightness(0.85); }
      }
      @keyframes pulseSlow {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Arka Plan Kartı -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">Buton Etkileşim Durum Matrisi</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">Farklı Durumlar Altında Buton Görsel Değişim Şeması</text>

  <!-- MATRİS ELEMANLARI (BUTTON STATES) -->

  <!-- 1. Default (Normal) State -->
  <g transform="translate(80, 150)" filter="url(#shadow)">
    <rect width="280" height="120" rx="12" fill="#21222c" stroke="#6272a4" stroke-width="1"/>
    <text x="140" y="30" class="text-style" font-size="13" font-weight="700" text-anchor="middle">1. Default (Normal)</text>
    
    <!-- Buton Örneği -->
    <g transform="translate(65, 50)">
      <rect width="150" height="36" rx="6" fill="#bd93f9"/>
      <text x="75" y="22" class="text-style" font-size="12" font-weight="600" text-anchor="middle" fill="#14161d">Onayla</text>
    </g>
    <text x="140" y="105" fill="#6272a4" font-size="10" text-anchor="middle">Opaklık: 1.0 | Cursor: Pointer</text>
  </g>

  <!-- 2. Hover State -->
  <g transform="translate(440, 150)" filter="url(#shadow)">
    <rect width="280" height="120" rx="12" fill="#21222c" stroke="#bd93f9" stroke-width="1.5"/>
    <text x="140" y="30" class="text-style" font-size="13" font-weight="700" text-anchor="middle">2. Hover (Üzerinde)</text>
    
    <!-- Buton Örneği (Animasyonlu) -->
    <g transform="translate(65, 50)" class="btn-hover-anim">
      <rect width="150" height="36" rx="6" fill="#bd93f9" filter="url(#glow-hover)"/>
      <text x="75" y="22" class="text-style" font-size="12" font-weight="600" text-anchor="middle" fill="#14161d">Onayla</text>
    </g>
    <text x="140" y="105" fill="#bd93f9" font-size="10" text-anchor="middle">Gölge Vurgusu | Parlaklık: Artış</text>
  </g>

  <!-- 3. Active (Pressed) State -->
  <g transform="translate(80, 310)" filter="url(#shadow)">
    <rect width="280" height="120" rx="12" fill="#21222c" stroke="#ff79c6" stroke-width="1.5"/>
    <text x="140" y="30" class="text-style" font-size="13" font-weight="700" text-anchor="middle">3. Active (Pressed)</text>
    
    <!-- Buton Örneği (Animasyonlu) -->
    <g transform="translate(65, 50)" class="btn-active-anim">
      <rect width="150" height="36" rx="6" fill="#a37cd8"/>
      <text x="75" y="22" class="text-style" font-size="12" font-weight="600" text-anchor="middle" fill="#14161d">Onayla</text>
    </g>
    <text x="140" y="105" fill="#ff79c6" font-size="10" text-anchor="middle">Küçülme (0.96) | Renk: Koyu Ton</text>
  </g>

  <!-- 4. Disabled State -->
  <g transform="translate(440, 310)" filter="url(#shadow)">
    <rect width="280" height="120" rx="12" fill="#21222c" stroke="#ff5555" stroke-width="1" opacity="0.6"/>
    <text x="140" y="30" class="text-style" font-size="13" font-weight="700" text-anchor="middle" opacity="0.6">4. Disabled (Pasif)</text>
    
    <!-- Buton Örneği -->
    <g transform="translate(65, 50)" opacity="0.4">
      <rect width="150" height="36" rx="6" fill="#6272a4"/>
      <text x="75" y="22" class="text-style" font-size="12" font-weight="600" text-anchor="middle" fill="#f8f8f2">Onayla</text>
    </g>
    <text x="140" y="105" fill="#ff5555" font-size="10" text-anchor="middle" opacity="0.8">Opaklık: 0.4 | Cursor: Not-Allowed</text>
  </g>

</svg>
