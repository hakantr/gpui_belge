<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540">
  <title>Buton Etkileşim Durum Matrisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="btn-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#7c3aed" flood-opacity="0.32" />
    </filter>
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="g-card-dim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-violet-hover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="g-violet-deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#5b21b6" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1" />
      <stop offset="1" stop-color="#94a3b8" />
    </linearGradient>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font: 800 26px system-ui; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui; fill: #64748b; }
      .card-title { font: 800 18px system-ui; fill: #0f172a; }
      .btn-text { font: 700 15px system-ui; fill: #ffffff; }
      .note { font: 500 14px system-ui; fill: #64748b; }
      .note-violet { font: 700 14px system-ui; fill: #7c3aed; }
      .note-rose { font: 700 14px system-ui; fill: #e11d48; }
      .badge { font: 800 12px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }
      @keyframes pulseRing {
        0%   { opacity: 1; }
        50%  { opacity: 0.65; }
        100% { opacity: 1; }
      }
      @keyframes cardFocus {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.78; }
      }
      .hover-ring { animation: pulseRing 9s ease-in-out infinite; }
      .focus-card { animation: cardFocus 9s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @media (prefers-reduced-motion: reduce) {
        .hover-ring, .focus-card { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="430" y="48" text-anchor="middle" class="title">Buton Etkileşim Durum Matrisi</text>
  <text x="430" y="76" text-anchor="middle" class="subtitle">Farklı durumlar altında butonun görsel değişim şeması</text>

  <!-- 1. Varsayılan (Normal) -->
  <g transform="translate(80, 120)">
    <rect width="320" height="160" rx="12" fill="url(#g-card)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="16" y="16" width="38" height="20" rx="10" fill="#475569" />
    <text x="35" y="30" text-anchor="middle" class="badge">01</text>
    <text x="174" y="32" text-anchor="middle" class="card-title">Varsayılan (Normal)</text>

    <g transform="translate(80, 66)">
      <rect width="160" height="44" rx="8" fill="url(#g-violet)" filter="url(#shadow)" />
      <text x="80" y="28" text-anchor="middle" class="btn-text">Onayla</text>
    </g>

    <text x="160" y="142" text-anchor="middle" class="note">Opaklık: 1.0 · imleç: işaretçi</text>
  </g>

  <!-- 2. Üzerinde (Hover) -->
  <g transform="translate(460, 120)">
    <rect width="320" height="160" rx="12" fill="url(#g-card)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <rect x="16" y="16" width="38" height="20" rx="10" fill="#7c3aed" />
    <text x="35" y="30" text-anchor="middle" class="badge">02</text>
    <text x="178" y="32" text-anchor="middle" class="card-title">Üzerinde (Hover)</text>

    <g transform="translate(80, 66)">
      <rect class="hover-ring" x="-6" y="-6" width="172" height="56" rx="11" fill="#8b5cf6" fill-opacity="0.18" />
      <rect width="160" height="44" rx="8" fill="url(#g-violet-hover)" filter="url(#btn-shadow)" />
      <text x="80" y="28" text-anchor="middle" class="btn-text">Onayla</text>
    </g>

    <text x="160" y="142" text-anchor="middle" class="note-violet">Gölge vurgusu · parlaklık artışı</text>
  </g>

  <!-- 3. Basılı (Active) -->
  <g transform="translate(80, 320)">
    <rect width="320" height="160" rx="12" fill="url(#g-card)" stroke="#e11d48" stroke-width="2" filter="url(#shadow)" />
    <rect x="16" y="16" width="38" height="20" rx="10" fill="#e11d48" />
    <text x="35" y="30" text-anchor="middle" class="badge">03</text>
    <text x="180" y="32" text-anchor="middle" class="card-title">Basılı (Active)</text>

    <g transform="translate(86, 70)">
      <rect width="148" height="38" rx="8" fill="url(#g-violet-deep)" />
      <text x="74" y="25" text-anchor="middle" class="btn-text">Onayla</text>
    </g>

    <text x="160" y="142" text-anchor="middle" class="note-rose">Küçülme (0.96) · koyu ton</text>
  </g>

  <!-- 4. Pasif (Disabled) -->
  <g transform="translate(460, 320)">
    <rect width="320" height="160" rx="12" fill="url(#g-card-dim)" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4" />
    <rect x="16" y="16" width="38" height="20" rx="10" fill="#94a3b8" />
    <text x="35" y="30" text-anchor="middle" class="badge">04</text>
    <text x="180" y="32" text-anchor="middle" class="card-title" style="fill:#94a3b8">Pasif (Disabled)</text>

    <g transform="translate(80, 66)" opacity="0.5">
      <rect width="160" height="44" rx="8" fill="url(#g-slate)" />
      <text x="80" y="28" text-anchor="middle" class="btn-text">Onayla</text>
    </g>

    <text x="160" y="142" text-anchor="middle" class="note">Opaklık: 0.4 · imleç: izin yok</text>
  </g>

</svg>
