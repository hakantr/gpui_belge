<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Buton etkileşim durum matrisi</title>
  <defs>
    <marker id="aSlate" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#64748b" stroke="#64748b" stroke-width="1pt" />
    </marker>
    <marker id="dot-aSlate" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#64748b" />
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#475569}
      .h{font-size:13px;font-weight:700;fill:#0f172a}
      .t{font-size:12px;font-weight:600;fill:#0f172a}
      .body{font-size:11px;fill:#475569}
      .small{font-size:10px;fill:#64748b}
      .card{fill:#fff;stroke-width:1.6}
      .tEmerald{fill:#059669}.tViolet{fill:#7c3aed}.tAmber{fill:#d97706}.tRose{fill:#be123c}.tSlate{fill:#64748b}.tWhite{fill:#fff}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc"/>

  <text x="400" y="40" text-anchor="middle" class="title">Buton Etkileşim Durum Matrisi</text>
  <text x="400" y="63" text-anchor="middle" class="sub">Farklı durumlar altında butonun görsel değişim şeması</text>

  <!-- 1. Varsayılan -->
  <g transform="translate(80,150)">
    <rect width="280" height="120" rx="12" class="card" stroke="#cbd5e1"/>
    <text x="140" y="30" text-anchor="middle" class="t">1. Varsayılan (Normal)</text>
    <g transform="translate(65,50)">
      <rect width="150" height="36" rx="6" fill="#7c3aed"/>
      <text x="75" y="23" text-anchor="middle" class="t tWhite">Onayla</text>
    </g>
    <text x="140" y="105" text-anchor="middle" class="small">Opaklık: 1.0 · imleç: işaretçi</text>
  </g>

  <!-- 2. Üzerinde (Hover) -->
  <g transform="translate(440,150)">
    <rect width="280" height="120" rx="12" class="card" stroke="#7c3aed"/>
    <text x="140" y="30" text-anchor="middle" class="t">2. Üzerinde (Hover)</text>
    <g transform="translate(65,50)">
      <rect x="-3" y="-3" width="156" height="42" rx="8" fill="#7c3aed" fill-opacity="0.18"/>
      <rect width="150" height="36" rx="6" fill="#8b5cf6"/>
      <text x="75" y="23" text-anchor="middle" class="t tWhite">Onayla</text>
    </g>
    <text x="140" y="105" text-anchor="middle" class="small tViolet" font-weight="600">Gölge vurgusu · parlaklık artışı</text>
  </g>

  <!-- 3. Basılı (Active) -->
  <g transform="translate(80,310)">
    <rect width="280" height="120" rx="12" class="card" stroke="#be123c"/>
    <text x="140" y="30" text-anchor="middle" class="t">3. Basılı (Active)</text>
    <g transform="translate(75,52)">
      <rect width="130" height="32" rx="6" fill="#6d28d9"/>
      <text x="65" y="21" text-anchor="middle" class="t tWhite">Onayla</text>
    </g>
    <text x="140" y="105" text-anchor="middle" class="small tRose" font-weight="600">Küçülme (0.96) · koyu ton</text>
  </g>

  <!-- 4. Pasif (Disabled) -->
  <g transform="translate(440,310)">
    <rect width="280" height="120" rx="12" class="card" stroke="#cbd5e1" stroke-dasharray="5,4"/>
    <text x="140" y="30" text-anchor="middle" class="t" opacity="0.6">4. Pasif (Disabled)</text>
    <g transform="translate(65,50)" opacity="0.45">
      <rect width="150" height="36" rx="6" fill="#94a3b8"/>
      <text x="75" y="23" text-anchor="middle" class="t tWhite">Onayla</text>
    </g>
    <text x="140" y="105" text-anchor="middle" class="small">Opaklık: 0.4 · imleç: izin yok</text>
  </g>
</svg>
