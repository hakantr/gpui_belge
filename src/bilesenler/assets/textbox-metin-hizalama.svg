<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0f172a; rx: 12px; }
      .label-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #f8fafc; text-anchor: middle; }
      .label-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #94a3b8; text-anchor: middle; }
      
      /* Input Box */
      .input-border { fill: #1e293b; stroke: #334155; stroke-width: 2; rx: 8px; transition: stroke 0.3s, box-shadow 0.3s; }
      .input-border-focus { animation: border-pulse 4s infinite; }
      
      @keyframes border-pulse {
        0%, 100% { stroke: #334155; filter: drop-shadow(0 0 0px rgba(56, 189, 248, 0)); }
        50% { stroke: #38bdf8; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4)); }
      }

      /* Text and labels */
      .field-label { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 14px; fill: #e2e8f0; }
      .text-val { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; fill: #f8fafc; dominant-baseline: middle; }
      .text-placeholder { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; fill: #475569; dominant-baseline: middle; }
      .caption { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; }
      
      /* Guides */
      .guide-line { stroke: #e11d48; stroke-dasharray: 3 3; stroke-width: 1; opacity: 0.7; }
      .guide-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #fb7185; }

      /* Cursor blink */
      .cursor { stroke: #38bdf8; stroke-width: 2; animation: blink 1s infinite; }
      @keyframes blink {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }

      /* Icons */
      .icon-svg { fill: #94a3b8; }
      .icon-accent { fill: #38bdf8; }

      /* Interactive Eye Animation */
      .eye-pupil { animation: move-pupil 4s infinite; }
      @keyframes move-pupil {
        0%, 100% { transform: translate(0px, 0px); }
        50% { transform: translate(2px, 0px); }
      }
    </style>
  </defs>

  <!-- Arka Plan -->
  <rect width="800" height="350" class="bg" />

  <!-- Başlıklar -->
  <text x="400" y="45" class="label-title">InputField Metin ve İkon Hizalaması</text>
  <text x="400" y="70" class="label-sub">Öğelerin dikeyde otomatik ortalanması (items_center) ve odak (focus) durumu</text>

  <!-- Input Field Anatomisi -->
  <!-- Label: "API Anahtarı" -->
  <text x="150" y="135" class="field-label">API Anahtarı</text>

  <!-- Giriş Alanı Kapsayıcısı (x: 150, y: 145, w: 500, h: 50) -->
  <rect x="150" y="145" width="500" height="50" class="input-border input-border-focus" />

  <!-- Sol İkon (Lock) x: 165, y: 157 (boyut: 24) -->
  <g transform="translate(165, 158)">
    <path class="icon-accent" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
  </g>

  <!-- Metin Değeri x: 205, y: 170 (dikeyde ortalanmış y: 170 dominan-baseline: middle) -->
  <!-- Maskelenmiş Şifre Karakterleri veya Normal Karakterler -->
  <text x="205" y="171" class="text-val">sk-proj-••••••••••••a7f9</text>

  <!-- Yanıp Sönen İmleç (Cursor) x: 395, y: 158'den 182'ye -->
  <line x1="397" y1="158" x2="397" y2="182" class="cursor" />

  <!-- Sağ İkon (Eye/Mask) x: 610, y: 158 (boyut: 24) -->
  <g transform="translate(610, 158)">
    <path class="icon-svg" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
    <!-- Göz Bebeği Animasyonu -->
    <circle cx="12" cy="12" r="1.5" fill="#38bdf8" class="eye-pupil" />
  </g>

  <!-- items_center Kılavuz Çizgisi (Dikey Eksen Ortası y: 170) -->
  <line x1="120" y1="170" x2="680" y2="170" class="guide-line" />
  <text x="690" y="174" class="guide-text">Dikey Merkez Ekseni</text>
  
  <path d="M 680 170 L 675 167 L 675 173 Z" fill="#e11d48" />
  <path d="M 120 170 L 125 167 L 125 173 Z" fill="#e11d48" />

  <!-- İkon & Metin Dikey Hizalama Etiketleri -->
  <text x="165" y="220" class="caption" text-anchor="middle">start_icon()</text>
  <text x="300" y="220" class="caption" text-anchor="middle">Metin/Seçim Alanı</text>
  <text x="622" y="220" class="caption" text-anchor="middle">masked() butonu</text>

  <!-- Kılavuz Açıklaması -->
  <text x="400" y="270" class="caption" text-anchor="middle" fill="#94a3b8">Kapsayıcı içindeki tüm öğeler dikeyde hizalıdır.</text>
  <text x="400" y="290" class="caption" text-anchor="middle" fill="#64748b">Odağı kaybetme durumunda border rengi sönükleşir.</text>
</svg>
