<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440">
  <title>InputField Metin ve İkon Hizalaması</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow-focus" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0284c7" flood-opacity="0.45" />
    </filter>

    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#e11d48" />
    </marker>

    <linearGradient id="g-field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-note" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .input-border { fill: url(#g-field); stroke: #0284c7; stroke-width: 2.5; filter: url(#glow-focus); animation: pulse-border 4s infinite alternate; }

      @keyframes pulse-border {
        0%, 100% { stroke: #0284c7; }
        50% { stroke: #38bdf8; }
      }

      .field-label { font: 800 16px system-ui, -apple-system, sans-serif; fill: #334155; }
      .text-val { font: 600 18px ui-monospace, SFMono-Regular, monospace; fill: #0f172a; dominant-baseline: middle; }

      .guide-line { stroke: #e11d48; stroke-dasharray: 6 4; stroke-width: 2; opacity: 0.8; }
      .guide-text { font: 800 13px system-ui, -apple-system, sans-serif; fill: #e11d48; letter-spacing: 0.5px; text-anchor: middle; }

      .cursor { stroke: #0ea5e9; stroke-width: 3; animation: blink 1.1s infinite; }
      @keyframes blink {
        0% { opacity: 1; }
        45% { opacity: 1; }
        55% { opacity: 0; }
        95% { opacity: 0; }
        100% { opacity: 1; }
      }

      .icon-accent { fill: #0ea5e9; }
      .icon-svg { fill: #64748b; }

      .eye-pupil { animation: move-pupil 4s infinite ease-in-out; }
      @keyframes move-pupil {
        0%, 100% { transform: translate(0px, 0px); }
        50% { transform: translate(2px, 0px); }
      }

      .caption { font: 800 14px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="480" y="48" class="title">InputField Metin ve İkon Hizalaması</text>
  <text x="480" y="76" class="sub">Öğelerin dikeyde otomatik ortalanması (items_center) ve odak (focus) durumu</text>

  <!-- ================= KILAVUZ ETİKETİ (üstte, taşmasız) ================= -->
  <text x="480" y="138" class="guide-text">DİKEY MERKEZ EKSENİ</text>

  <!-- ================= ANATOMİ ================= -->

  <!-- Label -->
  <text x="180" y="178" class="field-label">API Anahtarı (Gizli)</text>

  <!-- Input Field Kapsayıcı (x=180, y=193, w=600, h=60) -->
  <rect x="180" y="193" width="600" height="60" rx="12" class="input-border" />

  <!-- Sol İkon (Lock) -->
  <g transform="translate(200, 209)">
    <path class="icon-accent" transform="scale(1.15)" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
  </g>

  <!-- Metin Değeri (dikey merkez y: 223) -->
  <text x="250" y="225" class="text-val">sk-proj-••••••••••••a7f9</text>

  <!-- Cursor -->
  <line x1="512" y1="208" x2="512" y2="238" class="cursor" />

  <!-- Sağ İkon (Eye) -->
  <g transform="translate(730, 209)">
    <path class="icon-svg" transform="scale(1.15)" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
    <circle cx="13.8" cy="13.8" r="2" fill="#0ea5e9" class="eye-pupil" />
  </g>

  <!-- ================= KILAVUZ ÇİZGİSİ (Dikey Eksen Ortası y: 223) ================= -->
  <line x1="150" y1="223" x2="810" y2="223" class="guide-line" marker-end="url(#arrow)" />
  <line x1="810" y1="223" x2="150" y2="223" class="guide-line" marker-end="url(#arrow)" />

  <!-- ================= ETİKETLER ================= -->
  <text x="212" y="288" class="caption">start_icon()</text>
  <text x="430" y="288" class="caption">Metin / Seçim Alanı</text>
  <text x="742" y="288" class="caption">masked() butonu</text>

  <!-- ================= AÇIKLAMA ================= -->
  <g transform="translate(480, 350)">
    <rect x="-300" y="0" width="600" height="64" rx="12" fill="url(#g-note)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="27" class="note" style="fill: #1e40af; font-weight: 700;">Kapsayıcı içindeki tüm öğeler dikeyde hizalıdır (items_center).</text>
    <text x="0" y="48" class="note" style="fill: #475569;">Odağı kaybetme durumunda kenarlık rengi sönükleşir ve parıltı kaybolur.</text>
  </g>

</svg>
