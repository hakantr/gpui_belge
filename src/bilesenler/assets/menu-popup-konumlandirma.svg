<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Menu, popup ve tooltip konumlandırma</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#e11d48" stroke="#e11d48" stroke-width="1pt" />
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      .bg { fill: #f8fafc; }
      .title { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; text-anchor: middle; }
      .sub { font: 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; text-anchor: middle; }
      .trigger { fill: #fff; stroke: #0284c7; stroke-width: 2; }
      .trigger-text { font-size: 14px; font-weight: 700; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .surface { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .tooltip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.3; }
      .popup-head { fill: #334155; }
      .surface-title { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .surface-text { font-size: 12px; fill: #334155; }
      .muted { font-size: 12px; fill: #94a3b8; text-anchor: middle; dominant-baseline: middle; }
      .guide { stroke: #e11d48; stroke-width: 1.7; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
      .guide-label { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e11d48; text-anchor: middle; }
      .anchor-dot { fill: #e11d48; }
      .cursor { fill: #0f172a; stroke: #0f172a; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="800" height="400" rx="10" class="bg" />

  <text x="400" y="42" class="title">Menu, Popup ve Tooltip Konumlandırma</text>
  <text x="400" y="68" class="sub">Anchor noktası, yüzeyin hangi kenara yerleşeceğini belirler.</text>

  <!-- Trigger -->
  <rect x="315" y="174" width="170" height="52" rx="8" class="trigger" />
  <text x="400" y="200" class="trigger-text">Sağ Tıkla / Hover</text>
  <circle cx="400" cy="174" r="4" class="anchor-dot" />
  <circle cx="315" cy="226" r="4" class="anchor-dot" />
  <circle cx="485" cy="200" r="4" class="anchor-dot" opacity="0.45" />
  <circle cx="315" cy="200" r="4" class="anchor-dot" opacity="0.45" />

  <!-- Tooltip -->
  <g>
    <rect x="292" y="104" width="216" height="42" rx="6" class="tooltip" />
    <polygon points="394,146 406,146 400,154" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.2" />
    <line x1="395" y1="146" x2="405" y2="146" stroke="#e0f2fe" stroke-width="2" />
    <text x="400" y="128" class="surface-text" text-anchor="middle">Tooltip: kısa bilgilendirme metni</text>
    <path d="M 400 154 V 166" class="guide" />
    <text x="448" y="162" class="guide-label">Anchor::Bottom</text>
  </g>

  <!-- Popup menu -->
  <g opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      values="0;0;1;1;0;0"
      keyTimes="0;0.34;0.42;0.72;0.82;1" />
    <rect x="315" y="250" width="190" height="104" rx="8" class="surface" />
    <rect x="315" y="250" width="190" height="30" rx="8" class="popup-head" />
    <path d="M315 272 H505 V280 H315 Z" class="popup-head" />
    <text x="333" y="270" class="surface-title">Menu</text>
    <text x="333" y="302" class="surface-text">Kopyala</text>
    <text x="333" y="326" class="surface-text">Yapıştır</text>
    <text x="333" y="350" class="surface-text">Düzenle...</text>
    <path d="M 315 226 V 242" class="guide" />
    <text x="382" y="242" class="guide-label">Anchor::TopLeft</text>
  </g>

  <!-- Reference placements -->
  <g opacity="0.5">
    <rect x="108" y="176" width="144" height="48" rx="8" class="surface" />
    <text x="180" y="201" class="muted">Sol Popup</text>
    <path d="M 307 200 H 260" class="guide" />
    <text x="284" y="192" class="guide-label">Left</text>
  </g>

  <g opacity="0.5">
    <rect x="548" y="176" width="144" height="48" rx="8" class="surface" />
    <text x="620" y="201" class="muted">Sağ Popup</text>
    <path d="M 493 200 H 540" class="guide" />
    <text x="516" y="192" class="guide-label">Right</text>
  </g>

  <!-- Cursor movement is isolated from placement groups, so it cannot shift labels or surfaces. -->
  <g>
    <g transform="translate(374 314)">
      <polygon points="0,0 4,18 9,13 16,20 19,17 12,11 18,9" class="cursor" />
      <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite"
        values="374 314; 404 210; 404 210; 374 314"
        keyTimes="0;0.35;0.7;1"
        calcMode="spline"
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" />
    </g>
  </g>
</svg>
