<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460">
  <title>AI ve Collab Domain Haritası</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .head { font: 800 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ffffff; text-anchor: middle; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .body-c { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; text-anchor: middle; }
      .small { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .flow-arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow.flow { stroke-dasharray: 8 6; animation: dash 9s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -56; } }
      @media (prefers-reduced-motion: reduce) {
        .flow-arrow.flow { animation: none; stroke-dasharray: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="470" y="46" class="title">AI ve Collab Domain Haritası</text>
  <text x="470" y="74" class="subtitle">Component hazır görünse de gerçek state üst katmanda kalır.</text>

  <!-- Domain State -->
  <g transform="translate(40, 138)">
    <rect width="220" height="160" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 208 A 12 12 0 0 1 220 12 V 42 H 0 Z" fill="url(#g-slate)" />
    <text x="110" y="28" class="head">Domain state</text>

    <text x="20" y="72" class="body">• agent provider</text>
    <text x="20" y="98" class="body">• auth / status</text>
    <text x="20" y="124" class="body">• thread / skill catalog</text>
    <text x="110" y="148" class="small">view veya model sahibi</text>
  </g>

  <!-- AiSettingItem -->
  <g transform="translate(340, 92)">
    <rect width="230" height="116" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 42 H 0 Z" fill="url(#g-violet)" />
    <text x="115" y="28" class="head">AiSettingItem</text>

    <text x="115" y="74" class="body-c">label + status + source</text>
    <text x="115" y="100" class="small">servis mantığı taşımaz</text>
  </g>

  <!-- AgentSetupButton -->
  <g transform="translate(340, 250)">
    <rect width="230" height="116" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 42 H 0 Z" fill="url(#g-sky)" />
    <text x="115" y="28" class="head">AgentSetupButton</text>

    <text x="115" y="74" class="body-c">kurulum CTA yüzeyi</text>
    <text x="115" y="100" class="small">callback dışarıdan gelir</text>
  </g>

  <!-- Collab UI -->
  <g transform="translate(650, 92)">
    <rect width="230" height="116" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 42 H 0 Z" fill="url(#g-green)" />
    <text x="115" y="28" class="head">Collab UI</text>

    <text x="115" y="74" class="body-c">avatar, follower, share</text>
    <text x="115" y="100" class="small">presence state'i üstte</text>
  </g>

  <!-- Update / Toast -->
  <g transform="translate(650, 250)">
    <rect width="230" height="116" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 42 H 0 Z" fill="url(#g-amber)" />
    <text x="115" y="28" class="head">Update / Toast</text>

    <text x="115" y="74" class="body-c">duyuru ve migration</text>
    <text x="115" y="100" class="small">lifecycle parent'ta</text>
  </g>

  <!-- Bağlantılar -->
  <path d="M 260 190 L 300 190 L 300 150 L 330 150" class="flow-arrow flow" />
  <path d="M 260 240 L 300 240 L 300 308 L 330 308" class="flow-arrow flow" />

  <path d="M 570 150 L 640 150" class="flow-arrow flow" />
  <path d="M 570 308 L 640 308" class="flow-arrow flow" />

  <!-- Alt Bilgi Notu -->
  <g transform="translate(40, 398)">
    <rect width="860" height="46" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="430" y="28" class="body-c" style="font-weight: 500; fill: #1e3a8a;">Kural: component yalnız render girdisi alır; gerçek servis ve migration kararları uygulama modelinde kalır.</text>
  </g>
</svg>
