<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 540">
  <title>Sanal Liste Sanallaştırma Mimarisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow-viewport" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#0284c7" flood-opacity="0.35" />
    </filter>

    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-vp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#eef2f7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="g-idle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .panel-label { font: 800 16px system-ui, -apple-system, sans-serif; fill: #475569; }
      .vp-label { font: 800 16px system-ui, -apple-system, sans-serif; fill: #0284c7; }

      .viewport-rect { fill: none; stroke: #0284c7; stroke-width: 4; filter: url(#glow-viewport); }

      .item-rect { rx: 8px; transition: all 0.5s; }
      .item-text { font: 600 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .src-text { font: 600 14px ui-monospace, SFMono-Regular, monospace; fill: #64748b; text-anchor: middle; dominant-baseline: middle; }

      .scrollbar-track { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 4px; }
      .scrollbar-thumb { fill: #94a3b8; rx: 4px; animation: scroll-thumb 9s infinite ease-in-out; }

      @keyframes scroll-thumb {
        0%, 100% { y: 150; }
        50% { y: 250; }
      }

      .list-container { animation: scroll-list 9s infinite ease-in-out; }
      @keyframes scroll-list {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-160px); }
      }

      @keyframes render-item-0 { 0%, 100% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } 50% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } }
      @keyframes render-item-1 { 0%, 100% { fill: url(#g-green); stroke: #059669; opacity: 1; } 50% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } }
      @keyframes render-item-2 { 0%, 100% { fill: url(#g-green); stroke: #059669; opacity: 1; } 50% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } }
      @keyframes render-item-3 { 0%, 100% { fill: url(#g-green); stroke: #059669; opacity: 1; } 50% { fill: url(#g-green); stroke: #059669; opacity: 1; } }
      @keyframes render-item-4 { 0%, 100% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } 50% { fill: url(#g-green); stroke: #059669; opacity: 1; } }
      @keyframes render-item-5 { 0%, 100% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } 50% { fill: url(#g-green); stroke: #059669; opacity: 1; } }
      @keyframes render-item-6 { 0%, 100% { fill: url(#g-idle); stroke: #cbd5e1; opacity: 0.6; } 50% { fill: url(#g-green); stroke: #059669; opacity: 1; } }

      .i0 { animation: render-item-0 9s infinite ease-in-out; }
      .i1 { animation: render-item-1 9s infinite ease-in-out; }
      .i2 { animation: render-item-2 9s infinite ease-in-out; }
      .i3 { animation: render-item-3 9s infinite ease-in-out; }
      .i4 { animation: render-item-4 9s infinite ease-in-out; }
      .i5 { animation: render-item-5 9s infinite ease-in-out; }
      .i6 { animation: render-item-6 9s infinite ease-in-out; }

      .legend-text { font: 600 14px system-ui, -apple-system, sans-serif; fill: #475569; }

      @media (prefers-reduced-motion: reduce) {
        .list-container, .scrollbar-thumb,
        .i0, .i1, .i2, .i3, .i4, .i5, .i6 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />
  <text x="580" y="48" class="title">Sanal Liste (Sanallaştırma) Mimarisi</text>
  <text x="580" y="78" class="sub">Binlerce öğe arasından sadece Viewport içindekilerin aktif render edilmesi</text>

  <!-- Sol Panel: Veri Kaynağı (10.000 Öğe) -->
  <g transform="translate(200, 130)">
    <text x="0" y="-16" class="panel-label">Büyük Veri Kümesi (10.000 Öğe)</text>
    <rect width="240" height="300" fill="url(#g-panel)" stroke="#e2e8f0" stroke-width="1.5" rx="12" filter="url(#shadow)" />

    <text x="120" y="50" class="src-text">Öğe 0001</text>
    <text x="120" y="95" class="src-text">Öğe 0002</text>
    <text x="120" y="140" class="src-text">Öğe 0003</text>
    <text x="120" y="190" class="src-text" style="fill:#94a3b8;font-size:26px;letter-spacing:4px">···</text>
    <text x="120" y="255" class="src-text">Öğe 9999</text>
  </g>

  <!-- Sağ Panel: Sanal Liste Viewport -->
  <g transform="translate(620, 130)">
    <text x="0" y="-16" class="vp-label">Sanal Liste Viewport (Aktif Çizim)</text>

    <!-- Viewport zemini (degrade) -->
    <rect x="0" y="30" width="340" height="240" rx="12" fill="url(#g-vp)" />

    <!-- Mask -->
    <mask id="viewport-mask">
      <rect x="0" y="30" width="340" height="240" fill="white" rx="12" />
    </mask>

    <g mask="url(#viewport-mask)">
      <!-- Scroll edilebilir konteyner -->
      <g class="list-container">
        <g transform="translate(20, 42)"><rect width="280" height="48" class="item-rect i0" stroke-width="1.5" /><text x="140" y="24" class="item-text" style="fill:#334155">Öğe 0012</text></g>
        <g transform="translate(20, 104)"><rect width="280" height="48" class="item-rect i1" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0013</text></g>
        <g transform="translate(20, 166)"><rect width="280" height="48" class="item-rect i2" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0014</text></g>
        <g transform="translate(20, 228)"><rect width="280" height="48" class="item-rect i3" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0015</text></g>
        <g transform="translate(20, 290)"><rect width="280" height="48" class="item-rect i4" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0016</text></g>
        <g transform="translate(20, 352)"><rect width="280" height="48" class="item-rect i5" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0017</text></g>
        <g transform="translate(20, 414)"><rect width="280" height="48" class="item-rect i6" stroke-width="1.5" /><text x="140" y="24" class="item-text">Öğe 0018</text></g>
      </g>
    </g>

    <!-- Scrollbar -->
    <rect x="318" y="30" width="8" height="240" class="scrollbar-track" />
    <rect x="318" width="8" height="70" class="scrollbar-thumb" />

    <!-- Viewport Çerçevesi -->
    <rect x="0" y="30" width="340" height="240" rx="12" class="viewport-rect" />
  </g>

  <!-- Akış oku: kaynak -> viewport -->
  <path d="M 460 280 L 580 280" stroke="#0284c7" stroke-width="3" stroke-dasharray="8 6" fill="none" stroke-linecap="round" />
  <polygon points="596,280 584,274 584,286" fill="#0284c7" />
  <text x="520" y="263" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#0284c7" text-anchor="middle">Sanallaştırma</text>

  <!-- Göstergeler -->
  <g transform="translate(310, 488)">
    <rect x="0" y="0" width="20" height="20" rx="5" fill="url(#g-green)" stroke="#059669" stroke-width="1" />
    <text x="30" y="15" class="legend-text">Aktif Render Edilen (GPU Belleğinde)</text>

    <rect x="320" y="0" width="20" height="20" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" opacity="0.7" />
    <text x="350" y="15" class="legend-text">Pasif / Belleğe Alınmayan</text>
  </g>

</svg>
