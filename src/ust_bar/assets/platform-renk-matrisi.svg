<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 385">
  <title>Platform Renk Token Matrisi</title>
  <defs>
    <style>
      .title { font: 700 19px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub   { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .hdr   { font: 700 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #fff; }
      .tok   { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .cell  { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .yes   { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #059669; }
      .no    { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .note  { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="820" height="385" rx="10" fill="#f8fafc"/>
  <text x="410" y="30" text-anchor="middle" class="title">Platform Renk Token Matrisi</text>
  <text x="410" y="50" text-anchor="middle" class="sub">Başlık çubuğu render kodu hangi platformda hangi tema token'ını tüketir.</text>

  <!-- Sütun başlıkları -->
  <rect x="10"  y="60" width="280" height="34" rx="4" fill="#475569"/>
  <text x="150" y="82" text-anchor="middle" class="hdr">Token</text>

  <rect x="298" y="60" width="160" height="34" rx="4" fill="#0284c7"/>
  <text x="378" y="82" text-anchor="middle" class="hdr">Linux / FreeBSD</text>

  <rect x="466" y="60" width="160" height="34" rx="4" fill="#374151"/>
  <text x="546" y="82" text-anchor="middle" class="hdr">Windows</text>

  <rect x="634" y="60" width="176" height="34" rx="4" fill="#4c1d95"/>
  <text x="722" y="82" text-anchor="middle" class="hdr">macOS</text>

  <!-- Satır arkaplanları, çizgiler -->
  <rect x="10" y="100" width="800" height="28" fill="#f1f5f9"/>
  <rect x="10" y="128" width="800" height="28" fill="#fff"/>
  <rect x="10" y="156" width="800" height="28" fill="#f1f5f9"/>
  <rect x="10" y="184" width="800" height="28" fill="#fff"/>
  <rect x="10" y="212" width="800" height="28" fill="#f1f5f9"/>
  <rect x="10" y="240" width="800" height="28" fill="#fff"/>
  <rect x="10" y="268" width="800" height="28" fill="#f1f5f9"/>
  <rect x="10" y="296" width="800" height="28" fill="#fff"/>
  <rect x="10" y="324" width="800" height="28" fill="#f1f5f9"/>

  <!-- Dikey sınır çizgileri -->
  <line x1="294" y1="60" x2="294" y2="352" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="462" y1="60" x2="462" y2="352" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="630" y1="60" x2="630" y2="352" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Yatay satır sınırları -->
  <line x1="10" y1="100" x2="810" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="128" x2="810" y2="128" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="156" x2="810" y2="156" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="184" x2="810" y2="184" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="212" x2="810" y2="212" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="240" x2="810" y2="240" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="268" x2="810" y2="268" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="296" x2="810" y2="296" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="324" x2="810" y2="324" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="352" x2="810" y2="352" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Satır 1: title_bar_background -->
  <text x="20"  y="119" class="tok">title_bar_background</text>
  <text x="308" y="115" class="yes">✓</text>
  <text x="308" y="127" class="cell">aktif pencere</text>
  <text x="476" y="115" class="yes">✓</text>
  <text x="476" y="127" class="cell">tüm durumlar</text>
  <text x="644" y="115" class="yes">✓</text>
  <text x="644" y="127" class="cell">tüm durumlar</text>

  <!-- Satır 2: title_bar_inactive_background -->
  <text x="20"  y="147" class="tok">title_bar_inactive_background</text>
  <text x="308" y="143" class="yes">✓</text>
  <text x="308" y="155" class="cell">pasif / taşınırken</text>
  <text x="476" y="147" class="no">—</text>
  <text x="644" y="147" class="no">—</text>

  <!-- Satır 3: tab_bar_background -->
  <text x="20"  y="175" class="tok">tab_bar_background</text>
  <text x="308" y="171" class="yes">✓</text>
  <text x="308" y="183" class="cell">sekme çubuğu</text>
  <text x="476" y="171" class="yes">✓</text>
  <text x="476" y="183" class="cell">sekme çubuğu</text>
  <text x="644" y="171" class="yes">✓</text>
  <text x="644" y="183" class="cell">sekme çubuğu</text>

  <!-- Satır 4: border -->
  <text x="20"  y="203" class="tok">border</text>
  <text x="308" y="199" class="yes">✓</text>
  <text x="308" y="211" class="cell">tab/buton kenarı</text>
  <text x="476" y="203" class="no">—</text>
  <text x="644" y="203" class="no">—</text>

  <!-- Satır 5: ghost_element_background / hover / active -->
  <text x="20"  y="227" class="tok">ghost_element_background</text>
  <text x="308" y="227" class="yes">✓  default bg</text>
  <text x="476" y="227" class="no">—</text>
  <text x="644" y="227" class="no">—</text>

  <!-- Satır 6: ghost_element_hover + active -->
  <text x="20"  y="253" class="tok">ghost_element_hover / active</text>
  <text x="308" y="249" class="yes">✓ hover</text>
  <text x="308" y="263" class="cell">WindowControl</text>
  <text x="476" y="249" class="yes">✓ hover + active</text>
  <text x="476" y="263" class="cell">non-close buton</text>
  <text x="644" y="253" class="no">—</text>

  <!-- Satır 7: icon + icon_muted -->
  <text x="20"  y="285" class="tok">icon  /  icon_muted</text>
  <text x="308" y="281" class="yes">✓ glyph rengi</text>
  <text x="308" y="293" class="cell">hover: icon_muted</text>
  <text x="476" y="285" class="no">—</text>
  <text x="644" y="285" class="no">—</text>

  <!-- Satır 8: text -->
  <text x="20"  y="313" class="tok">text</text>
  <text x="308" y="313" class="no">—</text>
  <text x="476" y="309" class="yes">✓ caption glyph</text>
  <text x="476" y="321" class="cell">varsayılan renk</text>
  <text x="644" y="313" class="no">—</text>

  <!-- Satır 9: drop_target -->
  <text x="20"  y="341" class="tok">drop_target_background / border</text>
  <text x="308" y="337" class="yes">✓</text>
  <text x="308" y="349" class="cell">sekme drag hedefi</text>
  <text x="476" y="337" class="yes">✓</text>
  <text x="476" y="349" class="cell">sekme drag hedefi</text>
  <text x="644" y="337" class="yes">✓</text>
  <text x="644" y="349" class="cell">sekme drag hedefi</text>

  <!-- Alt not -->
  <text x="410" y="373" text-anchor="middle" class="note">drop_target_* eksik bırakılırsa sekme sürükleme sırasında görsel geri bildirim kaybolur.</text>
</svg>
