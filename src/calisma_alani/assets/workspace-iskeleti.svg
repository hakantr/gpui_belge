<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820">
  <title>Zed Workspace İskeleti</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#be123c" stroke="#be123c" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrowRed" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#be123c" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .monoSmall { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .softTitle { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowRed { stroke: #be123c; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowRed); marker-start: url(#dot-arrowRed); }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 1.2; }
    </style>
    
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">Zed Workspace İskeleti</text>

  <text x="580" y="62" text-anchor="middle" class="subtitle">Workspace kök Entity; dock'lar, pane grubu, status bar ve modal katmanı birlikte çalışır.</text>
  <rect x="60" y="92" width="1040" height="530" rx="12" fill="#f1f5f9" stroke="#334155" stroke-width="1.6" />
  <text x="86" y="122" class="label">Workspace - kök Entity</text>
  <text x="86" y="144" class="small">left_dock, right_dock, bottom_dock, center: PaneGroup, status_bar ve modal_layer.</text>
  <rect x="86" y="168" width="220" height="280" rx="8" class="card" />
<rect x="86" y="168" width="220" height="30" rx="8" fill="#0284c7" />
<path d="M 86 190 H 306 V 198 H 86 Z" fill="#0284c7" />
<text x="100" y="188" class="cardTitle">left_dock: Dock</text>
<text x="100" y="220" class="body">DockPosition::Left.</text>
<text x="100" y="237" class="body">Project, Outline, Git Panel.</text>
<text x="100" y="254" class="body">activation_priority sırası.</text>
<text x="100" y="271" class="body">Panel: Focusable + Render.</text>
<text x="100" y="288" class="body">EventEmitter&lt;PanelEvent&gt;.</text>
<text x="100" y="305" class="body">PanelEvent: Activate, Close.</text>
<text x="100" y="322" class="body">ZoomIn ve ZoomOut.</text>
<text x="100" y="339" class="body">ToggleLeftDock.</text>
<text x="100" y="356" class="body">resize_active_panel.</text>

  <rect x="854" y="168" width="220" height="280" rx="8" class="card" />
<rect x="854" y="168" width="220" height="30" rx="8" fill="#7c3aed" />
<path d="M 854 190 H 1074 V 198 H 854 Z" fill="#7c3aed" />
<text x="868" y="188" class="cardTitle">right_dock: Dock</text>
<text x="868" y="220" class="body">DockPosition::Right.</text>
<text x="868" y="237" class="body">Assistant, Outline, Chat.</text>
<text x="868" y="254" class="body">add_panel benzersiz</text>
<text x="868" y="271" class="body">priority ister.</text>
<text x="868" y="288" class="body">Aynı priority panic üretir.</text>
<text x="868" y="322" class="body">visible_panel, active_panel.</text>
<text x="868" y="339" class="body">panel::&lt;T&gt;() -&gt;</text>
<text x="868" y="356" class="body">Option&lt;Entity&lt;T&gt;&gt;.</text>

  <rect x="330" y="168" width="500" height="230" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.4" />
  <text x="580" y="198" text-anchor="middle" class="label">center: PaneGroup</text>
  <text x="580" y="220" text-anchor="middle" class="body">Member::Pane veya Member::Axis(PaneAxis).</text>
  <rect x="356" y="244" width="220" height="128" rx="8" fill="#fff" stroke="#059669" />
  <text x="466" y="268" text-anchor="middle" class="label">Pane - sol</text>
  <text x="376" y="292" text-anchor="start" class="small">Tab1 [Item], Tab2, Tab3</text>
<text x="376" y="308" text-anchor="start" class="small">activate_item / close_item</text>
<text x="376" y="324" text-anchor="start" class="small">navigate_backward / forward</text>
<text x="376" y="340" text-anchor="start" class="small">split(direction) -&gt; yeni Pane</text>
<text x="376" y="356" text-anchor="start" class="small">NavHistory, pin, preview</text>
  <rect x="594" y="244" width="210" height="128" rx="8" fill="#fff" stroke="#059669" />
  <text x="699" y="268" text-anchor="middle" class="label">Pane - sağ split</text>
  <text x="614" y="292" text-anchor="start" class="small">SplitDirection: Up, Down</text>
<text x="614" y="308" text-anchor="start" class="small">Left, Right</text>
<text x="614" y="324" text-anchor="start" class="small">ToolbarItemView</text>
<text x="614" y="340" text-anchor="start" class="small">Emitter&lt;ToolbarItemEvent&gt;</text>
<text x="614" y="356" text-anchor="start" class="small">Item: tab_content</text>
  <rect x="330" y="416" width="500" height="84" rx="8" class="card" />
<rect x="330" y="416" width="500" height="30" rx="8" fill="#d97706" />
<path d="M 330 438 H 830 V 446 H 330 Z" fill="#d97706" />
<text x="344" y="436" class="cardTitle">bottom_dock: Dock</text>
<text x="344" y="468" class="body">DockPosition::Bottom; Terminal, Problems, Debug Console ve Tests.</text>
<text x="344" y="485" class="body">ToggleBottomDock, Panel trait ve PanelEvent.</text>

  <rect x="86" y="518" width="988" height="44" rx="8" fill="#fff" stroke="#334155" />
  <text x="580" y="544" text-anchor="middle" class="label">StatusBar - left_items / right_items: Vec&lt;Box&lt;dyn StatusItemView&gt;&gt;</text>
  <rect x="86" y="574" width="988" height="30" rx="8" fill="#ffe4e6" stroke="#be123c" />
  <text x="580" y="594" text-anchor="middle" class="small">ModalLayer: ModalView, ManagedView, Notification, ToastView, workspace.toggle_modal&lt;V&gt;(...) ve show_toast.</text>
  <rect x="60" y="656" width="1040" height="112" rx="8" class="card" />
<rect x="60" y="656" width="1040" height="30" rx="8" fill="#d97706" />
<path d="M 60 678 H 1100 V 686 H 60 Z" fill="#d97706" />
<text x="74" y="676" class="cardTitle">Altyapı - Workspace dışı, paylaşılan</text>
<text x="74" y="708" class="body">AppState, WorkspaceStore, WorkspaceDb, HistoryManager, OpenListener ve RawOpenRequest.</text>
<text x="74" y="725" class="body">Workspace::new(workspace_id, project, app_state, window, cx).</text>
<text x="74" y="742" class="body">Workspace::new_local(paths, app_state, ...).</text>
<text x="74" y="759" class="body">register_sidebar (MultiWorkspace); Sidebar: Focusable + Render + EventEmitter&lt;SidebarEvent&gt;.</text>


</svg>
