<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640">
  <title>Workspace yığılım ve katman sırası</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="shadow-deep" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>

    <linearGradient id="g-workspace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="g-pane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-modal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="g-toast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1f2" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
    <linearGradient id="g-notification" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5" />
      <stop offset="1" stop-color="#d1fae5" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .layer-workspace { fill: url(#g-workspace); stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow-deep); }
      .layer-pane { fill: url(#g-pane); stroke: #94a3b8; stroke-width: 2; filter: url(#shadow-deep); }
      .layer-modal { fill: url(#g-modal); stroke: #3b82f6; stroke-width: 2; filter: url(#shadow-deep); }
      .layer-toast { fill: url(#g-toast); stroke: #e11d48; stroke-width: 2; filter: url(#shadow-deep); }
      .layer-notification { fill: url(#g-notification); stroke: #10b981; stroke-width: 2; filter: url(#shadow-deep); }

      .text-lbl { font: 800 17px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .text-desc { font: 600 12.5px system-ui, -apple-system, sans-serif; fill: #475569; }
      .text-order { font: 800 12px ui-monospace, SFMono-Regular, monospace; fill: #6366f1; }

      .blue { fill: #1d4ed8; }
      .rose { fill: #be123c; }
      .green { fill: #047857; }

      .legend-box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; filter: url(#shadow); }
      .legend-head { font: 800 13px system-ui, -apple-system, sans-serif; fill: #334155; }
      .legend-txt { font: 500 12px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .legend-key { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #0ea5e9; }

      /* Perspektif izometrik yığılım — taban durağan, üst katmanlar yumuşak nabız.
         Düşey aralık, alttaki katmanın başlık şeridi üsttekiyle örtüşmesin diye geniş tutulur. */
      @keyframes float-workspace {
        0%, 100% { transform: translate(400px, 488px) scale(1.30) rotateX(50deg) rotateZ(-9deg); }
      }
      @keyframes float-pane {
        0%, 100% { transform: translate(400px, 396px) scale(1.24) rotateX(50deg) rotateZ(-9deg); }
        50%      { transform: translate(400px, 389px) scale(1.24) rotateX(50deg) rotateZ(-9deg); }
      }
      @keyframes float-modal {
        0%, 100% { transform: translate(400px, 318px) scale(1.18) rotateX(50deg) rotateZ(-9deg); }
        50%      { transform: translate(400px, 308px) scale(1.18) rotateX(50deg) rotateZ(-9deg); }
      }
      @keyframes float-toast {
        0%, 100% { transform: translate(400px, 240px) scale(1.11) rotateX(50deg) rotateZ(-9deg); }
        50%      { transform: translate(400px, 226px) scale(1.11) rotateX(50deg) rotateZ(-9deg); }
      }
      @keyframes float-notification {
        0%, 100% { transform: translate(400px, 174px) scale(1.04) rotateX(50deg) rotateZ(-9deg); }
        50%      { transform: translate(400px, 158px) scale(1.04) rotateX(50deg) rotateZ(-9deg); }
      }

      .workspace-g { animation: float-workspace 10s infinite ease-in-out; transform-origin: 0px 0px; }
      .pane-g { animation: float-pane 10s infinite ease-in-out; transform-origin: 0px 0px; }
      .modal-g { animation: float-modal 10s infinite ease-in-out; transform-origin: 0px 0px; }
      .toast-g { animation: float-toast 10s infinite ease-in-out; transform-origin: 0px 0px; }
      .notification-g { animation: float-notification 10s infinite ease-in-out; transform-origin: 0px 0px; }

      @media (prefers-reduced-motion: reduce) {
        .workspace-g, .pane-g, .modal-g, .toast-g, .notification-g { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />
  <text x="400" y="44" class="title">Workspace Yığılım &amp; Katman Sırası</text>
  <text x="400" y="72" class="sub">Pencere içi bileşen katmanlarının üst üste çizim hiyerarşisi</text>

  <!-- KATMANLAR — aşağıdan yukarıya çizilir (SVG kuralı), yüksek z-index üstte görünür -->

  <g class="workspace-g">
    <rect x="-200" y="-120" width="400" height="240" rx="12" class="layer-workspace" />
    <text x="-180" y="28" class="text-lbl">Workspace Tabanı</text>
    <text x="-180" y="50" class="text-desc">Pencere iskeleti, dock alanları ve arka plan</text>
    <text x="-180" y="74" class="text-order">Z-INDEX: 0</text>
  </g>

  <g class="pane-g">
    <rect x="-200" y="-120" width="400" height="240" rx="12" class="layer-pane" />
    <text x="-180" y="40" class="text-lbl">Pane &amp; Tab Layer</text>
    <text x="-180" y="62" class="text-desc">Editör panelleri, sekmeler ve breadcrumbs</text>
    <text x="-180" y="86" class="text-order">Z-INDEX: 10</text>
  </g>

  <g class="modal-g">
    <rect x="-200" y="-120" width="400" height="240" rx="12" class="layer-modal" />
    <text x="-180" y="40" class="text-lbl blue">Modal Layer</text>
    <text x="-180" y="62" class="text-desc">Komut paleti, arama diyaloğu ve modal view'lar</text>
    <text x="-180" y="86" class="text-order blue">Z-INDEX: 100</text>
  </g>

  <g class="toast-g">
    <rect x="-200" y="-120" width="400" height="240" rx="12" class="layer-toast" />
    <text x="-180" y="40" class="text-lbl rose">Toast Layer</text>
    <text x="-180" y="62" class="text-desc">Geçici ve otomatik gizlenen durum bildirimleri</text>
    <text x="-180" y="86" class="text-order rose">Z-INDEX: 200</text>
  </g>

  <g class="notification-g">
    <rect x="-200" y="-120" width="400" height="240" rx="12" class="layer-notification" />
    <text x="-180" y="40" class="text-lbl green">Notification Layer</text>
    <text x="-180" y="62" class="text-desc">Kullanıcı eylemi bekleyen kalıcı bildirimler</text>
    <text x="-180" y="86" class="text-order green">Z-INDEX: 300</text>
  </g>

  <!-- Açıklama: çizim yönü ipucu -->
  <g>
    <rect x="24" y="572" width="752" height="52" rx="10" class="legend-box" />
    <text x="44" y="596" class="legend-head">Çizim yönü</text>
    <text x="44" y="615" class="legend-txt">Katmanlar aşağıdan yukarıya çizilir; en yüksek <tspan class="legend-key">z-index</tspan> en üstte görünür ve tıklamayı önce alır.</text>
    <line x1="640" y1="584" x2="640" y2="612" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="660" y="596" class="legend-key" style="fill:#10b981">▲ üst (z 300)</text>
    <text x="660" y="615" class="legend-txt">taban ▼ (z 0)</text>
  </g>
</svg>
