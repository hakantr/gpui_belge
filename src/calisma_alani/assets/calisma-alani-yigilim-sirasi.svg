<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Workspace yığılım ve katman sırası</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; rx: 12px; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #0f172a; text-anchor: middle; }
      .sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }

      .layer-workspace { fill: #f1f5f9; stroke: #ffffff; stroke-width: 2; opacity: 0.9; }
      .layer-pane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; opacity: 0.92; }
      .layer-modal { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; opacity: 0.95; }
      .layer-toast { fill: #ffe4e6; stroke: #e11d48; stroke-width: 2; opacity: 0.96; }
      .layer-notification { fill: #d1fae5; stroke: #059669; stroke-width: 2; opacity: 0.97; }

      .text-lbl { font-family: system-ui, -apple-system, sans-serif; font-weight: bold; font-size: 14px; fill: #0f172a; }
      .text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #475569; }
      .text-order { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #7c3aed; }
      .blue { fill: #0369a1; }
      .rose { fill: #be123c; }
      .green { fill: #047857; }

      @keyframes float-notification {
        0%, 100% { transform: translate(400px, 180px) scale(1.05) rotateX(60deg) rotateZ(-7deg); }
        50% { transform: translate(400px, 166px) scale(1.05) rotateX(60deg) rotateZ(-7deg); }
      }
      @keyframes float-toast {
        0%, 100% { transform: translate(400px, 226px) scale(1.18) rotateX(60deg) rotateZ(-7deg); }
        50% { transform: translate(400px, 214px) scale(1.18) rotateX(60deg) rotateZ(-7deg); }
      }
      @keyframes float-modal {
        0%, 100% { transform: translate(400px, 274px) scale(1.31) rotateX(60deg) rotateZ(-7deg); }
        50% { transform: translate(400px, 264px) scale(1.31) rotateX(60deg) rotateZ(-7deg); }
      }
      @keyframes float-pane {
        0%, 100% { transform: translate(400px, 324px) scale(1.44) rotateX(60deg) rotateZ(-7deg); }
        50% { transform: translate(400px, 316px) scale(1.44) rotateX(60deg) rotateZ(-7deg); }
      }
      @keyframes float-workspace {
        0%, 100% { transform: translate(400px, 374px) scale(1.57) rotateX(60deg) rotateZ(-7deg); }
      }

      .notification-g { animation: float-notification 6s infinite ease-in-out; transform-origin: 0px 0px; }
      .toast-g { animation: float-toast 6s infinite ease-in-out; transform-origin: 0px 0px; }
      .modal-g { animation: float-modal 6s infinite ease-in-out; transform-origin: 0px 0px; }
      .pane-g { animation: float-pane 6s infinite ease-in-out; transform-origin: 0px 0px; }
      .workspace-g { animation: float-workspace 6s infinite ease-in-out; transform-origin: 0px 0px; }
    </style>
  </defs>

  <rect width="800" height="500" class="bg" />
  <text x="400" y="30" class="title">Workspace Yığılım &amp; Katman Sırası</text>
  <text x="400" y="55" class="sub">Pencere içi bileşen katmanlarının üst üste çizim hiyerarşisi</text>

  <g class="workspace-g">
    <rect x="-200" y="-120" width="400" height="240" rx="8" class="layer-workspace" />
    <text x="-180" y="56" class="text-lbl">Workspace Tabanı</text>
    <text x="-180" y="76" class="text-desc">Pencere iskeleti, dock alanları ve arka plan</text>
    <text x="-180" y="98" class="text-order">Z-INDEX: 0</text>
  </g>

  <g class="pane-g">
    <rect x="-200" y="-120" width="400" height="240" rx="8" class="layer-pane" />
    <text x="-180" y="56" class="text-lbl">Pane &amp; Tab Layer</text>
    <text x="-180" y="76" class="text-desc">Editör panelleri, sekmeler ve breadcrumbs</text>
    <text x="-180" y="98" class="text-order">Z-INDEX: 10</text>
  </g>

  <g class="modal-g">
    <rect x="-200" y="-120" width="400" height="240" rx="8" class="layer-modal" />
    <text x="-180" y="56" class="text-lbl blue">Modal Layer</text>
    <text x="-180" y="76" class="text-desc">Komut paleti, arama diyaloğu ve modal view'lar</text>
    <text x="-180" y="98" class="text-order blue">Z-INDEX: 100</text>
  </g>

  <g class="toast-g">
    <rect x="-200" y="-120" width="400" height="240" rx="8" class="layer-toast" />
    <text x="-180" y="56" class="text-lbl rose">Toast Layer</text>
    <text x="-180" y="76" class="text-desc">Geçici ve otomatik gizlenen durum bildirimleri</text>
    <text x="-180" y="98" class="text-order rose">Z-INDEX: 200</text>
  </g>

  <g class="notification-g">
    <rect x="-200" y="-120" width="400" height="240" rx="8" class="layer-notification" />
    <text x="-180" y="56" class="text-lbl green">Notification Layer</text>
    <text x="-180" y="76" class="text-desc">Kullanıcı eylemi bekleyen kalıcı bildirimler</text>
    <text x="-180" y="98" class="text-order green">Z-INDEX: 300</text>
  </g>
</svg>
