<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 550">
  <title>Platform titlebar ve pencere kontrolleri</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.06" />
    </filter>
    <style>
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; }
      
      .window-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .titlebar { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      
      .text-title { font: 800 14px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .text-desc { font: 14px system-ui, -apple-system, sans-serif; fill: #475569; }
      
      .tl-red { fill: #ef4444; stroke: #b91c1c; stroke-width: 0.5; }
      .tl-yellow { fill: #f59e0b; stroke: #b45309; stroke-width: 0.5; }
      .tl-green { fill: #10b981; stroke: #047857; stroke-width: 0.5; }
      
      .win-btn { fill: none; stroke: #64748b; stroke-width: 1.5; }
      .win-close { stroke: #ef4444; }

      .guide-line { stroke: #ef4444; stroke-width: 1.5; stroke-dasharray: 4 4; }
      .guide-text { font: 600 12px ui-monospace, SFMono-Regular, monospace; fill: #ef4444; }

      @keyframes anim-mac {
        0%, 45%, 100% { opacity: 1; transform: translateY(0); }
        50%, 95% { opacity: 0.15; transform: translateY(5px); }
      }
      @keyframes anim-win {
        0%, 45%, 100% { opacity: 0.15; transform: translateY(5px); }
        50%, 95% { opacity: 1; transform: translateY(0); }
      }
      .mac-view { animation: anim-mac 8s infinite ease-in-out; transform-origin: center; }
      .win-view { animation: anim-win 8s infinite ease-in-out; transform-origin: center; }

      @keyframes anim-label-1 { 0%, 45%, 100% { opacity: 1; } 50%, 95% { opacity: 0; } }
      @keyframes anim-label-2 { 0%, 45%, 100% { opacity: 0; } 50%, 95% { opacity: 1; } }
      .lbl-s1 { animation: anim-label-1 8s infinite linear; }
      .lbl-s2 { animation: anim-label-2 8s infinite linear; }
      .state-labels text { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #0284c7; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />
  
  <text x="580" y="46" text-anchor="middle" class="title">Platform Titlebar ve Pencere Kontrolleri</text>
  <text x="580" y="74" text-anchor="middle" class="subtitle">macOS (Traffic Lights) ile Windows/Linux pencere eylem butonları yerleşim farkları</text>

  <!-- ================= MAC APP VIEW ================= -->
  <g class="mac-view" transform="translate(180, 120)">
    <!-- Shadow Container -->
    <rect x="0" y="0" width="800" height="140" rx="10" fill="#ffffff" filter="url(#shadow)" />
    <!-- Window Outline -->
    <rect x="0" y="0" width="800" height="140" rx="10" class="window-bg" />
    <path d="M 0 40 L 800 40" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 790 A 10 10 0 0 1 800 10 V 40 H 0 Z" fill="#f1f5f9" />
    
    <!-- macOS Traffic Lights -->
    <circle cx="20" cy="20" r="6" class="tl-red" />
    <circle cx="40" cy="20" r="6" class="tl-yellow" />
    <circle cx="60" cy="20" r="6" class="tl-green" />
    
    <text x="120" y="25" class="text-title">Sol Sekme / Başlık Alanı</text>
    <text x="400" y="90" class="text-desc" text-anchor="middle">macOS yerleşiminde sol tarafta traffic lights için padding ayrılır.</text>

    <!-- TRAFFIC_LIGHT_PADDING Kılavuz Çizgisi -->
    <line x1="0" y1="55" x2="80" y2="55" class="guide-line" />
    <line x1="80" y1="50" x2="80" y2="60" stroke="#ef4444" stroke-width="2" />
    <line x1="0" y1="50" x2="0" y2="60" stroke="#ef4444" stroke-width="2" />
    <text x="40" y="75" class="guide-text" text-anchor="middle">TRAFFIC_LIGHT_PADDING (78px)</text>
  </g>

  <!-- ================= WINDOWS APP VIEW ================= -->
  <g class="win-view" transform="translate(180, 290)">
    <!-- Shadow Container -->
    <rect x="0" y="0" width="800" height="140" rx="10" fill="#ffffff" filter="url(#shadow)" />
    <!-- Window Outline -->
    <rect x="0" y="0" width="800" height="140" rx="10" class="window-bg" />
    <path d="M 0 40 L 800 40" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 790 A 10 10 0 0 1 800 10 V 40 H 0 Z" fill="#f1f5f9" />

    <!-- Windows Eylem Butonları -->
    <!-- Minimize -->
    <line x1="720" y1="20" x2="736" y2="20" class="win-btn" />
    <!-- Maximize -->
    <rect x="752" y="14" width="12" height="12" class="win-btn" />
    <!-- Close -->
    <line x1="776" y1="14" x2="788" y2="26" class="win-btn win-close" />
    <line x1="788" y1="14" x2="776" y2="26" class="win-btn win-close" />

    <text x="20" y="25" class="text-title">Proje İsmi / Başlık Alanı</text>
    <text x="400" y="90" class="text-desc" text-anchor="middle">Windows/Linux yerleşiminde butonlar sağdadır ve sol tarafta traffic lights boşluğu bırakılmaz.</text>
  </g>

  <!-- Dinamik Platform Etiketi -->
  <g class="state-labels" transform="translate(580, 500)">
    <text class="lbl-s1">Etkin Platform Görünümü: macOS (Traffic Lights Solda)</text>
    <text class="lbl-s2">Etkin Platform Görünümü: Windows / Linux (Eylem Butonları Sağda)</text>
  </g>

</svg>
