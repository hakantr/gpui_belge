<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 600">
  <title>Platform titlebar ve pencere kontrolleri</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <linearGradient id="g-window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="g-titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="g-mac-badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-win-badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .badge-text { font: 800 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; }

      .text-title { font: 800 15px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .text-desc { font: 500 14px system-ui, -apple-system, sans-serif; fill: #475569; }

      .tl-red { fill: #ef4444; }
      .tl-yellow { fill: #f59e0b; }
      .tl-green { fill: #10b981; }

      .win-btn { fill: none; stroke: #475569; stroke-width: 1.6; stroke-linecap: round; }
      .win-close { stroke: #e11d48; }

      .guide-line { stroke: #e11d48; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .guide-cap { stroke: #e11d48; stroke-width: 2; }
      .guide-text { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #e11d48; }

      @keyframes anim-mac {
        0%, 45%, 100% { opacity: 1; }
        55%, 90% { opacity: 0.62; }
      }
      @keyframes anim-win {
        0%, 45%, 100% { opacity: 0.62; }
        55%, 90% { opacity: 1; }
      }
      .mac-view { animation: anim-mac 10s infinite ease-in-out; }
      .win-view { animation: anim-win 10s infinite ease-in-out; }

      @keyframes anim-label-1 { 0%, 45%, 100% { opacity: 1; } 55%, 90% { opacity: 0; } }
      @keyframes anim-label-2 { 0%, 45%, 100% { opacity: 0; } 55%, 90% { opacity: 1; } }
      .lbl-s1 { animation: anim-label-1 10s infinite ease-in-out; }
      .lbl-s2 { animation: anim-label-2 10s infinite ease-in-out; }
      .state-text { font: 700 15px ui-monospace, SFMono-Regular, monospace; fill: #0284c7; text-anchor: middle; }

      @media (prefers-reduced-motion: reduce) {
        .mac-view, .win-view, .lbl-s1, .lbl-s2 { animation: none; }
        .win-view { opacity: 1; }
        .lbl-s2 { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="580" y="50" class="title">Platform Titlebar ve Pencere Kontrolleri</text>
  <text x="580" y="78" class="subtitle">macOS (Traffic Lights) ile Windows/Linux pencere eylem butonları yerleşim farkları</text>

  <!-- ================= macOS GORUNUMU ================= -->
  <g class="mac-view">
    <!-- Platform rozeti -->
    <rect x="180" y="118" width="118" height="30" rx="8" fill="url(#g-mac-badge)" filter="url(#shadow)" />
    <text x="239" y="138" class="badge-text" text-anchor="middle">macOS</text>

    <!-- Pencere kapsayicisi -->
    <rect x="180" y="162" width="800" height="150" rx="12" fill="url(#g-window)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <!-- Baslik cubugu -->
    <path d="M 181 174 A 11 11 0 0 1 192 163 H 968 A 11 11 0 0 1 979 174 V 206 H 181 Z" fill="url(#g-titlebar)" />
    <path d="M 180 206 H 980" stroke="#cbd5e1" stroke-width="1.5" />

    <!-- macOS Traffic Lights (sol kenarda) -->
    <circle cx="206" cy="185" r="7" class="tl-red" />
    <circle cx="228" cy="185" r="7" class="tl-yellow" />
    <circle cx="250" cy="185" r="7" class="tl-green" />

    <text x="320" y="191" class="text-title">Sol Sekme / Başlık Alanı</text>
    <text x="580" y="288" class="text-desc" text-anchor="middle">macOS yerleşiminde sol tarafta traffic lights için boşluk (padding) ayrılır.</text>

    <!-- TRAFFIC_LIGHT_PADDING olcum koridoru (sol kenardan icerik baslangicina) -->
    <rect x="181" y="207" width="78" height="36" fill="#e11d48" fill-opacity="0.07" />
    <line x1="181" y1="225" x2="259" y2="225" class="guide-line" />
    <line x1="181" y1="218" x2="181" y2="232" class="guide-cap" />
    <line x1="259" y1="218" x2="259" y2="232" class="guide-cap" />
    <text x="280" y="251" class="guide-text" text-anchor="start">TRAFFIC_LIGHT_PADDING (78px)</text>
  </g>

  <!-- ================= Windows / Linux GORUNUMU ================= -->
  <g class="win-view">
    <!-- Platform rozeti -->
    <rect x="180" y="340" width="178" height="30" rx="8" fill="url(#g-win-badge)" filter="url(#shadow)" />
    <text x="269" y="360" class="badge-text" text-anchor="middle">Windows / Linux</text>

    <!-- Pencere kapsayicisi -->
    <rect x="180" y="384" width="800" height="150" rx="12" fill="url(#g-window)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <!-- Baslik cubugu -->
    <path d="M 181 396 A 11 11 0 0 1 192 385 H 968 A 11 11 0 0 1 979 396 V 428 H 181 Z" fill="url(#g-titlebar)" />
    <path d="M 180 428 H 980" stroke="#cbd5e1" stroke-width="1.5" />

    <text x="206" y="413" class="text-title">Proje İsmi / Başlık Alanı</text>

    <!-- Windows eylem butonlari (sag kenarda) -->
    <!-- Minimize -->
    <line x1="888" y1="407" x2="904" y2="407" class="win-btn" />
    <!-- Maximize -->
    <rect x="920" y="401" width="12" height="12" class="win-btn" />
    <!-- Close -->
    <line x1="948" y1="401" x2="960" y2="413" class="win-btn win-close" />
    <line x1="960" y1="401" x2="948" y2="413" class="win-btn win-close" />

    <text x="580" y="484" class="text-desc" text-anchor="middle">Windows/Linux yerleşiminde butonlar sağdadır ve sol tarafta traffic lights boşluğu bırakılmaz.</text>
  </g>

  <!-- Dinamik platform etiketi -->
  <g transform="translate(580, 572)">
    <text class="state-text lbl-s1">Etkin Platform Görünümü: macOS (Traffic Lights Solda)</text>
    <text class="state-text lbl-s2">Etkin Platform Görünümü: Windows / Linux (Eylem Butonları Sağda)</text>
  </g>

</svg>
