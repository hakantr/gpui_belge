<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <title>WindowButtonLayout Platform Desteği</title>
  <defs>
    <style>
      .title { font: 700 19px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub   { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .hdr   { font: 700 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #fff; }
      .feat  { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1e293b; }
      .cell  { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .mono  { font: 10.5px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .yes   { font: 700 11.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #047857; }
      .no    { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #94a3b8; }
      .note  { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="900" height="360" rx="10" fill="#f8fafc" />
  <text x="450" y="30" text-anchor="middle" class="title">WindowButtonLayout Platform Desteği</text>
  <text x="450" y="51" text-anchor="middle" class="sub">Buton düzeni yalnızca Linux/FreeBSD CSD penceresinde anlamlıdır.</text>

  <!-- Başlık satırı -->
  <rect x="24" y="70" width="198" height="40" rx="4" fill="#475569" />
  <rect x="230" y="70" width="328" height="40" rx="4" fill="#0284c7" />
  <rect x="566" y="70" width="150" height="40" rx="4" fill="#334155" />
  <rect x="724" y="70" width="152" height="40" rx="4" fill="#334155" />
  <text x="123" y="95" text-anchor="middle" class="hdr">Özellik</text>
  <text x="394" y="95" text-anchor="middle" class="hdr">Linux / FreeBSD (CSD)</text>
  <text x="641" y="95" text-anchor="middle" class="hdr">Windows</text>
  <text x="800" y="95" text-anchor="middle" class="hdr">macOS</text>

  <!-- Satır zeminleri -->
  <rect x="24" y="116" width="852" height="54" fill="#f1f5f9" />
  <rect x="24" y="170" width="852" height="58" fill="#fff" />
  <rect x="24" y="228" width="852" height="64" fill="#f1f5f9" />
  <rect x="24" y="292" width="852" height="42" fill="#fff" />

  <!-- Izgara -->
  <path d="M 24 116 H 876 M 24 170 H 876 M 24 228 H 876 M 24 292 H 876 M 24 334 H 876" stroke="#e2e8f0" stroke-width="1" />
  <path d="M 226 70 V 334 M 562 70 V 334 M 720 70 V 334" stroke="#e2e8f0" stroke-width="1" />

  <!-- Satır 1 -->
  <text x="38" y="139" class="feat">cx.button_layout()</text>
  <text x="244" y="134" class="yes">Some(WindowButtonLayout)</text>
  <text x="244" y="153" class="cell">GTK/GNOME masaüstü ayarını okur.</text>
  <text x="580" y="139" class="no">None</text>
  <text x="580" y="156" class="cell">her zaman</text>
  <text x="738" y="139" class="no">None</text>
  <text x="738" y="156" class="cell">her zaman</text>

  <!-- Satır 2 -->
  <text x="38" y="196" class="feat">Varsayılan düzen</text>
  <text x="244" y="191" class="cell">linux_default()</text>
  <text x="244" y="210" class="cell">Sağ: Minimize, Maximize, Close</text>
  <text x="580" y="191" class="cell">Sistem caption</text>
  <text x="580" y="210" class="cell">değiştirilemez</text>
  <text x="738" y="191" class="cell">Sol: yerel</text>
  <text x="738" y="210" class="cell">trafik ışıkları</text>

  <!-- Satır 3 -->
  <text x="38" y="256" class="feat">Özel yerleşim</text>
  <text x="244" y="251" class="yes">3 mod</text>
  <text x="244" y="270" class="mono">platform_default / standard</text>
  <text x="244" y="288" class="mono">GNOME string</text>
  <text x="580" y="259" class="no">—</text>
  <text x="738" y="259" class="no">—</text>

  <!-- Satır 4 -->
  <text x="38" y="318" class="feat">GNOME format örneği</text>
  <text x="244" y="310" class="mono">"close:minimize,maximize"</text>
  <text x="244" y="327" class="cell">Sol: Close | Sağ: Min, Max</text>
  <text x="580" y="319" class="no">—</text>
  <text x="738" y="319" class="no">—</text>

  <text x="450" y="350" text-anchor="middle" class="note">set_button_layout Windows/macOS üzerinde görünür etki üretmez. MAX_BUTTONS_PER_SIDE = 3.</text>
</svg>
