<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 540">
  <title>Başlık Çubuğu Sürükleme Durum Makinesi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#e11d48" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-note" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf5" />
      <stop offset="1" stop-color="#fef9ec" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .stateTitle { font: 800 17px system-ui, -apple-system, sans-serif; fill: #ffffff; letter-spacing: 0.4px; }
      .stateVal { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f1f5f9; }
      .edge { font: 700 13px system-ui, -apple-system, sans-serif; fill: #1e293b; }
      .edgeSub { font: 500 12px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .noteTitle { font: 800 14px system-ui, -apple-system, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
      .noteBody { font: 500 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow-red { stroke: #e11d48; stroke-width: 2.5; fill: none; marker-end: url(#arrowRed); stroke-linecap: round; stroke-linejoin: round; }

      .dash { stroke-dasharray: 8 6; animation: flow 9s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -28; } }

      .pulse1 { animation: glow 10s ease-in-out infinite; }
      .pulse2 { animation: glow 10s ease-in-out infinite; animation-delay: -3.3s; }
      .pulse3 { animation: glow 10s ease-in-out infinite; animation-delay: -6.6s; }
      @keyframes glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.86; }
      }
      @media (prefers-reduced-motion: reduce) {
        .dash, .pulse1, .pulse2, .pulse3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="580" y="48" text-anchor="middle" class="title">Başlık Çubuğu Sürükleme Durum Makinesi</text>
  <text x="580" y="76" text-anchor="middle" class="subtitle">`should_move` bayrağı sürükleme akışının merkezindedir. Tek-atışlık (one-shot) tetikleyici ile çalışır.</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <!-- HAZIR -> SÜRÜKLEMEYE HAZIR -->
  <path d="M 320 170 L 454 170" class="flow-arrow dash" />
  <rect x="328" y="123" width="124" height="38" rx="7" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="390" y="141" text-anchor="middle" class="edge" style="fill:#0284c7">on_mouse_down</text>
  <text x="390" y="155" text-anchor="middle" class="edgeSub">Left, drag alanı</text>

  <!-- SÜRÜKLEMEYE HAZIR -> SÜRÜKLENİYOR -->
  <path d="M 720 170 L 854 170" class="flow-arrow dash" />
  <rect x="728" y="123" width="124" height="38" rx="7" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="790" y="141" text-anchor="middle" class="edge" style="fill:#0284c7">on_mouse_move</text>
  <text x="790" y="155" text-anchor="middle" class="edgeSub">start_window_move()</text>

  <!-- SÜRÜKLEMEYE HAZIR -> HAZIR (iptal — kırmızı) -->
  <path d="M 590 224 L 590 268 L 190 268 L 190 226" class="flow-arrow-red dash" />
  <rect x="262" y="248" width="256" height="44" rx="7" fill="#fff1f3" stroke="#fecdd3" stroke-width="1.5" />
  <text x="390" y="266" text-anchor="middle" class="edge" style="fill:#e11d48">on_mouse_up / on_mouse_down_out</text>
  <text x="390" y="282" text-anchor="middle" class="edgeSub" style="fill:#9f1239">İptal durumu — should_move = false</text>

  <!-- SÜRÜKLENİYOR -> HAZIR -->
  <path d="M 990 224 L 990 332 L 190 332 L 190 226" class="flow-arrow dash" />
  <rect x="478" y="313" width="224" height="38" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="590" y="331" text-anchor="middle" class="edge">platform sürüklemeyi tamamlar</text>
  <text x="590" y="345" text-anchor="middle" class="edgeSub">should_move = false</text>

  <!-- ================= DURUMLAR (NODES) ================= -->

  <!-- HAZIR -->
  <g class="pulse1">
    <rect x="60" y="120" width="260" height="100" rx="50" fill="url(#g-slate)" filter="url(#shadow)" />
    <text x="190" y="166" text-anchor="middle" class="stateTitle">HAZIR</text>
    <text x="190" y="191" text-anchor="middle" class="stateVal">should_move = false</text>
  </g>

  <!-- SÜRÜKLEMEYE HAZIR -->
  <g class="pulse2">
    <rect x="460" y="120" width="260" height="100" rx="50" fill="url(#g-sky)" filter="url(#shadow)" />
    <text x="590" y="166" text-anchor="middle" class="stateTitle">SÜRÜKLEMEYE HAZIR</text>
    <text x="590" y="191" text-anchor="middle" class="stateVal">should_move = true</text>
  </g>

  <!-- SÜRÜKLENİYOR -->
  <g class="pulse3">
    <rect x="860" y="120" width="260" height="100" rx="50" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="990" y="166" text-anchor="middle" class="stateTitle">SÜRÜKLENİYOR</text>
    <text x="990" y="191" text-anchor="middle" class="stateVal">platform kontrolünde</text>
  </g>

  <!-- ================= NOTLAR ================= -->
  <g transform="translate(60, 408)">
    <rect width="1040" height="104" rx="12" fill="url(#g-note)" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 1028 A 12 12 0 0 1 1040 12 V 32 H 0 Z" fill="url(#g-amber)" />
    <text x="18" y="22" class="noteTitle">Linux: 3 kritik `stop_propagation` noktası — eksik biri davranışı bozar</text>
    <text x="18" y="54" class="noteBody"><tspan font-weight="800" style="fill:#d97706">1.</tspan> LinuxWindowControls h_flex: on_mouse_down(Left), başlık çubuğu sürüklemesini buton grubunda keser.</text>
    <text x="18" y="74" class="noteBody"><tspan font-weight="800" style="fill:#d97706">2.</tspan> WindowControl: on_mouse_move, buton üzerindeki fare hareketinin sürüklemeyi tetiklemesini engeller.</text>
    <text x="18" y="94" class="noteBody"><tspan font-weight="800" style="fill:#d97706">3.</tspan> WindowControl on_click: stop_propagation(), tıklama eyleminden önce should_move = true yapılmasını engeller.</text>
  </g>

</svg>
