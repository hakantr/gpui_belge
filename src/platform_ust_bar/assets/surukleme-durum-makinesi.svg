<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <title>Başlık Çubuğu Sürükleme Durum Makinesi</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <marker id="arrowR" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#dc2626" stroke="#dc2626" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrowR" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#dc2626" />
    </marker>
    <style>
      .title { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub   { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .state { font: 700 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #fff; }
      .flag  { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .edge  { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1e293b; }
      .edgeB { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1d4ed8; }
      .edgeR { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #dc2626; }
      .body  { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .note  { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowR { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrowR); marker-start: url(#dot-arrowR); }
    </style>
  </defs>

  <rect width="900" height="500" rx="10" fill="#f8fafc" />
  <text x="450" y="34" text-anchor="middle" class="title">Başlık Çubuğu Sürükleme Durum Makinesi</text>
  <text x="450" y="56" text-anchor="middle" class="sub">should_move bayrağı sürükleme akışının merkezindedir. Tek-atışlık tetikleyici ile çalışır.</text>

  <!-- Durum kutuları -->
  <rect x="56" y="120" width="210" height="76" rx="38" fill="#334155" />
  <text x="161" y="153" text-anchor="middle" class="state">HAZIR</text>
  <text x="161" y="173" text-anchor="middle" class="flag">should_move = false</text>

  <rect x="345" y="120" width="210" height="76" rx="38" fill="#1d4ed8" />
  <text x="450" y="148" text-anchor="middle" class="state">SÜRÜKLEMEYE</text>
  <text x="450" y="166" text-anchor="middle" class="state">HAZIR</text>
  <text x="450" y="184" text-anchor="middle" class="flag">should_move = true</text>

  <rect x="634" y="120" width="210" height="76" rx="38" fill="#059669" />
  <text x="739" y="153" text-anchor="middle" class="state">SÜRÜKLENİYOR</text>
  <text x="739" y="173" text-anchor="middle" class="flag">platform kontrolünde</text>

  <!-- İleri geçişler -->
  <path d="M 274 158 L 337 158" class="arrow" />
  <rect x="258" y="84" width="96" height="34" rx="6" fill="#f8fafc" stroke="#bfdbfe" />
  <text x="306" y="98" text-anchor="middle" class="edgeB">on_mouse_down</text>
  <text x="306" y="112" text-anchor="middle" class="note">Left, drag alanı</text>

  <path d="M 563 158 L 626 158" class="arrow" />
  <rect x="543" y="78" width="104" height="40" rx="6" fill="#f8fafc" stroke="#bfdbfe" />
  <text x="595" y="93" text-anchor="middle" class="edgeB">on_mouse_move</text>
  <text x="595" y="107" text-anchor="middle" class="note">start_window_move()</text>

  <!-- Hazır bekleme durumuna dönüş -->
  <path d="M 450 204 C 408 230 214 230 161 204" class="arrowR" />
  <rect x="259" y="248" width="144" height="34" rx="6" fill="#fff7f7" stroke="#fecaca" />
  <text x="331" y="262" text-anchor="middle" class="edgeR">on_mouse_up</text>
  <text x="331" y="276" text-anchor="middle" class="edgeR">on_mouse_down_out</text>

  <!-- Platform sürükleme tamamlanınca başa dönüş -->
  <path d="M 739 204 C 739 296 628 336 578 336 L 322 336 C 250 336 161 296 161 204" class="arrow" />
  <rect x="330" y="294" width="240" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="450" y="315" text-anchor="middle" class="edge">platform sürüklemeyi tamamlar</text>

  <!-- Linux stop_propagation notları -->
  <rect x="56" y="350" width="788" height="122" rx="8" fill="#fff" stroke="#fde68a" stroke-width="1.5" />
  <path d="M 64 350 H 836 Q 844 350 844 358 V 376 H 56 V 358 Q 56 350 64 350 Z" fill="#b45309" />
  <text x="76" y="368" style="font: 700 12px system-ui; fill: #fff;">Linux: 3 stop_propagation noktası; eksik biri davranışı bozar</text>

  <text x="76" y="400" class="body"><tspan font-weight="bold">1.</tspan> LinuxWindowControls h_flex: on_mouse_down(Left), başlık çubuğu sürüklemesini buton grubunda keser.</text>
  <text x="76" y="424" class="body"><tspan font-weight="bold">2.</tspan> WindowControl: on_mouse_move, buton üzerindeki fare hareketinin sürüklemeyi tetiklemesini engeller.</text>
  <text x="76" y="448" class="body"><tspan font-weight="bold">3.</tspan> WindowControl on_click: stop_propagation(), tıklama eyleminden önce should_move = true yapılmasını engeller.</text>
</svg>
