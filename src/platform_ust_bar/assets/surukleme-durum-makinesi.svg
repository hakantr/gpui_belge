<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500">
  <title>Başlık Çubuğu Sürükleme Durum Makinesi</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.04" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#ef4444" />
    </marker>
    <style>
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .stateTitle { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
      .stateVal { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f8fafc; }
      .edge { font: 700 13px system-ui, -apple-system, sans-serif; fill: #1e293b; }
      .edgeSub { font: 500 12px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
      .flow-arrow-red { stroke: #ef4444; stroke-width: 3; fill: none; marker-end: url(#arrowRed); stroke-linejoin: round; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />
  
  <text x="580" y="46" text-anchor="middle" class="title">Başlık Çubuğu Sürükleme Durum Makinesi</text>
  <text x="580" y="74" text-anchor="middle" class="subtitle">`should_move` bayrağı sürükleme akışının merkezindedir. Tek-atışlık (one-shot) tetikleyici ile çalışır.</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <!-- HAZIR -> SÜRÜKLEMEYE HAZIR -->
  <path d="M 320 170 L 460 170" class="flow-arrow" />
  <rect x="330" y="125" width="120" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="390" y="142" text-anchor="middle" class="edge" style="fill:#0284c7">on_mouse_down</text>
  <text x="390" y="156" text-anchor="middle" class="edgeSub">Left, drag alanı</text>

  <!-- SÜRÜKLEMEYE HAZIR -> SÜRÜKLENİYOR -->
  <path d="M 720 170 L 860 170" class="flow-arrow" />
  <rect x="730" y="125" width="120" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="790" y="142" text-anchor="middle" class="edge" style="fill:#0284c7">on_mouse_move</text>
  <text x="790" y="156" text-anchor="middle" class="edgeSub">start_window_move()</text>

  <!-- SÜRÜKLEMEYE HAZIR -> HAZIR (Red Arrow) -->
  <path d="M 590 220 L 590 280 L 190 280 L 190 220" class="flow-arrow-red" />
  <rect x="300" y="262" width="180" height="36" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" />
  <text x="390" y="279" text-anchor="middle" class="edge" style="fill:#dc2626">on_mouse_up / down_out</text>
  <text x="390" y="293" text-anchor="middle" class="edgeSub">İptal durumu</text>

  <!-- SÜRÜKLENİYOR -> HAZIR -->
  <path d="M 990 220 L 990 340 L 190 340 L 190 220" class="flow-arrow" />
  <rect x="490" y="322" width="200" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="590" y="345" text-anchor="middle" class="edge">Platform Sürüklemeyi Tamamlar</text>

  <!-- ================= DURUMLAR (NODES) ================= -->

  <!-- HAZIR -->
  <rect x="60" y="120" width="260" height="100" rx="50" fill="#334155" filter="url(#shadow)" />
  <text x="190" y="165" text-anchor="middle" class="stateTitle">HAZIR</text>
  <text x="190" y="190" text-anchor="middle" class="stateVal">should_move = false</text>

  <!-- SÜRÜKLEMEYE HAZIR -->
  <rect x="460" y="120" width="260" height="100" rx="50" fill="#0284c7" filter="url(#shadow)" />
  <text x="590" y="165" text-anchor="middle" class="stateTitle">SÜRÜKLEMEYE HAZIR</text>
  <text x="590" y="190" text-anchor="middle" class="stateVal">should_move = true</text>

  <!-- SÜRÜKLENİYOR -->
  <rect x="860" y="120" width="260" height="100" rx="50" fill="#059669" filter="url(#shadow)" />
  <text x="990" y="165" text-anchor="middle" class="stateTitle">SÜRÜKLENİYOR</text>
  <text x="990" y="190" text-anchor="middle" class="stateVal">Platform kontrolünde</text>

  <!-- ================= NOTLAR ================= -->
  <g transform="translate(60, 390)">
    <rect width="1060" height="90" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 1050 A 10 10 0 0 1 1060 10 V 28 H 0 Z" fill="#d97706" />
    <text x="15" y="19" class="stateTitle" style="font-size: 14px;">Linux: 3 kritik `stop_propagation` noktası</text>
    <text x="15" y="48" class="edgeSub" style="fill:#334155"><tspan font-weight="700">1.</tspan> LinuxWindowControls h_flex: on_mouse_down(Left), başlık çubuğu sürüklemesini buton grubunda keser.</text>
    <text x="15" y="66" class="edgeSub" style="fill:#334155"><tspan font-weight="700">2.</tspan> WindowControl: on_mouse_move, buton üzerindeki fare hareketinin sürüklemeyi tetiklemesini engeller.</text>
    <text x="15" y="84" class="edgeSub" style="fill:#334155"><tspan font-weight="700">3.</tspan> WindowControl on_click: stop_propagation(), tıklama eyleminden önce should_move = true yapılmasını engeller.</text>
  </g>

</svg>
