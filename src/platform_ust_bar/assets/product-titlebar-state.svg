<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 520">
  <title>Ürün Başlık Çubuğu Durum Haritası</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" />
      <stop offset="1" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .cardTitle { font: 800 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ffffff; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .note { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .footnote { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .flow-arrow {
        stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow);
        stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 7 5;
        animation: flow 9s linear infinite;
      }
      @keyframes flow { to { stroke-dashoffset: -48; } }
      @media (prefers-reduced-motion: reduce) {
        .flow-arrow { animation: none; stroke-dasharray: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="580" y="48" text-anchor="middle" class="title">Ürün Başlık Çubuğu Durum Haritası</text>
  <text x="580" y="76" text-anchor="middle" class="subtitle">Platform kabuğu mekanik kalır; ürün başlığı alanı durumu görsele çevirir.</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <path d="M 310 220 L 332 220 L 332 168 L 350 168" class="flow-arrow" />
  <path d="M 310 220 L 332 220 L 332 358 L 350 358" class="flow-arrow" />

  <path d="M 610 168 L 650 168" class="flow-arrow" />
  <path d="M 610 358 L 650 358" class="flow-arrow" />

  <path d="M 910 358 L 932 358 L 932 268 L 950 268" class="flow-arrow" />

  <!-- ================= KARTLAR ================= -->

  <!-- Col 1: Uygulama durumu -->
  <g transform="translate(50, 152)">
    <rect width="260" height="136" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 248 A 12 12 0 0 1 260 12 V 40 H 0 Z" fill="url(#g-slate)" />
    <text x="130" y="26" text-anchor="middle" class="cardTitle">Uygulama Durumu</text>
    <text x="130" y="66" text-anchor="middle" class="body">Workspace adı</text>
    <text x="130" y="88" text-anchor="middle" class="body">Güncelleme durumu</text>
    <text x="130" y="110" text-anchor="middle" class="body">Özellik bayrakları (Flags)</text>
    <text x="130" y="128" text-anchor="middle" class="note">ürün katmanı</text>
  </g>

  <!-- Col 2: AppTitleBar -->
  <g transform="translate(350, 116)">
    <rect width="260" height="104" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 248 A 12 12 0 0 1 260 12 V 40 H 0 Z" fill="url(#g-sky)" />
    <text x="130" y="26" text-anchor="middle" class="cardTitle">AppTitleBar</text>
    <text x="130" y="66" text-anchor="middle" class="body">Menü + proje başlığı</text>
    <rect x="20" y="76" width="220" height="20" rx="5" fill="#f0f9ff" />
    <text x="130" y="90" text-anchor="middle" class="mono" style="fill:#0369a1">Çocukları üretir</text>
  </g>

  <!-- Col 2: UpdateButton -->
  <g transform="translate(350, 306)">
    <rect width="260" height="104" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 248 A 12 12 0 0 1 260 12 V 40 H 0 Z" fill="url(#g-violet)" />
    <text x="130" y="26" text-anchor="middle" class="cardTitle">UpdateButton</text>
    <text x="130" y="66" text-anchor="middle" class="body">Denetleme / İndirme statüsü</text>
    <rect x="20" y="76" width="220" height="20" rx="5" fill="#f5f3ff" />
    <text x="130" y="90" text-anchor="middle" class="mono" style="fill:#6d28d9">Duruma göre devre dışı</text>
  </g>

  <!-- Col 3: Duyuru Bandı -->
  <g transform="translate(650, 116)">
    <rect width="260" height="104" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 248 A 12 12 0 0 1 260 12 V 40 H 0 Z" fill="url(#g-green)" />
    <text x="130" y="26" text-anchor="middle" class="cardTitle">Duyuru Bandı</text>
    <text x="130" y="66" text-anchor="middle" class="body">Örn: Yeni özellik duyurusu</text>
    <rect x="20" y="76" width="220" height="20" rx="5" fill="#ecfdf5" />
    <text x="130" y="90" text-anchor="middle" class="mono" style="fill:#047857">Koşullu görünür (visible_when)</text>
  </g>

  <!-- Col 3: PlatformTitleBar -->
  <g transform="translate(650, 306)">
    <rect width="260" height="104" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 248 A 12 12 0 0 1 260 12 V 40 H 0 Z" fill="url(#g-amber)" />
    <text x="130" y="26" text-anchor="middle" class="cardTitle">PlatformTitleBar</text>
    <text x="130" y="66" text-anchor="middle" class="body">Çerçeve ve sistem butonları</text>
    <rect x="20" y="76" width="220" height="20" rx="5" fill="#fffbeb" />
    <text x="130" y="90" text-anchor="middle" class="mono" style="fill:#b45309">Sarmalayıcı (set_children alır)</text>
  </g>

  <!-- Col 4: Window -->
  <g transform="translate(950, 206)">
    <rect width="160" height="124" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 148 A 12 12 0 0 1 160 12 V 40 H 0 Z" fill="url(#g-rose)" />
    <text x="80" y="26" text-anchor="middle" class="cardTitle">Window</text>
    <text x="80" y="66" text-anchor="middle" class="body">Sürükleme</text>
    <rect x="12" y="76" width="136" height="20" rx="5" fill="#fff1f2" />
    <text x="80" y="90" text-anchor="middle" class="mono" style="fill:#be123c">Kapat/Küçült/Büyüt</text>
  </g>

  <text x="580" y="492" text-anchor="middle" class="footnote">Soldan sağa: ürün durumu önce başlık alanını besler, ardından platform çerçevesine ve pencereye akar.</text>

</svg>
