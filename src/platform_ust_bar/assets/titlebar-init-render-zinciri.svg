<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 620">
  <title>TitleBar Init → Render Zinciri</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.04" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <style>
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .phaseTitle { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
      .stepTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .body { font: 13px system-ui, -apple-system, sans-serif; fill: #475569; }
      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />
  
  <text x="580" y="46" text-anchor="middle" class="title">TitleBar Init → Render Zinciri</text>
  <text x="580" y="74" text-anchor="middle" class="subtitle">Uygulama başlangıcından her ekran karesindeki render'a kadar olan zincir.</text>

  <!-- ================= FAZ 1 ================= -->
  <g transform="translate(60, 110)">
    <rect width="1040" height="110" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 1030 A 10 10 0 0 1 1040 10 V 38 H 0 Z" fill="#334155" />
    <text x="20" y="24" class="phaseTitle">Faz 1 — Uygulama başlangıcı (title_bar::init)</text>

    <!-- Node 1 -->
    <rect x="30" y="55" width="280" height="40" rx="6" fill="#f1f5f9" />
    <text x="170" y="73" text-anchor="middle" class="stepTitle">title_bar::init(cx)</text>
    <text x="170" y="88" text-anchor="middle" class="body">giriş noktası</text>

    <path d="M 310 75 L 360 75" class="flow-arrow" />

    <!-- Node 2 -->
    <rect x="360" y="55" width="310" height="40" rx="6" fill="#f1f5f9" />
    <text x="515" y="73" text-anchor="middle" class="stepTitle">PlatformTitleBar::init(cx)</text>
    <text x="515" y="88" text-anchor="middle" class="body">platform kabuğunu hazırlar</text>

    <path d="M 670 75 L 720 75" class="flow-arrow" />

    <!-- Node 3 -->
    <rect x="720" y="55" width="290" height="40" rx="6" fill="#f1f5f9" />
    <text x="865" y="73" text-anchor="middle" class="stepTitle">cx.observe_new(Workspace)</text>
    <text x="865" y="88" text-anchor="middle" class="body">her yeni workspace için kanca</text>
  </g>

  <!-- FAZ 1 -> FAZ 2 -->
  <path d="M 580 220 L 580 250" class="flow-arrow" />

  <!-- ================= FAZ 2 ================= -->
  <g transform="translate(60, 250)">
    <rect width="1040" height="110" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 1030 A 10 10 0 0 1 1040 10 V 38 H 0 Z" fill="#7c3aed" />
    <text x="20" y="24" class="phaseTitle">Faz 2 — Workspace açılışı (per workspace)</text>

    <!-- Node 1 -->
    <rect x="30" y="55" width="280" height="40" rx="6" fill="#f5f3ff" />
    <text x="170" y="73" text-anchor="middle" class="stepTitle">TitleBar::new(...)</text>
    <text x="170" y="88" text-anchor="middle" class="body">TitleBar entity'si oluşturulur</text>

    <path d="M 310 75 L 360 75" class="flow-arrow" />

    <!-- Node 2 -->
    <rect x="360" y="55" width="310" height="40" rx="6" fill="#f5f3ff" />
    <text x="515" y="73" text-anchor="middle" class="stepTitle">workspace.set_titlebar_item()</text>
    <text x="515" y="88" text-anchor="middle" class="body">workspace kök render akışına bağlanır</text>

    <path d="M 670 75 L 720 75" class="flow-arrow" />

    <!-- Node 3 -->
    <rect x="720" y="55" width="290" height="40" rx="6" fill="#f5f3ff" />
    <text x="865" y="73" text-anchor="middle" class="stepTitle">WindowOptions ayarları</text>
    <text x="865" y="88" text-anchor="middle" class="body">titlebar, decorations, movable yapılandırması</text>
  </g>

  <!-- FAZ 2 -> FAZ 3 -->
  <path d="M 580 360 L 580 390" class="flow-arrow" />

  <!-- ================= FAZ 3 ================= -->
  <g transform="translate(60, 390)">
    <rect width="1040" height="110" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 0 10 A 10 10 0 0 1 10 0 H 1030 A 10 10 0 0 1 1040 10 V 38 H 0 Z" fill="#0284c7" />
    <text x="20" y="24" class="phaseTitle">Faz 3 — Her ekran karesi (TitleBar::render)</text>

    <!-- Node 1 -->
    <rect x="20" y="55" width="230" height="40" rx="6" fill="#f0f9ff" />
    <text x="135" y="73" text-anchor="middle" class="stepTitle">button_layout hesapla</text>
    <text x="135" y="88" text-anchor="middle" class="body">cx.button_layout()</text>

    <path d="M 250 75 L 280 75" class="flow-arrow" />

    <!-- Node 2 -->
    <rect x="280" y="55" width="260" height="40" rx="6" fill="#f0f9ff" />
    <text x="410" y="73" text-anchor="middle" class="stepTitle">set_children/set_button_layout</text>
    <text x="410" y="88" text-anchor="middle" class="body">mem::take ile tüketilir!</text>

    <path d="M 540 75 L 570 75" class="flow-arrow" />

    <!-- Node 3 -->
    <rect x="570" y="55" width="290" height="40" rx="6" fill="#f0f9ff" />
    <text x="715" y="73" text-anchor="middle" class="stepTitle">PlatformTitleBar.into_any_element</text>
    <text x="715" y="88" text-anchor="middle" class="body">kök element ağacına dahil</text>

    <path d="M 860 75 L 890 75" class="flow-arrow" />

    <!-- Node 4 -->
    <rect x="890" y="55" width="130" height="40" rx="6" fill="#f0f9ff" />
    <text x="955" y="73" text-anchor="middle" class="stepTitle">GPU render</text>
    <text x="955" y="88" text-anchor="middle" class="body">Ekrana çizim</text>
  </g>

  <!-- ================= CSD Sarmal Notu ================= -->
  <g transform="translate(60, 520)">
    <rect width="1040" height="60" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" />
    <text x="20" y="26" class="body"><tspan font-weight="700">CSD sarmalı (client_side_decorations):</tspan> PlatformTitleBar'ın çevresini sarar. Shadow, border, resize kenarı ve</text>
    <text x="20" y="46" class="body">window.set_client_inset(...) burada yönetilir. Başlık çubuğu tek başına CSD penceresi değildir; bu sarmal zorunludur.</text>
  </g>

</svg>
