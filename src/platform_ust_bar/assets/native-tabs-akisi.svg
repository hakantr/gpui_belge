  <text x="300" y="146" class="small">macOS yerel izin</text>

  <rect x="284" y="244" width="186" height="96" rx="8" class="card"/>
  <rect x="284" y="244" width="186" height="30" rx="8" fill="#7c3aed"/>
  <path d="M284 266 H470 V274 H284 Z" fill="#7c3aed"/>
