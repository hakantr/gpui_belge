  <rect x="548" y="244" width="178" height="96" rx="8" class="card"/>
  <rect x="548" y="244" width="178" height="30" rx="8" fill="#d97706"/>
  <path d="M548 266 H726 V274 H548 Z" fill="#d97706"/>
