<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500">
  <title>Yerel Sekme Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" /><stop offset="1" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" /><stop offset="1" stop-color="#f8fafc" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .cardTitle { font: 800 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ffffff; }
      .body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      .flow-arrow {
        stroke-dasharray: 10 7;
        animation: flowdash 9s linear infinite;
      }
      @keyframes flowdash {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -204; }
      }
      .pulse { animation: pulse 10s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.82; }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow-arrow { animation: none; stroke-dasharray: none; }
        .pulse { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="580" y="46" text-anchor="middle" class="title">Yerel Sekme Akışı</text>
  <text x="580" y="74" text-anchor="middle" class="subtitle">Settings, denetleyici durumu ve platform çağrısı aynı görünürlüğü belirler.</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <!-- Settings -> tabbing & Controller -->
  <path d="M 280 235 L 305 235 L 305 155 L 330 155" class="flow-arrow" />
  <path d="M 280 235 L 305 235 L 305 315 L 330 315" class="flow-arrow" />

  <!-- tabbing -> render -->
  <path d="M 560 155 L 610 155" class="flow-arrow" />

  <!-- Controller -> sürükle/bırak -->
  <path d="M 560 315 L 610 315" class="flow-arrow" />

  <!-- render & sürükle/bırak -> Platform -->
  <path d="M 840 155 L 865 155 L 865 235 L 890 235" class="flow-arrow" />
  <path d="M 840 315 L 865 315 L 865 235 L 890 235" class="flow-arrow" />

  <!-- ================= KARTLAR ================= -->

  <!-- Col 1: Settings -->
  <g transform="translate(50, 180)">
    <rect width="230" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 40 H 0 Z" fill="url(#g-slate)" />
    <text x="115" y="26" text-anchor="middle" class="cardTitle">SettingsStore</text>
    <text x="115" y="68" text-anchor="middle" class="body">use_system_window_tabs</text>
    <rect x="20" y="78" width="190" height="24" rx="6" fill="#f1f5f9" />
    <text x="115" y="94" text-anchor="middle" class="mono" style="fill:#475569">observe_global</text>
  </g>

  <!-- Col 2: tabbing_identifier -->
  <g transform="translate(330, 100)">
    <rect width="230" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 40 H 0 Z" fill="url(#g-sky)" />
    <text x="115" y="26" text-anchor="middle" class="cardTitle">tabbing_identifier</text>
    <text x="115" y="68" text-anchor="middle" class="body">Pencereye yazılır</text>
    <rect x="20" y="78" width="190" height="24" rx="6" fill="#f0f9ff" />
    <text x="115" y="94" text-anchor="middle" class="mono" style="fill:#0369a1">macOS yerel izin</text>
  </g>

  <!-- Col 2: Controller -->
  <g transform="translate(330, 260)">
    <rect width="230" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 40 H 0 Z" fill="url(#g-violet)" />
    <text x="115" y="26" text-anchor="middle" class="cardTitle">Controller</text>
    <text x="115" y="68" text-anchor="middle" class="body">Görünürlük + sekme grupları</text>
    <rect x="20" y="78" width="190" height="24" rx="6" fill="#f5f3ff" />
    <text x="115" y="94" text-anchor="middle" class="mono" style="fill:#6d28d9">WindowId haritası</text>
  </g>

  <!-- Col 3: render -->
  <g transform="translate(610, 100)">
    <rect width="230" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 40 H 0 Z" fill="url(#g-green)" />
    <text x="115" y="26" text-anchor="middle" class="cardTitle">Sekmeleri render et</text>
    <text x="115" y="68" text-anchor="middle" class="body">register_action_renderer</text>
    <rect x="20" y="78" width="190" height="24" rx="6" fill="#ecfdf5" />
    <text x="115" y="94" text-anchor="middle" class="mono" style="fill:#047857">koşullu bağlama</text>
  </g>

  <!-- Col 3: sürükle/bırak -->
  <g transform="translate(610, 260)">
    <rect width="230" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 218 A 12 12 0 0 1 230 12 V 40 H 0 Z" fill="url(#g-amber)" />
    <text x="115" y="26" text-anchor="middle" class="cardTitle">Sürükle / Bırak</text>
    <text x="115" y="68" text-anchor="middle" class="body">Çubuk içi yeniden sıralama</text>
    <rect x="20" y="78" width="190" height="24" rx="6" fill="#fffbeb" />
    <text x="115" y="94" text-anchor="middle" class="mono" style="fill:#b45309">bar dışı yeni pencere</text>
  </g>

  <!-- Col 4: Platform -->
  <g transform="translate(890, 180)" class="pulse">
    <rect width="220" height="110" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 208 A 12 12 0 0 1 220 12 V 40 H 0 Z" fill="url(#g-rose)" />
    <text x="110" y="26" text-anchor="middle" class="cardTitle">Platform</text>
    <text x="110" y="68" text-anchor="middle" class="body">NSWindow</text>
    <rect x="20" y="78" width="180" height="24" rx="6" fill="#fff1f2" />
    <text x="110" y="94" text-anchor="middle" class="mono" style="fill:#be123c">veya yedek (fallback)</text>
  </g>

</svg>
