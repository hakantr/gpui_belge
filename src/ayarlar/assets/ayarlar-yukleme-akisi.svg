<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480">
  <title>Ayarlar yükleme ve birleştirme akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <!-- Kaynak kartı degradeleri -->
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b" /><stop offset="1" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>

    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#d97706" />
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#059669" />
    </marker>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 24px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 15px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .layer-title { font: 800 15px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .layer-body { font: 600 13px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.9; text-anchor: middle; }

      .api { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .when { font: 800 13px system-ui, -apple-system, sans-serif; fill: rgba(255,255,255,0.85); letter-spacing: 0.5px; text-anchor: middle; }

      .card { filter: url(#shadow); rx: 12px; }

      .merge-line { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrowAmber); stroke-linecap: round; stroke-linejoin: round; }
      .notify-line { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrowEmerald); stroke-linecap: round; stroke-linejoin: round; }

      /* Akan kesik çizgi: yükleme/birleştirme yönünü gösterir */
      .flow { stroke-dasharray: 9 9; animation: dash 9s linear infinite; }
      @keyframes dash { 0% { stroke-dashoffset: 36; } 100% { stroke-dashoffset: 0; } }

      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; stroke-dasharray: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="500" y="46" class="title">Ayarlar (Settings) Yükleme ve Birleştirme Akışı</text>
  <text x="500" y="74" class="sub">Farklı seviyelerdeki ayarların SettingsStore üzerinde öncelik sırasıyla çözümlenmesi</text>

  <!-- ================= OKLAR (kartların altında çizilir) ================= -->
  <path d="M 300 145 C 360 145 380 245 405 245" class="merge-line flow" />
  <path d="M 300 245 H 405" class="merge-line flow" />
  <path d="M 300 345 C 360 345 380 245 405 245" class="merge-line flow" />
  <path d="M 640 245 H 725" class="notify-line flow" />

  <!-- ================= KAYNAK DOSYALAR ================= -->
  <!-- 1. Default -->
  <g transform="translate(60, 110)">
    <rect width="240" height="70" fill="url(#g-slate)" class="card" />
    <text x="120" y="32" class="layer-title">1. default.json</text>
    <text x="120" y="55" class="layer-body">Gömülü Varsayılanlar</text>
  </g>

  <!-- 2. Global / User -->
  <g transform="translate(60, 210)">
    <rect width="240" height="70" fill="url(#g-violet)" class="card" />
    <text x="120" y="32" class="layer-title">2. settings.json</text>
    <text x="120" y="55" class="layer-body">Kullanıcı (Global)</text>
  </g>

  <!-- 3. Local / Project -->
  <g transform="translate(60, 310)">
    <rect width="240" height="70" fill="url(#g-sky)" class="card" />
    <text x="120" y="32" class="layer-title">3. .zed/settings.json</text>
    <text x="120" y="55" class="layer-body">Yerel Proje Ayarları</text>
  </g>

  <!-- ================= SETTINGS STORE (MERGE) ================= -->
  <g transform="translate(420, 180)">
    <rect width="220" height="130" fill="url(#g-amber)" class="card" />
    <text x="110" y="40" class="api">SettingsStore</text>
    <text x="110" y="65" class="when">BİRLEŞTİRME (MERGE)</text>

    <rect x="20" y="80" width="180" height="30" rx="6" fill="#fcd34d" fill-opacity="0.22" />
    <text x="110" y="100" class="layer-title" style="fill:#fffbeb">Hiyerarşik Çözümleme</text>
  </g>

  <!-- ================= APP CONTEXT (DAĞITIM) ================= -->
  <g transform="translate(740, 180)">
    <rect width="200" height="130" fill="url(#g-emerald)" class="card" />
    <text x="100" y="40" class="api">AppContext</text>
    <text x="100" y="65" class="when">GLOBAL BİLDİRİM</text>

    <rect x="20" y="80" width="160" height="30" rx="6" fill="#6ee7b7" fill-opacity="0.22" />
    <text x="100" y="100" class="layer-title" style="fill:#ecfdf5">observe_global</text>
  </g>

  <!-- ================= ALT BİLGİ ================= -->
  <g transform="translate(60, 420)">
    <rect width="880" height="30" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" />
    <text x="440" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#9a3412">Hiyerarşi: Default &lt; Global (User) &lt; Local (Project) şeklinde ezilerek (override) ilerler.</text>
  </g>

</svg>
