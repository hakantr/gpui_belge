<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti ve Gölgeler -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .flow-path {
        stroke-dasharray: 6, 8;
        animation: flowDash 20s linear infinite;
      }
      .pulse-slow {
        animation: pulseSlow 3s infinite;
      }
      .node-glow {
        animation: glowPulse 4s ease-in-out infinite;
      }
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }

      @keyframes flowDash {
        to { stroke-dashoffset: -1000; }
      }
      @keyframes pulseSlow {
        0%, 100% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.02); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(80, 250, 123, 0.2)); }
        50% { filter: drop-shadow(0 0 8px rgba(80, 250, 123, 0.6)); }
      }
    </style>
  </defs>

  <!-- Arka Plan Kartı -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">Ayarlar (Settings) Yükleme ve Birleştirme Akışı</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">Farklı Seviyelerdeki Ayarların SettingsStore Üzerinde Öncelik Sırasıyla Çözümlenmesi</text>

  <!-- AYAR DOSYALARI (SOURCES - DISK) -->
  
  <!-- Default Settings -->
  <g transform="translate(60, 120)" filter="url(#shadow)">
    <rect width="200" height="60" rx="8" fill="#21222c" stroke="#6272a4" stroke-width="1.5"/>
    <text x="100" y="35" class="text-style" font-size="12" font-weight="600" text-anchor="middle">1. default.json (Varsayılan)</text>
  </g>

  <!-- Global User Settings -->
  <g transform="translate(60, 210)" filter="url(#shadow)">
    <rect width="200" height="60" rx="8" fill="#21222c" stroke="#bd93f9" stroke-width="1.5"/>
    <text x="100" y="35" class="text-style" font-size="12" font-weight="600" text-anchor="middle">2. settings.json (Global)</text>
  </g>

  <!-- Local Project Settings -->
  <g transform="translate(60, 300)" filter="url(#shadow)">
    <rect width="200" height="60" rx="8" fill="#21222c" stroke="#8be9fd" stroke-width="1.5"/>
    <text x="100" y="35" class="text-style" font-size="12" font-weight="600" text-anchor="middle">3. .zed/settings.json (Yerel)</text>
  </g>

  <!-- SETTINGS STORE (PROCESSING) -->
  <g transform="translate(360, 180)" filter="url(#shadow)">
    <g class="pulse-slow" style="transform-origin: 90px 60px;">
      <rect width="180" height="120" rx="12" fill="#21222c" stroke="#ffb86c" stroke-width="2"/>
      <text x="90" y="35" class="text-style" font-size="13" font-weight="700" text-anchor="middle">SettingsStore</text>
      <text x="90" y="55" fill="#6272a4" font-size="10" text-anchor="middle">Birleştirme (Merge)</text>
      
      <rect x="15" y="75" width="150" height="30" rx="6" fill="#ffb86c" fill-opacity="0.15"/>
      <text x="90" y="94" fill="#ffb86c" font-size="10" font-weight="600" text-anchor="middle">Hiyerarşik Çözümleme</text>
    </g>
  </g>

  <!-- APP CONTEXT & UI (DISTRIBUTION) -->
  <g transform="translate(610, 180)" filter="url(#shadow)" class="node-glow">
    <rect width="130" height="120" rx="12" fill="#21222c" stroke="#50fa7b" stroke-width="2"/>
    <text x="65" y="35" class="text-style" font-size="13" font-weight="700" text-anchor="middle">AppContext</text>
    <text x="65" y="55" fill="#6272a4" font-size="10" text-anchor="middle">Global Bildirim</text>

    <rect x="15" y="75" width="100" height="30" rx="6" fill="#50fa7b" fill-opacity="0.15"/>
    <text x="65" y="94" fill="#50fa7b" font-size="10" font-weight="600" text-anchor="middle">observe_global</text>
  </g>

  <!-- AKIŞ HATLARI (FLOW LINES) -->

  <!-- Default -> Store -->
  <path d="M 260 150 L 300 150 L 300 200 L 360 200" fill="none" stroke="#6272a4" stroke-width="1.5"/>
  <path d="M 260 150 L 300 150 L 300 200 L 360 200" fill="none" stroke="#ffb86c" stroke-dasharray="6,8" stroke-width="2.5" class="flow-path"/>
  <polygon points="360,200 350,195 350,205" fill="#ffb86c"/>

  <!-- Global -> Store -->
  <path d="M 260 240 L 360 240" fill="none" stroke="#bd93f9" stroke-width="1.5"/>
  <path d="M 260 240 L 360 240" fill="none" stroke="#ffb86c" stroke-dasharray="6,8" stroke-width="2.5" class="flow-path"/>
  <polygon points="360,240 350,235 350,245" fill="#ffb86c"/>

  <!-- Yerel -> Store -->
  <path d="M 260 330 L 300 330 L 300 260 L 360 260" fill="none" stroke="#8be9fd" stroke-width="1.5"/>
  <path d="M 260 330 L 300 330 L 300 260 L 360 260" fill="none" stroke="#ffb86c" stroke-dasharray="6,8" stroke-width="2.5" class="flow-path"/>
  <polygon points="360,260 350,255 350,265" fill="#ffb86c"/>

  <!-- Store -> AppContext -->
  <path d="M 540 240 L 610 240" fill="none" stroke="#ffb86c" stroke-width="2"/>
  <path d="M 540 240 L 610 240" fill="none" stroke="#50fa7b" stroke-dasharray="6,8" stroke-width="2.5" class="flow-path"/>
  <polygon points="610,240 600,235 600,245" fill="#50fa7b"/>

</svg>
