<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <title>SettingsStore Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" /><stop offset="1" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" /><stop offset="1" stop-color="#9333ea" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b8a6" /><stop offset="1" stop-color="#0f766e" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 15px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-path { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.82; text-anchor: middle; }
      .c-body { font: 600 13px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }

      .p-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .p-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .p-mono { font: 600 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      /* Sıralı belirme: kaynak kartları soldan sağa, akışın doğal yönünde */
      .src { animation: pop 9s ease-in-out infinite; }
      .s1 { animation-delay: 0s; }
      .s2 { animation-delay: 0.4s; }
      .s3 { animation-delay: 0.8s; }
      .s4 { animation-delay: 1.2s; }
      .s5 { animation-delay: 1.6s; }
      .s6 { animation-delay: 2.0s; }
      @keyframes pop {
        0%   { opacity: 1; }
        45%  { opacity: 1; }
        62%  { opacity: 0.72; }
        80%  { opacity: 1; }
        100% { opacity: 1; }
      }

      /* Akan merge okları */
      .merge { stroke-dasharray: 7 7; animation: flow 9s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -56; } }

      /* Aşağı inen sonuç okları, hafif nabız */
      .pulse { animation: pulse 9s ease-in-out infinite; }
      @keyframes pulse {
        0%   { opacity: 1; }
        50%  { opacity: 0.65; }
        100% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .src, .merge, .pulse { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="600" y="46" class="title">SettingsStore Akışı</text>
  <text x="600" y="74" class="sub">Kaynaklar sırayla SettingsContent üzerine merge edilir; tipli ayarlar Settings::from_settings ile üretilir.</text>

  <!-- ================= 6 ADIM KAYNAK KARTLARI ================= -->
  <!-- Genişlik: 170, Boşluk: 20 -> Toplam (6*170 + 5*20) = 1020 + 100 = 1120. Merkez=600 -> Sol=40 -->

  <!-- 1. Default -->
  <g class="src s1" transform="translate(40, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-sky)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">1. default.json</text>
    <text x="85" y="55" class="c-path">assets/settings/</text>
    <text x="85" y="70" class="c-path">default.json</text>
    <text x="85" y="95" class="c-body">Gömülü taban</text>
    <text x="85" y="112" class="c-body">değerler.</text>
  </g>

  <!-- 2. Kullanıcı -->
  <g class="src s2" transform="translate(230, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">2. Kullanıcı</text>
    <text x="85" y="55" class="c-path">~/.config/zed/</text>
    <text x="85" y="70" class="c-path">settings.json</text>
    <text x="85" y="95" class="c-body">set_user_settings</text>
    <text x="85" y="112" class="c-body">kalıcı JSON.</text>
  </g>

  <!-- 3. Sunucu -->
  <g class="src s3" transform="translate(420, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-purple)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">3. Sunucu</text>
    <text x="85" y="55" class="c-path">initial_server_</text>
    <text x="85" y="70" class="c-path">settings.json</text>
    <text x="85" y="95" class="c-body">Release channel</text>
    <text x="85" y="112" class="c-body">override.</text>
  </g>

  <!-- 4. Proje -->
  <g class="src s4" transform="translate(610, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">4. Proje</text>
    <text x="85" y="55" class="c-path">&lt;worktree&gt;/.zed/</text>
    <text x="85" y="70" class="c-path">settings.json</text>
    <text x="85" y="95" class="c-body">set_local_settings</text>
    <text x="85" y="112" class="c-body">SettingsLocation.</text>
  </g>

  <!-- 5. Dile Özel -->
  <g class="src s5" transform="translate(800, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-rose)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">5. Dile Özel</text>
    <text x="85" y="55" class="c-path">"languages"</text>
    <text x="85" y="70" class="c-path">bloğu</text>
    <text x="85" y="95" class="c-body">worktree + path</text>
    <text x="85" y="112" class="c-body">bilgisiyle seçilir.</text>
  </g>

  <!-- 6. Override -->
  <g class="src s6" transform="translate(990, 110)">
    <rect width="170" height="130" rx="12" fill="url(#g-indigo)" filter="url(#shadow)" />
    <text x="85" y="32" class="c-title">6. Override</text>
    <text x="85" y="55" class="c-path">XSettings::</text>
    <text x="85" y="70" class="c-path">override_global</text>
    <text x="85" y="95" class="c-body">Kalıcılaştırılmaz,</text>
    <text x="85" y="112" class="c-body">yalnız runtime.</text>
  </g>

  <!-- ================= MERGE OKLARI ================= -->
  <path d="M 125 240 C 125 310 590 280 590 320" class="arrow-line merge" />
  <path d="M 315 240 C 315 310 590 280 590 320" class="arrow-line merge" />
  <path d="M 505 240 C 505 310 590 280 590 320" class="arrow-line merge" />

  <path d="M 695 240 C 695 310 610 280 610 320" class="arrow-line merge" />
  <path d="M 885 240 C 885 310 610 280 610 320" class="arrow-line merge" />
  <path d="M 1075 240 C 1075 310 610 280 610 320" class="arrow-line merge" />

  <!-- ================= MERGE SONUCU ================= -->
  <g transform="translate(170, 335)">
    <rect width="860" height="110" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="430" y="32" class="p-title">SettingsContent — Merge Sonucu</text>
    <text x="24" y="60" class="p-body">• Sıra: default &lt;- user &lt;- server &lt;- local &lt;- language &lt;- override.</text>
    <text x="24" y="80" class="p-body">• Her kaynak MergeFrom ile önceki sonucu günceller.</text>
    <text x="24" y="100" class="p-body">• SettingsStore::recompute() dosya değişiminden sonra zinciri yeniden hesaplar.</text>
  </g>

  <path d="M 600 445 L 600 472" class="arrow-line pulse" />

  <!-- ================= GLOBAL STORE ================= -->
  <g transform="translate(120, 485)">
    <rect width="960" height="110" rx="12" fill="url(#g-slate)" filter="url(#shadow)" />
    <text x="480" y="32" class="p-title">SettingsStore — Global, cx.set_global</text>
    <text x="24" y="60" class="p-body">• Kayıt: #[derive(RegisterSetting)] + inventory::collect! ve Settings::register(cx).</text>
    <text x="24" y="80" class="p-body">• Her tipli ayar için Settings::from_settings(&amp;SettingsContent) çağrılır.</text>
    <text x="24" y="100" class="p-mono">• Okuma: T::get_global(cx), T::get(Some(SettingsLocation), cx), T::try_get(cx), T::try_read_global(async_cx, …).</text>
  </g>

  <path d="M 600 595 L 600 622" class="arrow-line pulse" />

  <!-- ================= UI TÜKETİM ================= -->
  <g transform="translate(120, 635)">
    <rect width="960" height="110" rx="12" fill="url(#g-teal)" filter="url(#shadow)" />
    <text x="480" y="32" class="p-title">UI Tüketim &amp; observe_global</text>
    <text x="24" y="60" class="p-body">• cx.observe_global::&lt;SettingsStore&gt;(...) her merge sonrası çalışır; cx.notify() ile yeniden çizim istenir.</text>
    <text x="24" y="80" class="p-mono">• Yazma: settings::update_settings_file(fs, cx, |content, cx| { … }) kullanıcı JSON'una kalıcı yazar.</text>
    <text x="24" y="100" class="p-body">• from_settings panik ediyorsa varsayılan JSON'da alan eksiktir.</text>
  </g>

  <text x="600" y="778" class="note">Aynı kalıp tema için de işler: ThemeRegistry, ThemeFamily, refine_theme_family ve theme_settings::reload_theme(cx).</text>

</svg>
