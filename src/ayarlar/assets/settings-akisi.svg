<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820">
  <title>SettingsStore Akışı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .monoSmall { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .arrowSoft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .mergeBranch { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrowStart { fill: #334155; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">SettingsStore Akışı</text>
  <text x="580" y="62" text-anchor="middle" class="subtitle">Kaynaklar sırayla SettingsContent üzerine merge edilir; tipli ayarlar Settings::from_settings ile üretilir.</text>

  <g>
    <rect x="50" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="50" y="94" width="166" height="30" rx="8" fill="#0284c7" />
    <path d="M 50 116 H 216 V 124 H 50 Z" fill="#0284c7" />
    <text x="64" y="114" class="cardTitle">1. default.json</text>
    <text x="64" y="146" class="monoSmall">assets/settings/</text>
    <text x="64" y="162" class="monoSmall">default.json</text>
    <text x="64" y="180" class="body">Gömülü taban</text>
    <text x="64" y="196" class="body">değerler.</text>
  </g>

  <g>
    <rect x="230" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="230" y="94" width="166" height="30" rx="8" fill="#059669" />
    <path d="M 230 116 H 396 V 124 H 230 Z" fill="#059669" />
    <text x="244" y="114" class="cardTitle">2. Kullanıcı</text>
    <text x="244" y="146" class="monoSmall">~/.config/zed/</text>
    <text x="244" y="162" class="monoSmall">settings.json</text>
    <text x="244" y="180" class="body">set_user_settings</text>
    <text x="244" y="196" class="body">kalıcı JSON.</text>
  </g>

  <g>
    <rect x="410" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="410" y="94" width="166" height="30" rx="8" fill="#7c3aed" />
    <path d="M 410 116 H 576 V 124 H 410 Z" fill="#7c3aed" />
    <text x="424" y="114" class="cardTitle">3. Sunucu</text>
    <text x="424" y="146" class="monoSmall">initial_server_</text>
    <text x="424" y="162" class="monoSmall">settings.json</text>
    <text x="424" y="180" class="body">Release channel</text>
    <text x="424" y="196" class="body">override.</text>
  </g>

  <g>
    <rect x="590" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="590" y="94" width="166" height="30" rx="8" fill="#d97706" />
    <path d="M 590 116 H 756 V 124 H 590 Z" fill="#d97706" />
    <text x="604" y="114" class="cardTitle">4. Proje</text>
    <text x="604" y="146" class="monoSmall">&lt;worktree&gt;/.zed/</text>
    <text x="604" y="162" class="monoSmall">settings.json</text>
    <text x="604" y="180" class="body">set_local_settings</text>
    <text x="604" y="196" class="body">SettingsLocation.</text>
  </g>

  <g>
    <rect x="770" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="770" y="94" width="166" height="30" rx="8" fill="#be123c" />
    <path d="M 770 116 H 936 V 124 H 770 Z" fill="#be123c" />
    <text x="784" y="114" class="cardTitle">5. Dile özel</text>
    <text x="784" y="146" class="monoSmall">"languages"</text>
    <text x="784" y="162" class="monoSmall">bloğu</text>
    <text x="784" y="180" class="body">worktree + path</text>
    <text x="784" y="196" class="body">bilgisiyle seçilir.</text>
  </g>

  <g>
    <rect x="950" y="94" width="166" height="112" rx="8" class="card" />
    <rect x="950" y="94" width="166" height="30" rx="8" fill="#be123c" />
    <path d="M 950 116 H 1116 V 124 H 950 Z" fill="#be123c" />
    <text x="964" y="114" class="cardTitle">6. Override</text>
    <text x="964" y="146" class="monoSmall">XSettings::</text>
    <text x="964" y="162" class="monoSmall">override_global</text>
    <text x="964" y="180" class="body">Kalıcılaştırılmaz,</text>
    <text x="964" y="196" class="body">yalnız runtime.</text>
  </g>

  <path d="M 133 206 C 300 216 580 246 580 292" class="mergeBranch" />
  <path d="M 313 206 C 440 224 580 250 580 292" class="mergeBranch" />
  <path d="M 493 206 C 550 232 580 258 580 292" class="mergeBranch" />
  <path d="M 673 206 C 610 232 580 258 580 292" class="mergeBranch" />
  <path d="M 853 206 C 720 224 580 250 580 292" class="mergeBranch" />
  <path d="M 1033 206 C 860 216 580 246 580 292" class="mergeBranch" />
  <circle cx="133" cy="206" r="3.5" class="arrowStart" />
  <circle cx="313" cy="206" r="3.5" class="arrowStart" />
  <circle cx="493" cy="206" r="3.5" class="arrowStart" />
  <circle cx="673" cy="206" r="3.5" class="arrowStart" />
  <circle cx="853" cy="206" r="3.5" class="arrowStart" />
  <circle cx="1033" cy="206" r="3.5" class="arrowStart" />

  <rect x="200" y="300" width="760" height="112" rx="8" class="card" />
  <rect x="200" y="300" width="760" height="30" rx="8" fill="#d97706" />
  <path d="M 200 322 H 960 V 330 H 200 Z" fill="#d97706" />
  <text x="214" y="320" class="cardTitle">SettingsContent - merge sonucu</text>
  <text x="214" y="352" class="body">Sıra: default &lt;- user &lt;- server &lt;- local &lt;- language &lt;- override.</text>
  <text x="214" y="370" class="body">Her kaynak MergeFrom ile önceki sonucu günceller.</text>
  <text x="214" y="388" class="body">SettingsStore::recompute() dosya değişiminden sonra zinciri yeniden hesaplar.</text>

  <path d="M 580 412 L 580 502" class="arrowSoft" />
  <circle cx="580" cy="412" r="3.5" class="arrowStart" />

  <rect x="60" y="510" width="1040" height="118" rx="8" class="card" />
  <rect x="60" y="510" width="1040" height="30" rx="8" fill="#334155" />
  <path d="M 60 532 H 1100 V 540 H 60 Z" fill="#334155" />
  <text x="74" y="530" class="cardTitle">SettingsStore - global, cx.set_global</text>
  <text x="74" y="562" class="body">Kayıt: #[derive(RegisterSetting)] + inventory::collect! ve Settings::register(cx).</text>
  <text x="74" y="580" class="body">Her tipli ayar için Settings::from_settings(&amp;SettingsContent) çağrılır.</text>
  <text x="74" y="598" class="body">Okuma: T::get_global(cx), T::get(Some(SettingsLocation), cx), T::try_get(cx), T::try_read_global(async_cx, ...).</text>

  <path d="M 580 628 L 580 666" class="arrowSoft" />
  <circle cx="580" cy="628" r="3.5" class="arrowStart" />

  <rect x="60" y="674" width="1040" height="92" rx="8" class="card" />
  <rect x="60" y="674" width="1040" height="30" rx="8" fill="#0f766e" />
  <path d="M 60 696 H 1100 V 704 H 60 Z" fill="#0f766e" />
  <text x="74" y="694" class="cardTitle">UI tüketim</text>
  <text x="74" y="726" class="body">cx.observe_global::&lt;SettingsStore&gt;(...) her merge sonrasında çalışır; cx.notify() ile yeniden çizim istenir.</text>
  <text x="74" y="744" class="body">Yazma: settings::update_settings_file(fs, cx, |content, cx| { ... }) kullanıcı JSON'una kalıcı yazar.</text>
  <text x="74" y="762" class="body">from_settings panic ediyorsa varsayılan JSON'da alan eksiktir.</text>

  <text x="580" y="798" text-anchor="middle" class="small">Aynı kalıp tema için de işler: ThemeRegistry, ThemeFamily, refine_theme_family ve theme_settings::reload_theme(cx).</text>
</svg>
