<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 768">
  <title>Liste API Seçim Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-sig { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; }

      .qText { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }

      .tagYes { font: 800 14px system-ui, -apple-system, sans-serif; fill: #10b981; text-anchor: middle; }
      .tagNo { font: 800 14px system-ui, -apple-system, sans-serif; fill: #e11d48; text-anchor: middle; }

      .card { filter: url(#shadow); }
      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }

      @keyframes pulseNode {
        0%   { opacity: 1; }
        50%  { opacity: 0.82; }
        100% { opacity: 1; }
      }
      @keyframes riseCard {
        0%   { opacity: 1; }
        45%  { opacity: 0.72; }
        100% { opacity: 1; }
      }
      .anim-node { animation: pulseNode 9s ease-in-out infinite; }
      .anim-c1 { animation: riseCard 9s ease-in-out infinite; }
      .anim-c2 { animation: riseCard 9s ease-in-out infinite 0.6s; }
      .anim-c3 { animation: riseCard 9s ease-in-out infinite 1.2s; }

      @media (prefers-reduced-motion: reduce) {
        .anim-node, .anim-c1, .anim-c2, .anim-c3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">Liste API Seçim Akışı</text>
  <text x="550" y="74" class="sub">GPUI çekirdek liste API'leri ile Zed UI liste bileşeni arasındaki karar noktaları.</text>

  <!-- ================= SORU DÜĞÜMLERİ ================= -->

  <!-- Kök soru -->
  <g transform="translate(340, 110)" class="anim-node">
    <rect width="420" height="70" rx="35" fill="url(#g-node)" stroke="#38bdf8" stroke-width="3" class="card" />
    <text x="210" y="40" class="qText">Büyük liste veya sanallaştırma gerekli mi?</text>
  </g>

  <!-- 2. soru -->
  <g transform="translate(590, 280)" class="anim-node">
    <rect width="340" height="70" rx="35" fill="url(#g-node)" stroke="#38bdf8" stroke-width="3" class="card" />
    <text x="170" y="40" class="qText">Satır yükseklikleri sabit mi?</text>
  </g>

  <!-- ================= SONUÇ KARTLARI ================= -->

  <!-- 1. ui::List -->
  <g transform="translate(60, 490)" class="anim-c1">
    <rect width="300" height="170" rx="12" fill="url(#g-sky)" class="card" />
    <text x="150" y="40" class="c-title">ui::List</text>
    <text x="22" y="76" class="c-body">• Küçük veya statik listeler.</text>
    <text x="22" y="101" class="c-body">• Header, empty state ve hazır</text>
    <text x="22" y="123" class="c-body">  ListItem içerir.</text>
    <rect x="16" y="138" width="268" height="22" rx="6" fill="#ffffff" fill-opacity="0.16" />
    <text x="28" y="154" class="c-sig">ui::List / ListItem</text>
  </g>

  <!-- 2. list() -->
  <g transform="translate(400, 490)" class="anim-c2">
    <rect width="300" height="170" rx="12" fill="url(#g-violet)" class="card" />
    <text x="150" y="40" class="c-title">list()</text>
    <text x="22" y="76" class="c-body">• Değişken satır yüksekliği.</text>
    <text x="22" y="101" class="c-body">• ListState ile dinamik ölçüm</text>
    <text x="22" y="123" class="c-body">  önbelleği tutar.</text>
    <rect x="16" y="138" width="268" height="22" rx="6" fill="#ffffff" fill-opacity="0.16" />
    <text x="28" y="154" class="c-sig">list(durum, render_fn)</text>
  </g>

  <!-- 3. uniform_list() -->
  <g transform="translate(740, 490)" class="anim-c3">
    <rect width="300" height="252" rx="12" fill="url(#g-green)" class="card" />
    <text x="150" y="40" class="c-title">uniform_list()</text>
    <text x="22" y="74" class="c-body">• Sabit satır yüksekliği (çok hızlı).</text>
    <text x="22" y="97" class="c-body">• Yalnız tek örnek satır ölçülür.</text>
    <text x="22" y="120" class="c-body">• Değişmez başarım sunar.</text>
    <text x="22" y="143" class="c-body">• Onbinlerce sabit satır.</text>
    <text x="22" y="166" class="c-body">• Yalnız görünür aralık çizilir.</text>
    <rect x="16" y="182" width="268" height="22" rx="6" fill="#ffffff" fill-opacity="0.16" />
    <text x="28" y="198" class="c-sig">uniform_list(id, n, fn)</text>
    <rect x="16" y="210" width="268" height="22" rx="6" fill="#ffffff" fill-opacity="0.16" />
    <text x="28" y="226" class="c-sig">UniformListScrollHandle</text>
  </g>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <!-- Kök -> ui::List (Hayır) -->
  <path d="M 550 180 V 230 H 210 V 480" class="flow-arrow" />
  <rect x="358" y="215" width="54" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="385" y="235" class="tagNo">Hayır</text>

  <!-- Kök -> 2. soru (Evet) -->
  <path d="M 550 180 V 230 H 760 V 270" class="flow-arrow" />
  <rect x="633" y="215" width="54" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="660" y="235" class="tagYes">Evet</text>

  <!-- 2. soru -> list() (Hayır) -->
  <path d="M 760 350 V 400 H 550 V 480" class="flow-arrow" />
  <rect x="633" y="385" width="54" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="660" y="405" class="tagNo">Hayır</text>

  <!-- 2. soru -> uniform_list() (Evet) -->
  <path d="M 760 350 V 400 H 890 V 480" class="flow-arrow" />
  <rect x="798" y="385" width="54" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="825" y="405" class="tagYes">Evet</text>

</svg>
