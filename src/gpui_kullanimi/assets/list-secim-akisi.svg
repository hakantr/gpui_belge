<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <title>GPUI Liste API Seçim Akışı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .question { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .apiTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .tagYes { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #047857; }
      .tagNo { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #b91c1c; }
      .card { fill: #fff; stroke-width: 1.5; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>

  <rect width="900" height="520" rx="10" fill="#f8fafc" />
  <text x="450" y="34" text-anchor="middle" class="title">Liste API Seçim Akışı</text>
  <text x="450" y="56" text-anchor="middle" class="subtitle">GPUI çekirdek liste API'leri ile Zed UI liste bileşeni arasındaki karar noktaları.</text>

  <!-- Karar 1 -->
  <rect x="300" y="86" width="300" height="76" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.8" />
  <text x="450" y="114" text-anchor="middle" class="question">Büyük liste veya</text>
  <text x="450" y="134" text-anchor="middle" class="question">sanallaştırma gerekli mi?</text>

  <!-- Karar 2 -->
  <rect x="318" y="218" width="264" height="72" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.8" />
  <text x="450" y="246" text-anchor="middle" class="question">Satır yükseklikleri</text>
  <text x="450" y="266" text-anchor="middle" class="question">sabit mi?</text>

  <!-- Sonuç kartları -->
  <rect x="48" y="218" width="230" height="132" rx="9" class="card" stroke="#0f766e" />
  <path d="M 57 218 H 269 Q 278 218 278 227 V 249 H 48 V 227 Q 48 218 57 218 Z" fill="#0f766e" />
  <text x="163" y="238" text-anchor="middle" class="apiTitle">ui::List</text>
  <text x="68" y="274" class="body">Küçük veya statik listeler.</text>
  <text x="68" y="294" class="body">Header, empty state ve</text>
  <text x="68" y="314" class="body">ListItem hazır gelir.</text>
  <text x="68" y="336" class="mono">ui::List / ListItem</text>

  <rect x="622" y="218" width="230" height="132" rx="9" class="card" stroke="#334155" />
  <path d="M 631 218 H 843 Q 852 218 852 227 V 249 H 622 V 227 Q 622 218 631 218 Z" fill="#334155" />
  <text x="737" y="238" text-anchor="middle" class="apiTitle">uniform_list()</text>
  <text x="642" y="274" class="body">Onbinlerce sabit satır.</text>
  <text x="642" y="294" class="body">Yalnız görünür aralık</text>
  <text x="642" y="314" class="body">çizilir.</text>
  <text x="642" y="336" class="mono">UniformListScrollHandle</text>

  <rect x="190" y="372" width="230" height="112" rx="9" class="card" stroke="#7c3aed" />
  <path d="M 199 372 H 411 Q 420 372 420 381 V 403 H 190 V 381 Q 190 372 199 372 Z" fill="#7c3aed" />
  <text x="305" y="392" text-anchor="middle" class="apiTitle">list()</text>
  <text x="210" y="426" class="body">Değişken yükseklik.</text>
  <text x="210" y="446" class="body">ListState ölçüm önbelleği.</text>
  <text x="210" y="468" class="mono">list(durum, render_fn)</text>

  <rect x="480" y="372" width="230" height="112" rx="9" class="card" stroke="#059669" />
  <path d="M 489 372 H 701 Q 710 372 710 381 V 403 H 480 V 381 Q 480 372 489 372 Z" fill="#059669" />
  <text x="595" y="392" text-anchor="middle" class="apiTitle">uniform_list()</text>
  <text x="500" y="426" class="body">Sabit yükseklik, hızlı.</text>
  <text x="500" y="446" class="body">Yalnız örnek item ölçülür.</text>
  <text x="500" y="468" class="mono">uniform_list(id, n, fn)</text>

  <!-- Oklar ve karar etiketleri -->
  <path d="M 292 124 C 244 126 180 164 165 210" class="arrow" />
  <text x="232" y="136" text-anchor="middle" class="tagNo">Hayır</text>

  <path d="M 608 124 C 656 126 720 164 735 210" class="arrow" />
  <text x="668" y="136" text-anchor="middle" class="tagYes">Evet</text>

  <path d="M 450 170 L 450 210" class="arrow" />
  <text x="474" y="194" class="tagYes">Evet</text>

  <path d="M 405 298 C 368 328 330 338 307 364" class="arrow" />
  <text x="356" y="326" text-anchor="middle" class="tagNo">Hayır</text>

  <path d="M 495 298 C 532 328 570 338 593 364" class="arrow" />
  <text x="544" y="326" text-anchor="middle" class="tagYes">Evet</text>
</svg>
