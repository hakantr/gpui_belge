<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 800">
  <title>Test Zamanlayıcı Timeline</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f7ff" /><stop offset="1" stop-color="#e8ecff" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5f6" /><stop offset="1" stop-color="#ffe6e9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 17px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 13.5px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.97; text-anchor: middle; }
      .c-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.95; text-anchor: middle; }

      .card { filter: url(#shadow); }
      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .timeline-line { stroke: #cbd5e1; stroke-width: 4; stroke-linecap: round; }
      .timeline-node { stroke: #ffffff; stroke-width: 3; }

      .label-title { font: 800 16px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }

      .panel-title { font: 800 18px system-ui, -apple-system, sans-serif; }
      .panel-body { font: 500 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .panel-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #1e293b; }

      .stage { animation: stageGlow 10s ease-in-out infinite; }
      .stage-2 { animation-delay: 0.7s; }
      .stage-3 { animation-delay: 1.4s; }
      .stage-4 { animation-delay: 2.1s; }
      .node-pulse { animation: nodePulse 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .node-2 { animation-delay: 0.7s; }
      .node-3 { animation-delay: 1.4s; }
      .node-4 { animation-delay: 2.1s; }
      .flow { stroke-dasharray: 8 7; animation: flowDash 9s linear infinite; }

      @keyframes stageGlow {
        0%   { opacity: 1; }
        8%   { opacity: 0.78; }
        20%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes nodePulse {
        0%   { transform: scale(1); }
        7%   { transform: scale(1.45); }
        18%  { transform: scale(1); }
        100% { transform: scale(1); }
      }
      @keyframes flowDash {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
      @media (prefers-reduced-motion: reduce) {
        .stage, .node-pulse, .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="590" y="46" class="title">Test Zamanlayıcı Timeline</text>
  <text x="590" y="74" class="sub">TestDispatcher hazır task'leri ve sahte zamanı ayrı ayrı ilerletir.</text>

  <!-- ================= KAVISLI BİLGİ OKU (akış) ================= -->
  <path class="flow" d="M 160 168 C 280 110 560 110 680 168" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
  <text x="420" y="120" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#64748b" text-anchor="middle">timer hazır olana kadar task park eder</text>

  <!-- ================= TIMELINE ÇİZGİSİ VE NODELAR ================= -->
  <line x1="90" y1="210" x2="1090" y2="210" class="timeline-line" />

  <text x="160" y="195" class="label-title">t0</text>
  <circle cx="160" cy="210" r="10" fill="#0284c7" class="timeline-node node-pulse" />

  <text x="420" y="195" class="label-title">t+1s</text>
  <circle cx="420" cy="210" r="10" fill="#7c3aed" class="timeline-node node-pulse node-2" />

  <text x="680" y="195" class="label-title">park</text>
  <circle cx="680" cy="210" r="10" fill="#d97706" class="timeline-node node-pulse node-3" />

  <text x="940" y="195" class="label-title">assert</text>
  <circle cx="940" cy="210" r="10" fill="#059669" class="timeline-node node-pulse node-4" />

  <!-- ================= AŞAMALAR ================= -->

  <path d="M 160 280 V 232" class="arrow-line" />
  <g class="stage" transform="translate(35, 280)">
    <rect width="250" height="160" rx="12" fill="url(#g-sky)" class="card" />
    <text x="125" y="36" class="c-title">1. Task spawn</text>
    <text x="125" y="72" class="c-mono">cx.background_spawn(...)</text>
    <text x="125" y="104" class="c-body">Task timer beklemeye geçer.</text>
    <text x="125" y="136" class="c-mono">timer(1s).await</text>
  </g>

  <path d="M 420 280 V 232" class="arrow-line" />
  <g class="stage stage-2" transform="translate(295, 280)">
    <rect width="250" height="160" rx="12" fill="url(#g-purple)" class="card" />
    <text x="125" y="36" class="c-title">2. advance_clock</text>
    <text x="125" y="72" class="c-mono">advance_clock(1s)</text>
    <text x="125" y="104" class="c-body">Sahte saat ilerler.</text>
    <text x="125" y="136" class="c-body">Timer hazır hale gelir.</text>
  </g>

  <path d="M 680 280 V 232" class="arrow-line" />
  <g class="stage stage-3" transform="translate(555, 280)">
    <rect width="250" height="160" rx="12" fill="url(#g-amber)" class="card" />
    <text x="125" y="36" class="c-title">3. run_until_parked</text>
    <text x="125" y="72" class="c-mono">cx.run_until_parked()</text>
    <text x="125" y="104" class="c-body">Hazır task'ler sürülür.</text>
    <text x="125" y="136" class="c-body">Saat kendiliğinden ilerlemez.</text>
  </g>

  <path d="M 940 280 V 232" class="arrow-line" />
  <g class="stage stage-4" transform="translate(815, 280)">
    <rect width="250" height="160" rx="12" fill="url(#g-green)" class="card" />
    <text x="125" y="36" class="c-title">4. Sonuç</text>
    <text x="125" y="72" class="c-body">State değişmişse assert edilir.</text>
    <text x="125" y="104" class="c-body">Gerekirse cx.notify sonrası</text>
    <text x="125" y="136" class="c-body">render beklenir.</text>
  </g>

  <!-- ================= BİLGİ PANELLERİ ================= -->

  <g transform="translate(55, 510)">
    <rect width="510" height="160" rx="12" fill="url(#g-indigo)" stroke="#6366f1" stroke-width="1.5" class="card" />
    <text x="32" y="44" class="panel-title" style="fill:#4f46e5">İki ayrı kaldıraç</text>
    <text x="32" y="82" class="panel-body"><tspan class="panel-mono">advance_clock</tspan> yalnızca test saatini ileri alır.</text>
    <text x="32" y="114" class="panel-body"><tspan class="panel-mono">run_until_parked</tspan> hazır işleri sürer ama</text>
    <text x="32" y="136" class="panel-body">zamanı ilerletmez.</text>
  </g>

  <g transform="translate(615, 510)">
    <rect width="510" height="160" rx="12" fill="url(#g-rose)" stroke="#e11d48" stroke-width="1.5" class="card" />
    <text x="32" y="44" class="panel-title" style="fill:#e11d48">Kaçınılacak kullanım</text>
    <text x="32" y="82" class="panel-body"><tspan class="panel-mono">smol::Timer::after</tspan> test dispatcher saatini bilmez.</text>
    <text x="32" y="114" class="panel-body">Deterministik test için</text>
    <text x="32" y="136" class="panel-body"><tspan class="panel-mono">background_executor.timer(d)</tspan> kullanmak gerekir.</text>
  </g>

  <!-- alt not -->
  <text x="590" y="710" class="sub" style="font-weight:600">Timer bekleyen task için çoğu zaman ikisi beraber gerekir.</text>

</svg>
