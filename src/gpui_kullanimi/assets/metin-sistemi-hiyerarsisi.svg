<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820">
  <title>Metin Sistemi Bileşen Hiyerarşisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <!-- Kart degradeleri: aynı tonun açık → koyu hali -->
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" /><stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" /><stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-mono { font: 700 13.5px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; text-anchor: middle; }

      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      /* Sıralı belirme — katmanlar alttan yukarıya akar; ilk kare tam opaklıkta */
      .layer { animation: layerPulse 10s ease-in-out infinite; }
      .l1 { animation-delay: 0s; }
      .l2 { animation-delay: 0.6s; }
      .l3 { animation-delay: 1.2s; }
      .l4 { animation-delay: 1.8s; }
      .l5 { animation-delay: 2.4s; }
      @keyframes layerPulse {
        0%   { opacity: 1; }
        45%  { opacity: 0.82; }
        100% { opacity: 1; }
      }
      .flowdash { stroke-dasharray: 7 6; animation: dashmove 9s linear infinite; }
      @keyframes dashmove { to { stroke-dashoffset: -52; } }
      @media (prefers-reduced-motion: reduce) {
        .layer, .flowdash { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">Metin Sistemi Bileşen Hiyerarşisi</text>
  <text x="550" y="74" class="sub">Katmanlar aşağıdan yukarıya — her katman alttakini kullanır.</text>

  <!-- ================= BAĞLANTILAR (kartların altında çizilir) ================= -->
  <path d="M 290 200 V 244" class="flow-arrow flowdash" />
  <path d="M 810 200 V 244" class="flow-arrow flowdash" />
  <path d="M 290 364 V 408" class="flow-arrow flowdash" />
  <path d="M 810 364 V 408" class="flow-arrow flowdash" />
  <path d="M 325 524 V 568" class="flow-arrow flowdash" />
  <path d="M 592 630 H 636" class="flow-arrow flowdash" />

  <!-- ================= 1. KART (FONT TİPLERİ) ================= -->
  <g class="layer l1" transform="translate(60, 110)">
    <rect width="980" height="90" rx="12" fill="url(#g-slate)" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 968 A 12 12 0 0 1 980 12 V 35 H 0 Z" fill="#334155" />
    <text x="490" y="24" class="c-title" style="fill:#38bdf8">Font Tipleri (Sistem Özellikleri)</text>

    <text x="100" y="65" class="c-mono">Font</text>
    <text x="295" y="65" class="c-mono">FontWeight</text>
    <text x="490" y="65" class="c-mono">FontStyle</text>
    <text x="685" y="65" class="c-mono">FontFeatures</text>
    <text x="880" y="65" class="c-mono">FontFallbacks</text>
  </g>

  <!-- ================= 2. KART (TEXTSTYLE) ================= -->
  <g class="layer l2" transform="translate(60, 254)">
    <rect width="460" height="110" rx="12" fill="url(#g-blue)" filter="url(#shadow)" />
    <text x="230" y="35" class="c-title">TextStyle</text>
    <text x="22" y="65" class="c-body" style="text-anchor:start">• Taban görünüm: renk, font ailesi, boyut,</text>
    <text x="22" y="90" class="c-body" style="text-anchor:start">• satır yüksekliği, kalınlık, dekorasyon vb.</text>
  </g>

  <!-- ================= 3. KART (HIGHLIGHTSTYLE) ================= -->
  <g class="layer l2" transform="translate(580, 254)">
    <rect width="460" height="110" rx="12" fill="url(#g-violet)" filter="url(#shadow)" />
    <text x="230" y="35" class="c-title">HighlightStyle</text>
    <text x="22" y="65" class="c-body" style="text-anchor:start">• Kısmi ezme — belirli bir karakter</text>
    <text x="22" y="90" class="c-body" style="text-anchor:start">• aralığında taban stilin üstüne biner.</text>
  </g>

  <!-- ================= 4. KART (TEXTRUN) ================= -->
  <g class="layer l3" transform="translate(60, 418)">
    <rect width="980" height="110" rx="12" fill="url(#g-sky)" filter="url(#shadow)" />
    <text x="490" y="35" class="c-title">TextRun</text>
    <text x="22" y="65" class="c-body" style="text-anchor:start">• UTF-8 byte uzunluğu + Font + renk/dekorasyon bilgisi taşır.</text>
    <text x="22" y="90" class="c-body" style="text-anchor:start">• Aynı stilce ardışık karakterler tek bir run oluşturur; tüm run'ların uzunluk toplamı metnin byte uzunluğuyla eşleşmelidir.</text>
  </g>

  <!-- ================= 5. KART (STYLEDTEXT) ================= -->
  <g class="layer l4" transform="translate(60, 578)">
    <rect width="530" height="110" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="265" y="35" class="c-title">StyledText</text>
    <text x="22" y="65" class="c-body" style="text-anchor:start">• Çizime hazır, tüm font/stil bilgisi işlenmiş metin.</text>
    <text x="265" y="92" class="c-mono" style="opacity:0.92">SharedString + Vec&lt;TextRun&gt; + HighlightStyle</text>
  </g>

  <!-- ================= 6. KART (INTERACTIVETEXT) ================= -->
  <g class="layer l5" transform="translate(640, 578)">
    <rect width="400" height="110" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="200" y="35" class="c-title">InteractiveText</text>
    <text x="22" y="65" class="c-body" style="text-anchor:start">• Metin üzerinde hover, tıklama ve ipucu sağlar.</text>
    <text x="200" y="92" class="c-mono" style="opacity:0.92">StyledText + fare olayı kancaları</text>
  </g>

</svg>
