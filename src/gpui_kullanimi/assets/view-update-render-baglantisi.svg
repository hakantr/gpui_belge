<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <title>View Update ve Render Bağlantısı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" /><stop offset="1" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-indigo-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff" /><stop offset="1" stop-color="#e0e7ff" />
    </linearGradient>
    <linearGradient id="g-amber-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbeb" /><stop offset="1" stop-color="#fef3c7" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.9; }

      .p-title { font: 800 18px system-ui, -apple-system, sans-serif; }
      .p-body { font: 500 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .p-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; }

      .card { filter: url(#shadow); }
      .arrow-soft { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-dash { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; stroke-linecap: round; stroke-linejoin: round; }

      /* Sıralı akış vurgusu: her adım kutusu sırayla hafifçe öne çıkar */
      .step { transform-box: fill-box; transform-origin: center; }
      .s1 { animation: pulse 11s ease-in-out infinite; animation-delay: 0s; }
      .s2 { animation: pulse 11s ease-in-out infinite; animation-delay: 1.6s; }
      .s3 { animation: pulse 11s ease-in-out infinite; animation-delay: 3.2s; }
      .s4 { animation: pulse 11s ease-in-out infinite; animation-delay: 4.8s; }
      .s5 { animation: pulse 11s ease-in-out infinite; animation-delay: 6.4s; }
      .s6 { animation: pulse 11s ease-in-out infinite; animation-delay: 8.0s; }
      @keyframes pulse {
        0%   { opacity: 1;    transform: scale(1); }
        4%   { opacity: 1;    transform: scale(1.018); }
        9%   { opacity: 1;    transform: scale(1); }
        100% { opacity: 0.92; transform: scale(1); }
      }
      .flow { stroke-dasharray: 7 7; animation: dash 11s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -140; } }
      @media (prefers-reduced-motion: reduce) {
        .step, .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">View Update ve Render Bağlantısı</text>
  <text x="550" y="74" class="sub">State güncellemesi görünür hale gelmek için notify üzerinden render kuyruğuna bağlanır.</text>

  <!-- ================= ÜST SIRA (GİRDİ -> UPDATE -> NOTIFY) ================= -->

  <g class="step s1" transform="translate(60, 120)">
    <rect width="280" height="130" rx="12" fill="url(#g-sky)" class="card" />
    <text x="140" y="35" class="c-title">1. Girdi / Olay</text>
    <text x="20" y="70" class="c-body">• Action, mouse, keyboard, timer.</text>
    <text x="20" y="95" class="c-body">• Listener veya async callback çalışır.</text>
    <text x="20" y="118" class="c-mono">• cx.listener(...)</text>
  </g>

  <path d="M 340 185 H 390" class="arrow-soft flow" />

  <g class="step s2" transform="translate(400, 120)">
    <rect width="300" height="130" rx="12" fill="url(#g-violet)" class="card" />
    <text x="150" y="35" class="c-title">2. State Update</text>
    <text x="20" y="70" class="c-body">• Entity verisi güncellenir.</text>
    <text x="20" y="95" class="c-mono">• entity.update(cx, |v, cx| ...)</text>
    <text x="20" y="118" class="c-body">• İç state artık değişmiştir.</text>
  </g>

  <path d="M 700 185 H 750" class="arrow-soft flow" />

  <g class="step s3" transform="translate(760, 120)">
    <rect width="280" height="130" rx="12" fill="url(#g-green)" class="card" />
    <text x="140" y="35" class="c-title">3. cx.notify()</text>
    <text x="20" y="70" class="c-body">• Entity dirty olarak işaretlenir.</text>
    <text x="20" y="95" class="c-body">• İlgili window refresh ister.</text>
    <text x="20" y="118" class="c-body">• Aynı frame'de birleşebilir.</text>
  </g>

  <!-- ================= DÖNÜŞ (AŞAĞI) ================= -->
  <path d="M 900 250 V 300" class="arrow-soft flow" />

  <!-- ================= ALT SIRA (RENDER -> LAYOUT -> ETKİLEŞİM) ================= -->

  <g class="step s4" transform="translate(760, 310)">
    <rect width="280" height="130" rx="12" fill="url(#g-amber)" class="card" />
    <text x="140" y="35" class="c-title">4. Render::render</text>
    <text x="20" y="70" class="c-body">• Yeni element ağacı üretilir.</text>
    <text x="20" y="95" class="c-body">• State okunur, UI buna göre kurulur.</text>
    <text x="20" y="118" class="c-mono">• impl IntoElement</text>
  </g>

  <path d="M 760 375 H 710" class="arrow-soft flow" />

  <g class="step s5" transform="translate(400, 310)">
    <rect width="300" height="130" rx="12" fill="url(#g-rose)" class="card" />
    <text x="150" y="35" class="c-title">5. Layout / Paint</text>
    <text x="20" y="70" class="c-body">• request_layout, prepaint, paint.</text>
    <text x="20" y="95" class="c-body">• Hitbox ve GPU primitive üretilir.</text>
    <text x="20" y="118" class="c-body">• Window yeni frame'i gösterir.</text>
  </g>

  <path d="M 400 375 H 350" class="arrow-dash flow" />

  <g class="step s6" transform="translate(60, 310)">
    <rect width="280" height="130" rx="12" fill="url(#g-slate)" class="card" />
    <text x="140" y="35" class="c-title">6. Yeni Etkileşim</text>
    <text x="20" y="70" class="c-body">• Paint sonrası hitbox ve listener seti</text>
    <text x="20" y="95" class="c-body">• bir sonraki input için hazırdır.</text>
    <text x="20" y="118" class="c-body">• Döngü yeniden başlar.</text>
  </g>

  <!-- ================= BİLGİ PANELLERİ ================= -->

  <g transform="translate(60, 480)">
    <rect width="470" height="160" rx="12" fill="url(#g-indigo-panel)" stroke="#6366f1" stroke-width="2" class="card" />
    <text x="40" y="45" class="p-title" style="fill:#4f46e5">Notify Yoksa Ne Olur?</text>
    <text x="40" y="80" class="p-body">• Entity state'i değişir ama render kuyruğuna sinyal gitmez.</text>
    <text x="40" y="110" class="p-body">• Başka bir refresh olana kadar yeni UI görünmeyebilir.</text>
    <text x="40" y="140" class="p-body">• UI değişiklikleri genellikle <tspan class="p-mono" style="fill:#4f46e5">cx.notify()</tspan> ile bitmelidir.</text>
  </g>

  <g transform="translate(570, 480)">
    <rect width="470" height="160" rx="12" fill="url(#g-amber-panel)" stroke="#d97706" stroke-width="2" class="card" />
    <text x="40" y="45" class="p-title" style="fill:#b45309">Async Tarafta</text>
    <text x="40" y="80" class="p-body">• WeakEntity update çağrısı Result döndürür.</text>
    <text x="40" y="110" class="p-body">• Entity düşmüşse update çalışmaz; UI güvenli kalır.</text>
    <text x="40" y="140" class="p-mono" style="fill:#b45309">weak.update(cx, |view, cx| { cx.notify(); })?</text>
  </g>

</svg>
