<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560">
  <title>GPUI Pencere Yaşam Döngüsü</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#10b981" />
    </marker>
    <marker id="arrowRose" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#e11d48" />
    </marker>

    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="g-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8" />
      <stop offset="1" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" />
      <stop offset="1" stop-color="#e11d48" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; text-anchor: middle; }

      .card { filter: url(#shadow); }

      .flow-arrow-emerald { stroke: #10b981; stroke-width: 3; fill: none; marker-end: url(#arrowEmerald); stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow-slate { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow-rose { stroke: #e11d48; stroke-width: 3; fill: none; marker-end: url(#arrowRose); stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow-dashed-rose { stroke: #e11d48; stroke-width: 3; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrowRose); stroke-linecap: round; stroke-linejoin: round; }

      .edge { font: 700 13px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }
      .edge-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #e11d48; text-anchor: middle; }
      .desc-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #0f172a; text-anchor: middle; }

      @keyframes dashFlow { to { stroke-dashoffset: -52; } }
      @keyframes pulseDash { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -52; } }
      .flow-anim { stroke-dasharray: 10 6; animation: dashFlow 10s linear infinite; }
      .dash-anim { animation: pulseDash 10s linear infinite; }

      @media (prefers-reduced-motion: reduce) {
        .flow-anim, .dash-anim { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="50" class="title">GPUI Pencere Yaşam Döngüsü</text>
  <text x="550" y="80" class="sub">Pencere durum geçişleri ve olay kancaları</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <!-- 1. Oluşturulma -> Aktif -->
  <path d="M 330 280 L 380 280 L 380 165 L 430 165" class="flow-arrow-emerald flow-anim" />

  <!-- Aktif -> Pasif -->
  <path d="M 530 240 V 360" class="flow-arrow-slate flow-anim" />

  <!-- Pasif -> Aktif -->
  <path d="M 610 360 V 240" class="flow-arrow-emerald flow-anim" />

  <rect x="513" y="290" width="124" height="26" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="575" y="308" class="edge">Odak Değişimi</text>

  <!-- Aktif -> Kapanma -->
  <path d="M 710 165 L 760 165 L 760 280 L 810 280" class="flow-arrow-rose flow-anim" />

  <!-- Pasif -> Kapanma -->
  <path d="M 710 405 L 760 405 L 760 280 L 810 280" class="flow-arrow-rose flow-anim" />

  <!-- should_close? Dashed -->
  <path d="M 950 225 L 950 120 L 710 120" class="flow-arrow-dashed-rose dash-anim" />
  <rect x="763" y="105" width="134" height="30" rx="15" fill="#fff1f2" stroke="#ffe4e6" stroke-width="1.5" />
  <text x="830" y="125" class="edge-mono">should_close?</text>


  <!-- ================= KARTLAR ================= -->

  <!-- 1. Oluşturulma -->
  <g transform="translate(50, 225)">
    <rect width="280" height="130" rx="12" fill="url(#g-amber)" class="card" />
    <rect width="280" height="130" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="140" y="38" class="c-title">1. Oluşturulma</text>
    <text x="140" y="68" class="c-body">Pencerenin başlatılması</text>
    <rect x="50" y="86" width="180" height="28" rx="8" fill="#0f172a" fill-opacity="0.16" />
    <text x="140" y="105" class="c-mono">cx.open_window()</text>
  </g>

  <!-- 2. Aktif (Odakta) -->
  <g transform="translate(430, 105)">
    <rect width="280" height="130" rx="12" fill="url(#g-emerald)" class="card" />
    <rect width="280" height="130" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="140" y="38" class="c-title">2. Aktif (Odakta)</text>
    <text x="140" y="68" class="c-body">Klavye ve fare odağı</text>
    <rect x="22" y="86" width="236" height="28" rx="8" fill="#0f172a" fill-opacity="0.16" />
    <text x="140" y="105" class="c-mono">observe_window_activation</text>
  </g>

  <!-- 3. Pasif (Inactive) -->
  <g transform="translate(430, 360)">
    <rect width="280" height="130" rx="12" fill="url(#g-slate)" class="card" />
    <rect width="280" height="130" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="140" y="38" class="c-title">3. Pasif (Inactive)</text>
    <text x="140" y="68" class="c-body">Arka plana alınma, odaksız</text>
    <rect x="55" y="86" width="170" height="28" rx="8" fill="#0f172a" fill-opacity="0.16" />
    <text x="140" y="105" class="c-mono">minimize_window()</text>
  </g>

  <!-- 4. Kapanma -->
  <g transform="translate(810, 225)">
    <rect width="280" height="130" rx="12" fill="url(#g-rose)" class="card" />
    <rect width="280" height="130" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="140" y="38" class="c-title">4. Kapanma</text>
    <text x="140" y="68" class="c-body">Pencerenin yok edilmesi</text>
    <rect x="55" y="86" width="170" height="28" rx="8" fill="#0f172a" fill-opacity="0.16" />
    <text x="140" y="105" class="c-mono">on_window_closed</text>
  </g>

</svg>
