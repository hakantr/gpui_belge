<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti ve Gölgeler -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#ff5555"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .pulse-slow {
        animation: pulseSlow 3s infinite;
      }
      .flow-path {
        stroke-dasharray: 6, 8;
        animation: flowDash 25s linear infinite;
      }
      .state-glow {
        animation: stateGlow 3s ease-in-out infinite;
      }
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }

      @keyframes pulseSlow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
      @keyframes flowDash {
        to { stroke-dashoffset: -1000; }
      }
      @keyframes stateGlow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 184, 108, 0.2)); }
        50% { filter: drop-shadow(0 0 8px rgba(255, 184, 108, 0.6)); }
      }
    </style>
  </defs>

  <!-- Arka Plan Kartı -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">GPUI Pencere Yaşam Döngüsü</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">Pencere Durum Geçişleri ve Olay Kancaları</text>

  <!-- DURUM KUTULARI (STATES) -->

  <!-- 1. Başlatma / Açılış -->
  <g transform="translate(60, 200)" filter="url(#shadow)">
    <rect width="140" height="90" rx="10" fill="#21222c" stroke="#ffb86c" stroke-width="2"/>
    <text x="70" y="35" class="text-style" font-size="13" font-weight="600" text-anchor="middle">1. Oluşturulma</text>
    <rect x="15" y="52" width="110" height="20" rx="4" fill="#ffb86c" fill-opacity="0.15"/>
    <text x="70" y="66" fill="#ffb86c" font-size="10" font-weight="600" text-anchor="middle">cx.open_window()</text>
  </g>

  <!-- 2. Aktif (Active / Focused) -->
  <g transform="translate(290, 120)" filter="url(#shadow)" class="state-glow">
    <rect width="160" height="100" rx="10" fill="#21222c" stroke="#50fa7b" stroke-width="2"/>
    <text x="80" y="35" class="text-style" font-size="13" font-weight="600" text-anchor="middle">2. Aktif (Focused)</text>
    <text x="80" y="55" fill="#6272a4" font-size="10" text-anchor="middle">Klavye &amp; Fare Odağı</text>
    <rect x="15" y="68" width="130" height="20" rx="4" fill="#50fa7b" fill-opacity="0.15"/>
    <text x="80" y="82" fill="#50fa7b" font-size="9" font-weight="600" text-anchor="middle">observe_window_activation</text>
  </g>

  <!-- 3. Pasif (Inactive / Unfocused) -->
  <g transform="translate(290, 280)" filter="url(#shadow)">
    <rect width="160" height="100" rx="10" fill="#21222c" stroke="#6272a4" stroke-width="2"/>
    <text x="80" y="35" class="text-style" font-size="13" font-weight="600" text-anchor="middle">3. Pasif (Inactive)</text>
    <text x="80" y="55" fill="#6272a4" font-size="10" text-anchor="middle">Arka Plana Alınma</text>
    <rect x="15" y="68" width="130" height="20" rx="4" fill="#6272a4" fill-opacity="0.15"/>
    <text x="80" y="82" fill="#6272a4" font-size="9" font-weight="600" text-anchor="middle">minimize_window()</text>
  </g>

  <!-- 4. Kapanış (Closed) -->
  <g transform="translate(580, 200)" filter="url(#shadow)">
    <rect width="140" height="90" rx="10" fill="#21222c" stroke="#ff5555" stroke-width="2"/>
    <text x="70" y="35" class="text-style" font-size="13" font-weight="600" text-anchor="middle">4. Kapanma</text>
    <rect x="15" y="52" width="110" height="20" rx="4" fill="#ff5555" fill-opacity="0.15"/>
    <text x="70" y="66" fill="#ff5555" font-size="10" font-weight="600" text-anchor="middle">on_window_closed</text>
  </g>

  <!-- AKIŞ ÇİZGİLERİ VE OKLAR -->

  <!-- Oluşturuldu -> Aktif -->
  <path d="M 200 230 L 245 230 L 245 170 L 290 170" fill="none" stroke="#50fa7b" stroke-width="2"/>
  <path d="M 200 230 L 245 230 L 245 170 L 290 170" fill="none" stroke="#50fa7b" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="290,170 280,165 280,175" fill="#50fa7b"/>

  <!-- Aktif <-> Pasif Geçişi -->
  <path d="M 350 220 L 350 280" fill="none" stroke="#6272a4" stroke-width="1.5"/>
  <polygon points="350,280 345,270 355,270" fill="#6272a4"/>
  <path d="M 390 280 L 390 220" fill="none" stroke="#50fa7b" stroke-width="1.5"/>
  <polygon points="390,220 385,230 395,230" fill="#50fa7b"/>
  <text x="370" y="254" fill="#6272a4" font-size="9" text-anchor="middle">Focus</text>

  <!-- Aktif -> Kapanma -->
  <path d="M 450 170 L 525 170 L 525 230 L 580 230" fill="none" stroke="#ff5555" stroke-width="2"/>
  <path d="M 450 170 L 525 170 L 525 230 L 580 230" fill="none" stroke="#ff5555" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="580,230 570,225 570,235" fill="#ff5555"/>

  <!-- Pasif -> Kapanma -->
  <path d="M 450 330 L 525 330 L 525 260 L 580 260" fill="none" stroke="#ff5555" stroke-width="2"/>
  <path d="M 450 330 L 525 330 L 525 260 L 580 260" fill="none" stroke="#ff5555" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="580,260 570,255 570,265" fill="#ff5555"/>

  <!-- Kapatma Onayı Sorgusu (on_window_should_close) -->
  <path d="M 525 210 Q 525 100 370 120" fill="none" stroke="#ff5555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="370,120 380,125 378,115" fill="#ff5555"/>
  <text x="490" y="110" fill="#ff5555" font-size="9" font-weight="600" text-anchor="middle">should_close?</text>

</svg>
