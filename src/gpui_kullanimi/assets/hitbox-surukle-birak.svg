<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 860">
  <title>Hitbox ve Sürükle-Bırak State Machine</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#be123c" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .monoSmall { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .softTitle { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .arrowRed { stroke: #be123c; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowRed); }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 1.2; }
    </style>
    
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">Hitbox ve Sürükle-Bırak State Machine</text>

  <text x="580" y="62" text-anchor="middle" class="subtitle">Hitbox kaydı, pointer capture, drag payload ve hedef kabul akışı tek diyagramda.</text>
  <rect x="60" y="94" width="260" height="94" rx="8" class="card" />
<rect x="60" y="94" width="260" height="30" rx="8" fill="#334155" />
<path d="M 60 116 H 320 V 124 H 60 Z" fill="#334155" />
<text x="74" y="114" class="cardTitle">Idle</text>
<text x="74" y="146" class="body">cx.has_active_drag() -&gt; false.</text>
<text x="74" y="163" class="body">window.insert_hitbox(bounds,</text>
<text x="74" y="180" class="body">behavior).</text>

  <path d="M 320 140 L 410 140" class="arrowSoft" /><text x="365" y="128" text-anchor="middle" class="edge">on_mouse_down</text>
  <rect x="410" y="94" width="290" height="94" rx="8" class="card" />
<rect x="410" y="94" width="290" height="30" rx="8" fill="#0284c7" />
<path d="M 410 116 H 700 V 124 H 410 Z" fill="#0284c7" />
<text x="424" y="114" class="cardTitle">Mouse Down</text>
<text x="424" y="146" class="body">.on_mouse_down(button, ...).</text>
<text x="424" y="163" class="body">cx.stop_propagation ile</text>
<text x="424" y="180" class="body">diğer hitbox'lar kapanabilir.</text>

  <path d="M 700 140 L 810 140" class="arrowSoft" /><text x="755" y="128" text-anchor="middle" class="edge">on_drag payload</text>
  <rect x="810" y="94" width="290" height="94" rx="8" class="card" />
<rect x="810" y="94" width="290" height="30" rx="8" fill="#7c3aed" />
<path d="M 810 116 H 1100 V 124 H 810 Z" fill="#7c3aed" />
<text x="824" y="114" class="cardTitle">Dragging</text>
<text x="824" y="146" class="body">cx.has_active_drag() -&gt; true.</text>
<text x="824" y="163" class="body">Ghost view fare ile birlikte çizilir.</text>

  <path d="M 555 188 L 555 260" class="arrowSoft" /><text x="570" y="224" class="edge">eşiği aşmadı</text>
  <rect x="410" y="260" width="290" height="78" rx="8" class="card" />
<rect x="410" y="260" width="290" height="30" rx="8" fill="#334155" />
<path d="M 410 282 H 700 V 290 H 410 Z" fill="#334155" />
<text x="424" y="280" class="cardTitle">Click ürünü</text>
<text x="424" y="312" class="body">on_mouse_up sonrası .on_click(...) çalışır.</text>

  <path d="M 955 188 L 955 260" class="arrowSoft" /><text x="970" y="224" class="edge">fare hareketi</text>
  <rect x="810" y="260" width="290" height="98" rx="8" class="card" />
<rect x="810" y="260" width="290" height="30" rx="8" fill="#7c3aed" />
<path d="M 810 282 H 1100 V 290 H 810 Z" fill="#7c3aed" />
<text x="824" y="280" class="cardTitle">on_drag_move&lt;T&gt;</text>
<text x="824" y="312" class="body">.on_drag_move(|event, ...|).</text>
<text x="824" y="329" class="body">window.request_autoscroll(bounds).</text>

  <path d="M 955 358 L 955 414" class="arrowSoft" /><text x="792" y="390" class="edge">hedef hitbox'a girilir</text>
  <rect x="760" y="414" width="340" height="116" rx="8" class="card" />
<rect x="760" y="414" width="340" height="30" rx="8" fill="#d97706" />
<path d="M 760 436 H 1100 V 444 H 760 Z" fill="#d97706" />
<text x="774" y="434" class="cardTitle">Drag Over - hedef element</text>
<text x="774" y="466" class="body">.drag_over::&lt;T&gt;(|style, payload, window, cx|).</text>
<text x="774" y="483" class="body">.can_drop(|payload: &amp;dyn Any, ...| -&gt; bool).</text>
<text x="774" y="500" class="body">downcast_ref::&lt;T&gt;() ile tip kontrolü.</text>

  <path d="M 930 530 L 930 594" class="arrowSoft" /><text x="948" y="562" class="edge">can_drop = true</text>
  <rect x="760" y="594" width="340" height="96" rx="8" class="card" />
<rect x="760" y="594" width="340" height="30" rx="8" fill="#059669" />
<path d="M 760 616 H 1100 V 624 H 760 Z" fill="#059669" />
<text x="774" y="614" class="cardTitle">Drop kabul edilir</text>
<text x="774" y="646" class="body">.on_drop::&lt;T&gt;(|payload, window, cx| ...).</text>
<text x="774" y="663" class="body">cx.notify; drag_over stili otomatik temizlenir.</text>

  <path d="M 810 150 C 690 250 650 472 620 594" class="arrowRed" />
  <text x="566" y="428" class="edge">Esc / iptal / can_drop = false</text>
  <rect x="410" y="594" width="290" height="96" rx="8" class="card" />
<rect x="410" y="594" width="290" height="30" rx="8" fill="#be123c" />
<path d="M 410 616 H 700 V 624 H 410 Z" fill="#be123c" />
<text x="424" y="614" class="cardTitle">İptal</text>
<text x="424" y="646" class="body">cx.stop_active_drag(window) -&gt; bool.</text>
<text x="424" y="663" class="body">Pencere yeniden çizim için işaretlenir.</text>

  <path d="M 555 690 C 380 760 170 742 170 188" class="arrowRed" />
  <path d="M 930 690 C 1040 778 185 790 170 188" class="arrowDash" />
  <rect x="60" y="740" width="1040" height="78" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.2" />
<text x="76" y="764" text-anchor="start" class="small">HitboxBehavior: Normal, BlockMouse (.occlude), BlockMouseExceptScroll (.block_mouse_except_scroll).</text>
<text x="76" y="781" text-anchor="start" class="small">İmleç: window.set_cursor_style(style, &amp;hitbox), set_window_cursor_style, set_pointer_capture, release_pointer_capture, captured_hitbox.</text>
<text x="76" y="798" text-anchor="start" class="small">Drag imleci: cx.set_active_drag_cursor_style(style, window) ve cx.active_drag_cursor_style().</text>

</svg>
