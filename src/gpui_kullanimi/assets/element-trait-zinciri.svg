<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850">
  <title>GPUI Element Trait Zinciri</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <!-- Katman degradeleri: aynı tonun açık->koyu hali -->
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0f9ff" /><stop offset="1" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5" /><stop offset="1" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f3ff" /><stop offset="1" stop-color="#ede9fe" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbeb" /><stop offset="1" stop-color="#fef3c7" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1f2" /><stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
    <linearGradient id="g-amber-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-slate-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .layer-title { font: 800 19px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }
      .layer-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }
      .layer-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }

      .card { filter: url(#shadow); stroke-width: 2; }
      .info-card { fill: #ffffff; filter: url(#shadow); stroke: #e2e8f0; stroke-width: 1.5; }
      .info-title { font: 800 17px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .info-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }

      /* Sıralı katman belirme: dıştan içe, okunabilirliği bozmadan */
      .lyr { animation: lyrIn 10s ease-in-out infinite; }
      .l1 { animation-delay: 0s; }
      .l2 { animation-delay: -0.6s; }
      .l3 { animation-delay: -1.2s; }
      .l4 { animation-delay: -1.8s; }
      .l5 { animation-delay: -2.4s; }
      @keyframes lyrIn {
        0%   { opacity: 1; }
        42%  { opacity: 1; }
        60%  { opacity: 0.7; }
        78%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .lyr { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI Element Trait Zinciri</text>
  <text x="550" y="74" class="sub">İç katmanlar dış katmanların yeteneklerini korur; .id(...) state tutan en iç katmanı açar.</text>

  <!-- ================= ELEMENT (EN DIŞ) ================= -->
  <g class="lyr l1">
    <rect x="60" y="110" width="980" height="560" rx="14" fill="url(#g-sky)" stroke="#0284c7" class="card" />
    <text x="550" y="146" class="layer-title" style="fill:#0284c7">Element</text>
    <text x="550" y="172" class="layer-body">Yerleşim ve çizim sözleşmesi: request_layout, prepaint, paint.</text>
    <text x="550" y="197" class="layer-mono" style="fill:#0369a1">div / canvas / list / uniform_list / img / svg / anchored / deferred / surface</text>
  </g>

  <!-- ================= PARENT ELEMENT ================= -->
  <g class="lyr l2">
    <rect x="110" y="222" width="880" height="420" rx="14" fill="url(#g-green)" stroke="#059669" class="card" />
    <text x="550" y="258" class="layer-title" style="fill:#059669">ParentElement</text>
    <text x="550" y="284" class="layer-body">Alt öğe kabul eden elementler.</text>
    <text x="550" y="309" class="layer-mono" style="fill:#047857">.child(impl IntoElement) / .children(impl IntoIterator&lt;Item = impl IntoElement&gt;)</text>
  </g>

  <!-- ================= STYLED ================= -->
  <g class="lyr l3">
    <rect x="160" y="334" width="780" height="280" rx="14" fill="url(#g-violet)" stroke="#7c3aed" class="card" />
    <text x="550" y="370" class="layer-title" style="fill:#7c3aed">Styled</text>
    <text x="550" y="396" class="layer-body">StyleRefinement zincirine katılan elementler.</text>
    <text x="550" y="421" class="layer-mono" style="fill:#6d28d9">.flex() .gap_2() .text_color(...) .border_1() .rounded_sm()</text>
    <text x="550" y="443" class="layer-mono" style="fill:#6d28d9">.absolute() .w(...) .h(...)</text>
  </g>

  <!-- ================= INTERACTIVE ELEMENT ================= -->
  <g class="lyr l4">
    <rect x="210" y="466" width="680" height="118" rx="14" fill="url(#g-amber)" stroke="#d97706" class="card" />
    <text x="550" y="502" class="layer-title" style="fill:#d97706">InteractiveElement</text>
    <text x="550" y="528" class="layer-body">Klavye odağı, action, fare, hover ve sürükle-bırak dinleyicileri.</text>
    <text x="550" y="553" class="layer-mono" style="fill:#b45309">.on_click .on_mouse_down .on_key_down .on_action .hover .focus .track_focus .key_context</text>
  </g>

  <!-- ================= STATEFUL INTERACTIVE ELEMENT ================= -->
  <g class="lyr l5">
    <rect x="260" y="608" width="580" height="72" rx="12" fill="url(#g-rose)" stroke="#e11d48" class="card" />
    <text x="550" y="640" class="layer-title" style="fill:#e11d48">StatefulInteractiveElement</text>
    <text x="550" y="664" class="layer-mono" style="fill:#be123c">.id(...) sonrası: scroll konumu, klavye odağı ve kareler arası state.</text>
  </g>

  <!-- ================= ALT BİLGİ PANELLERİ ================= -->
  <g transform="translate(60, 710)">
    <rect width="470" height="116" rx="12" class="info-card" />
    <rect width="470" height="46" rx="12" fill="url(#g-amber-head)" />
    <rect y="24" width="470" height="22" fill="#d97706" />
    <text x="235" y="31" class="info-title">Element Üreten Trait'ler</text>
    <text x="235" y="74" class="info-body">Render::render(&amp;mut self, ...) ve</text>
    <text x="235" y="96" class="info-body">RenderOnce::render(self, ...) → impl IntoElement döndürür.</text>
  </g>

  <g transform="translate(570, 710)">
    <rect width="470" height="116" rx="12" class="info-card" />
    <rect width="470" height="46" rx="12" fill="url(#g-slate-head)" />
    <rect y="24" width="470" height="22" fill="#334155" />
    <text x="235" y="31" class="info-title">IntoElement Köprüsü</text>
    <text x="235" y="74" class="info-body">String, SharedString, Option&lt;T&gt;, Vec&lt;T&gt; ve RenderOnce</text>
    <text x="235" y="96" class="info-body">element ağacına sorunsuzca çevrilebilir.</text>
  </g>

</svg>
