<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740">
  <title>GPUI Element Trait Zinciri</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#be123c" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .monoSmall { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .softTitle { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .arrowRed { stroke: #be123c; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowRed); }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 1.2; }
    </style>
    
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="540" y="36" text-anchor="middle" class="title">GPUI Element Trait Zinciri</text>

  <text x="540" y="62" text-anchor="middle" class="subtitle">İç katmanlar dış katmanların yeteneklerini korur; .id(...) state tutan en iç katmanı açar.</text>
  <rect x="110" y="92" width="860" height="450" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.4" />
  <text x="540" y="124" text-anchor="middle" class="label">Element</text>
  <text x="540" y="146" text-anchor="middle" class="body">Yerleşim ve çizim sözleşmesi: request_layout, prepaint, paint.</text>
  <text x="540" y="166" text-anchor="middle" class="monoSmall">div / canvas / list / uniform_list / img / svg / anchored / deferred / surface</text>
  <rect x="150" y="196" width="780" height="306" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1.4" />
  <text x="540" y="228" text-anchor="middle" class="label">ParentElement</text>
  <text x="540" y="250" text-anchor="middle" class="body">Alt öğe kabul eden elementler.</text>
  <text x="540" y="270" text-anchor="middle" class="monoSmall">.child(impl IntoElement) / .children(impl IntoIterator&lt;Item = impl IntoElement&gt;)</text>
  <rect x="190" y="300" width="700" height="162" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4" />
  <text x="540" y="330" text-anchor="middle" class="label">Styled</text>
  <text x="540" y="350" text-anchor="middle" class="body">StyleRefinement zincirine katılan elementler.</text>
  <text x="540" y="372" text-anchor="middle" class="monoSmall">.flex() .gap_2() .text_color(...) .border_1() .rounded_sm()</text>
  <text x="540" y="390" text-anchor="middle" class="monoSmall">.absolute() .w(...) .h(...)</text>
  <rect x="230" y="408" width="620" height="92" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.4" />
  <text x="540" y="438" text-anchor="middle" class="label">InteractiveElement</text>
  <text x="540" y="458" text-anchor="middle" class="body">Klavye odağı, action, fare, hover ve sürükle-bırak dinleyicileri.</text>
  <text x="540" y="478" text-anchor="middle" class="monoSmall">.on_click .on_mouse_down .on_key_down .on_action .hover .focus .track_focus .key_context</text>
  <rect x="280" y="514" width="520" height="64" rx="10" fill="#ffe4e6" stroke="#be123c" stroke-width="1.4" />
  <text x="540" y="542" text-anchor="middle" class="label">StatefulInteractiveElement</text>
  <text x="540" y="562" text-anchor="middle" class="monoSmall">.id(...) sonrası: scroll konumu, klavye odağı ve kareler arası state.</text>
  <rect x="110" y="612" width="410" height="76" rx="8" class="card" />
<rect x="110" y="612" width="410" height="30" rx="8" fill="#d97706" />
<path d="M 110 634 H 520 V 642 H 110 Z" fill="#d97706" />
<text x="124" y="632" class="cardTitle">Element üreten trait'ler</text>
<text x="124" y="664" class="body">Render::render(&amp;mut self, ...) ve RenderOnce::render(self, ...)</text>
<text x="124" y="681" class="body">sonuçta impl IntoElement döndürür.</text>

  <rect x="560" y="612" width="410" height="76" rx="8" class="card" />
<rect x="560" y="612" width="410" height="30" rx="8" fill="#334155" />
<path d="M 560 634 H 970 V 642 H 560 Z" fill="#334155" />
<text x="574" y="632" class="cardTitle">IntoElement köprüsü</text>
<text x="574" y="664" class="body">String, SharedString, Option&lt;T&gt;, Vec&lt;T&gt; ve RenderOnce</text>
<text x="574" y="681" class="body">element ağacına çevrilebilir.</text>


</svg>
