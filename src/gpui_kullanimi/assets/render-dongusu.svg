<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500">
  <title>GPUI Render ve Element Yaşam Döngüsü</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#be123c" stroke="#be123c" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrowRed" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#be123c" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .monoSmall { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .softTitle { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowRed { stroke: #be123c; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowRed); marker-start: url(#dot-arrowRed); }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 1.2; }
    </style>
    
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="520" y="36" text-anchor="middle" class="title">GPUI Render ve Element Yaşam Döngüsü</text>

  <text x="520" y="62" text-anchor="middle" class="subtitle">Render çağrısı element ağacını üretir; elementler layout, prepaint ve paint aşamalarından geçer.</text>
  <rect x="340" y="88" width="360" height="78" rx="8" class="card" />
<rect x="340" y="88" width="360" height="30" rx="8" fill="#7c3aed" />
<path d="M 340 110 H 700 V 118 H 340 Z" fill="#7c3aed" />
<text x="354" y="108" class="cardTitle">Entity&lt;V&gt; + Render::render</text>
<text x="354" y="140" class="body">cx.notify() tetikler; yeni element ağacı üretilir.</text>

  <path d="M 520 166 L 520 196" class="arrowSoft" />
  <rect x="70" y="204" width="260" height="116" rx="8" class="card" />
<rect x="70" y="204" width="260" height="30" rx="8" fill="#059669" />
<path d="M 70 226 H 330 V 234 H 70 Z" fill="#059669" />
<text x="84" y="224" class="cardTitle">1. request_layout</text>
<text x="84" y="256" class="body">LayoutId ve RequestLayoutState döner.</text>
<text x="84" y="273" class="body">Taffy yerleşim ağacı kurulur.</text>
<text x="84" y="290" class="body">Stil ve alt öğe LayoutId'leri</text>
<text x="84" y="307" class="body">kaydedilir.</text>

  <path d="M 330 262 L 382 262" class="arrowSoft" />
  <rect x="390" y="204" width="260" height="116" rx="8" class="card" />
<rect x="390" y="204" width="260" height="30" rx="8" fill="#d97706" />
<path d="M 390 226 H 650 V 234 H 390 Z" fill="#d97706" />
<text x="404" y="224" class="cardTitle">2. prepaint</text>
<text x="404" y="256" class="body">PrepaintState üretilir.</text>
<text x="404" y="273" class="body">Hitbox kaydı ve scroll konumu</text>
<text x="404" y="290" class="body">belirlenir.</text>
<text x="404" y="307" class="body">Element başına veri hazırlanır.</text>

  <path d="M 650 262 L 702 262" class="arrowSoft" />
  <rect x="710" y="204" width="260" height="116" rx="8" class="card" />
<rect x="710" y="204" width="260" height="30" rx="8" fill="#be123c" />
<path d="M 710 226 H 970 V 234 H 710 Z" fill="#be123c" />
<text x="724" y="224" class="cardTitle">3. paint</text>
<text x="724" y="256" class="body">paint_quad, paint_path,</text>
<text x="724" y="273" class="body">paint_image ve paint_svg.</text>
<text x="724" y="290" class="body">set_cursor_style imleç sonucunu yazar.</text>
<text x="724" y="307" class="body">GPU primitive üretimi yapılır.</text>

  <path d="M 840 320 L 840 378 L 200 378 L 200 328" class="arrowDash" />
  <text x="520" y="370" text-anchor="middle" class="edge">cx.notify() / window.refresh() / on_next_frame ile yeniden çizim</text>
  <rect x="70" y="410" width="900" height="62" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.2" />
<text x="86" y="434" text-anchor="start" class="small">Aşama ihlali debug derlemede panic ile yakalanır: paint dışında paint_* veya prepaint dışında insert_hitbox çağrılmaz.</text>
<text x="86" y="451" text-anchor="start" class="small">Trait zinciri: Render, RenderOnce, ParentElement, Styled, InteractiveElement ve StatefulInteractiveElement.</text>

</svg>
