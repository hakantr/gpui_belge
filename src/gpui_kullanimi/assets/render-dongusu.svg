<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660">
  <title>GPUI Render ve Element Yaşam Döngüsü</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" />
      <stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }

      .note { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; }
      .flow-label { font: 700 13px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }

      .arrow-soft { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      @keyframes flow-dash { to { stroke-dashoffset: -52; } }
      @keyframes stage-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.82; }
      }
      .flow-anim { animation: flow-dash 9s linear infinite; }
      .s1 { animation: stage-pulse 9s ease-in-out infinite; }
      .s2 { animation: stage-pulse 9s ease-in-out infinite; animation-delay: -3s; }
      .s3 { animation: stage-pulse 9s ease-in-out infinite; animation-delay: -6s; }

      @media (prefers-reduced-motion: reduce) {
        .flow-anim, .s1, .s2, .s3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI Render ve Element Yaşam Döngüsü</text>
  <text x="550" y="74" class="sub">Render çağrısı element ağacını üretir; elementler layout, prepaint ve paint aşamalarından geçer.</text>

  <!-- ================= BAŞLANGIÇ (RENDER) ================= -->
  <g transform="translate(350, 110)">
    <rect width="400" height="92" rx="12" fill="url(#g-purple)" filter="url(#shadow)" />
    <text x="200" y="38" class="c-title">Entity&lt;V&gt; + Render::render</text>
    <text x="200" y="67" class="c-body" text-anchor="middle">cx.notify() tetikler; yeni element ağacı üretilir.</text>
  </g>

  <path d="M 550 202 V 246" class="arrow-soft" />

  <!-- ================= 3 AŞAMA ================= -->

  <!-- 1. request_layout -->
  <g transform="translate(60, 256)" class="s1">
    <rect width="300" height="158" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <text x="150" y="34" class="c-title">1. request_layout</text>
    <text x="22" y="64" class="c-body">• LayoutId ve RequestLayoutState</text>
    <text x="36" y="84" class="c-body">döner.</text>
    <text x="22" y="108" class="c-body">• Taffy yerleşim ağacı kurulur.</text>
    <text x="22" y="132" class="c-body">• Stil ve alt öğe LayoutId'leri</text>
    <text x="36" y="152" class="c-body">kaydedilir.</text>
  </g>

  <path d="M 360 335 H 404" class="arrow-soft" />

  <!-- 2. prepaint -->
  <g transform="translate(410, 256)" class="s2">
    <rect width="280" height="158" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <text x="140" y="36" class="c-title">2. prepaint</text>
    <text x="22" y="72" class="c-body">• PrepaintState üretilir.</text>
    <text x="22" y="98" class="c-body">• Hitbox kaydı ve scroll konumu</text>
    <text x="36" y="120" class="c-body">belirlenir.</text>
    <text x="22" y="146" class="c-body">• Element başına veri hazırlanır.</text>
  </g>

  <path d="M 690 335 H 734" class="arrow-soft" />

  <!-- 3. paint -->
  <g transform="translate(740, 256)" class="s3">
    <rect width="300" height="158" rx="12" fill="url(#g-rose)" filter="url(#shadow)" />
    <text x="150" y="36" class="c-title">3. paint</text>
    <text x="22" y="72" class="c-body">• paint_quad, paint_path,</text>
    <text x="36" y="94" class="c-body">paint_image ve paint_svg.</text>
    <text x="22" y="120" class="c-body">• set_cursor_style imleç sonucunu yazar.</text>
    <text x="22" y="146" class="c-body">• GPU primitive üretimi yapılır.</text>
  </g>

  <!-- ================= GERİ DÖNÜŞ (NOTIFY) ================= -->
  <path d="M 890 414 V 472 H 210 V 418" class="arrow-dash flow-anim" />
  <rect x="318" y="450" width="464" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="550" y="467" class="flow-label">cx.notify() / window.refresh() / on_next_frame ile yeniden çizim</text>

  <!-- ================= AÇIKLAMA (ALT BİLGİ) ================= -->
  <g transform="translate(60, 510)">
    <rect width="980" height="92" rx="12" fill="url(#g-panel)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="24" y="38" class="note">• Aşama ihlali debug derlemede panic ile yakalanır: paint dışında paint_* veya prepaint dışında insert_hitbox çağrılmaz.</text>
    <text x="24" y="68" class="note">• Trait zinciri: Render, RenderOnce, ParentElement, Styled, InteractiveElement ve StatefulInteractiveElement.</text>
  </g>

</svg>
