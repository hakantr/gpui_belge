<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
  <title>Element Girdi Olay Kategorileri</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <!-- Kart başlık degradeleri (açık → koyu) -->
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" /><stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="g-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706" /><stop offset="1" stop-color="#b45309" />
    </linearGradient>

    <!-- Kart gövde degradesi (çok hafif) -->
    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" /><stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="g-note" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" /><stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 16px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .c-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #1e293b; text-anchor: middle; }
      .c-mono-mut { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #64748b; text-anchor: middle; }

      .divider { stroke: #e2e8f0; stroke-width: 1.5; }

      /* Sıralı belirme — sütunlar bubble sırasıyla nabız atar (okunabilirliği bozmaz) */
      @keyframes col-pulse {
        0%   { opacity: 1; }
        50%  { opacity: 0.82; }
        100% { opacity: 1; }
      }
      .col { animation: col-pulse 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .col-1 { animation-delay: 0s; }
      .col-2 { animation-delay: 0.6s; }
      .col-3 { animation-delay: 1.2s; }
      .col-4 { animation-delay: 1.8s; }
      .col-5 { animation-delay: 2.4s; }

      @media (prefers-reduced-motion: reduce) {
        .col { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">Element Girdi Olay Kategorileri</text>
  <text x="550" y="74" class="sub">Her kategori fluent API üzerinden bağlanır. on_ → bubble aşaması · capture_ → capture aşaması.</text>

  <!-- ================= KATEGORİ SÜTUNLARI ================= -->

  <!-- Klavye Sütunu -->
  <g transform="translate(34, 118)" class="col col-1">
    <rect width="180" height="280" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-blue)" />
    <text x="90" y="26" class="c-title">Klavye</text>

    <text x="90" y="70" class="c-mono">.on_key_down</text>
    <text x="90" y="95" class="c-mono">.capture_key_down</text>
    <text x="90" y="120" class="c-mono">.on_key_up</text>
    <text x="90" y="145" class="c-mono">.capture_key_up</text>

    <line x1="20" y1="172" x2="160" y2="172" class="divider" />

    <text x="90" y="202" class="c-mono-mut">KeyDownEvent</text>
    <text x="90" y="227" class="c-mono-mut">KeyUpEvent</text>
  </g>

  <!-- Fare Sütunu -->
  <g transform="translate(238, 118)" class="col col-2">
    <rect width="196" height="360" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 184 A 12 12 0 0 1 196 12 V 40 H 0 Z" fill="url(#g-cyan)" />
    <text x="98" y="26" class="c-title">Fare</text>

    <text x="98" y="70" class="c-mono">.on_mouse_down</text>
    <text x="98" y="95" class="c-mono">.capture_any_mouse_down</text>
    <text x="98" y="120" class="c-mono">.on_mouse_up</text>
    <text x="98" y="145" class="c-mono">.on_mouse_move</text>
    <text x="98" y="170" class="c-mono">.on_click</text>
    <text x="98" y="195" class="c-mono">.on_hover</text>
    <text x="98" y="220" class="c-mono">.on_mouse_down_out</text>
    <text x="98" y="245" class="c-mono">.on_mouse_up_out</text>

    <line x1="20" y1="272" x2="176" y2="272" class="divider" />

    <text x="98" y="302" class="c-mono-mut">MouseDownEvent vb.</text>
  </g>

  <!-- Scroll Sütunu -->
  <g transform="translate(458, 118)" class="col col-3">
    <rect width="180" height="280" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-green)" />
    <text x="90" y="26" class="c-title">Hareket &amp; Scroll</text>

    <text x="90" y="70" class="c-mono">.on_scroll_wheel</text>
    <text x="90" y="95" class="c-mono">.on_pinch</text>
    <text x="90" y="120" class="c-mono">.capture_pinch</text>

    <line x1="20" y1="147" x2="160" y2="147" class="divider" />

    <text x="90" y="177" class="c-mono-mut">ScrollWheelEvent</text>
    <text x="90" y="202" class="c-mono-mut">PinchEvent</text>
  </g>

  <!-- Sürükle Bırak Sütunu -->
  <g transform="translate(662, 118)" class="col col-4">
    <rect width="180" height="280" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 168 A 12 12 0 0 1 180 12 V 40 H 0 Z" fill="url(#g-purple)" />
    <text x="90" y="26" class="c-title">Sürükle-Bırak</text>

    <text x="90" y="70" class="c-mono">.on_drag</text>
    <text x="90" y="95" class="c-mono">.on_drag_move::&lt;T&gt;</text>
    <text x="90" y="120" class="c-mono">.drag_over::&lt;T&gt;</text>
    <text x="90" y="145" class="c-mono">.on_drop::&lt;T&gt;</text>
    <text x="90" y="170" class="c-mono">.can_drop</text>

    <line x1="20" y1="197" x2="160" y2="197" class="divider" />

    <text x="90" y="227" class="c-mono-mut">DragMoveEvent</text>
    <text x="90" y="252" class="c-mono-mut">FileDropEvent</text>
  </g>

  <!-- Action Sütunu -->
  <g transform="translate(866, 118)" class="col col-5">
    <rect width="200" height="280" rx="12" fill="url(#g-card)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 188 A 12 12 0 0 1 200 12 V 40 H 0 Z" fill="url(#g-amber)" />
    <text x="100" y="26" class="c-title">Action</text>

    <text x="100" y="70" class="c-mono">.on_action::&lt;A&gt;</text>
    <text x="100" y="95" class="c-mono">.capture_action::&lt;A&gt;</text>
    <text x="100" y="120" class="c-mono">.on_boxed_action</text>

    <line x1="20" y1="147" x2="180" y2="147" class="divider" />

    <text x="100" y="177" class="c-mono-mut">dispatch → bubble</text>
    <text x="100" y="202" class="c-mono-mut">capture → önce tutar</text>
  </g>

  <!-- ================= BİLGİ KUTUSU ================= -->
  <g transform="translate(34, 540)">
    <rect width="1032" height="118" rx="12" fill="url(#g-note)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="0" y="0" width="6" height="118" rx="3" fill="#0ea5e9" />
    <text x="26" y="36" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#0f172a" font-weight="800">on_ vs capture_</text>
    <line x1="26" y1="48" x2="1006" y2="48" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="26" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#334155">GPUI olayı ağacın köküne kadar taşır (bubble). Capture_ dinleyiciler kökten aşağı inerken daha önce çalışır;</text>
    <text x="26" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#334155">ebeveyn, çocuktan önce olayı alır. Klavye, fare ve scroll olaylarında her iki aşama mevcuttur.</text>
    <text x="26" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#334155">Action'larda varsayılan yayılım bubble'dır; capture ile ebeveyn action'u çocuğa ulaşmadan kesebilir.</text>
  </g>

</svg>
