<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640">
  <title>Hitbox ve Sürükle-Bırak Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#10b981" flood-opacity="0.55" />
    </filter>

    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>

    <style>
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub   { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 19px ui-monospace, SFMono-Regular, monospace; fill: #0f172a; text-anchor: middle; }
      .c-sub   { font: 600 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .ph-txt  { font: 700 14px system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; }

      .item-txt { font: 800 15px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }

      .step-no   { font: 800 16px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .step-txt  { font: 600 15px system-ui, -apple-system, sans-serif; fill: #1e293b; }
      .step-code { font: 700 14px ui-monospace, SFMono-Regular, monospace; }

      /* Hedef kutusunun durum geçişi animasyonu */
      @keyframes anim-target {
        0%, 30%, 100% { stroke: #cbd5e1; }
        40%, 70%      { stroke: #10b981; }
        75%, 95%      { stroke: #0284c7; }
      }
      .target-animated { animation: anim-target 9s infinite ease-in-out; }

      /* Hedef içeriği: bırakma tamamlanınca beliren metin */
      @keyframes anim-target-text {
        0%, 70%   { opacity: 0; }
        76%, 96%  { opacity: 1; }
        100%      { opacity: 0; }
      }
      .target-content-text { animation: anim-target-text 9s infinite linear; font: 800 14px ui-monospace, SFMono-Regular, monospace; fill: #0284c7; text-anchor: middle; }

      @media (prefers-reduced-motion: reduce) {
        .target-animated, .target-content-text { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="#f8fafc" />

  <text x="550" y="48" class="title">Hitbox ve Sürükle-Bırak (Drag &amp; Drop) Akışı</text>
  <text x="550" y="76" class="sub">can_drop denetimi, görsel sürükleme durumu ve on_drop olay döngüsü</text>

  <!-- Akış oku: kaynaktan hedefe -->
  <path d="M 400 230 C 510 230, 580 230, 690 230" fill="none" stroke="#64748b" stroke-width="2.5"
        stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="9 7">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="1.6s" repeatCount="indefinite" />
  </path>
  <rect x="496" y="195" width="108" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="550" y="213" font="700 13px ui-monospace, SFMono-Regular, monospace" fill="#0284c7" text-anchor="middle">can_drop</text>

  <!-- SOL: Drag Source -->
  <g transform="translate(150, 130)">
    <rect width="250" height="200" rx="14" fill="url(#g-card)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="42" class="c-title">Drag Source</text>
    <text x="125" y="66" class="c-sub">Sürükleme Kaynağı</text>

    <!-- Kaynaktaki yer tutucu: sürükleme sırasında soluklaşır -->
    <rect x="45" y="100" width="160" height="64" rx="10" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1.5" />
    <text x="125" y="137" class="ph-txt" style="fill:#0369a1">Öğe A</text>
  </g>

  <!-- SAĞ: Drop Target -->
  <g transform="translate(700, 130)">
    <rect width="250" height="200" rx="14" fill="url(#g-card)" stroke="#cbd5e1" stroke-width="2.5"
          stroke-dasharray="7 6" filter="url(#shadow)" class="target-animated" />
    <text x="125" y="42" class="c-title">Drop Target</text>
    <text x="125" y="66" class="c-sub">Bırakma Hedefi</text>

    <!-- Hedef iç kutusu: can_drop / on_drop geri bildirimi -->
    <g transform="translate(45, 100)">
      <rect width="160" height="64" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="80" y="37" class="target-content-text">Öğe A Bırakıldı</text>
    </g>
  </g>

  <!-- SÜRÜKLENEN ELEMAN (Animasyonlu) -->
  <g transform="translate(195, 230)" opacity="0">
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite"
      values="195 230;195 230;470 230;745 230;745 230;195 230"
      keyTimes="0;0.15;0.34;0.55;0.76;1" calcMode="spline"
      keySplines="0 0 1 1;0.42 0 0.58 1;0.42 0 0.58 1;0 0 1 1;0.42 0 0.58 1" />
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite"
      values="0;1;1;1;0;0" keyTimes="0;0.15;0.55;0.71;0.76;1" />

    <rect width="160" height="64" rx="10" fill="url(#g-sky)" opacity="0.95"
          filter="drop-shadow(0 8px 16px rgba(2,132,199,0.35))" />
    <text x="80" y="32" class="item-txt">Öğe A</text>

    <!-- Fare imleci -->
    <g transform="translate(80, 34)">
      <polygon points="0,0 6,24 12,18 20,28 24,24 16,14 24,12" fill="#0f172a" stroke="#ffffff" stroke-width="2" />
    </g>
  </g>

  <!-- ALT: Akış adımları (kalıcı açıklama panosu, sırayla vurgulanır) -->
  <g transform="translate(150, 400)">
    <rect width="800" height="222" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <text x="28" y="38" font="800 15px system-ui, -apple-system, sans-serif" fill="#334155">Olay döngüsü</text>
    <line x1="28" y1="54" x2="772" y2="54" stroke="#e2e8f0" stroke-width="1.5" />

    <!-- Adım 1 -->
    <g transform="translate(28, 78)">
      <circle cx="18" cy="26" r="18" fill="url(#g-sky)">
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="1;1;0.65;0.65;1;1" keyTimes="0;0.18;0.25;0.78;0.85;1" />
      </circle>
      <text x="18" y="26" class="step-no">1</text>
      <text x="52" y="20" class="step-txt">Öğeye basılı tutularak sürükleme başlatılır</text>
      <text x="52" y="44" class="step-code" style="fill:#0284c7">on_drag(payload) → Drag&lt;T&gt; durumu oluşur</text>
    </g>

    <!-- Adım 2 -->
    <g transform="translate(28, 130)">
      <circle cx="18" cy="26" r="18" fill="url(#g-green)">
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0.65;0.65;1;1;0.65;0.65" keyTimes="0;0.27;0.34;0.66;0.73;1" />
      </circle>
      <text x="18" y="26" class="step-no">2</text>
      <text x="52" y="20" class="step-txt">can_drop denetlenir, hedef onay verir (etkin yeşil)</text>
      <text x="52" y="44" class="step-code" style="fill:#059669">can_drop(&amp;T) == true → hedef vurgulanır</text>
    </g>

    <!-- Adım 3 -->
    <g transform="translate(28, 182)">
      <circle cx="18" cy="26" r="18" fill="url(#g-slate)" stroke="#0284c7" stroke-width="2">
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0.65;0.65;1;1;0.65" keyTimes="0;0.72;0.79;0.97;1" />
      </circle>
      <text x="18" y="26" class="step-no">3</text>
      <text x="52" y="20" class="step-txt">on_drop tetiklenir, veri aktarımı tamamlanır</text>
      <text x="52" y="44" class="step-code" style="fill:#0284c7">on_drop(payload, window, cx) → veri taşınır</text>
    </g>
  </g>
</svg>
