<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>GPUI olay döngüsü ve platform entegrasyonu</title>
  <defs>
    <marker id="aSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="aEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
    <marker id="aViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#7c3aed"/></marker>
    <marker id="aCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0891b2"/></marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
    <marker id="aRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#be123c"/></marker>
    <marker id="aSky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0284c7"/></marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#475569}
      .h{font-size:13px;font-weight:700;fill:#0f172a}
      .t{font-size:12px;font-weight:600;fill:#0f172a}
      .body{font-size:11px;fill:#475569}
      .small{font-size:10px;fill:#64748b}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;fill:#0f172a}
      .card{fill:#fff;stroke-width:1.6}
      .tEmerald{fill:#059669}.tViolet{fill:#7c3aed}.tCyan{fill:#0891b2}.tAmber{fill:#d97706}.tRose{fill:#be123c}.tSky{fill:#0284c7}.tSlate{fill:#64748b}.tWhite{fill:#fff}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#aSlate)}
      .aEm{stroke:#059669;marker-end:url(#aEmerald)}.aVi{stroke:#7c3aed;marker-end:url(#aViolet)}.aCy{stroke:#0891b2;marker-end:url(#aCyan)}.aAm{stroke:#d97706;marker-end:url(#aAmber)}.aRo{stroke:#be123c;marker-end:url(#aRose)}.aSk{stroke:#0284c7;marker-end:url(#aSky)}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc"/>

  <text x="400" y="40" text-anchor="middle" class="title">GPUI Olay Döngüsü ve Platform Entegrasyonu</text>
  <text x="400" y="63" text-anchor="middle" class="sub">OS olaylarının eşzamansız ve eşzamanlı kuyruklar üzerinden dağıtımı</text>

  <!-- 1. İşletim sistemi -->
  <g transform="translate(60,140)">
    <rect width="180" height="120" rx="12" class="card" stroke="#be123c"/>
    <text x="90" y="35" text-anchor="middle" class="h">İşletim Sistemi (OS)</text>
    <text x="90" y="60" text-anchor="middle" class="small">Klavye, fare, pencere olayları</text>
    <rect x="20" y="80" width="140" height="25" rx="6" fill="#be123c" fill-opacity="0.12"/>
    <text x="90" y="97" text-anchor="middle" class="small tRose" font-weight="600">PlatformWindow</text>
  </g>

  <!-- 2. PlatformDispatcher -->
  <g transform="translate(310,140)">
    <rect width="180" height="120" rx="12" class="card" stroke="#d97706"/>
    <text x="90" y="35" text-anchor="middle" class="h">PlatformDispatcher</text>
    <text x="90" y="60" text-anchor="middle" class="small">Olay sıralama ve önceliklendirme</text>
    <rect x="20" y="80" width="140" height="25" rx="6" fill="#d97706" fill-opacity="0.12"/>
    <text x="90" y="97" text-anchor="middle" class="small tAmber" font-weight="600">Olay kuyruğu (Queue)</text>
  </g>

  <!-- 3. Ana iş parçacığı -->
  <g transform="translate(560,140)">
    <rect width="180" height="120" rx="12" class="card" stroke="#059669"/>
    <text x="90" y="35" text-anchor="middle" class="h">Ana İş Parçacığı (Main)</text>
    <text x="90" y="60" text-anchor="middle" class="small">UI çizimi ve durum güncelleme</text>
    <rect x="20" y="80" width="140" height="25" rx="6" fill="#059669" fill-opacity="0.12"/>
    <text x="90" y="97" text-anchor="middle" class="small tEmerald" font-weight="600">cx.notify() / render döngüsü</text>
  </g>

  <!-- 4. Arka plan görevleri -->
  <g transform="translate(310,340)">
    <rect width="180" height="100" rx="12" class="card" stroke="#0284c7"/>
    <text x="90" y="30" text-anchor="middle" class="h">Arka Plan Görevleri</text>
    <text x="90" y="55" text-anchor="middle" class="small">CPU yoğun ve G/Ç işlemleri</text>
    <rect x="20" y="68" width="140" height="20" rx="6" fill="#0284c7" fill-opacity="0.12"/>
    <text x="90" y="82" text-anchor="middle" class="small tSky" font-weight="600">BackgroundExecutor</text>
  </g>

  <!-- OS -> Dispatcher -->
  <path d="M 240 200 L 310 200" class="arrow aRo"/>
  <text x="275" y="188" text-anchor="middle" class="small tRose" font-weight="600">OS olayları</text>

  <!-- Dispatcher -> Main -->
  <path d="M 490 200 L 560 200" class="arrow aEm"/>
  <text x="525" y="188" text-anchor="middle" class="small tEmerald" font-weight="600">Dağıtım</text>

  <!-- Main -> Background -->
  <path d="M 650 260 L 650 390 L 490 390" class="arrow aSk"/>
  <text x="588" y="382" text-anchor="middle" class="small tSky mono" font-weight="600">background_spawn</text>

  <!-- Background -> Dispatcher -->
  <path d="M 400 340 L 400 260" class="arrow aAm"/>
  <text x="360" y="305" class="small tAmber mono" font-weight="600">cx.update()</text>
</svg>
