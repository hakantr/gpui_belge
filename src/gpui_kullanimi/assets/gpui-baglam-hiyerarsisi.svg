<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>GPUI bağlam (Context) hiyerarşisi</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; rx: 12px; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #0f172a; text-anchor: middle; }
      .sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
      
      /* Context Boxes */
      .context-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8px; }
      .context-title { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 700; font-size: 15px; fill: #334155; text-anchor: middle; }
      .context-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #475569; text-anchor: middle; }
      
      /* Inner fields */
      .field-rect { fill: #f1f5f9; rx: 4px; }
      .field-text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #0284c7; text-anchor: middle; }

      /* Inheritance Arrows */
      .arrow { stroke: #475569; stroke-width: 2; fill: none; }
      .arrow-active { stroke: #0284c7; stroke-dasharray: 5 3; animation: dash 2s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -20; } }

      /* Pulse animation */
      @keyframes box-pulse-1 { 0%, 100% { stroke: #cbd5e1; } 20%, 40% { stroke: #0284c7; filter: drop-shadow(0 0 4px rgba(56,189,248,0.3)); } }
      @keyframes box-pulse-2 { 0%, 25%, 100% { stroke: #cbd5e1; } 45%, 65% { stroke: #0284c7; filter: drop-shadow(0 0 4px rgba(56,189,248,0.3)); } }
      @keyframes box-pulse-3 { 0%, 50%, 100% { stroke: #cbd5e1; } 70%, 90% { stroke: #0284c7; filter: drop-shadow(0 0 4px rgba(56,189,248,0.3)); } }

      .bp-1 { animation: box-pulse-1 6s infinite linear; }
      .bp-2 { animation: box-pulse-2 6s infinite linear; }
      .bp-3 { animation: box-pulse-3 6s infinite linear; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" />
  <text x="400" y="45" class="title">GPUI Bağlam (Context) Hiyerarşisi</text>
  <text x="400" y="70" class="sub">AppContext, WindowContext ve ViewContext yapılarının kalıtım ve kapsama ilişkisi</text>

  <!-- 1. AppContext: En Dış Kapsam -->
  <g transform="translate(60, 110)">
    <rect width="200" height="210" class="context-box bp-1" />
    <text x="100" y="30" class="context-title">AppContext</text>
    <text x="100" y="50" class="context-desc">Uygulama Seviyesi</text>
    
    <g transform="translate(15, 70)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">Global States</text>
    </g>
    <g transform="translate(15, 105)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">SettingsStore</text>
    </g>
    <g transform="translate(15, 140)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">AssetSource / Fonts</text>
    </g>
    <g transform="translate(15, 175)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">Keymap / Actions</text>
    </g>
  </g>

  <!-- Ara Ok 1 -->
  <path d="M 260 215 L 300 215" class="arrow arrow-active" />
  <polygon points="300,215 292,211 292,219" fill="#0284c7" />

  <!-- 2. WindowContext: Pencere Kapsamı -->
  <g transform="translate(300, 110)">
    <rect width="200" height="210" class="context-box bp-2" />
    <text x="100" y="30" class="context-title">WindowContext</text>
    <text x="100" y="50" class="context-desc">Pencere Seviyesi</text>
    
    <g transform="translate(15, 75)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">window: &amp;mut Window</text>
    </g>
    <g transform="translate(15, 115)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">Window Bounds / Scale</text>
    </g>
    <g transform="translate(15, 155)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">Render Pass States</text>
    </g>
  </g>

  <!-- Ara Ok 2 -->
  <path d="M 500 215 L 540 215" class="arrow arrow-active" />
  <polygon points="540,215 532,211 532,219" fill="#0284c7" />

  <!-- 3. ViewContext: Entity Kapsamı -->
  <g transform="translate(540, 110)">
    <rect width="200" height="210" class="context-box bp-3" />
    <text x="100" y="30" class="context-title">ViewContext&lt;T&gt;</text>
    <text x="100" y="50" class="context-desc">Entity / Görünüm Seviyesi</text>
    
    <g transform="translate(15, 80)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">view: WeakEntity&lt;T&gt;</text>
    </g>
    <g transform="translate(15, 130)">
      <rect width="170" height="25" class="field-rect" />
      <text x="85" y="17" class="field-text">View Lifecycle / notify()</text>
    </g>
  </g>

</svg>
