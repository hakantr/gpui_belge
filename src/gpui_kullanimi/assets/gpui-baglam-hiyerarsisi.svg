<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620">
  <title>GPUI Bağlam (Context) Hiyerarşisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#0ea5e9" />
    </marker>

    <!-- Kart degradeleri: aynı tonun açık -> koyu hali -->
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f0f9ff" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f0fdf4" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f5f3ff" />
    </linearGradient>
    <linearGradient id="g-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 19px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }
      .c-sub { font: 600 13px system-ui, -apple-system, sans-serif; text-anchor: middle; }

      .card { filter: url(#shadow); rx: 14px; stroke-width: 2.5; }
      .field-rect { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1; rx: 7px; }
      .field-text { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #334155; text-anchor: middle; }

      .arrow-line { stroke: #0ea5e9; stroke-width: 3; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); stroke-linecap: round; }
      .arrow-label { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #0284c7; text-anchor: middle; }

      .band-title { font: 800 14px system-ui, -apple-system, sans-serif; fill: #ffffff; text-anchor: middle; }
      .band-text { font: 500 13.5px system-ui, -apple-system, sans-serif; fill: #cbd5e1; }
      .band-code { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #38bdf8; }

      /* Akan ok animasyonu (soldan sağa Deref / kapsama akışı) */
      @keyframes flow { to { stroke-dashoffset: -24; } }
      .arrow-line { animation: flow 1.6s linear infinite; }

      /* Sıralı kart vurgusu: dış -> iç bağlam kapsama sırası */
      @keyframes pulse1 { 0%, 100% { opacity: 1; } 14%, 30% { opacity: 1; filter: url(#shadow) drop-shadow(0 0 7px rgba(14,165,233,0.35)); } }
      @keyframes pulse2 { 0%, 100% { opacity: 1; } 38%, 54% { opacity: 1; filter: url(#shadow) drop-shadow(0 0 7px rgba(16,185,129,0.35)); } }
      @keyframes pulse3 { 0%, 100% { opacity: 1; } 62%, 78% { opacity: 1; filter: url(#shadow) drop-shadow(0 0 7px rgba(124,58,237,0.35)); } }
      .glow1 { animation: pulse1 9s ease-in-out infinite; }
      .glow2 { animation: pulse2 9s ease-in-out infinite; }
      .glow3 { animation: pulse3 9s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        .arrow-line { animation: none; }
        .glow1, .glow2, .glow3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="48" class="title">GPUI Bağlam (Context) Hiyerarşisi</text>
  <text x="550" y="76" class="sub">App, Window ve Context&lt;T&gt; tiplerinin güncel görev ve parametre ilişkisi</text>

  <!-- ================= 1. APP CONTEXT ================= -->
  <g transform="translate(60, 120)">
    <rect width="280" height="330" fill="url(#g-sky)" stroke="#0ea5e9" class="card glow1" />
    <rect width="280" height="6" rx="3" fill="#0ea5e9" />
    <text x="140" y="48" class="c-title" style="fill:#0284c7">App / AppContext</text>
    <text x="140" y="72" class="c-sub" style="fill:#0ea5e9">Uygulama Seviyesi · Global Kapsam</text>

    <g transform="translate(20, 96)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">Global States</text>
    </g>
    <g transform="translate(20, 150)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">SettingsStore</text>
    </g>
    <g transform="translate(20, 204)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">AssetSource / Fonts</text>
    </g>
    <g transform="translate(20, 258)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">Keymap / Actions</text>
    </g>
  </g>

  <path d="M 348 285 H 402" class="arrow-line" />
  <text x="375" y="272" class="arrow-label">open_window</text>

  <!-- ================= 2. WINDOW ================= -->
  <g transform="translate(410, 120)">
    <rect width="280" height="330" fill="url(#g-green)" stroke="#10b981" class="card glow2" />
    <rect width="280" height="6" rx="3" fill="#10b981" />
    <text x="140" y="48" class="c-title" style="fill:#059669">Window</text>
    <text x="140" y="72" class="c-sub" style="fill:#10b981">Ayrı Pencere Parametresi</text>

    <g transform="translate(20, 110)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">&amp;mut Window</text>
    </g>
    <g transform="translate(20, 170)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">Window Bounds / Scale</text>
    </g>
    <g transform="translate(20, 230)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">Focus / Input / Paint</text>
    </g>
  </g>

  <path d="M 698 285 H 752" class="arrow-line" />
  <text x="725" y="272" class="arrow-label">callback çifti</text>

  <!-- ================= 3. ENTITY CONTEXT ================= -->
  <g transform="translate(760, 120)">
    <rect width="280" height="330" fill="url(#g-purple)" stroke="#8b5cf6" class="card glow3" />
    <rect width="280" height="6" rx="3" fill="#8b5cf6" />
    <text x="140" y="48" class="c-title" style="fill:#7c3aed">Context&lt;T&gt;</text>
    <text x="140" y="72" class="c-sub" style="fill:#8b5cf6">Entity Seviyesi · App'e Deref</text>

    <g transform="translate(20, 124)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">entity: Entity&lt;T&gt;</text>
    </g>
    <g transform="translate(20, 184)">
      <rect width="240" height="42" class="field-rect" />
      <text x="120" y="27" class="field-text">emit / observe / notify</text>
    </g>
  </g>

  <!-- ================= ALT BANT: KAPSAMA / DEREF AÇIKLAMASI ================= -->
  <g transform="translate(60, 480)">
    <rect width="980" height="110" rx="14" fill="url(#g-band)" filter="url(#shadow)" />
    <rect width="6" height="110" rx="3" fill="#0ea5e9" />
    <text x="30" y="34" class="band-title" style="text-anchor:start">Parametre ve Deref ilişkisi</text>

    <text x="30" y="64" class="band-text">
      <tspan class="band-code">Context&lt;T&gt;: Deref&lt;Target = App&gt;</tspan><tspan>; </tspan><tspan class="band-code">Window</tspan><tspan> ise ayrı parametre olarak verilir.</tspan>
    </text>
    <text x="30" y="88" class="band-text">
      <tspan class="band-code">render(&amp;mut self, window: &amp;mut Window, cx: &amp;mut Context&lt;Self&gt;)</tspan><tspan> iki kapsamı birlikte taşır.</tspan>
    </text>
  </g>

</svg>
