<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640">
  <title>GPUI Piksel Birimi Katmanları</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; text-anchor: middle; }

      .card { filter: url(#shadow); }

      .flow-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
      .flow-dash { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 7 9; }
      .edge { font: 700 12.5px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; }
      .chip { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }

      @keyframes flowdash { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -32; } }
      .anim-dash { animation: flowdash 9s linear infinite; }

      @media (prefers-reduced-motion: reduce) {
        .anim-dash { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI Piksel Birimi Katmanları</text>
  <text x="550" y="74" class="sub">Ekran ölçeği (scale factor), Pixels ile ScaledPixels arasında uygulanır.</text>

  <!-- ================= KARTLAR ================= -->

  <!-- 1. Pixels(f32) -->
  <g transform="translate(48, 130)">
    <rect width="256" height="215" rx="12" fill="url(#g-blue)" class="card" />
    <text x="128" y="36" class="c-title">Pixels(f32)</text>
    <line x1="22" y1="50" x2="234" y2="50" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
    <text x="22" y="74" class="c-body">• UI kodu — her zaman bu birim.</text>
    <text x="22" y="96" class="c-body">• Stil değerleri, boyutlar,</text>
    <text x="34" y="116" class="c-body">konumlar ve boşluklar.</text>
    <text x="128" y="148" class="c-mono">px(12.0)</text>
    <text x="128" y="170" class="c-mono">size(px(100.), px(40.))</text>
    <text x="128" y="192" class="c-mono">point(px(0.), px(0.))</text>
  </g>

  <!-- 2. ScaledPixels(f32) -->
  <g transform="translate(422, 130)">
    <rect width="256" height="215" rx="12" fill="url(#g-violet)" class="card" />
    <text x="128" y="36" class="c-title">ScaledPixels(f32)</text>
    <line x1="22" y1="50" x2="234" y2="50" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
    <text x="22" y="74" class="c-body">• Çizim hazırlığı — GPUI içi.</text>
    <text x="22" y="96" class="c-body">• Pixels × scale_factor.</text>
    <text x="22" y="118" class="c-body">• Çizim aracına iletilen değer.</text>
    <text x="22" y="158" class="c-body">• Uygulama kodu doğrudan</text>
    <text x="34" y="178" class="c-body">bu tipte değer yazmaz.</text>
  </g>

  <!-- 3. DevicePixels(i32) -->
  <g transform="translate(796, 130)">
    <rect width="256" height="215" rx="12" fill="url(#g-slate)" class="card" />
    <text x="128" y="36" class="c-title">DevicePixels(i32)</text>
    <line x1="22" y1="50" x2="234" y2="50" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
    <text x="22" y="74" class="c-body">• Donanım — i32 koordinat.</text>
    <text x="22" y="96" class="c-body">• Fiziksel cihaz pikseli.</text>
    <text x="22" y="118" class="c-body">• Asset ve doku (texture)</text>
    <text x="34" y="138" class="c-body">boyutlarında kullanılır.</text>
    <text x="128" y="180" class="c-mono">sprite_atlas, texture_map</text>
  </g>

  <!-- 4. Rems(f32) — alt bant -->
  <g transform="translate(48, 435)">
    <rect width="630" height="160" rx="12" fill="url(#g-sky)" class="card" />
    <text x="22" y="36" class="c-title" style="text-anchor:start">Rems(f32) — göreceli uzunluk</text>
    <line x1="22" y1="50" x2="608" y2="50" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
    <text x="22" y="78" class="c-body">• Kök yazı tipi boyutuna göre ölçeklenir; düzene değil yazıya bağlıdır.</text>
    <text x="22" y="102" class="c-body">• Zed'de theme.ui_font_size üzerinden Pixels'e çevrilir.</text>
    <text x="22" y="126" class="c-body">• Tüm aralık ve boşluk yardımcıları (gap_2, p_4…) bu yoldan geçer.</text>
  </g>

  <!-- ================= BAĞLANTILAR (kartların ÜSTÜNDE) ================= -->

  <!-- Pixels -> ScaledPixels -->
  <path d="M 308 237 H 414" class="flow-arrow" />
  <path d="M 308 237 H 408" class="flow-dash anim-dash" />
  <rect x="318" y="195" width="90" height="25" rx="12.5" class="chip" />
  <text x="363" y="212" class="edge">× scale_factor()</text>

  <!-- ScaledPixels -> DevicePixels -->
  <path d="M 682 237 H 788" class="flow-arrow" />
  <path d="M 682 237 H 782" class="flow-dash anim-dash" />
  <rect x="700" y="195" width="64" height="25" rx="12.5" class="chip" />
  <text x="732" y="212" class="edge">render</text>

  <!-- Rems -> Pixels (yukarı) -->
  <path d="M 176 430 V 350" class="flow-arrow" />
  <path d="M 176 430 V 356" class="flow-dash anim-dash" />
  <rect x="111" y="377" width="130" height="25" rx="12.5" class="chip" />
  <text x="176" y="394" class="edge">× ui_font_size</text>

</svg>
