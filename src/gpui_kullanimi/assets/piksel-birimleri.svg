<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400">
  <title>GPUI Piksel Birimi Katmanları</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .title    { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .layerLbl { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #fff; }
      .typeTag  { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .body     { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .mono     { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .small    { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .edgeLbl  { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1e40af; }
      .arrow    { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowB   { stroke: #1e40af; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>

  <!-- Arka plan -->
  <rect width="860" height="400" rx="10" fill="#f8fafc" />

  <!-- Başlık -->
  <text x="430" y="34" text-anchor="middle" class="title">GPUI Piksel Birimi Katmanları</text>
  <text x="430" y="56" text-anchor="middle" class="subtitle">Ekran ölçeği (scale factor), Pixels ile ScaledPixels arasında uygulanır.</text>

  <!-- ─── Kutu 1: Pixels ─── -->
  <rect x="40" y="80" width="230" height="180" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.4" />
  <rect x="40" y="80" width="230" height="30" rx="8" fill="#2563eb" />
  <path d="M 40 102 H 270 V 110 H 40 Z" fill="#2563eb" />
  <text x="54" y="100" class="typeTag">Pixels(f32)</text>
  <text x="54" y="130" class="body">UI kodu — her zaman bu birim</text>
  <text x="54" y="150" class="body">Stil değerleri, boyutlar,</text>
  <text x="54" y="166" class="body">konumlar ve boşluklar.</text>
  <text x="54" y="192" class="mono">px(12.0)</text>
  <text x="54" y="208" class="mono">size(px(100.), px(40.))</text>
  <text x="54" y="224" class="mono">point(px(0.), px(0.))</text>

  <!-- ─── Ok 1 ─── -->
  <path d="M 272 170 L 316 170" class="arrowB" />
  <text x="294" y="160" text-anchor="middle" class="edgeLbl">× scale</text>
  <text x="294" y="173" text-anchor="middle" class="edgeLbl">_factor()</text>

  <!-- ─── Kutu 2: ScaledPixels ─── -->
  <rect x="318" y="80" width="224" height="180" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.4" />
  <rect x="318" y="80" width="224" height="30" rx="8" fill="#7c3aed" />
  <path d="M 318 102 H 542 V 110 H 318 Z" fill="#7c3aed" />
  <text x="332" y="100" class="typeTag">ScaledPixels(f32)</text>
  <text x="332" y="130" class="body">Çizim hazırlığı — GPUI iç</text>
  <text x="332" y="146" class="body">Pixels × scale_factor.</text>
  <text x="332" y="166" class="body">Çizim aracına iletilen değer.</text>
  <text x="332" y="186" class="body">Uygulama kodu doğrudan</text>
  <text x="332" y="202" class="body">bu tipte değer yazmaz.</text>

  <!-- ─── Ok 2 ─── -->
  <path d="M 544 170 L 588 170" class="arrow" />
  <text x="566" y="162" text-anchor="middle" class="small">render</text>

  <!-- ─── Kutu 3: DevicePixels ─── -->
  <rect x="590" y="80" width="230" height="180" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.4" />
  <rect x="590" y="80" width="230" height="30" rx="8" fill="#334155" />
  <path d="M 590 102 H 820 V 110 H 590 Z" fill="#334155" />
  <text x="604" y="100" class="typeTag">DevicePixels(i32)</text>
  <text x="604" y="130" class="body">Donanım — i32 koordinat</text>
  <text x="604" y="150" class="body">Fiziksel cihaz pikseli.</text>
  <text x="604" y="170" class="body">Asset ve doku (texture)</text>
  <text x="604" y="186" class="body">boyutlarında kullanılır.</text>
  <text x="604" y="224" class="mono">sprite_atlas, texture_map</text>

  <!-- ─── Alt bant: Rems ─── -->
  <rect x="40" y="290" width="540" height="78" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2" />
  <rect x="40" y="290" width="540" height="26" rx="8" fill="#0891b2" />
  <path d="M 40 308 H 580 V 316 H 40 Z" fill="#0891b2" />
  <text x="56" y="307" class="layerLbl">Rems(f32) — göreceli uzunluk</text>
  <text x="56" y="334" class="body">Kök yazı tipi boyutuna göre ölçeklenir. Zed'de</text>
  <text x="56" y="350" class="mono">theme.ui_font_size</text>
  <text x="186" y="350" class="body"> üzerinden Pixels'e çevrilir. Tüm</text>
  <text x="56" y="366" class="body">aralık ve boşluk yardımcıları (gap_2, p_4…) bu yoldan geçer.</text>

  <!-- Rems → Pixels oku -->
  <path d="M 582 329 L 600 329 L 600 210 L 592 210" class="arrowB" />
  <text x="608" y="275" class="edgeLbl">→ Pixels</text>

</svg>
