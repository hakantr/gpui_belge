<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820">
  <title>Focus ve Key Context Ağacı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">Focus ve Key Context Ağacı</text>
  <text x="580" y="62" text-anchor="middle" class="subtitle">Odaktaki elementten köke doğru bağlam yığını kurulur; keymap ve action dispatch bu yığını kullanır.</text>

  <rect x="80" y="98" width="1000" height="380" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4" />
  <text x="105" y="128" class="label">UI element ağacı</text>
  <text x="105" y="150" class="small">Capture kökten odağa, Bubble odaktan köke doğru akar.</text>

  <rect x="440" y="178" width="280" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text x="580" y="203" text-anchor="middle" class="label">Workspace</text>
  <text x="580" y="222" text-anchor="middle" class="mono">key_context("Workspace")</text>

  <path d="M 580 240 L 350 292" class="arrowSoft" />
  <path d="M 580 240 L 580 292" class="arrowSoft" />
  <path d="M 580 240 L 810 292" class="arrowSoft" />

  <rect x="210" y="292" width="280" height="62" rx="8" fill="#e0f2fe" stroke="#0284c7" />
  <text x="350" y="317" text-anchor="middle" class="label">Left Dock</text>
  <text x="350" y="336" text-anchor="middle" class="mono">key_context("ProjectPanel")</text>

  <rect x="440" y="292" width="280" height="62" rx="8" fill="#d1fae5" stroke="#059669" />
  <text x="580" y="317" text-anchor="middle" class="label">Pane</text>
  <text x="580" y="336" text-anchor="middle" class="mono">key_context("Pane")</text>

  <rect x="670" y="292" width="280" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" />
  <text x="810" y="317" text-anchor="middle" class="label">Right Dock</text>
  <text x="810" y="336" text-anchor="middle" class="mono">key_context("Assistant")</text>

  <path d="M 580 354 L 580 402" class="arrowSoft" />
  <rect x="440" y="402" width="280" height="58" rx="8" fill="#fef3c7" stroke="#d97706" />
  <text x="580" y="426" text-anchor="middle" class="label">Editor - odak burada</text>
  <text x="580" y="444" text-anchor="middle" class="mono">key_context("Editor mode=insert")</text>

  <path d="M 230 166 C 205 250 210 400 438 434" class="arrowDash" />
  <text x="145" y="230" class="edge">Capture</text>
  <text x="145" y="248" class="edge">root -> focus</text>

  <path d="M 720 434 C 964 404 955 250 930 166" class="arrowDash" />
  <text x="948" y="230" class="edge">Bubble</text>
  <text x="948" y="248" class="edge">focus -> root</text>

  <rect x="80" y="520" width="300" height="118" rx="8" class="card" />
  <rect x="80" y="520" width="300" height="30" rx="8" fill="#0284c7" />
  <path d="M 80 542 H 380 V 550 H 80 Z" fill="#0284c7" />
  <text x="94" y="540" class="cardTitle">1. context_stack()</text>
  <text x="94" y="572" class="body">Odaktaki Editor'dan köke yürür.</text>
  <text x="94" y="589" class="body">Her key_context predicate'e eklenir.</text>
  <text x="94" y="606" class="body">Derin eşleşme daha yüksek önceliklidir.</text>

  <path d="M 380 579 L 430 579" class="arrowSoft" />

  <rect x="430" y="520" width="300" height="118" rx="8" class="card" />
  <rect x="430" y="520" width="300" height="30" rx="8" fill="#7c3aed" />
  <path d="M 430 542 H 730 V 550 H 430 Z" fill="#7c3aed" />
  <text x="444" y="540" class="cardTitle">2. Keymap resolve</text>
  <text x="444" y="572" class="body">Keystroke + context_stack eşleştirilir.</text>
  <text x="444" y="589" class="body">matched ve pending sonuçları üretilir.</text>
  <text x="444" y="606" class="body">NoAction / Unbind bağlamda iptal eder.</text>

  <path d="M 730 579 L 780 579" class="arrowSoft" />

  <rect x="780" y="520" width="300" height="118" rx="8" class="card" />
  <rect x="780" y="520" width="300" height="30" rx="8" fill="#059669" />
  <path d="M 780 542 H 1080 V 550 H 780 Z" fill="#059669" />
  <text x="794" y="540" class="cardTitle">3. Action dispatch</text>
  <text x="794" y="572" class="body">Capture dinleyicileri önce çalışır.</text>
  <text x="794" y="589" class="body">Bubble aşamasında .on_action tetiklenir.</text>
  <text x="794" y="606" class="body">cx.propagate yayılımı sürdürür.</text>

  <rect x="80" y="684" width="1000" height="64" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2" />
  <text x="96" y="710" class="small">Predicate örnekleri: "Editor", "mode == insert", "!Terminal", "Workspace &gt; Editor", "A &amp;&amp; B", "A || B".</text>
  <text x="96" y="730" class="small">Odak değiştiğinde context stack de değişir; aynı tuş farklı view'larda farklı action'a bağlanabilir.</text>
</svg>
