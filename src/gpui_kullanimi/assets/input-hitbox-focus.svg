<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 860">
  <title>Input, Hitbox ve Focus Karar Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>
    <marker id="arrowSoft" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#94a3b8" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8" />
      <stop offset="1" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" />
      <stop offset="1" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="g-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; text-anchor: middle; }

      .card { filter: url(#shadow); }

      .pipeline-arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-dash { stroke: #0ea5e9; stroke-width: 3; fill: none; stroke-dasharray: 10 8; stroke-linecap: round; animation: flow 9s linear infinite; }
      .feed-arrow { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowSoft); stroke-linecap: round; stroke-linejoin: round; }
      .edge { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; paint-order: stroke; stroke: #f8fafc; stroke-width: 4px; stroke-linejoin: round; stroke-linecap: round; }

      .stage { animation: rise 9s ease-in-out infinite; }
      .s2 { animation-delay: 0.6s; }
      .s3 { animation-delay: 1.2s; }

      @keyframes flow { to { stroke-dashoffset: -36; } }
      @keyframes rise {
        0%, 100% { opacity: 1; }
        45% { opacity: 1; }
        70% { opacity: 0.82; }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow-dash { animation: none; }
        .stage { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="580" y="46" class="title">Input, Hitbox ve Focus Karar Akışı</text>
  <text x="580" y="74" class="sub">Mouse hit-test, keyboard focus ve pointer capture farklı karar kanallarından geçer.</text>

  <!-- ================= ÜST KARTLAR (PIPELINE) ================= -->
  <g transform="translate(60, 120)" class="stage">
    <rect width="300" height="130" rx="12" fill="url(#g-sky)" class="card" />
    <text x="150" y="35" class="c-title">1. Platform Input</text>
    <text x="150" y="65" class="c-body">MouseMove, MouseDown, KeyDown.</text>
    <text x="150" y="85" class="c-body">Window event loop olayı alır.</text>
    <text x="150" y="105" class="c-body">Koordinat pencere uzayındadır.</text>
  </g>

  <g transform="translate(430, 120)" class="stage s2">
    <rect width="300" height="130" rx="12" fill="url(#g-violet)" class="card" />
    <text x="150" y="35" class="c-title">2. Hitbox Araması</text>
    <text x="150" y="65" class="c-body">Son prepaint hitbox listesi taranır.</text>
    <text x="150" y="85" class="c-body">Üstteki ve occlude eden hit kazanır.</text>
    <text x="150" y="105" class="c-mono">HitboxBehavior</text>
  </g>

  <g transform="translate(800, 120)" class="stage s3">
    <rect width="300" height="130" rx="12" fill="url(#g-green)" class="card" />
    <text x="150" y="35" class="c-title">3. Listener / Cursor Sonucu</text>
    <text x="150" y="65" class="c-body">on_mouse_*, on_click, hover state çalışır.</text>
    <text x="150" y="85" class="c-body">set_cursor_style hitbox ile bağlanır.</text>
    <text x="150" y="105" class="c-body">stop_propagation alttaki hitleri durdurur.</text>
  </g>

  <!-- PIPELINE OKLARI (akan) -->
  <path d="M 360 185 H 416" class="flow-dash" />
  <path d="M 360 185 H 422" class="pipeline-arrow" />
  <path d="M 730 185 H 786" class="flow-dash" />
  <path d="M 730 185 H 792" class="pipeline-arrow" />

  <!-- ================= ALT KARTLAR (MODIFIERS) ================= -->
  <g transform="translate(60, 360)">
    <rect width="300" height="130" rx="12" fill="url(#g-blue)" class="card" />
    <text x="150" y="35" class="c-title">Keyboard Focus</text>
    <text x="150" y="65" class="c-body">FocusHandle odak sahibini belirler.</text>
    <text x="150" y="85" class="c-mono">window.focus(&amp;handle)</text>
    <text x="150" y="105" class="c-body">KeyDown focus path'e iletilir.</text>
  </g>

  <g transform="translate(430, 360)">
    <rect width="300" height="130" rx="12" fill="url(#g-indigo)" class="card" />
    <text x="150" y="35" class="c-title">Pointer Capture</text>
    <text x="150" y="65" class="c-body">Mouse olayları belirli hitbox'a kilitlenir.</text>
    <text x="150" y="85" class="c-mono">set_pointer_capture(&amp;hitbox)</text>
    <text x="150" y="105" class="c-body">Drag ve resize sırasında kararlı hedef.</text>
  </g>

  <g transform="translate(800, 360)">
    <rect width="300" height="130" rx="12" fill="url(#g-teal)" class="card" />
    <text x="150" y="35" class="c-title">Text Input / IME</text>
    <text x="150" y="65" class="c-body">Printable key önce input'a gidebilir.</text>
    <text x="150" y="85" class="c-mono">accepts_text_input()</text>
    <text x="150" y="105" class="c-body">Keymap önceliği buna göre düşer.</text>
  </g>

  <!-- MODIFIER OKLARI -->
  <path d="M 210 350 V 260" class="feed-arrow" />
  <text x="210" y="312" class="edge">besler</text>
  <path d="M 580 350 V 260" class="feed-arrow" />
  <text x="580" y="312" class="edge">besler</text>
  <path d="M 950 350 V 260" class="feed-arrow" />
  <text x="950" y="312" class="edge">besler</text>


  <!-- ================= KARAR ÖZETİ (DARK THEME) ================= -->
  <g transform="translate(60, 540)">
    <rect width="1040" height="160" rx="12" fill="url(#g-dark)" stroke="#334155" stroke-width="2" class="card" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 20 V 160 H 12 A 12 12 0 0 1 0 148 Z" fill="#0ea5e9" />

    <text x="40" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#38bdf8">Karar Özeti</text>

    <circle cx="44" cy="74" r="4" fill="#38bdf8" />
    <text x="60" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1" font-weight="600">Mouse hedefi hitbox ve occlusion ile seçilir; keyboard hedefi focus path ile seçilir.</text>

    <circle cx="44" cy="104" r="4" fill="#38bdf8" />
    <text x="60" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1" font-weight="600">Pointer capture aktifse mouse hareketleri koordinat hedefinden bağımsız olarak yakalanan hitbox'a gider.</text>

    <circle cx="44" cy="134" r="4" fill="#38bdf8" />
    <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1" font-weight="600">Cursor sonucu hitbox'a bağlıdır; modal overlay alttaki hitbox'ları engelleyebilir.</text>
  </g>

</svg>
