<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820">
  <title>Input, Hitbox ve Focus Karar Akışı</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowDash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">Input, Hitbox ve Focus Karar Akışı</text>
  <text x="580" y="62" text-anchor="middle" class="subtitle">Mouse hit-test, keyboard focus ve pointer capture farklı karar kanallarından geçer.</text>

  <rect x="60" y="110" width="270" height="116" rx="8" class="card" />
  <rect x="60" y="110" width="270" height="30" rx="8" fill="#0284c7" />
  <path d="M 60 132 H 330 V 140 H 60 Z" fill="#0284c7" />
  <text x="74" y="130" class="cardTitle">1. Platform input</text>
  <text x="74" y="162" class="body">MouseMove, MouseDown, KeyDown.</text>
  <text x="74" y="179" class="body">Window event loop olayı alır.</text>
  <text x="74" y="196" class="body">Koordinat pencere uzayındadır.</text>

  <path d="M 330 168 L 392 168" class="arrowSoft" />

  <rect x="400" y="110" width="270" height="116" rx="8" class="card" />
  <rect x="400" y="110" width="270" height="30" rx="8" fill="#7c3aed" />
  <path d="M 400 132 H 670 V 140 H 400 Z" fill="#7c3aed" />
  <text x="414" y="130" class="cardTitle">2. Hitbox araması</text>
  <text x="414" y="162" class="body">Son prepaint hitbox listesi taranır.</text>
  <text x="414" y="179" class="body">Üstteki ve occlude eden hit kazanır.</text>
  <text x="414" y="196" class="mono">HitboxBehavior</text>

  <path d="M 670 168 L 732 168" class="arrowSoft" />

  <rect x="740" y="110" width="360" height="116" rx="8" class="card" />
  <rect x="740" y="110" width="360" height="30" rx="8" fill="#059669" />
  <path d="M 740 132 H 1100 V 140 H 740 Z" fill="#059669" />
  <text x="754" y="130" class="cardTitle">3. Listener / cursor sonucu</text>
  <text x="754" y="162" class="body">on_mouse_*, on_click ve hover state çalışır.</text>
  <text x="754" y="179" class="body">set_cursor_style hitbox ile ilişkilendirilir.</text>
  <text x="754" y="196" class="body">stop_propagation alttaki hitleri durdurur.</text>

  <rect x="110" y="322" width="280" height="126" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text x="250" y="352" text-anchor="middle" class="label">Keyboard focus</text>
  <text x="250" y="376" text-anchor="middle" class="body">FocusHandle odak sahibini belirler.</text>
  <text x="250" y="396" text-anchor="middle" class="mono">window.focus(&amp;handle)</text>
  <text x="250" y="416" text-anchor="middle" class="body">KeyDown focus path'e dispatch edilir.</text>

  <rect x="440" y="322" width="280" height="126" rx="8" fill="#fef3c7" stroke="#d97706" />
  <text x="580" y="352" text-anchor="middle" class="label">Pointer capture</text>
  <text x="580" y="376" text-anchor="middle" class="body">Mouse olayları belirli hitbox'a kilitlenir.</text>
  <text x="580" y="396" text-anchor="middle" class="mono">set_pointer_capture(&amp;hitbox)</text>
  <text x="580" y="416" text-anchor="middle" class="body">Drag/resize sırasında kararlı hedef sağlar.</text>

  <rect x="770" y="322" width="280" height="126" rx="8" fill="#ede9fe" stroke="#7c3aed" />
  <text x="910" y="352" text-anchor="middle" class="label">Text input / IME</text>
  <text x="910" y="376" text-anchor="middle" class="body">Printable key önce input handler'a gidebilir.</text>
  <text x="910" y="396" text-anchor="middle" class="mono">accepts_text_input()</text>
  <text x="910" y="416" text-anchor="middle" class="body">Keymap önceliği buna göre düşer.</text>

  <path d="M 250 322 C 250 270 235 244 195 226" class="arrowDash" />
  <path d="M 580 322 C 580 270 535 244 535 234" class="arrowDash" />
  <path d="M 910 322 C 910 270 920 244 920 234" class="arrowDash" />

  <rect x="80" y="542" width="1000" height="120" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2" />
  <text x="104" y="572" class="label">Karar özeti</text>
  <text x="104" y="600" class="body">Mouse hedefi hitbox ve occlusion ile seçilir; keyboard hedefi focus path ile seçilir.</text>
  <text x="104" y="624" class="body">Pointer capture aktifse mouse hareketleri koordinat hedefinden bağımsız olarak yakalanan hitbox'a gider.</text>
  <text x="104" y="648" class="body">Cursor sonucu hitbox'a bağlıdır; modal overlay alttaki hitbox'ları engelleyebilir.</text>
</svg>
