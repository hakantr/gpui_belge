<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 670">
  <title>GPUI Platform Seçim Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#d97706" />
    </marker>

    <linearGradient id="g-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706" />
      <stop offset="1" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0284c7" />
      <stop offset="1" stop-color="#0369a1" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; text-anchor: middle; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .card { filter: url(#shadow); }

      .flow-arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-line { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .flow-arrow-dashed-amber { stroke: #d97706; stroke-width: 2.5; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-amber); stroke-linecap: round; stroke-linejoin: round; }

      @keyframes flowPulse {
        0%   { opacity: 1; }
        50%  { opacity: 0.78; }
        100% { opacity: 1; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -24; }
      }
      @keyframes cardLift {
        0%   { opacity: 1; }
        50%  { opacity: 0.92; }
        100% { opacity: 1; }
      }

      .lvl1 { animation: flowPulse 9s ease-in-out infinite; }
      .lvl2 { animation: flowPulse 9s ease-in-out infinite; animation-delay: 0.8s; }
      .lvl3 { animation: flowPulse 9s ease-in-out infinite; animation-delay: 1.6s; }
      .dashed-amber-anim { animation: dash 1.6s linear infinite; }

      @media (prefers-reduced-motion: reduce) {
        .lvl1, .lvl2, .lvl3, .dashed-amber-anim { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI Platform Seçim Akışı</text>
  <text x="550" y="74" class="sub">application() çağrısı işletim sistemine göre doğru platform arka ucunu otomatik döndürür.</text>

  <!-- ================= BAĞLANTILAR (OKLAR) ================= -->

  <g class="lvl1">
    <path d="M 550 160 V 191" class="flow-line" />
    <path d="M 150 191 H 950" class="flow-line" />
    <path d="M 150 191 V 219" class="flow-arrow" />
    <path d="M 350 191 V 219" class="flow-arrow" />
    <path d="M 550 191 V 219" class="flow-arrow" />
    <path d="M 750 191 V 219" class="flow-arrow" />
    <path d="M 950 191 V 219" class="flow-arrow" />
  </g>

  <g class="lvl2">
    <path d="M 550 330 V 361" class="flow-line" />
    <path d="M 450 361 H 650" class="flow-line" />
    <path d="M 450 361 V 389" class="flow-arrow" />
    <path d="M 650 361 V 389" class="flow-arrow" />
  </g>

  <path d="M 950 330 V 389" class="flow-arrow-dashed-amber dashed-amber-anim" />

  <!-- ================= KARTLAR ================= -->

  <!-- Üst düğüm -->
  <g transform="translate(400, 100)" class="lvl1">
    <rect width="300" height="60" rx="12" fill="url(#g-node)" stroke="#38bdf8" stroke-width="1.5" class="card" />
    <text x="150" y="28" class="c-title" style="fill:#38bdf8">gpui_platform::application()</text>
    <text x="150" y="48" class="c-body" style="fill:#94a3b8">İşletim Sistemi Algılar</text>
  </g>

  <!-- Düzey 2: macOS -->
  <g transform="translate(60, 220)" class="lvl2">
    <rect width="180" height="110" rx="12" fill="url(#g-blue)" class="card" />
    <text x="90" y="38" class="c-title">macOS</text>
    <text x="90" y="68" class="c-mono">MacPlatform</text>
    <text x="90" y="90" class="c-mono" style="opacity:0.82">::new(headless)</text>
  </g>

  <!-- Düzey 2: Windows -->
  <g transform="translate(260, 220)" class="lvl2">
    <rect width="180" height="110" rx="12" fill="url(#g-violet)" class="card" />
    <text x="90" y="38" class="c-title">Windows</text>
    <text x="90" y="68" class="c-mono">WindowsPlatform</text>
    <text x="90" y="90" class="c-mono" style="opacity:0.82">::new(headless)</text>
  </g>

  <!-- Düzey 2: Linux / FreeBSD -->
  <g transform="translate(460, 220)" class="lvl2">
    <rect width="180" height="110" rx="12" fill="url(#g-cyan)" class="card" />
    <text x="90" y="38" class="c-title">Linux / FreeBSD</text>
    <text x="90" y="68" class="c-mono">current_platform()</text>
    <text x="90" y="90" class="c-body" style="opacity:0.88">Wayland veya X11 seçer</text>
  </g>

  <!-- Düzey 2: Web / WASM -->
  <g transform="translate(660, 220)" class="lvl2">
    <rect width="180" height="110" rx="12" fill="url(#g-green)" class="card" />
    <text x="90" y="38" class="c-title">Web / WASM</text>
    <text x="90" y="68" class="c-mono">WebPlatform</text>
    <text x="90" y="90" class="c-mono" style="fill:#d1fae5; opacity:0.9">gpui_web</text>
  </g>

  <!-- Düzey 2: Headless -->
  <g transform="translate(860, 220)" class="lvl2">
    <rect width="180" height="110" rx="12" fill="url(#g-amber)" class="card" />
    <text x="90" y="38" class="c-title">Headless</text>
    <text x="90" y="68" class="c-mono">headless()</text>
    <text x="90" y="90" class="c-body" style="opacity:0.88">Pencere Oluşturmaz</text>
  </g>

  <!-- Düzey 3: Wayland -->
  <g transform="translate(370, 390)" class="lvl3">
    <rect width="160" height="70" rx="12" fill="url(#g-sky)" class="card" />
    <text x="80" y="32" class="c-title">Wayland</text>
    <text x="80" y="56" class="c-mono" style="opacity:0.85">gpui_linux</text>
  </g>

  <!-- Düzey 3: X11 -->
  <g transform="translate(570, 390)" class="lvl3">
    <rect width="160" height="70" rx="12" fill="url(#g-sky)" class="card" />
    <text x="80" y="32" class="c-title">X11</text>
    <text x="80" y="56" class="c-mono" style="opacity:0.85">gpui_linux</text>
  </g>

  <!-- Düzey 3: Test Desteği -->
  <g transform="translate(840, 390)" class="lvl3">
    <rect width="220" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" class="card" />
    <text x="110" y="32" class="c-title" style="fill:#b45309">Test Desteği</text>
    <text x="110" y="56" class="c-mono" style="fill:#b45309; font-size:13px">current_headless_renderer()</text>
  </g>

  <!-- Alt bilgi -->
  <g transform="translate(60, 530)">
    <rect width="980" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" class="card" />
    <text x="490" y="34" class="note">Tüm dallar aynı Platform trait yüzeyini karşılar. Uygulama kodu işletim sistemine göre ayrışmaz;</text>
    <text x="490" y="58" class="note">App ve Window sarmalayıcıları bu farkı tamamen gizler.</text>
  </g>

</svg>
