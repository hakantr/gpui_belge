<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820">
  <title>GPUI ve Zed Mimari Katmanları</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 20px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 15px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }

      .card { filter: url(#shadow); }
      .arrow-soft { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      .layer { opacity: 1; animation: layerIn 9s ease-in-out infinite; }
      .l4 { animation-delay: 0s; }
      .l3 { animation-delay: 0.5s; }
      .l2 { animation-delay: 1s; }
      .l1 { animation-delay: 1.5s; }
      .flow { stroke-dasharray: 6 6; animation: flowDash 9s linear infinite; }
      @keyframes layerIn {
        0%   { opacity: 1; }
        45%  { opacity: 0.72; }
        100% { opacity: 1; }
      }
      @keyframes flowDash {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -48; }
      }
      @media (prefers-reduced-motion: reduce) {
        .layer, .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI ve Zed Mimari Katmanları</text>
  <text x="550" y="74" class="sub">Her katman daha alttaki sözleşmeye dayanır; Zed bileşenleri GPUI üzerine kurulur.</text>

  <!-- ================= KATMAN 4 ================= -->
  <g transform="translate(100, 120)" class="layer l4">
    <rect width="900" height="120" rx="12" fill="url(#g-blue)" class="card" />
    <text x="450" y="38" class="c-title">4. Zed Üst Kabuğu</text>
    <text x="24" y="72" class="c-body">• crates/ui, platform_title_bar ve workspace katmanı.</text>
    <text x="24" y="98" class="c-body">• Button, Icon, Label, Modal, ContextMenu, Tooltip, Tab ve başlık çubuğu.</text>
  </g>

  <path d="M 550 240 V 274" class="arrow-soft flow" />

  <!-- ================= KATMAN 3 ================= -->
  <g transform="translate(100, 282)" class="layer l3">
    <rect width="900" height="138" rx="12" fill="url(#g-green)" class="card" />
    <text x="450" y="38" class="c-title">3. Render / Element Katmanı</text>
    <text x="24" y="72" class="c-body">• Render, RenderOnce, IntoElement ve Element sözleşmeleri.</text>
    <text x="24" y="98" class="c-body">• div, canvas, list, uniform_list, img, svg, anchored, deferred ve surface.</text>
    <text x="24" y="124" class="c-body">• Styled ve InteractiveElement bu katmanda davranış ekler.</text>
  </g>

  <path d="M 550 420 V 454" class="arrow-soft flow" />

  <!-- ================= KATMAN 2 ================= -->
  <g transform="translate(100, 462)" class="layer l2">
    <rect width="900" height="138" rx="12" fill="url(#g-purple)" class="card" />
    <text x="450" y="38" class="c-title">2. Uygulama / Durum Katmanı</text>
    <text x="24" y="72" class="c-body">• Application, App, Context&lt;T&gt;, Entity&lt;T&gt;, WeakEntity&lt;T&gt;.</text>
    <text x="24" y="98" class="c-body">• Task, Subscription ve Global ile tipli durum yönetimi.</text>
    <text x="24" y="124" class="c-body">• Olay sistemi ve event loop bu katmanı canlı tutar.</text>
  </g>

  <path d="M 550 600 V 634" class="arrow-soft flow" />

  <!-- ================= KATMAN 1 ================= -->
  <g transform="translate(100, 642)" class="layer l1">
    <rect width="900" height="138" rx="12" fill="url(#g-slate)" class="card" />
    <text x="450" y="38" class="c-title">1. Platform Katmanı</text>
    <text x="24" y="72" class="c-body">• macOS, Windows, Linux, web ve test platformları aynı trait yüzeyini sağlar.</text>
    <text x="24" y="98" class="c-body">• Pencere oluşturma, ekran listesi, pano, sürükle-bırak, ses, dosya seçici ve girdi.</text>
    <text x="24" y="124" class="c-body">• Üst katmanlar yalnızca ortak platform sözleşmesini görür.</text>
  </g>

</svg>
