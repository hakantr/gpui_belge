<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti ve Gölgeler -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#8be9fd"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .flow-path {
        stroke-dasharray: 6, 8;
        animation: flowDash 20s linear infinite;
      }
      .glow-node {
        animation: glowPulse 4s ease-in-out infinite;
      }
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }

      @keyframes flowDash {
        to { stroke-dashoffset: -1000; }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(139, 233, 253, 0.2)); }
        50% { filter: drop-shadow(0 0 8px rgba(139, 233, 253, 0.6)); }
      }
    </style>
  </defs>

  <!-- Arka Plan Kartı -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">GPUI Stil Çözümleme Akışı</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">Fluent API'den GPU Paint Aşamasına Stil Çözümleme Süreci</text>

  <!-- AKIŞ KUTULARI (STEPS) -->

  <!-- Step 1: Fluent API -->
  <g transform="translate(40, 180)" filter="url(#shadow)">
    <rect width="160" height="120" rx="10" fill="#21222c" stroke="#bd93f9" stroke-width="2"/>
    <text x="80" y="30" class="text-style" font-size="13" font-weight="600" text-anchor="middle">1. Fluent API</text>
    <rect x="15" y="48" width="130" height="55" rx="6" fill="#bd93f9" fill-opacity="0.1"/>
    <text x="25" y="66" fill="#bd93f9" font-family="monospace" font-size="9">div()</text>
    <text x="25" y="80" fill="#bd93f9" font-family="monospace" font-size="9">  .flex()</text>
    <text x="25" y="94" fill="#bd93f9" font-family="monospace" font-size="9">  .bg(gpui::red())</text>
  </g>

  <!-- Step 2: gpui::Style Object -->
  <g transform="translate(290, 180)" filter="url(#shadow)">
    <rect width="160" height="120" rx="10" fill="#21222c" stroke="#ffb86c" stroke-width="2"/>
    <text x="80" y="30" class="text-style" font-size="13" font-weight="600" text-anchor="middle">2. Style Struct</text>
    <rect x="15" y="48" width="130" height="55" rx="6" fill="#ffb86c" fill-opacity="0.1"/>
    <text x="80" y="68" fill="#ffb86c" font-size="10" text-anchor="middle" font-weight="600">Veri Modeli</text>
    <text x="80" y="85" fill="#6272a4" font-size="9" text-anchor="middle">Layout &amp; Paint Özellikleri</text>
  </g>

  <!-- Step 3: Layout Engine (Taffy) -->
  <g transform="translate(540, 120)" filter="url(#shadow)" class="glow-node">
    <rect width="200" height="100" rx="10" fill="#21222c" stroke="#8be9fd" stroke-width="2"/>
    <text x="100" y="30" class="text-style" font-size="13" font-weight="600" text-anchor="middle">3. Layout (Taffy)</text>
    <text x="100" y="50" fill="#6272a4" font-size="10" text-anchor="middle">Geometri &amp; Flexbox Hesabı</text>
    <rect x="20" y="65" width="160" height="20" rx="4" fill="#8be9fd" fill-opacity="0.15"/>
    <text x="100" y="78" fill="#8be9fd" font-size="9" font-weight="600" text-anchor="middle">request_layout() -> Bounds</text>
  </g>

  <!-- Step 4: Paint Engine (GPU) -->
  <g transform="translate(540, 260)" filter="url(#shadow)">
    <rect width="200" height="100" rx="10" fill="#21222c" stroke="#50fa7b" stroke-width="2"/>
    <text x="100" y="30" class="text-style" font-size="13" font-weight="600" text-anchor="middle">4. Paint (GPU)</text>
    <text x="100" y="50" fill="#6272a4" font-size="10" text-anchor="middle">Quad &amp; SVG Çizim Komutları</text>
    <rect x="20" y="65" width="160" height="20" rx="4" fill="#50fa7b" fill-opacity="0.15"/>
    <text x="100" y="78" fill="#50fa7b" font-size="9" font-weight="600" text-anchor="middle">paint() -> Primitive Commands</text>
  </g>

  <!-- AKIŞ ÇİZGİLERİ VE OKLAR -->

  <!-- Step 1 -> Step 2 -->
  <path d="M 200 240 L 290 240" fill="none" stroke="#bd93f9" stroke-width="2"/>
  <path d="M 200 240 L 290 240" fill="none" stroke="#bd93f9" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="290,240 280,235 280,245" fill="#bd93f9"/>

  <!-- Step 2 -> Step 3 (Layout) -->
  <path d="M 450 220 L 490 220 L 490 170 L 540 170" fill="none" stroke="#8be9fd" stroke-width="2"/>
  <path d="M 450 220 L 490 220 L 490 170 L 540 170" fill="none" stroke="#8be9fd" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="540,170 530,165 530,175" fill="#8be9fd"/>
  <text x="495" y="150" fill="#8be9fd" font-size="9" font-weight="600" text-anchor="middle">Layout</text>

  <!-- Step 2 -> Step 4 (Paint) -->
  <path d="M 450 260 L 490 260 L 490 310 L 540 310" fill="none" stroke="#50fa7b" stroke-width="2"/>
  <path d="M 450 260 L 490 260 L 490 310 L 540 310" fill="none" stroke="#50fa7b" stroke-dasharray="6,8" stroke-width="3" class="flow-path"/>
  <polygon points="540,310 530,305 530,315" fill="#50fa7b"/>
  <text x="495" y="335" fill="#50fa7b" font-size="9" font-weight="600" text-anchor="middle">Paint</text>

</svg>
