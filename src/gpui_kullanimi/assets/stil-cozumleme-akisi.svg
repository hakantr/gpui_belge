<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>GPUI stil çözümleme akışı</title>
  <defs>
    <marker id="aSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="aEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
    <marker id="aViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#7c3aed"/></marker>
    <marker id="aCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0891b2"/></marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
    <marker id="aRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#be123c"/></marker>
    <marker id="aSky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0284c7"/></marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#475569}
      .h{font-size:13px;font-weight:700;fill:#0f172a}
      .t{font-size:12px;font-weight:600;fill:#0f172a}
      .body{font-size:11px;fill:#475569}
      .small{font-size:10px;fill:#64748b}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;fill:#0f172a}
      .card{fill:#fff;stroke-width:1.6}
      .tEmerald{fill:#059669}.tViolet{fill:#7c3aed}.tCyan{fill:#0891b2}.tAmber{fill:#d97706}.tRose{fill:#be123c}.tSky{fill:#0284c7}.tSlate{fill:#64748b}.tWhite{fill:#fff}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#aSlate)}
      .aEm{stroke:#059669;marker-end:url(#aEmerald)}.aVi{stroke:#7c3aed;marker-end:url(#aViolet)}.aCy{stroke:#0891b2;marker-end:url(#aCyan)}.aAm{stroke:#d97706;marker-end:url(#aAmber)}.aRo{stroke:#be123c;marker-end:url(#aRose)}.aSk{stroke:#0284c7;marker-end:url(#aSky)}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc"/>

  <text x="400" y="40" text-anchor="middle" class="title">GPUI Stil Çözümleme Akışı</text>
  <text x="400" y="63" text-anchor="middle" class="sub">Fluent API'den GPU paint aşamasına stil çözümleme süreci</text>

  <!-- 1. Fluent API -->
  <g transform="translate(40,180)">
    <rect width="160" height="120" rx="10" class="card" stroke="#7c3aed"/>
    <text x="80" y="30" text-anchor="middle" class="t">1. Fluent API</text>
    <rect x="15" y="48" width="130" height="55" rx="6" fill="#7c3aed" fill-opacity="0.08"/>
    <text x="25" y="66" class="mono tViolet">div()</text>
    <text x="25" y="80" class="mono tViolet">  .flex()</text>
    <text x="25" y="94" class="mono tViolet">  .bg(gpui::red())</text>
  </g>

  <!-- 2. Style Struct -->
  <g transform="translate(290,180)">
    <rect width="160" height="120" rx="10" class="card" stroke="#d97706"/>
    <text x="80" y="30" text-anchor="middle" class="t">2. Style Struct</text>
    <rect x="15" y="48" width="130" height="55" rx="6" fill="#d97706" fill-opacity="0.08"/>
    <text x="80" y="70" text-anchor="middle" class="t tAmber">Veri modeli</text>
    <text x="80" y="88" text-anchor="middle" class="small">Layout ve paint özellikleri</text>
  </g>

  <!-- 3. Layout (Taffy) -->
  <g transform="translate(540,120)">
    <rect width="200" height="100" rx="10" class="card" stroke="#0284c7"/>
    <text x="100" y="30" text-anchor="middle" class="t">3. Layout (Taffy)</text>
    <text x="100" y="50" text-anchor="middle" class="small">Geometri ve flexbox hesabı</text>
    <rect x="20" y="63" width="160" height="22" rx="4" fill="#0284c7" fill-opacity="0.1"/>
    <text x="100" y="78" text-anchor="middle" class="mono tSky" font-weight="600">request_layout() → Bounds</text>
  </g>

  <!-- 4. Paint (GPU) -->
  <g transform="translate(540,260)">
    <rect width="200" height="100" rx="10" class="card" stroke="#059669"/>
    <text x="100" y="30" text-anchor="middle" class="t">4. Paint (GPU)</text>
    <text x="100" y="50" text-anchor="middle" class="small">Quad ve SVG çizim komutları</text>
    <rect x="20" y="63" width="160" height="22" rx="4" fill="#059669" fill-opacity="0.1"/>
    <text x="100" y="78" text-anchor="middle" class="mono tEmerald" font-weight="600">paint() → çizim komutları</text>
  </g>

  <!-- 1 -> 2 -->
  <path d="M 200 240 L 290 240" class="arrow aVi"/>

  <!-- 2 -> 3 (yerleşim) -->
  <path d="M 450 220 L 490 220 L 490 170 L 540 170" class="arrow aSk"/>
  <text x="495" y="152" text-anchor="middle" class="small tSky" font-weight="600">Yerleşim</text>

  <!-- 2 -> 4 (çizim) -->
  <path d="M 450 260 L 490 260 L 490 310 L 540 310" class="arrow aEm"/>
  <text x="495" y="335" text-anchor="middle" class="small tEmerald" font-weight="600">Çizim</text>
</svg>
