<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520">
  <title>GPUI Stil Çözümleme Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#d97706" />
    </marker>
    <marker id="arrow-sky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#0284c7" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#059669" />
    </marker>

    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.95; }

      .step-num { font: 800 13px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }

      .edge { font: 800 14px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .note { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      /* Akan kesik çizgi animasyonu (akış vurgusu) */
      .flow { stroke-dasharray: 10 6; animation: dash 9s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -160; } }

      /* Sıralı belirme — kartlar akış yönünde nabız atar; opaklık 0.78 altına inmez */
      .pulse-1 { animation: pulse 10s ease-in-out infinite; }
      .pulse-2 { animation: pulse 10s ease-in-out infinite; animation-delay: 2.5s; }
      .pulse-3 { animation: pulse 10s ease-in-out infinite; animation-delay: 5s; }
      .pulse-4 { animation: pulse 10s ease-in-out infinite; animation-delay: 5s; }
      @keyframes pulse {
        0%   { opacity: 1; }
        12%  { opacity: 1; }
        50%  { opacity: 0.82; }
        100% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; }
        .pulse-1, .pulse-2, .pulse-3, .pulse-4 { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="50" class="title">GPUI Stil Çözümleme Akışı</text>
  <text x="550" y="80" class="sub">Fluent API'den GPU paint aşamasına stil çözümleme süreci</text>

  <!-- 1. Fluent API -->
  <g transform="translate(60, 200)" class="pulse-1">
    <rect width="250" height="160" rx="12" fill="url(#g-violet)" filter="url(#shadow)" />
    <circle cx="32" cy="32" r="15" fill="#ffffff" opacity="0.18" />
    <text x="32" y="37" class="step-num" style="fill:#ffffff">1</text>
    <text x="142" y="38" class="c-title">Fluent API</text>
    <line x1="20" y1="54" x2="230" y2="54" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" />

    <rect x="20" y="68" width="210" height="78" rx="8" fill="#5b21b6" stroke="#4c1d95" stroke-width="2" />
    <text x="38" y="92" class="c-mono">div()</text>
    <text x="38" y="113" class="c-mono">  .flex()</text>
    <text x="38" y="134" class="c-mono">  .bg(gpui::red())</text>
  </g>

  <!-- 2. Style Struct -->
  <g transform="translate(400, 200)" class="pulse-2">
    <rect width="250" height="160" rx="12" fill="url(#g-amber)" filter="url(#shadow)" />
    <circle cx="32" cy="32" r="15" fill="#ffffff" opacity="0.18" />
    <text x="32" y="37" class="step-num" style="fill:#ffffff">2</text>
    <text x="142" y="38" class="c-title">Style Struct</text>
    <line x1="20" y1="54" x2="230" y2="54" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" />

    <rect x="20" y="68" width="210" height="78" rx="8" fill="#b45309" stroke="#92400e" stroke-width="2" />
    <text x="125" y="100" class="c-title" font-size="16">Veri Modeli</text>
    <text x="125" y="126" class="c-body" text-anchor="middle">Layout ve paint özellikleri</text>
  </g>

  <!-- 3. Layout (Taffy) -->
  <g transform="translate(800, 120)" class="pulse-3">
    <rect width="250" height="130" rx="12" fill="url(#g-sky)" filter="url(#shadow)" />
    <circle cx="32" cy="32" r="15" fill="#ffffff" opacity="0.18" />
    <text x="32" y="37" class="step-num" style="fill:#ffffff">3</text>
    <text x="142" y="38" class="c-title">Layout (Taffy)</text>
    <line x1="20" y1="54" x2="230" y2="54" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" />

    <text x="125" y="76" class="c-body" text-anchor="middle">Geometri ve flexbox hesabı</text>
    <rect x="20" y="90" width="210" height="28" rx="6" fill="#0369a1" />
    <text x="125" y="109" class="c-mono" text-anchor="middle">request_layout() → Bounds</text>
  </g>

  <!-- 4. Paint (GPU) -->
  <g transform="translate(800, 310)" class="pulse-4">
    <rect width="250" height="130" rx="12" fill="url(#g-green)" filter="url(#shadow)" />
    <circle cx="32" cy="32" r="15" fill="#ffffff" opacity="0.18" />
    <text x="32" y="37" class="step-num" style="fill:#ffffff">4</text>
    <text x="142" y="38" class="c-title">Paint (GPU)</text>
    <line x1="20" y1="54" x2="230" y2="54" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" />

    <text x="125" y="76" class="c-body" text-anchor="middle">Quad ve SVG çizim komutları</text>
    <rect x="20" y="90" width="210" height="28" rx="6" fill="#047857" />
    <text x="125" y="109" class="c-mono" text-anchor="middle">paint() → çizim komutları</text>
  </g>

  <!-- ================= BAĞLANTILAR ================= -->

  <!-- 1 -> 2 -->
  <path d="M 310 280 H 400" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-violet)" class="flow" />

  <!-- 2 -> 3 (yerleşim) -->
  <path d="M 650 250 C 720 250 730 185 800 185" fill="none" stroke="#0284c7" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-sky)" class="flow" />
  <rect x="690" y="190" width="86" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="733" y="208" class="edge" style="fill:#0284c7">Yerleşim</text>

  <!-- 2 -> 4 (çizim) -->
  <path d="M 650 310 C 720 310 730 375 800 375" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" class="flow" />
  <rect x="700" y="362" width="66" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="733" y="380" class="edge" style="fill:#059669">Çizim</text>

  <!-- Alt bilgi şeridi: süreç özeti -->
  <g transform="translate(0, 478)">
    <text x="550" y="0" class="note">Bildirimsel stil → veri modeli → yerleşim geometrisi → GPU çizim komutları</text>
  </g>

</svg>
