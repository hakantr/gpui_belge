<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820">
  <title>Asset Yükleme Pipeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #fff; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .edge { font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .arrowSoft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
      .bus { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .branch { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc" />
  <text x="580" y="36" text-anchor="middle" class="title">Asset Yükleme Pipeline</text>
  <text x="580" y="62" text-anchor="middle" class="subtitle">Gömülü veya disk kaynaklı varlıklar, AssetSource üzerinden tipli tüketim yüzeylerine ayrılır.</text>

  <rect x="60" y="100" width="250" height="126" rx="8" class="card" />
  <rect x="60" y="100" width="250" height="30" rx="8" fill="#0284c7" />
  <path d="M 60 122 H 310 V 130 H 60 Z" fill="#0284c7" />
  <text x="74" y="120" class="cardTitle">Kaynaklar</text>
  <text x="74" y="152" class="body">include_dir / rust-embed.</text>
  <text x="74" y="169" class="body">Disk asset source.</text>
  <text x="74" y="186" class="body">Testte fake veya dış asset.</text>

  <path d="M 310 163 L 382 163" class="arrowSoft" />

  <rect x="390" y="100" width="300" height="126" rx="8" class="card" />
  <rect x="390" y="100" width="300" height="30" rx="8" fill="#7c3aed" />
  <path d="M 390 122 H 690 V 130 H 390 Z" fill="#7c3aed" />
  <text x="404" y="120" class="cardTitle">AssetSource</text>
  <text x="404" y="152" class="body">path -> bytes çözümleme.</text>
  <text x="404" y="169" class="body">MIME / uzantı ayrımı.</text>
  <text x="404" y="186" class="body">Cache ve hata raporlama katmanı.</text>

  <path d="M 690 163 L 762 163" class="arrowSoft" />

  <rect x="770" y="100" width="330" height="126" rx="8" class="card" />
  <rect x="770" y="100" width="330" height="30" rx="8" fill="#059669" />
  <path d="M 770 122 H 1100 V 130 H 770 Z" fill="#059669" />
  <text x="784" y="120" class="cardTitle">Application::with_assets</text>
  <text x="784" y="152" class="body">Runtime'a asset provider bağlanır.</text>
  <text x="784" y="169" class="body">UI ve servis katmanları aynı yüzeyi okur.</text>
  <text x="784" y="186" class="body">Eksik asset erken görünür hata üretir.</text>

  <rect x="60" y="300" width="210" height="126" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text x="165" y="330" text-anchor="middle" class="label">SVG / Icon</text>
  <text x="165" y="354" text-anchor="middle" class="small">svg path, symbol, icon registry</text>
  <text x="165" y="374" text-anchor="middle" class="mono">paint_svg</text>

  <rect x="295" y="300" width="210" height="126" rx="8" fill="#d1fae5" stroke="#059669" />
  <text x="400" y="330" text-anchor="middle" class="label">Raster image</text>
  <text x="400" y="354" text-anchor="middle" class="small">png, jpg, webp</text>
  <text x="400" y="374" text-anchor="middle" class="mono">img(...) / paint_image</text>

  <rect x="530" y="300" width="210" height="126" rx="8" fill="#fef3c7" stroke="#d97706" />
  <text x="635" y="330" text-anchor="middle" class="label">Font</text>
  <text x="635" y="354" text-anchor="middle" class="small">font family, weight, style</text>
  <text x="635" y="374" text-anchor="middle" class="mono">text_system</text>

  <rect x="765" y="300" width="210" height="126" rx="8" fill="#ede9fe" stroke="#7c3aed" />
  <text x="870" y="330" text-anchor="middle" class="label">JSON</text>
  <text x="870" y="354" text-anchor="middle" class="small">settings, schema, metadata</text>
  <text x="870" y="374" text-anchor="middle" class="mono">serde parse</text>

  <rect x="530" y="492" width="210" height="126" rx="8" fill="#ffe4e6" stroke="#be123c" />
  <text x="635" y="522" text-anchor="middle" class="label">Sound / binary</text>
  <text x="635" y="546" text-anchor="middle" class="small">wav, raw bytes, model data</text>
  <text x="635" y="566" text-anchor="middle" class="mono">audio / custom parser</text>

  <path d="M 540 226 L 540 258 M 165 258 H 870" class="bus" />
  <path d="M 165 258 L 165 292" class="branch" />
  <path d="M 400 258 L 400 292" class="branch" />
  <path d="M 635 258 L 635 292" class="branch" />
  <path d="M 870 258 L 870 292" class="branch" />
  <path d="M 870 258 H 1030 V 555 H 748" class="branch" />

  <rect x="80" y="664" width="1000" height="74" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2" />
  <text x="104" y="692" class="label">Test stratejisi</text>
  <text x="104" y="718" class="small">Headless testte asset source açıkça bağlanır; dış dosyaya bağımlı testlerde path ve eksik asset hatası görünür yapılır.</text>
</svg>
