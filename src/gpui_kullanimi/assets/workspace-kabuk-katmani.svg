<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600">
  <title>workspace Kabuk Katmanı</title>
  <desc>Workspace katmanının pencere kromunu, istemci tarafı süslemesini, resize bölgelerini ve ana çalışma alanı içeriğini tek bir kabukta birleştirmesi.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="deep-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f7" />
      <stop offset="1" stop-color="#dde5ee" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe" />
      <stop offset="1" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5" />
      <stop offset="1" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="g-stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="g-csd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      .label-title { font: 800 16px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .label-body { font: 600 14px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .label-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; }
      .anchor-label { font: 800 15px system-ui, -apple-system, sans-serif; fill: #334155; text-anchor: middle; }

      @keyframes pulse-handle {
        0%   { opacity: 1; }
        50%  { opacity: 0.7; }
        100% { opacity: 1; }
      }
      .resize-handle { animation: pulse-handle 9s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .resize-handle { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="50" class="title">workspace: Uygulama Kabuğu</text>
  <text x="550" y="78" class="sub">Başlık, dekorasyon, resize alanları ve pencere içeriği aynı bütün içinde toplanır.</text>

  <!-- ================= GÖLGE VE ÇERÇEVE ================= -->
  <rect x="106" y="118" width="888" height="350" rx="16" fill="#cbd5e1" opacity="0.40" filter="url(#deep-shadow)" />
  <rect x="100" y="110" width="900" height="350" rx="14" fill="url(#g-frame)" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />

  <!-- ================= PENCERE KROMU VE BAŞLIK ================= -->
  <rect x="100" y="110" width="900" height="50" rx="14" fill="url(#g-chrome)" stroke="#94a3b8" stroke-width="2" />
  <!-- Düzleştirme (alt köşelerin yuvarlaklığını kaldır) -->
  <path d="M 100 144 H 1000 V 160 H 100 Z" fill="#dde5ee" />
  <line x1="100" y1="160" x2="1000" y2="160" stroke="#94a3b8" stroke-width="1" />

  <text x="130" y="140" class="label-mono" style="fill:#334155">platform_title_bar</text>

  <!-- macOS pencere düğmeleri -->
  <circle cx="892" cy="135" r="7" fill="#10b981" />
  <circle cx="916" cy="135" r="7" fill="#f59e0b" />
  <circle cx="940" cy="135" r="7" fill="#e11d48" />

  <!-- Başlık öğesi -->
  <rect x="350" y="120" width="400" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="550" y="140" class="label-body" style="fill:#64748b">titlebar item / ürün başlığı</text>

  <!-- ================= İÇERİK BÖLGELERİ ================= -->

  <!-- Sol Panel (Dock) -->
  <rect x="120" y="180" width="120" height="220" rx="8" fill="url(#g-sky)" stroke="#7dd3fc" stroke-width="2" filter="url(#shadow)" />
  <text x="180" y="218" class="label-title" style="fill:#0369a1">Dock</text>
  <text x="180" y="244" class="label-body" style="fill:#0284c7">panel</text>
  <text x="180" y="266" class="label-body" style="fill:#0284c7">araçlar</text>

  <!-- Orta İçerik (Pane ve Editör) -->
  <rect x="260" y="180" width="500" height="220" rx="8" fill="url(#g-stage)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />

  <rect x="280" y="200" width="220" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="390" y="223" class="label-body" style="fill:#94a3b8; font-size:13px">sekme</text>
  <rect x="520" y="200" width="220" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="630" y="223" class="label-body" style="fill:#94a3b8; font-size:13px">sekme</text>

  <rect x="280" y="255" width="460" height="125" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="510" y="305" class="label-title" style="fill:#334155">Pane ve Editör İçeriği</text>
  <text x="510" y="332" class="label-body" style="fill:#64748b">sekme, split, aktif item</text>

  <!-- Sağ Panel (Yan Panel) -->
  <rect x="780" y="180" width="200" height="220" rx="8" fill="url(#g-green)" stroke="#86efac" stroke-width="2" filter="url(#shadow)" />
  <text x="880" y="218" class="label-title" style="fill:#047857">Yan Panel</text>
  <text x="880" y="244" class="label-body" style="fill:#059669">assistant, outline, search</text>

  <rect x="800" y="278" width="160" height="102" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" />
  <text x="880" y="335" class="label-body" style="fill:#059669">workspace state</text>

  <!-- ================= ALT SÜSLEMELER (CSD) ================= -->

  <rect x="120" y="418" width="860" height="24" rx="6" fill="url(#g-csd)" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="550" y="434" class="label-body" style="fill:#64748b">client_side_decorations: gölge, kenarlık, inset ve resize bölgeleri</text>

  <!-- Yeniden Boyutlandırma (Resize) Kutucukları -->
  <rect class="resize-handle" x="93" y="103" width="16" height="16" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="2" />
  <rect class="resize-handle" x="991" y="103" width="16" height="16" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="2" style="animation-delay:-2.25s" />
  <rect class="resize-handle" x="93" y="451" width="16" height="16" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="2" style="animation-delay:-4.5s" />
  <rect class="resize-handle" x="991" y="451" width="16" height="16" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="2" style="animation-delay:-6.75s" />

  <!-- ================= AÇIKLAYICI OKLAR ================= -->

  <path d="M 180 522 V 472" class="arrow-line" />
  <text x="180" y="548" class="anchor-label">Panellerin Yerleşimi</text>

  <path d="M 550 522 V 472" class="arrow-line" />
  <text x="550" y="548" class="anchor-label">Pencere Kromu</text>

  <path d="M 920 522 V 472" class="arrow-line" />
  <text x="920" y="548" class="anchor-label">Yeniden Boyutlandırma</text>

</svg>
