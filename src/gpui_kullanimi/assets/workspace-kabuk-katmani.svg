<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430">
  <title>workspace Kabuk Katmanı</title>
  <desc>Workspace katmanının pencere kromunu, istemci tarafı süslemesini, resize bölgelerini ve ana çalışma alanı içeriğini tek bir kabukta birleştirmesi.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#334155" stroke="#334155" stroke-width="1pt" />
    </marker>
    <marker id="dot-arrow" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 22px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .frame { fill: #fff; stroke: #94a3b8; stroke-width: 1.5; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .chrome { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.2; }
      .resize { fill: #fde68a; stroke: #f59e0b; stroke-width: 1; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#dot-arrow); }
    </style>
  </defs>

  <rect width="960" height="430" rx="10" fill="#f8fafc" />
  <text x="480" y="36" text-anchor="middle" class="title">workspace: uygulama kabuğu</text>
  <text x="480" y="60" text-anchor="middle" class="subtitle">Başlık, dekorasyon, resize alanları ve pencere içeriği aynı bütün içinde toplanır.</text>

  <rect x="88" y="96" width="784" height="276" rx="16" fill="#cbd5e1" opacity="0.45" filter="url(#shadow)" />
  <rect x="92" y="88" width="776" height="276" rx="14" class="frame" />

  <rect x="92" y="88" width="776" height="42" rx="14" class="chrome" />
  <path d="M 92 116 H 868 V 130 H 92 Z" fill="#e2e8f0" />
  <text x="112" y="114" class="mono">platform_title_bar</text>
  <rect x="324" y="99" width="312" height="20" rx="5" fill="#fff" stroke="#cbd5e1" />
  <text x="480" y="114" text-anchor="middle" class="small">titlebar item / ürün başlığı</text>
  <circle cx="812" cy="109" r="6" fill="#38bdf8" />
  <circle cx="834" cy="109" r="6" fill="#38bdf8" />
  <circle cx="856" cy="109" r="6" fill="#ef4444" />

  <rect x="104" y="142" width="92" height="186" rx="7" fill="#e0f2fe" stroke="#7dd3fc" />
  <text x="150" y="166" text-anchor="middle" class="label">Dock</text>
  <text x="150" y="184" text-anchor="middle" class="small">panel</text>
  <text x="150" y="202" text-anchor="middle" class="small">araçlar</text>

  <rect x="208" y="142" width="430" height="186" rx="7" class="panel" />
  <rect x="222" y="158" width="184" height="28" rx="5" fill="#fff" stroke="#cbd5e1" />
  <rect x="420" y="158" width="184" height="28" rx="5" fill="#fff" stroke="#cbd5e1" />
  <rect x="222" y="204" width="382" height="94" rx="6" fill="#fff" stroke="#cbd5e1" />
  <text x="423" y="246" text-anchor="middle" class="label">Pane ve editör içeriği</text>
  <text x="423" y="264" text-anchor="middle" class="small">sekme, split, aktif item</text>

  <rect x="650" y="142" width="206" height="186" rx="7" fill="#f0fdf4" stroke="#86efac" />
  <text x="753" y="166" text-anchor="middle" class="label">Yan panel</text>
  <text x="753" y="184" text-anchor="middle" class="small">assistant, outline, search</text>
  <rect x="672" y="208" width="162" height="78" rx="6" fill="#fff" stroke="#bbf7d0" />
  <text x="753" y="248" text-anchor="middle" class="small">workspace state</text>

  <rect x="104" y="338" width="752" height="14" rx="4" fill="#f1f5f9" stroke="#cbd5e1" />
  <text x="480" y="349" text-anchor="middle" class="small">client_side_decorations: gölge, kenarlık, inset ve resize bölgeleri</text>

  <rect x="86" y="82" width="14" height="14" rx="3" class="resize" />
  <rect x="860" y="82" width="14" height="14" rx="3" class="resize" />
  <rect x="86" y="356" width="14" height="14" rx="3" class="resize" />
  <rect x="860" y="356" width="14" height="14" rx="3" class="resize" />

  <path d="M 160 378 L 160 340" class="arrow" />
  <text x="160" y="402" text-anchor="middle" class="body">panellerin yerleşimi</text>
  <path d="M 480 378 L 480 340" class="arrow" />
  <text x="480" y="402" text-anchor="middle" class="body">pencere kromu</text>
  <path d="M 786 378 L 786 340" class="arrow" />
  <text x="786" y="402" text-anchor="middle" class="body">yeniden boyutlandırma</text>
</svg>
