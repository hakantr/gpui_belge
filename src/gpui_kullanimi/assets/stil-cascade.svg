<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 940">
  <title>Refineable / StyleRefinement / Cascade / MergeFrom</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" /><stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" /><stop offset="1" stop-color="#be123c" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .c-mono { font: 700 13.5px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; }

      .card { filter: url(#shadow); }
      .arrow-soft { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-flow { stroke: #0ea5e9; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 7 7; }

      .edge { font: 700 13px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; }
      .section-label { font: 800 18px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }

      @keyframes flow { to { stroke-dashoffset: -28; } }
      .flow { animation: flow 1.2s linear infinite; }

      @keyframes stepGlow {
        0%, 100% { opacity: 0.0; }
        50%      { opacity: 1.0; }
      }
      .step1 { animation: stepGlow 10s ease-in-out infinite; }
      .step2 { animation: stepGlow 10s ease-in-out infinite; animation-delay: 2.5s; }
      .step3 { animation: stepGlow 10s ease-in-out infinite; animation-delay: 5s; }
      .step4 { animation: stepGlow 10s ease-in-out infinite; animation-delay: 7.5s; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="580" y="46" class="title">Refineable / StyleRefinement / Cascade / MergeFrom</text>
  <text x="580" y="74" class="sub">Zorunlu style alanlarından opsiyonel refinement üretimi ve çizim sırasında uygulama sırası.</text>

  <!-- ================= BÖLÜM 1: REFINEABLE ================= -->
  <text x="580" y="120" class="section-label">1. Refineable: zorunlu alanlardan opsiyonel ikiz türetilir</text>

  <g transform="translate(60, 140)">
    <rect width="320" height="140" rx="12" fill="url(#g-sky)" class="card" />
    <text x="160" y="35" class="c-title">Style</text>
    <text x="20" y="66" class="c-body">• Temel struct; her alan zorunlu.</text>
    <text x="20" y="90" class="c-mono">• font_size: AbsoluteLength</text>
    <text x="20" y="111" class="c-mono">• background: Fill</text>
    <text x="20" y="132" class="c-mono">• border_widths: Edges&lt;...&gt;</text>
  </g>

  <path d="M 380 210 H 442" class="arrow-soft" />
  <path d="M 380 210 H 442" class="arrow-flow flow" />
  <text x="411" y="198" class="edge">derive</text>

  <g transform="translate(452, 140)">
    <rect width="296" height="140" rx="12" fill="url(#g-purple)" class="card" />
    <text x="148" y="35" class="c-title">StyleRefinement</text>
    <text x="20" y="66" class="c-body">• Her alan Option ile sarılı ikiz.</text>
    <text x="20" y="90" class="c-mono">• font_size: Option&lt;AbsoluteLength&gt;</text>
    <text x="20" y="111" class="c-mono">• background: Option&lt;Fill&gt;</text>
    <text x="20" y="132" class="c-mono">• border_widths: Option&lt;...&gt;</text>
  </g>

  <path d="M 748 210 H 810" class="arrow-soft" />
  <path d="M 748 210 H 810" class="arrow-flow flow" />
  <text x="779" y="198" class="edge">refine</text>

  <g transform="translate(820, 140)">
    <rect width="280" height="140" rx="12" fill="url(#g-green)" class="card" />
    <text x="140" y="35" class="c-title">Style — yenilenmiş</text>
    <text x="20" y="66" class="c-body">• Her alan dolu; çizimde kullanılır.</text>
    <text x="20" y="90" class="c-body">• Some yazar; None değeri korur.</text>
    <text x="20" y="111" class="c-mono">• from_cascade(&amp;cascade)</text>
    <text x="20" y="132" class="c-mono">&#160;&#160;-&gt; Self</text>
  </g>

  <!-- BİLGİ KUTUSU 1 -->
  <g transform="translate(60, 300)">
    <rect width="1040" height="62" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" class="card" />
    <text x="22" y="26" class="c-body" style="fill:#5b21b6">• Refineable derive'ı Style, TextStyle, UnderlineStyle, StrikethroughStyle ve tema renkleri için refinement ikizleri üretir.</text>
    <text x="22" y="47" class="c-body" style="fill:#5b21b6">• Tema tarafında ThemeColors, StatusColors ve HighlightStyle aynı mantığı kullanır.</text>
  </g>

  <!-- ================= BÖLÜM 2: INTERACTIVITY ================= -->
  <text x="580" y="412" class="section-label">2. Interactivity: GPUI çekirdeği paralel Option&lt;Box&lt;StyleRefinement&gt;&gt; alanları kullanır</text>

  <g transform="translate(60, 432)">
    <rect width="500" height="200" rx="12" fill="url(#g-amber)" class="card" />
    <text x="250" y="35" class="c-title">Interactivity</text>
    <text x="20" y="66" class="c-mono">• base_style: StyleRefinement</text>
    <text x="20" y="88" class="c-mono">• hover_style: Option&lt;Box&lt;StyleRefinement&gt;&gt;</text>
    <text x="20" y="110" class="c-mono">• active_style: Option&lt;Box&lt;StyleRefinement&gt;&gt;</text>
    <text x="20" y="132" class="c-mono">• focus_style: Option&lt;Box&lt;StyleRefinement&gt;&gt;</text>
    <text x="20" y="154" class="c-mono">• in_focus_style: Option&lt;Box&lt;StyleRefinement&gt;&gt;</text>
    <text x="20" y="176" class="c-mono">• focus_visible_style: Option&lt;Box&lt;...&gt;&gt;</text>
    <text x="20" y="195" class="c-body" opacity="0.9">• group_hover_style / group_active_style vb.</text>
  </g>

  <path d="M 560 532 H 622" class="arrow-soft" />
  <path d="M 560 532 H 622" class="arrow-flow flow" />

  <g transform="translate(630, 432)">
    <rect width="470" height="200" rx="12" fill="url(#g-green)" class="card" />
    <text x="235" y="35" class="c-title">Paint zamanında zincirleme refine</text>
    <text x="20" y="66" class="c-mono">• let mut s = Style::default();</text>
    <g>
      <rect class="step1" x="10" y="76" width="450" height="22" rx="6" fill="#ffffff" opacity="0" />
      <text x="20" y="92" class="c-mono">• s.refine(&amp;base_style);</text>
    </g>
    <g>
      <rect class="step2" x="10" y="98" width="450" height="22" rx="6" fill="#ffffff" opacity="0" />
      <text x="20" y="114" class="c-mono">• if hover { s.refine(&amp;hover_style); }</text>
    </g>
    <g>
      <rect class="step3" x="10" y="120" width="450" height="22" rx="6" fill="#ffffff" opacity="0" />
      <text x="20" y="136" class="c-mono">• if active { s.refine(&amp;active_style); }</text>
    </g>
    <g>
      <rect class="step4" x="10" y="142" width="450" height="22" rx="6" fill="#ffffff" opacity="0" />
      <text x="20" y="158" class="c-mono">• if focused { s.refine(&amp;focus_style); }</text>
    </g>
    <text x="20" y="180" class="c-mono">• if focus_visible { s.refine(&amp;focus_visible_style); }</text>
    <text x="20" y="195" class="c-body"  font-weight="800" style="fill:#a7f3d0">Son uygulanan refinement kazanır.</text>
  </g>

  <!-- ================= BÖLÜM 3: CASCADE VE MERGEFROM ================= -->
  <text x="580" y="682" class="section-label">3. Yan desenler: Cascade ve MergeFrom</text>

  <g transform="translate(60, 702)">
    <rect width="500" height="160" rx="12" fill="url(#g-slate)" class="card" />
    <text x="250" y="35" class="c-title">Cascade&lt;S: Refineable&gt; / CascadeSlot</text>
    <text x="20" y="66" class="c-mono">• Cascade(Vec&lt;Option&lt;S::Refinement&gt;&gt;).</text>
    <text x="20" y="88" class="c-mono">• slot 0: Some(default); cascade.reserve()</text>
    <text x="20" y="107" class="c-mono">&#160;&#160;-&gt; CascadeSlot.</text>
    <text x="20" y="129" class="c-mono">• Refineable::from_cascade(&amp;cascade) -&gt; S.</text>
    <text x="20" y="150" class="c-body" opacity="0.9">• refineable crate'inde durur; çekirdek içeriden kullanmaz.</text>
  </g>

  <g transform="translate(600, 702)">
    <rect width="500" height="160" rx="12" fill="url(#g-rose)" class="card" />
    <text x="250" y="35" class="c-title">MergeFrom — Ayarlar / Tema</text>
    <text x="20" y="66" class="c-mono">• trait MergeFrom { fn merge_from(&amp;mut self,</text>
    <text x="20" y="85" class="c-mono">&#160;&#160;other: &amp;Self); }</text>
    <text x="20" y="107" class="c-mono">• #[derive(MergeFrom)], ExtendingVec&lt;T&gt;, SaturatingBool.</text>
    <text x="20" y="129" class="c-mono">• user_settings.merge_from(&amp;server_settings).</text>
    <text x="20" y="150" class="c-body" opacity="0.9">• Ayarlar ve tema yüklemesinde kullanılır.</text>
  </g>

</svg>
