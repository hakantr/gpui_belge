<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 700">
  <title>GPUI Keymap ve Action Bubbling Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#38bdf8" flood-opacity="0.7" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#e11d48" />
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#f59e0b" />
    </marker>

    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="g-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1f2" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }

      .mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; }
      .card { filter: url(#shadow); }

      .event-arrow { stroke: #e11d48; stroke-width: 4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowRed); stroke-linecap: round; stroke-linejoin: round; }
      .match-arrow { stroke: #f59e0b; stroke-width: 4; fill: none; marker-end: url(#arrowAmber); stroke-linecap: round; stroke-linejoin: round; }

      .edge-red { font: 800 14px system-ui, -apple-system, sans-serif; fill: #e11d48; }
      .edge-amber { font: 800 14px system-ui, -apple-system, sans-serif; fill: #d97706; }

      /* Akan kabarma çizgileri (yukarı doğru) */
      .flow { animation: flow 2.2s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -28; } }

      /* Sıralı vurgu: kabarma sırası 1->2->3 */
      .pulse1 { animation: pulse 9s ease-in-out infinite; }
      .pulse2 { animation: pulse 9s ease-in-out infinite; animation-delay: 3s; }
      .pulse3 { animation: pulse 9s ease-in-out infinite; animation-delay: 6s; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        8% { opacity: 1; }
        18% { opacity: 0.78; }
        33% { opacity: 1; }
      }

      /* Eşleşme paneli nabzı */
      .match-glow { animation: matchglow 9s ease-in-out infinite; animation-delay: 6.4s; }
      @keyframes matchglow {
        0%, 55%, 100% { opacity: 1; filter: url(#shadow); }
        70% { opacity: 1; filter: url(#glow); }
        85% { opacity: 1; filter: url(#shadow); }
      }

      @media (prefers-reduced-motion: reduce) {
        .flow, .pulse1, .pulse2, .pulse3, .match-glow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="580" y="46" class="title">GPUI Keymap ve Action Bubbling Akışı</text>
  <text x="580" y="74" class="sub">Tuş vuruşunun odak ağacından yukarıya doğru action eşleştirmesi</text>

  <!-- ================= BAĞLANTILAR ================= -->
  <!-- Tuş Girişi -->
  <path d="M 140 540 H 180" class="event-arrow flow" />

  <!-- Bubbling: Text Input -> Editor Pane -->
  <path d="M 360 480 V 420" class="event-arrow flow" />
  <text x="380" y="455" class="edge-red">Bubbling ↑</text>

  <!-- Bubbling: Editor Pane -> Workspace -->
  <path d="M 360 300 V 240" class="event-arrow flow" />
  <text x="380" y="275" class="edge-red">Bubbling ↑</text>

  <!-- Eşleştirme Oku -->
  <path d="M 540 180 C 650 180 620 330 720 330" class="match-arrow" />
  <text x="610" y="240" text-anchor="middle" class="edge-amber">Keymap Eşleştirme</text>

  <!-- ================= INPUT KUTUSU ================= -->
  <rect x="40" y="520" width="100" height="40" rx="8" fill="url(#g-chip)" stroke="#e11d48" stroke-width="2" class="card" />
  <text x="90" y="546" text-anchor="middle" class="mono" style="fill:#e11d48">ctrl-s</text>

  <!-- ================= ODAK AĞACI KARTLARI ================= -->
  <!-- 1. Text Input -->
  <g transform="translate(180, 480)" class="pulse1">
    <rect width="360" height="110" rx="12" fill="url(#g-green)" class="card" />
    <text x="180" y="35" class="c-title">Text Input (Etkin Odak)</text>
    <text x="20" y="70" class="c-body">• İlk tuş vuruşu buraya gelir.</text>
    <text x="20" y="95" class="c-body">• Eşleşme yoksa ebeveyne (üst) aktarılır.</text>
  </g>

  <!-- 2. Editor Pane -->
  <g transform="translate(180, 300)" class="pulse2">
    <rect width="360" height="110" rx="12" fill="url(#g-sky)" class="card" />
    <text x="180" y="35" class="c-title">Editor Pane (Üst Odak)</text>
    <text x="20" y="70" class="c-body">• Olayı alır, kendi bağlamında arar.</text>
    <text x="20" y="95" class="c-body">• Eşleşme yoksa yine yukarı aktarır.</text>
  </g>

  <!-- 3. Workspace -->
  <g transform="translate(180, 120)" class="pulse3">
    <rect width="360" height="110" rx="12" fill="url(#g-violet)" class="card" />
    <text x="180" y="35" class="c-title">Workspace (Kök Odak)</text>
    <text x="20" y="70" class="c-body">• Global kısayollar (ctrl-s gibi) buradadır.</text>
    <text x="20" y="95" class="c-body">• Eşleşme bulunur ve Action tetiklenir.</text>
  </g>

  <!-- ================= KEYMAP MATCHER PANELI ================= -->
  <g transform="translate(730, 200)" class="match-glow">
    <rect width="400" height="260" rx="12" fill="url(#g-panel)" stroke="#334155" stroke-width="2" class="card" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 388 A 12 12 0 0 1 400 12 V 50 H 0 Z" fill="url(#g-head)" />

    <text x="200" y="32" text-anchor="middle" class="c-title" style="fill:#38bdf8">Keymap Matcher</text>

    <!-- Gelen Tuş Vuruşu -->
    <rect x="40" y="80" width="100" height="40" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="2" />
    <text x="90" y="106" text-anchor="middle" class="mono" style="fill:#fb7185">ctrl-s</text>

    <!-- Hedef Action -->
    <rect x="200" y="80" width="160" height="40" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2" />
    <text x="280" y="106" text-anchor="middle" class="mono" style="fill:#c4b5fd">workspace::Save</text>

    <!-- Bağlantı -->
    <path d="M 150 100 H 190" class="match-arrow" />

    <text x="200" y="170" text-anchor="middle" class="c-body" style="fill:#cbd5e1">Ağaç boyunca yukarı çıkan (kabaran) olay,</text>
    <text x="200" y="195" text-anchor="middle" class="c-body" style="fill:#cbd5e1">Keymap üzerinde bir eşleşme bulduğu an durur.</text>
    <text x="200" y="235" text-anchor="middle" class="c-body" style="fill:#34d399; font-weight:800">✓ Eşleşme Başarılı &amp; İşlem Tetiklenir</text>
  </g>
</svg>
