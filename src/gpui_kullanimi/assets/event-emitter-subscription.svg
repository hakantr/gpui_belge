<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920">
  <title>EventEmitter ve Subscription Yaşam Döngüsü</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" /><stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e" /><stop offset="1" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b8a6" /><stop offset="1" stop-color="#0d9488" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; }

      .lbl { font: 800 18px system-ui, -apple-system, sans-serif; fill: #0f172a; text-anchor: middle; }

      .arrow-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .card { filter: url(#shadow); }
      .edge { font: 700 12px ui-monospace, SFMono-Regular, monospace; fill: #475569; text-anchor: middle; }

      .flow { stroke-dasharray: 7 7; animation: dash 9s linear infinite; }
      @keyframes dash { 0% { stroke-dashoffset: 28; } 100% { stroke-dashoffset: 0; } }
      @media (prefers-reduced-motion: reduce) { .flow { animation: none; } }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">EventEmitter ve Subscription Yaşam Döngüsü</text>
  <text x="550" y="74" class="sub">Tipli olay üretimi, pending_effects kuyruğu ve abonelik sahipliği birlikte çalışır.</text>

  <!-- ================= AKIŞ: ÜRET → MERKEZ → ABONE ================= -->
  <g transform="translate(60, 110)">
    <rect width="300" height="166" rx="12" fill="url(#g-sky)" class="card" />
    <text x="150" y="32" class="c-title">Üreten: EventEmitter&lt;E&gt;</text>
    <text x="20" y="60" class="c-mono">impl EventEmitter&lt;Kaydedildi&gt;</text>
    <text x="20" y="80" class="c-mono">  for Belge {}</text>
    <text x="20" y="100" class="c-mono">cx.emit(Kaydedildi)</text>
    <text x="20" y="124" class="c-body">• Context&lt;Belge&gt; üzerinden çağrılır</text>
    <text x="20" y="146" class="c-body">• Tip güvenli mesaj yayar</text>
  </g>

  <path d="M 370 193 H 410" class="arrow-line flow" />
  <text x="390" y="183" class="edge">emit</text>

  <g transform="translate(420, 110)">
    <rect width="300" height="166" rx="12" fill="url(#g-purple)" class="card" />
    <text x="150" y="34" class="c-title">Merkez: App pending_effects</text>
    <text x="20" y="72" class="c-body">• cx.notify ve cx.emit kuyruğa girer</text>
    <text x="20" y="100" class="c-body">• flush_effects sırayla tüketir</text>
    <text x="20" y="128" class="c-body">• Kayıtlı Subscription callback'leri çağrılır</text>
  </g>

  <path d="M 730 193 H 770 " class="arrow-line flow" />
  <text x="750" y="183" class="edge">dispatch</text>

  <g transform="translate(780, 110)">
    <rect width="260" height="166" rx="12" fill="url(#g-green)" class="card" />
    <text x="130" y="32" class="c-title">Abone: Subscription</text>
    <text x="20" y="60" class="c-mono">cx.subscribe(&amp;belge,</text>
    <text x="20" y="80" class="c-mono">  |g, b, event, cx| { ... })</text>
    <text x="20" y="106" class="c-body">• Gözlemleyen entity güncellenir</text>
    <text x="20" y="128" class="c-body">• cx.notify ile yeniden çizim ister</text>
  </g>

  <!-- ================= ABONELİK SAHİPLİĞİ ================= -->
  <text x="550" y="318" class="lbl">Subscription Sahiplik Desenleri</text>

  <g transform="translate(60, 338)">
    <rect width="320" height="150" rx="12" fill="url(#g-amber)" class="card" />
    <text x="160" y="34" class="c-title">A. Struct Alanında Saklama</text>
    <text x="20" y="62" class="c-mono">struct Gorunum {</text>
    <text x="20" y="80" class="c-mono">  _abonelikler: Vec&lt;Subscription&gt; }</text>
    <text x="20" y="108" class="c-body">• new() içinde push edilir</text>
    <text x="20" y="130" class="c-body">• Görünüm düşünce kayıt otomatik silinir</text>
  </g>

  <g transform="translate(390, 338)">
    <rect width="320" height="150" rx="12" fill="url(#g-blue)" class="card" />
    <text x="160" y="34" class="c-title">B. .detach()</text>
    <text x="20" y="62" class="c-mono">cx.subscribe(&amp;varlık,</text>
    <text x="20" y="80" class="c-mono">  |...| { ... }).detach();</text>
    <text x="20" y="108" class="c-body">• Sahipten kopuk, view ömrü dışında yaşar</text>
    <text x="20" y="130" class="c-body">• Veri erişimi WeakEntity gerektirir</text>
  </g>

  <g transform="translate(720, 338)">
    <rect width="320" height="150" rx="12" fill="url(#g-rose)" class="card" />
    <text x="160" y="34" class="c-title">C. Yerel let _abonelik</text>
    <text x="20" y="62" class="c-mono">let _abonelik =</text>
    <text x="20" y="80" class="c-mono">  cx.observe(&amp;varlik, ...);</text>
    <text x="20" y="108" class="c-body">• Kapsam sonunda düşer ve iptal olur</text>
    <text x="20" y="130" class="c-body">• Geçici dinleme için uygundur</text>
  </g>

  <!-- ================= API AİLESİ ================= -->
  <text x="550" y="524" class="lbl">Subscribe / Observe API Ailesi</text>

  <g transform="translate(60, 544)">
    <rect width="530" height="184" rx="12" fill="url(#g-teal)" class="card" />
    <text x="265" y="34" class="c-title">Veri ve Event Abonelikleri</text>
    <text x="20" y="66" class="c-mono">• cx.observe(entity, |g, e, cx|)</text>
    <text x="40" y="86" class="c-body">- entity notify ettiğinde tetiklenir</text>
    <text x="20" y="110" class="c-mono">• cx.subscribe(entity, |g, e, &amp;E, cx|)</text>
    <text x="40" y="130" class="c-body">- EventEmitter&lt;E&gt; olaylarında tetiklenir</text>
    <text x="20" y="154" class="c-mono">• cx.observe_release(entity, |g, e, cx|)</text>
    <text x="40" y="174" class="c-body">- entity düşmeden önce son temizlik için</text>
  </g>

  <g transform="translate(600, 544)">
    <rect width="440" height="232" rx="12" fill="url(#g-teal)" class="card" />
    <text x="220" y="34" class="c-title">Pencere ve Global Varyantlar</text>
    <text x="20" y="66" class="c-mono">• cx.observe_global::&lt;G&gt;(|cx|)</text>
    <text x="40" y="86" class="c-body">- global her bildirimde tetiklenir</text>
    <text x="20" y="110" class="c-mono">• observe_window_bounds / activation / appearance</text>
    <text x="20" y="134" class="c-mono">• observe_button_layout_changed</text>
    <text x="20" y="158" class="c-mono">• observe_pending_input</text>
    <text x="20" y="182" class="c-mono">• observe_keystrokes</text>
    <text x="20" y="206" class="c-mono">• cx.on_drop(&amp;weak, |cx|) · AsyncApp::subscribe</text>
  </g>

  <!-- ================= BİLGİ KUTUSU ================= -->
  <g transform="translate(60, 800)">
    <rect width="980" height="84" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <rect width="6" height="84" rx="3" fill="#e11d48" />
    <text x="24" y="34" class="c-body" style="fill:#1e293b">• Subscription drop edildiğinde kayıt otomatik silinir.</text>
    <text x="24" y="60" class="c-body" style="fill:#1e293b">• observe içinden entity.update çağırmak panik verir; cx.defer(|cx|) veya cx.spawn(...) tercih edilir.</text>
  </g>

</svg>
