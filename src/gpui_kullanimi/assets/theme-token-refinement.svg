<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
  <title>Theme Token ve Style Refinement Akışı</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.6" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.6 0 L -1.6 1.9 L -1.6 -1.9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" /><stop offset="1" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" /><stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" /><stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-blue-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff" /><stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="g-amber-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbeb" /><stop offset="1" stop-color="#fef3c7" />
    </linearGradient>
    <linearGradient id="g-green-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5" /><stop offset="1" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="g-indigo-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff" /><stop offset="1" stop-color="#e0e7ff" />
    </linearGradient>
    <linearGradient id="g-rose-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1f2" /><stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.96; }
      .c-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; opacity: 0.92; }

      .card { filter: url(#shadow); }
      .arrow-soft { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }

      .label-title { font: 800 16px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .label-body { font: 600 14px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .label-mono { font: 700 14px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; opacity: 0.95; }

      .panel-title { font: 800 18px system-ui, -apple-system, sans-serif; }
      .panel-body { font: 500 14px system-ui, -apple-system, sans-serif; fill: #334155; }

      /* Sıralı akış vurgusu — okunabilirliği bozmadan */
      .flow1 { animation: pulse1 9s ease-in-out infinite; }
      .flow2 { animation: pulse2 9s ease-in-out infinite; }
      .flow3 { animation: pulse3 9s ease-in-out infinite; }
      @keyframes pulse1 { 0%,100% { opacity: 1; } 22%,78% { opacity: 0.82; } }
      @keyframes pulse2 { 0% { opacity: 1; } 11% { opacity: 0.82; } 33% { opacity: 1; } 100% { opacity: 0.94; } }
      @keyframes pulse3 { 0% { opacity: 1; } 22% { opacity: 0.82; } 44% { opacity: 1; } 100% { opacity: 0.94; } }

      .dashflow { stroke-dasharray: 7 7; animation: dashmove 9s linear infinite; }
      @keyframes dashmove { to { stroke-dashoffset: -56; } }

      @media (prefers-reduced-motion: reduce) {
        .flow1, .flow2, .flow3, .dashflow { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">Theme Token ve Style Refinement Akışı</text>
  <text x="550" y="74" class="sub">Tema ailesi ve kullanıcı ayarları token değerlerine, token'lar da element style refinement'larına dönüşür.</text>

  <!-- ================= 3 ADIMLIK AKIŞ ================= -->
  <g transform="translate(60, 110)" class="flow1">
    <rect width="280" height="138" rx="12" fill="url(#g-sky)" class="card" />
    <text x="140" y="34" class="c-title">1. ThemeFamily</text>
    <text x="20" y="68" class="c-body">• JSON tema ailesi ve varyantlar.</text>
    <text x="20" y="93" class="c-body">• Light / dark appearance bilgisi.</text>
    <text x="20" y="118" class="c-mono">• ThemeRegistry</text>
  </g>

  <path d="M 340 179 H 382" class="arrow-soft flow2" />

  <g transform="translate(390, 110)" class="flow2">
    <rect width="280" height="138" rx="12" fill="url(#g-violet)" class="card" />
    <text x="140" y="34" class="c-title">2. Settings Merge</text>
    <text x="20" y="68" class="c-body">• Kullanıcı, server ve project override.</text>
    <text x="20" y="93" class="c-body">• ThemeSettings seçimi belirler.</text>
    <text x="20" y="118" class="c-mono">• reload_theme(cx)</text>
  </g>

  <path d="M 670 179 H 712" class="arrow-soft flow3" />

  <g transform="translate(720, 110)" class="flow3">
    <rect width="320" height="138" rx="12" fill="url(#g-green)" class="card" />
    <text x="160" y="34" class="c-title">3. Theme Token'ları</text>
    <text x="20" y="62" class="c-body">• ThemeColors, StatusColors,</text>
    <text x="20" y="83" class="c-body">  HighlightStyle vb.</text>
    <text x="20" y="106" class="c-body">• Refinement ile eksik alanlar dolar.</text>
    <text x="20" y="128" class="c-mono">• ThemeColorsRefinement</text>
  </g>

  <!-- ================= UYGULAMA MANTIĞI ================= -->

  <g transform="translate(140, 320)">
    <rect width="240" height="124" rx="12" fill="url(#g-blue-soft)" stroke="#2563eb" stroke-width="2" class="card" />
    <text x="120" y="38" class="label-title" style="fill:#1d4ed8">UI Token</text>
    <text x="120" y="66" class="label-mono" style="fill:#2563eb">cx.theme().colors().text</text>
    <text x="120" y="92" class="label-body" style="fill:#3b82f6">text, background, border</text>
    <text x="120" y="113" class="label-body" style="fill:#3b82f6">status, accent, warning</text>
  </g>

  <g transform="translate(430, 320)">
    <rect width="240" height="124" rx="12" fill="url(#g-amber-soft)" stroke="#d97706" stroke-width="2" class="card" />
    <text x="120" y="38" class="label-title" style="fill:#b45309">StyleRefinement</text>
    <text x="120" y="66" class="label-mono" style="fill:#d97706">.text_color(token)</text>
    <text x="120" y="92" class="label-mono" style="fill:#d97706">.bg(token)</text>
    <text x="120" y="113" class="label-mono" style="fill:#d97706">.border_color(token)</text>
  </g>

  <g transform="translate(720, 320)">
    <rect width="240" height="124" rx="12" fill="url(#g-green-soft)" stroke="#059669" stroke-width="2" class="card" />
    <text x="120" y="36" class="label-title" style="fill:#047857">Paint Output</text>
    <text x="120" y="60" class="label-body" style="fill:#059669">Element final Style üretir.</text>
    <text x="120" y="80" class="label-body" style="fill:#059669">Renderer renkleri</text>
    <text x="120" y="98" class="label-body" style="fill:#059669">primitive'e yazar.</text>
    <text x="120" y="118" class="label-mono" style="fill:#10b981">paint_quad</text>
  </g>

  <path d="M 380 382 H 422" class="arrow-soft dashflow" />
  <path d="M 670 382 H 712" class="arrow-soft dashflow" />

  <!-- Kavisli geri besleme oku: tema değişimi yeniden render tetikler -->
  <path d="M 840 320 C 840 282 260 282 260 318" class="arrow-soft dashflow" />
  <text x="550" y="288" class="label-body" style="fill:#64748b">tema değişince yeniden render</text>

  <!-- ================= BİLGİ PANELLERİ ================= -->

  <g transform="translate(60, 512)">
    <rect width="470" height="158" rx="12" fill="url(#g-indigo-soft)" stroke="#6366f1" stroke-width="2" class="card" />
    <text x="32" y="42" class="panel-title" style="fill:#4f46e5">Tema Değişince</text>
    <line x1="32" y1="56" x2="438" y2="56" stroke="#c7d2fe" stroke-width="1.5" />
    <text x="32" y="84" class="panel-body">• ThemeRegistry yeni aktif temayı seçer.</text>
    <text x="32" y="110" class="panel-body">• SettingsStore veya ThemeRegistry gözlemcileri notify eder.</text>
    <text x="32" y="136" class="panel-body">• Elementler sonraki render'da yeni token okur.</text>
  </g>

  <g transform="translate(570, 512)">
    <rect width="470" height="158" rx="12" fill="url(#g-rose-soft)" stroke="#e11d48" stroke-width="2" class="card" />
    <text x="32" y="42" class="panel-title" style="fill:#e11d48">Yerel Override Sınırı</text>
    <line x1="32" y1="56" x2="438" y2="56" stroke="#fecdd3" stroke-width="1.5" />
    <text x="32" y="84" class="panel-body">• Element style'ı token'ı doğrudan ezebilir.</text>
    <text x="32" y="110" class="panel-body">• Bileşen sistemi token kullanımını tercih ederek</text>
    <text x="32" y="136" class="panel-body">  tema değişiminde tutarlılığı korur.</text>
  </g>

</svg>
