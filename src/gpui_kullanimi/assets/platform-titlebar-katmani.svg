<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560">
  <title>platform_title_bar Katmanı</title>
  <desc>Platforma göre pencere kontrol butonlarını, sürükleme alanını, yerel sekmeleri ve ürün başlığı çocuklarını bir araya getiren başlık çubuğu katmanı.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#64748b" />
    </marker>

    <linearGradient id="g-shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f6" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="g-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px ui-monospace, SFMono-Regular, monospace; fill: #ffffff; text-anchor: middle; }
      .c-body { font: 600 14px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.95; text-anchor: middle; }

      .note { font: 500 12px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }
      .ink { font: 600 14px system-ui, -apple-system, sans-serif; fill: #334155; text-anchor: middle; }

      .card { filter: url(#shadow); rx: 12px; }
      .layer { rx: 12px; stroke-width: 2; }

      .flow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flow-dash { stroke-dasharray: 7 6; animation: flow-move 9s linear infinite; }
      @keyframes flow-move { to { stroke-dashoffset: -130; } }

      @media (prefers-reduced-motion: reduce) {
        .flow-dash { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">platform_title_bar: Platform Kabuğu</text>
  <text x="550" y="74" class="sub">Pencere mekaniğini bilir; ürün içeriğini çocuk element olarak alır.</text>

  <!-- ================= ANA KABUK ================= -->
  <g transform="translate(60, 110)">
    <rect width="980" height="210" fill="url(#g-shell)" stroke="#cbd5e1" class="layer" filter="url(#shadow)" />

    <!-- Başlık Çubuğu Yüzeyi -->
    <rect x="20" y="20" width="940" height="84" fill="#ffffff" stroke="#94a3b8" class="layer" />

    <!-- PlatformTitleBar Etiketi -->
    <rect x="20" y="20" width="940" height="30" fill="url(#g-bar)" rx="10" />
    <path d="M 20 40 H 960 V 50 H 20 Z" fill="#334155" />
    <text x="40" y="40" font-family="ui-monospace, monospace" font-weight="700" font-size="14" fill="#ffffff">PlatformTitleBar</text>

    <!-- macOS Işıkları -->
    <circle cx="62" cy="77" r="8" fill="#ef4444" />
    <circle cx="87" cy="77" r="8" fill="#f59e0b" />
    <circle cx="112" cy="77" r="8" fill="#22c55e" />
    <text x="87" y="124" class="note">macOS trafik ışığı alanı</text>

    <!-- Sürükleme ve Sekme Alanı -->
    <rect x="200" y="62" width="450" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="425" y="82" class="ink">sürükleme alanı ve yerel sekme boşluğu</text>

    <!-- Win/Lin Butonları -->
    <rect x="680" y="62" width="80" height="30" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" />
    <text x="720" y="82" font-family="system-ui" font-size="14" fill="#0284c7" text-anchor="middle">min</text>

    <rect x="770" y="62" width="80" height="30" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" />
    <text x="810" y="82" font-family="system-ui" font-size="14" fill="#0284c7" text-anchor="middle">max</text>

    <rect x="860" y="62" width="80" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5" />
    <text x="900" y="82" font-family="system-ui" font-size="14" fill="#be123c" text-anchor="middle">close</text>

    <text x="810" y="124" class="note">Windows/Linux kontrol butonları</text>

    <!-- Ürün Başlığı Çocukları -->
    <rect x="150" y="150" width="680" height="42" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="490" y="176" font-family="system-ui" font-size="14" fill="#334155" text-anchor="middle" font-weight="700">ürün başlığı çocukları: menü, proje adı, kullanıcı alanı, aksiyonlar</text>
  </g>

  <!-- ================= BAĞLANTILAR ================= -->
  <!-- PlatformStyle -> kabuk -->
  <path d="M 200 410 C 200 370 150 360 150 332" class="flow flow-dash" />
  <!-- Servisler -> kabuk (orta) -->
  <path d="M 550 410 L 550 332" class="flow flow-dash" />
  <!-- App Action -> kabuk -->
  <path d="M 900 410 C 900 370 950 360 950 332" class="flow flow-dash" />

  <!-- ================= ALT KARTLAR ================= -->

  <g transform="translate(60, 410)">
    <rect width="280" height="110" fill="url(#g-blue)" class="card" />
    <text x="140" y="42" class="c-title">PlatformStyle</text>
    <text x="140" y="70" class="c-body">platformu belirler</text>
    <text x="140" y="90" class="c-body" font-size="13">macOS / Windows / Linux</text>
  </g>

  <g transform="translate(410, 410)">
    <rect width="280" height="110" fill="url(#g-green)" class="card" />
    <text x="140" y="34" class="c-title">Window ve Servisler</text>
    <text x="140" y="62" class="c-body" font-size="13">hit-test, minimize, maximize, close</text>
    <text x="140" y="84" class="c-body" font-size="13">sekme ve sürükleme davranışı</text>
  </g>

  <g transform="translate(760, 410)">
    <rect width="280" height="110" fill="url(#g-violet)" class="card" />
    <text x="140" y="42" class="c-title">App Action</text>
    <text x="140" y="70" class="c-body">kapatma kararı</text>
    <text x="140" y="90" class="c-body" font-size="13">üründen gelir</text>
  </g>

</svg>
