<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>GPUI görev ve yürütücü mimarisi</title>
  <defs>
    <marker id="aSlate" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#64748b" stroke="#64748b" stroke-width="1pt" />
    </marker>
    <marker id="dot-aSlate" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#64748b" />
    </marker>
    <marker id="aEmerald" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#059669" stroke="#059669" stroke-width="1pt" />
    </marker>
    <marker id="dot-aEmerald" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#059669" />
    </marker>
    <marker id="aViolet" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#7c3aed" stroke="#7c3aed" stroke-width="1pt" />
    </marker>
    <marker id="dot-aViolet" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#7c3aed" />
    </marker>
    <marker id="aCyan" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#0891b2" stroke="#0891b2" stroke-width="1pt" />
    </marker>
    <marker id="dot-aCyan" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#0891b2" />
    </marker>
    <marker id="aAmber" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#d97706" stroke="#d97706" stroke-width="1pt" />
    </marker>
    <marker id="dot-aAmber" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#d97706" />
    </marker>
    <marker id="aRose" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#be123c" stroke="#be123c" stroke-width="1pt" />
    </marker>
    <marker id="dot-aRose" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#be123c" />
    </marker>
    <marker id="aSky" viewBox="0 0 1 1" refX="0" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 5.77 0 L -2.88 5 V -5 Z" transform="scale(0.5)" fill="#0284c7" stroke="#0284c7" stroke-width="1pt" />
    </marker>
    <marker id="dot-aSky" viewBox="0 0 7 7" refX="3.5" refY="3.5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="3.5" fill="#0284c7" />
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#475569}
      .h{font-size:13px;font-weight:700;fill:#0f172a}
      .t{font-size:12px;font-weight:600;fill:#0f172a}
      .body{font-size:11px;fill:#475569}
      .small{font-size:10px;fill:#64748b}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;fill:#0f172a}
      .card{fill:#fff;stroke-width:1.6}
      .tEmerald{fill:#059669}.tViolet{fill:#7c3aed}.tCyan{fill:#0891b2}.tAmber{fill:#d97706}.tRose{fill:#be123c}.tSky{fill:#0284c7}.tSlate{fill:#64748b}.tWhite{fill:#fff}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#aSlate); marker-start: url(#dot-aSlate)}
      .aEm{stroke:#059669;marker-end:url(#aEmerald); marker-start: url(#dot-aEmerald)}.aVi{stroke:#7c3aed;marker-end:url(#aViolet); marker-start: url(#dot-aViolet)}.aCy{stroke:#0891b2;marker-end:url(#aCyan); marker-start: url(#dot-aCyan)}.aAm{stroke:#d97706;marker-end:url(#aAmber); marker-start: url(#dot-aAmber)}.aRo{stroke:#be123c;marker-end:url(#aRose); marker-start: url(#dot-aRose)}.aSk{stroke:#0284c7;marker-end:url(#aSky); marker-start: url(#dot-aSky)}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#f8fafc"/>

  <text x="400" y="40" text-anchor="middle" class="title">GPUI Görev ve Yürütücü (Executor) Mimarisi</text>
  <text x="400" y="63" text-anchor="middle" class="sub">ForegroundExecutor ve BackgroundExecutor iş paylaşım modeli</text>

  <!-- ForegroundExecutor (UI iş parçacığı) -->
  <g transform="translate(60,140)">
    <rect width="280" height="280" rx="12" class="card" stroke="#059669"/>
    <text x="140" y="30" text-anchor="middle" class="h">ForegroundExecutor (UI İş Parçacığı)</text>
    <text x="140" y="50" text-anchor="middle" class="small">Ana iş parçacığı ve UI güncellemeleri</text>
    <rect x="20" y="80" width="240" height="170" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="140" y="105" text-anchor="middle" class="t tEmerald">Görev sırası (Task Queue)</text>
    <rect x="40" y="125" width="200" height="30" rx="6" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1"/>
    <text x="140" y="144" text-anchor="middle" class="body">cx.notify() / yeniden çizim</text>
    <rect x="40" y="165" width="200" height="30" rx="6" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="1"/>
    <text x="140" y="184" text-anchor="middle" class="body">Eşzamansız güncelleme (UI sonucu)</text>
    <rect x="40" y="205" width="200" height="30" rx="6" fill="#be123c" fill-opacity="0.1" stroke="#be123c" stroke-width="1"/>
    <text x="140" y="224" text-anchor="middle" class="body">Kullanıcı girdisi olay dağıtımı</text>
  </g>

  <!-- BackgroundExecutor (iş parçacığı havuzu) -->
  <g transform="translate(460,140)">
    <rect width="280" height="280" rx="12" class="card" stroke="#0284c7"/>
    <text x="140" y="30" text-anchor="middle" class="h">BackgroundExecutor (İş Parçacığı Havuzu)</text>
    <text x="140" y="50" text-anchor="middle" class="small">Eşzamansız G/Ç ve ağır hesaplamalar</text>
    <rect x="25" y="80" width="110" height="80" rx="8" fill="#0284c7" fill-opacity="0.06" stroke="#0284c7" stroke-width="1"/>
    <text x="80" y="115" text-anchor="middle" class="t">İş parçacığı 1</text>
    <text x="80" y="135" text-anchor="middle" class="small">İşleniyor...</text>
    <rect x="145" y="80" width="110" height="80" rx="8" fill="#0284c7" fill-opacity="0.06" stroke="#0284c7" stroke-width="1"/>
    <text x="200" y="115" text-anchor="middle" class="t">İş parçacığı 2</text>
    <text x="200" y="135" text-anchor="middle" class="small">Boşta</text>
    <rect x="25" y="175" width="230" height="75" rx="8" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-width="1"/>
    <text x="140" y="205" text-anchor="middle" class="t tAmber">Zamanlayıcı (Timer Service)</text>
    <text x="140" y="227" text-anchor="middle" class="mono" font-size="10">cx.background_executor().timer()</text>
  </g>

  <!-- Görev devri: Foreground -> Background -->
  <path d="M 340 190 Q 400 150 460 190" class="arrow aSk"/>
  <text x="400" y="143" text-anchor="middle" class="small tSky mono" font-weight="600">background_spawn()</text>

  <!-- Görev tamamlanması: Background -> Foreground -->
  <path d="M 460 370 Q 400 410 340 370" class="arrow aEm"/>
  <text x="400" y="422" text-anchor="middle" class="small tEmerald mono" font-weight="600">cx.update()</text>
</svg>
