<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tasarım Paleti ve Gölgeler -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161d"/>
      <stop offset="100%" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- CSS Animasyonları -->
    <style>
      .pulse-fast {
        animation: pulseFast 1.5s infinite alternate;
      }
      .dash-flow {
        stroke-dasharray: 8, 8;
        animation: dashMove 20s linear infinite;
      }
      .dash-flow-reverse {
        stroke-dasharray: 8, 8;
        animation: dashMoveReverse 20s linear infinite;
      }
      .glow-box {
        animation: boxGlow 4s ease-in-out infinite;
      }
      .text-style {
        font-family: 'Outfit', 'Inter', sans-serif;
        fill: #f8f8f2;
      }

      @keyframes pulseFast {
        0% { opacity: 0.8; }
        100% { opacity: 1; transform: scale(1.02); }
      }
      @keyframes dashMove {
        to { stroke-dashoffset: -1000; }
      }
      @keyframes dashMoveReverse {
        to { stroke-dashoffset: 1000; }
      }
      @keyframes boxGlow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(189, 147, 249, 0.2)); }
        50% { filter: drop-shadow(0 0 8px rgba(189, 147, 249, 0.6)); }
      }
    </style>
  </defs>

  <!-- Arka Plan -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="99.5%" height="99.5%" x="0.25%" y="0.25%" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Başlık -->
  <text x="40" y="45" class="text-style" font-size="20" font-weight="700" letter-spacing="0.5">GPUI Görev ve Yürütücü (Executor) Mimarisi</text>
  <text x="40" y="68" fill="#6272a4" font-family="sans-serif" font-size="12">ForegroundExecutor ve BackgroundExecutor İş Paylaşım Modeli</text>

  <!-- KUTULAR -->

  <!-- Foreground Executor (UI Thread) -->
  <g transform="translate(60, 140)" filter="url(#shadow)">
    <rect width="280" height="280" rx="12" fill="#21222c" stroke="#50fa7b" stroke-width="2"/>
    <text x="140" y="30" class="text-style" font-size="14" font-weight="600" text-anchor="middle">ForegroundExecutor (UI Thread)</text>
    <text x="140" y="50" fill="#6272a4" font-size="11" text-anchor="middle">Ana İş Parçacığı &amp; UI Güncellemeleri</text>
    
    <!-- UI Tasks Queue -->
    <rect x="20" y="80" width="240" height="170" rx="8" fill="#14161d" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="140" y="105" fill="#50fa7b" font-size="12" font-weight="600" text-anchor="middle">Görev Sırası (Task Queue)</text>
    
    <!-- Queue Items -->
    <rect x="40" y="125" width="200" height="30" rx="6" fill="#50fa7b" fill-opacity="0.15" stroke="#50fa7b" stroke-width="1"/>
    <text x="140" y="144" fill="#f8f8f2" font-size="11" text-anchor="middle">cx.notify() / Redraw</text>
    
    <rect x="40" y="165" width="200" height="30" rx="6" fill="#bd93f9" fill-opacity="0.15" stroke="#bd93f9" stroke-width="1"/>
    <text x="140" y="184" fill="#f8f8f2" font-size="11" text-anchor="middle">Async Update (UI Result)</text>

    <rect x="40" y="205" width="200" height="30" rx="6" fill="#ff5555" fill-opacity="0.15" stroke="#ff5555" stroke-width="1"/>
    <text x="140" y="224" fill="#f8f8f2" font-size="11" text-anchor="middle">User Input Event Dispatch</text>
  </g>

  <!-- Background Executor (Thread Pool) -->
  <g transform="translate(460, 140)" filter="url(#shadow)" class="glow-box">
    <rect width="280" height="280" rx="12" fill="#21222c" stroke="#8be9fd" stroke-width="2"/>
    <text x="140" y="30" class="text-style" font-size="14" font-weight="600" text-anchor="middle">BackgroundExecutor (ThreadPool)</text>
    <text x="140" y="50" fill="#6272a4" font-size="11" text-anchor="middle">Asenkron I/O &amp; Ağır Hesaplamalar</text>

    <!-- Thread Pool Workers -->
    <rect x="25" y="80" width="110" height="80" rx="8" fill="#14161d" stroke="#8be9fd" stroke-width="1"/>
    <text x="80" y="115" fill="#f8f8f2" font-size="11" text-anchor="middle" font-weight="600">Thread 1</text>
    <text x="80" y="135" fill="#6272a4" font-size="10" text-anchor="middle">İşleniyor...</text>

    <rect x="145" y="80" width="110" height="80" rx="8" fill="#14161d" stroke="#8be9fd" stroke-width="1"/>
    <text x="200" y="115" fill="#f8f8f2" font-size="11" text-anchor="middle" font-weight="600">Thread 2</text>
    <text x="200" y="135" fill="#6272a4" font-size="10" text-anchor="middle">Boşta</text>

    <rect x="25" y="175" width="230" height="75" rx="8" fill="#14161d" stroke="#ffb86c" stroke-width="1"/>
    <text x="140" y="205" fill="#ffb86c" font-size="11" font-weight="600" text-anchor="middle">Zamanlayıcı (Timer Service)</text>
    <text x="140" y="225" fill="#6272a4" font-size="10" text-anchor="middle">cx.background_executor().timer()</text>
  </g>

  <!-- AKIŞ HATLARI (FLOW LINES) -->

  <!-- Task Spawn: Foreground -> Background (cx.background_spawn) -->
  <path d="M 340 190 Q 400 150 460 190" fill="none" stroke="#bd93f9" stroke-width="2"/>
  <path d="M 340 190 Q 400 150 460 190" fill="none" stroke="#8be9fd" stroke-dasharray="6, 10" stroke-width="3" class="dash-flow"/>
  <polygon points="460,190 450,183 453,194" fill="#8be9fd"/>
  <text x="400" y="145" fill="#8be9fd" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">background_spawn()</text>

  <!-- Task Completion / UI Update: Background -> Foreground (cx.spawn update) -->
  <path d="M 460 370 Q 400 410 340 370" fill="none" stroke="#ffb86c" stroke-width="2"/>
  <path d="M 460 370 Q 400 410 340 370" fill="none" stroke="#50fa7b" stroke-dasharray="6, 10" stroke-width="3" class="dash-flow-reverse"/>
  <polygon points="340,370 350,377 347,366" fill="#50fa7b"/>
  <text x="400" y="420" fill="#50fa7b" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">cx.update()</text>

</svg>
