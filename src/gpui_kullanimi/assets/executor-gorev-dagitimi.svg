<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820">
  <title>GPUI Görev ve Yürütücü Mimarisi</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrow" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-sky" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#0284c7" />
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 1 1" refX="0.4" refY="0" markerWidth="1" markerHeight="1" orient="auto-start-reverse" overflow="visible" preserveAspectRatio="xMidYMid">
      <path d="M 1.4 0 L -1 1.5 L -1 -1.5 Z" fill="#059669" />
    </marker>

    <!-- Degradeler -->
    <linearGradient id="g-panel-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f0fdf4" />
    </linearGradient>
    <linearGradient id="g-panel-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f0f9ff" />
    </linearGradient>
    <linearGradient id="g-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185" />
      <stop offset="1" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="g-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#f1f5f9" />
    </linearGradient>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 26px system-ui, -apple-system, sans-serif; fill: #0f172a; letter-spacing: -0.5px; text-anchor: middle; }
      .sub { font: 500 16px system-ui, -apple-system, sans-serif; fill: #64748b; text-anchor: middle; }

      .c-title { font: 800 18px system-ui, -apple-system, sans-serif; text-anchor: middle; }
      .c-sub { font: 600 14px system-ui, -apple-system, sans-serif; opacity: 0.85; text-anchor: middle; }
      .c-body { font: 700 14px system-ui, -apple-system, sans-serif; text-anchor: middle; fill: #ffffff; }
      .c-dark { font: 600 14px system-ui, -apple-system, sans-serif; text-anchor: middle; fill: #334155; }
      .c-mono { font: 700 13px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }

      .panel { rx: 16px; stroke-width: 2; filter: url(#shadow); }
      .box { rx: 10px; stroke-width: 1.5; filter: url(#shadow); }
      .dashbox { rx: 12px; stroke-width: 1.5; }

      .arrow-line { stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .edge { font: 700 13px ui-monospace, SFMono-Regular, monospace; text-anchor: middle; }
      .info { font: 500 14px system-ui, -apple-system, sans-serif; fill: #334155; }

      /* Akan kesik çizgi animasyonu (görev devri) */
      .flow-to-bg { stroke: #0284c7; stroke-dasharray: 9 7; animation: dash-fwd 9s linear infinite; }
      .flow-to-fg { stroke: #059669; stroke-dasharray: 9 7; animation: dash-bwd 9s linear infinite; }
      @keyframes dash-fwd { from { stroke-dashoffset: 32; } to { stroke-dashoffset: 0; } }
      @keyframes dash-bwd { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 32; } }
      @media (prefers-reduced-motion: reduce) {
        .flow-to-bg, .flow-to-fg { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="12" class="bg" />

  <text x="550" y="46" class="title">GPUI Görev ve Yürütücü (Executor) Mimarisi</text>
  <text x="550" y="74" class="sub">ForegroundExecutor ve BackgroundExecutor iş paylaşım modeli</text>

  <!-- ================= FOREGROUND EXECUTOR ================= -->
  <g transform="translate(60, 140)">
    <rect width="400" height="430" fill="url(#g-panel-emerald)" stroke="#059669" class="panel" />
    <text x="200" y="42" class="c-title" fill="#059669">ForegroundExecutor</text>
    <text x="200" y="66" class="c-sub" fill="#059669">UI İş Parçacığı / Ana iş parçacığı</text>

    <!-- Görev sırası -->
    <rect x="36" y="92" width="328" height="306" fill="#f1f5f9" stroke="#cbd5e1" class="dashbox" stroke-dasharray="6 4" />
    <text x="200" y="122" class="c-title" fill="#334155">Görev Sırası (Task Queue)</text>

    <rect x="60" y="148" width="280" height="62" fill="url(#g-emerald)" stroke="#059669" class="box" />
    <text x="200" y="184" class="c-body">cx.notify() / Yeniden Çizim</text>

    <rect x="60" y="226" width="280" height="62" fill="url(#g-violet)" stroke="#7c3aed" class="box" />
    <text x="200" y="262" class="c-body">Eşzamansız Güncelleme (UI Sonucu)</text>

    <rect x="60" y="304" width="280" height="62" fill="url(#g-rose)" stroke="#e11d48" class="box" />
    <text x="200" y="340" class="c-body">Kullanıcı Girdisi Olay Dağıtımı</text>
  </g>

  <!-- ================= BACKGROUND EXECUTOR ================= -->
  <g transform="translate(640, 140)">
    <rect width="400" height="430" fill="url(#g-panel-sky)" stroke="#0284c7" class="panel" />
    <text x="200" y="42" class="c-title" fill="#0284c7">BackgroundExecutor</text>
    <text x="200" y="66" class="c-sub" fill="#0284c7">İş Parçacığı Havuzu (Thread Pool)</text>

    <!-- İş parçacığı 1 -->
    <rect x="36" y="92" width="160" height="130" fill="url(#g-sky)" stroke="#0284c7" class="box" />
    <text x="116" y="140" class="c-body">İş Parçacığı 1</text>
    <text x="116" y="178" class="c-sub" fill="#ffffff">İşleniyor...</text>

    <!-- İş parçacığı 2 -->
    <rect x="204" y="92" width="160" height="130" fill="#e0f2fe" stroke="#38bdf8" class="box" />
    <text x="284" y="140" class="c-dark" style="fill:#0369a1;font-weight:700">İş Parçacığı 2</text>
    <text x="284" y="178" class="c-sub" style="fill:#64748b">Boşta</text>

    <!-- Zamanlayıcı -->
    <rect x="36" y="250" width="328" height="120" fill="url(#g-amber)" stroke="#d97706" class="box" />
    <text x="200" y="296" class="c-title" fill="#ffffff">Zamanlayıcı (Timer Service)</text>
    <text x="200" y="332" class="c-mono" fill="#ffffff">cx.background_executor().timer()</text>
  </g>

  <!-- ================= OKLAR ================= -->
  <!-- Görev devri: Foreground -> Background -->
  <path d="M 460 230 Q 550 168 640 230" class="arrow-line flow-to-bg" marker-end="url(#arrow-sky)" />
  <rect x="478" y="148" width="144" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="550" y="166" class="edge" style="fill:#0284c7">background_spawn()</text>

  <!-- Görev tamamlanması: Background -> Foreground -->
  <path d="M 640 350 Q 550 412 460 350" class="arrow-line flow-to-fg" marker-end="url(#arrow-emerald)" />
  <rect x="500" y="406" width="100" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="550" y="424" class="edge" style="fill:#059669">cx.update()</text>

  <!-- ================= BİLGİ KUTUSU ================= -->
  <g transform="translate(60, 612)">
    <rect width="980" height="156" rx="12" fill="url(#g-info)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="28" y="40" class="c-title" text-anchor="start" fill="#0f172a" style="font-size:16px">Akış özeti</text>

    <circle cx="38" cy="74" r="4" fill="#0284c7" />
    <text x="56" y="79" class="info" text-anchor="start">Eşzamansız G/Ç ve ağır hesaplamalar, UI iş parçacığını kilitlememesi için BackgroundExecutor'a devredilir.</text>

    <circle cx="38" cy="106" r="4" fill="#059669" />
    <text x="56" y="111" class="info" text-anchor="start">Sonuçlar cx.update() ile UI iş parçacığına geri döndürülerek ekrana yansıtılır.</text>

    <circle cx="38" cy="138" r="4" fill="#d97706" />
    <text x="56" y="143" class="info" text-anchor="start">Zamanlayıcı (timer), gecikmeli ve süreli görevleri UI'yi bloke etmeden BackgroundExecutor üzerinde yürütür.</text>
  </g>

</svg>
