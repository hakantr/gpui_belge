[book]
title = "Zed GPUI Kullanım Haritası"
description = "Zed içinde pencere, başlık çubuğu, dekorasyon, platforma özel davranış, blur/transparency ve UI bileşeni geliştirirken doğru dosyaya ve API'ye yönelmek için kapsamlı başvuru rehberi."
language = "tr"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = ""
edit-url-template = ""
mathjax-support = false
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
